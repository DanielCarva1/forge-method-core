meta:
  topic: "@oh-my-pi/pi-natives — compatibilidade e riscos vs @earendil-works/pi-coding-agent"
  query: "pi-natives é puramente benéfico ou há tradeoffs/riscos para o usuário de @earendil-works/pi-coding-agent em WSL Linux x64?"
  date: 2026-06-26
  researcher_model: glm-4.6-researcher
  confidence: high
  sources_consulted: 12

key_findings:
  - id: F1
    finding: "PREMISSA INCORRETA — @oh-my-pi/pi-natives NÃO é um pacote companion de @earendil-works/pi-coding-agent. São projetos totalmente diferentes."
    evidence: >
      @oh-my-pi/pi-natives pertence ao repo can1357/oh-my-pi (conhecido como "omp"),
      que é um FORK de badlogic/pi-mono por @mariozechner — um agente de código
      completamente diferente do @earendil-works/pi-coding-agent (repo earendil-works/pi).
      Os escopos npm são distintos: @oh-my-pi/ vs @earendil-works/.
      O earendil-works/pi NÃO importa nada de @oh-my-pi/pi-natives em qualquer
      parte do seu código ou dependências.
    sources:
      - https://www.npmjs.com/package/@oh-my-pi/pi-natives
      - https://github.com/can1357/oh-my-pi
      - https://github.com/earendil-works/pi

  - id: F2
    finding: "omp (can1357/oh-my-pi) é um agente separado com seu próprio @oh-my-pi/pi-coding-agent, CLI 'omp', e nativos integrados"
    evidence: >
      README do omp: 'Fork of Pi by @mariozechner'. Publica @oh-my-pi/pi-coding-agent
      (não @earendil-works/). Site omp.sh. ~55k linhas de Rust core.
      pi-natives é uma dependência interna do omp, não uma extensão opcional
      para terceiros.
    sources:
      - https://github.com/can1357/oh-my-pi
      - https://www.npmjs.com/package/@oh-my-pi/pi-coding-agent

  - id: F3
    finding: "O que pi-nativos faz (internamente para omp): grep/ripgrep, clipboard, SIXEL, syntax highlighting, PTY, shell, AST grep, token counting — tudo via N-API Rust"
    evidence: >
      Módulos Rust: grep, clipboard, highlight, pty, shell, ast, sixel, tokens,
      summary, html, fs_cache, workspace, etc. ~7.500+ linhas Rust.
      Plataformas suportadas: linux-x64, linux-arm64, darwin-x64, darwin-arm64, win32-x64.
      Binários pré-compilados via optionalDependencies por plataforma (leaf packages).
      x64 tem variantes modern (AVX2) e baseline.
    sources:
      - https://github.com/can1357/oh-my-pi/blob/refs/heads/main/docs/natives-architecture.md
      - https://github.com/can1357/oh-my-pi/blob/dc6446c1/packages/natives/scripts/gen-npm-packages.ts

  - id: F4
    finding: "O @earendil-works/pi-coding-agent TEM seus próprios bindings nativos — mas usa @mariozechner/clipboard, não pi-natives"
    evidence: >
      scripts/build-binaries.sh de earendil-works/pi referencia
      optionalDependencies['@mariozechner/clipboard']. Issue #3621 mostra panic
      Rust em copyToClipboard (src/lib.rs). Release v0.77.0 menciona update
      do native clipboard addon para napi-rs 3.x.
      Portanto: pi já tem clipboard nativo próprio; grep/shell usam implementações
      JS/TS nativas do próprio pi.
    sources:
      - https://github.com/earendil-works/pi/blob/main/scripts/build-binaries.sh
      - https://github.com/earendil-works/pi/issues/3621
      - https://github.com/earendil-works/pi/releases/tag/v0.77.0

  - id: F5
    finding: "Risco real de binário nativo: issues documentadas de crash em WSL e Windows após upgrade v14.x (addon não resolvido)"
    evidence: >
      Issue #684: crash em startup em WSL Linux-x64 E Windows nativo após upgrade
      para v14.x — 'Failed to load pi_natives native addon for linux-x64 (modern)'.
      Issue #727: falha em linux-arm64. Issue #3238: macOS x64 worker falha.
      PR #1825: bug onde pi-natives não era sincronizado durante update do omp
      (version mismatch sentinel).
    sources:
      - https://github.com/can1357/oh-my-pi/issues/684
      - https://github.com/can1357/oh-my-pi/issues/727
      - https://github.com/can1357/oh-my-pi/issues/3238
      - https://github.com/can1357/oh-my-pi/pull/1825

  - id: F6
    finding: "Licença MIT, autor can1357 (desenvolvedor ativo, conhecido por reverse engineering / Windows internals), cadência de release muito frequente (v15.x+ atualmente)"
    evidence: >
      Versão atual ~15.x, publicada há poucos dias. Mais de 14 versões major.
      Repo tem CI com SLSA provenance, build actions em GitHub Actions.
      Não há relação com mitsuhiko/Armin Ronacher — earendil-works é entidade separada.
    sources:
      - https://www.npmjs.com/package/@oh-my-pi/pi-natives
      - https://github.com/can1357/oh-my-pi/blob/main/LICENSE

recommendations:
  - id: R1
    recommendation: "NÃO INSTALAR @oh-my-pi/pi-natives — ele não tem relação com @earendil-works/pi-coding-agent e não o acelera em nada"
    based_on: [F1, F2, F4]
    priority: high
  - id: R2
    recommendation: "Se quiser omp (oh-my-pi) como agente alternativo, instale-o como projeto separado — pi-natives vem embutido automaticamente como optionalDependency"
    based_on: [F3, F5]
    priority: medium
  - id: R3
    recommendation: "O @earendil-works/pi já tem clipboard nativo próprio (@mariozechner/clipboard); grep/shell usam JS — não há gap de performance a preencher com pi-natives"
    based_on: [F4]
    priority: medium

gaps:
  - gap: "Não foi possível verificar se earendil-works/pi tem planos de adotar pi-natives no futuro"
    why: "Changelog e roadmap do earendil-works/pi não mencionam pi-natives; são codebases independentes"
  - gap: "Benchmarks exatos de pi-natives vs implementações JS não foram publicados formalmente"
    why: "omp blog posts mencionam ganhos qualitativos mas sem tabelas comparativas reproduzíveis"

open_questions:
  - "O usuário pode estar confundindo os dois projetos 'pi' (earendil-works vs oh-my-pi)? Qual ele realmente usa?"
  - "Se o usuário usa o Rust port do pi (cargo install pi-coding-agent), ele tem nativos embutidos no binário — confirma?"


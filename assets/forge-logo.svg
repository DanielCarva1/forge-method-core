<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Forge Method">
  <defs>
    <linearGradient id="steel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4ccd0"/>
      <stop offset="50%" stop-color="#8b9499"/>
      <stop offset="100%" stop-color="#4a5054"/>
    </linearGradient>
    <linearGradient id="flame" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#e8400a"/>
      <stop offset="45%" stop-color="#ff7722"/>
      <stop offset="80%" stop-color="#ffb833"/>
      <stop offset="100%" stop-color="#ffe88a" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="48%" r="50%">
      <stop offset="0%" stop-color="#ff6600" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="120" cy="120" r="115" fill="#1a1a2e"/>
  <circle cx="120" cy="120" r="115" fill="url(#glow)"/>

  <!-- Flame (single clean shape above the anvil face) -->
  <path d="M 120,38 C 104,58 100,82 110,105 C 114,94 118,88 120,78 C 122,88 126,94 130,105 C 140,82 136,58 120,38 Z"
        fill="url(#flame)"/>

  <!-- Anvil silhouette -->
  <path d="M 25,112
           L 50,94
           L 190,94
           L 196,104
           L 178,106
           L 168,128
           L 186,128
           L 205,188
           L 35,188
           L 54,128
           L 72,128
           L 62,106
           L 50,104
           Z"
        fill="url(#steel)"/>

  <!-- Highlight strip on anvil face -->
  <path d="M 50,94 L 190,94 L 192,97 L 48,97 Z" fill="#d5dade" opacity="0.7"/>

  <!-- Text -->
  <text x="120" y="222" text-anchor="middle" font-family="Georgia, serif" font-size="17" font-weight="bold"
        fill="#8b9499" letter-spacing="3">FORGE METHOD</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="800" height="180" role="img" aria-label="Forge Method banner">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#15152a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="steel2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4ccd0"/>
      <stop offset="50%" stop-color="#8b9499"/>
      <stop offset="100%" stop-color="#4a5054"/>
    </linearGradient>
    <linearGradient id="flame2" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#e8400a"/>
      <stop offset="50%" stop-color="#ff7722"/>
      <stop offset="100%" stop-color="#ffe88a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <rect width="800" height="180" fill="url(#bg)" rx="12"/>

  <!-- Ember accent line -->
  <rect x="24" y="176" width="752" height="2" fill="#ff6600" opacity="0.4" rx="1"/>

  <!-- Mini logo (left) -->
  <g transform="translate(30, 18)">
    <circle cx="72" cy="72" r="68" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
    <!-- Flame -->
    <path d="M 72,22 C 60,38 57,56 65,72 C 68,64 71,59 72,51 C 73,59 76,64 79,72 C 87,56 84,38 72,22 Z" fill="url(#flame2)"/>
    <!-- Anvil -->
    <path d="M 22,80 L 38,67 L 106,67 L 110,74 L 98,75 L 91,88 L 104,88 L 116,130 L 28,130 L 40,88 L 53,88 L 47,75 L 38,74 Z" fill="url(#steel2)"/>
    <path d="M 38,67 L 106,67 L 107,69 L 37,69 Z" fill="#d5dade" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="190" y="68" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#e8e8e8" letter-spacing="2">FORGE METHOD</text>

  <!-- Tagline -->
  <text x="192" y="92" font-family="system-ui, sans-serif" font-size="15" fill="#8b9499">Elevate what you can build.</text>

  <!-- v2 badge -->
  <rect x="192" y="106" width="68" height="22" rx="11" fill="#ff6600" fill-opacity="0.12" stroke="#ff7722" stroke-width="1" stroke-opacity="0.4"/>
  <text x="226" y="121" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#ff8833">v2.0.0</text>

  <!-- Right: value props -->
  <g font-family="system-ui, sans-serif" font-size="13" fill="#7a7f84">
    <text x="470" y="50">Guided workflows — idea to shipped</text>
    <text x="470" y="74">Multi-agent flock coordination</text>
    <text x="470" y="98">Anti-slop verification gates</text>
    <text x="470" y="122">Open source · MIT · Anti-gatekeeper</text>
  </g>

  <!-- Right: runtime row -->
  <text x="470" y="152" font-family="system-ui, sans-serif" font-size="11" fill="#4a5054">Codex · Claude Code · OpenCode · Pi</text>
</svg>

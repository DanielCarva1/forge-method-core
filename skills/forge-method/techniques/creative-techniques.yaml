# Forge Method creative techniques
structured-ideation: "Generate options across constraints, audience, medium, risk, and novelty."
reverse-thinking: "Invert the goal, identify anti-patterns, then turn useful inversions back into ideas."
constraints-remix: "Treat constraints as creative material and recombine them into directions."
customer-empathy: "Map user feeling, situation, need, objection, and desired transformation."
narrative-framing: "Create premise, tension, stakes, turn, payoff, and remembered line."
risk-inversion: "Ask how the idea fails, then design a version that makes failure less likely."

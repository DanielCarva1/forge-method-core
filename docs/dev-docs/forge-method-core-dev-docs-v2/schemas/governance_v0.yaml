schema_version: "0.1"
kind: "governance_policy"
policy_id: "governance.default"
principals:
  - principal_id: "principal.human.daniel"
    principal_kind: "human"
    default_role: "owner"
intent_required_for:
  - "write_project_files"
  - "run_commands"
  - "publish"
conflict_detection:
  dimensions:
    - "target_ref"
    - "lane_id"
    - "state_version"
    - "effect_id"
arbitration:
  mode: "human_in_loop"
  allowed_decisions: ["accept_left", "accept_right", "merge", "reject_both", "request_replan"]
audit:
  ledger_ref: ".forge-method/governance/arbitration.ndjson"

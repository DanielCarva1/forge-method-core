schema_version: "0.1"
kind: "memory_policy"
policy_id: "memory.default"
default_retention: "project"
admission:
  mode: "policy_gated"
  require_source_evidence: true
  allow_llm_summary: true
  summary_creates_authority: false
read_routing:
  tiers:
    - id: "profile_lookup"
      max_records: 5
    - id: "targeted_retrieval"
      max_records: 20
    - id: "deep_reasoning"
      max_records: 50
promotion:
  allowed_levels: ["episodic", "skill", "rule"]
  require_human_approval_for: ["skill", "rule"]
forget:
  supported: true
  tombstone_required: true
authority_boundary:
  memory_may_suggest: true
  memory_may_mutate_workflow: false

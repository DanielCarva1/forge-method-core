schema_version: "0.1"
kind: "workflow_graph"
graph_id: "graph.example"
created_at: "2026-06-28T00:00:00Z"
authority_boundary:
  source_of_truth: "forge-core-runtime"
  adapters_may_suggest: true
  adapters_may_mutate: false
nodes:
  - node_id: "plan"
    node_kind: "operation"
    operation_ref: "contracts/operations/example-plan.yaml"
    budget:
      max_steps: 3
      max_tool_calls: 2
  - node_id: "verify"
    node_kind: "verifier"
    verifies: ["plan"]
    pass_condition: "all_required_evidence_present"
edges:
  - from: "plan"
    to: "verify"
    edge_kind: "requires_success"
stop_conditions:
  - "validation_errors"
  - "budget_exceeded"
  - "human_required"

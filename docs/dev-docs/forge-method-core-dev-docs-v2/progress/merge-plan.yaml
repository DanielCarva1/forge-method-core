# ===================================================================
# merge-plan.yaml — auto-organização das branches paralelas
# ===================================================================
#
# ESTE É O ÚNICO DOCUMENTO DE COORDENAÇÃO. Não há integrador humano entre
# turnos. Cada chat lê, decide e atualiza por conta própria.
#
# LEIA ANTES DE QUALQUER COISA. Atualize antes de commitar.
#
# worktrees (cada epic mora na sua — NÃO editar cross-worktree):
#   <repo-root>  -> f12-guided-start
#   D:/forge-f08          -> f08-mcp-adapter
#   D:/forge-f14          -> f14-knowledge-orchestration
#   F07 roda em f06.2-trust-axes até o merge final
#
# master é a base comum; feature branches saem de master e voltam pra ela.

# ===================================================================
# §1  PROTOCOLO (como cada chat usa este arquivo)
# ===================================================================
#
# AO ABRIR A SESSÃO (primeira ação, antes de codar):
#   1. git pull --rebase no seu worktree.
#   2. git checkout origin/merge-plan-is-tracked? — NÃO. Este arquivo vive em
#      CADA branch. Você lê a cópia no SEU worktree. O merge plan é fundido no
#      merge final (resolução: manter a versão mais recente por seção — ver §6).
#   3. Leia §2 (worktree status) e §3 (per-branch status). Confirme que sua
#      branch está marcada "active" por você.
#   4. Verifique §4 (lock de arquivos shared). Se o arquivo que você vai tocar
#      está com alguém "writing", ESPERE (ou abra mão da edição / proponha
#      append no fim). Append-only no fim do array nunca conflita (§5).
#
# ANTES DE COMMITAR:
#   1. Atualize §3 (seu branch status): current_story, last_commit, next_story.
#   2. Se criou/tochou arquivo shared, atualize §4 (lock state).
#   3. Se sua decisão impactou outra branch, atualize §7 (open_questions) e,
#      se resolveu uma, marque resolved.
#   4. Adicione 1 linha em §8 (audit_trail): <data> <branch> <o que fez>.
#   5. Commit este arquivo junto com seu código (mesmo commit ou seguinte).
#
# AO DEGRADAR CONTEXTO (~150-200k tokens estimados):
#   - Escreva handoff_<branch>_<story>.md no seu worktree, anote em §3
#     (handoff: path), e pare. Não empurre pra degradação.
#
# REGRAS DE OURO (não negociáveis):
#   - **NA DÚVIDA, ATUALIZE O MERGE-PLAN ANTES DE MEXER NAS COISAS.** Esta é a
#     regra zero. Se você não tem certeza de que sua ação está alinhada com os
#     outros chats, PRIMEIRO atualize §2/§3/§4/§7 deste arquivo, commit só ele,
#     e SÓ DEPOIS faça a mutação no código. O merge-plan é o único ponto de
#     coordenação entre chats — se ele não reflete o que você vai fazer, você
#     está desalinhado. Atualizar-antes é barato; desalinhamento depois de
#     commit é caro (rework, conflito de merge, ADR divergente).
#     Aplicação concreta: antes de (a) criar crate nova, (b) tocar arquivo
#     shared (§5), (c) mudar decisão de design (§3 adrs/open_questions),
#     (d) abrir mão de um scope — atualize o merge-plan primeiro.
#   - Cada branch adiciona sua entrada nos arquivos shared NO FIM do array
#     (COMMANDS, pub mod, members). Nunca no meio. Isso transforma conflito de
#     merge em "duas linhas novas no fim".
#   - Não editar cross-worktree. Você escreve SÓ no seu worktree.
#   - Anchor 122 é sagrado: forge-core validate --json deve emitir
#     122x "diagnostics": 0. Se quebrar, sua branch está vermelha — não
#     commit até corrigir.
#   - CI -D pedantic + hook pi-green-loop + AGENTS.md valem por branch.

# ===================================================================
# §2  WORKTREE STATUS (quem está vivo agora)
# ===================================================================
worktree_status:
  # Cada chat marca a si mesmo "active: true" ao abrir sessão e "false" ao
  # fechar. Se um chat precisar saber se outro está vivo, lê aqui.
  # last_seen = ISO timestamp aproximado da última atualização.

  f07: { active: false, last_seen: "2026-07-02T03:00Z", where: "f06.2-trust-axes", note: "F07.5-F07.7 em andamento; F07 fechou em commits 0145/2f32" }
  f08: { active: false, last_seen: "2026-07-02T03:00Z", where: "D:/forge-f08", note: "ADR-0006 + 7 stories; pronto pra codar" }
  f12: { active: false, last_seen: "2026-07-02T03:00Z", where: "<repo-root>", note: "grill F12.1 pendente" }
  f14: { active: true, last_seen: "2026-07-02T04:00Z", where: "D:/forge-f14", note: "F14.1 FECHADO; F14.2 IN_PROGRESS (mesmo chat, sem /clear — contexto leve)" }


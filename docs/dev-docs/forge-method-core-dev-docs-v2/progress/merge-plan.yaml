# ===================================================================
# §4  LOCK DE ARQUIVOS SHARED (coordenação write-write)
# ===================================================================
#
# Append-only no FIM do array nunca conflita (§5). Este §4 é só pra arquivos
# onde você edita NO MEIO ou reestrutura — ai sim precisa de coordenação.
#
# Convenção: owner = branch que está editando AGORA. Liberado = [].
# Se você vai editar um arquivo aqui com owner != [], AVISE (open_questions §7)
# ou espere. Edição append-only não precisa declarar aqui.
shared_locks:
  "crates/forge-core-validate/src/lib.rs":
    # F14 ESTENDE validate_yaml_source_id_references (lib.rs:280) p/ 2 backings.
    # F07 também adiciona validators. Se ambos appendam no fim, ok.
    # F14 CUIDADO: manter assinatura estendida ao resolver conflito.
    owners: []
    conflict_type: "append_validators_at_end"
    note: "F14 adiciona DiagnosticCode::UnresolvedSourceId + validate_citation_*"
  "CONTEXT.md":
    # Cada epic appenda sua seção "## ..." no FIM. Conflito baixo.
    owners: []
    conflict_type: "append_section_at_end"
    note: "F14 já escreveu '## Knowledge Orchestration (F14)'"

# ===================================================================
# §5  MATRIZ DE OVERLAP (quem toca o quê + ação exata)
# ===================================================================
overlap_matrix:
  always_conflict_append_only:
    - file: "Cargo.toml (root) [members]"
      rule: "append no fim do array"
      actions:
        f07: '(já em master) forge-core-governance'
        f08: 'append "crates/forge-core-protocol-mcp"'
        f12: 'append "crates/forge-core-onboarding"'
        f14: 'append "crates/forge-core-research"'
    - file: "crates/forge-core-cli/src/lib.rs [pub mod]"
      rule: "append no fim"
      actions:
        f07: 'pub mod governance_cmd;'
        f08: 'pub mod mcp_cmd;'
        f12: 'pub mod start_cmd;'
        f14: 'pub mod research_cmd;'
    - file: "crates/forge-core-cli/src/command_registry.rs [COMMANDS]"
      rule: "append CommandSpec no fim do array. NÃO duplicar nomes (teste every_command_name_is_unique em command_registry.rs:354)"
      actions:
        f07: 'CommandSpec { name: "governance", ... }'
        f08: 'CommandSpec { name: "mcp", ... }'
        f12: 'CommandSpec { name: "start", ... }'
        f14: 'CommandSpec { name: "research", handler: crate::research_cmd::run_research_command, ... }'
  sometimes_conflict:
    - file: "crates/forge-core-validate/src/lib.rs"
      f14: "ESTENDE validate_yaml_source_id_references (lib.rs:280) p/ 2 backings (curated ∪ runtime); append DiagnosticCode::UnresolvedSourceId no fim"
      f07: "append validators no fim"
      resolution: "ambos appendam no fim; mecânico"
  no_conflict_new_crate:  # zero conflito
    f14:
      - "crates/forge-core-research/ (nova crate)"
      - "crates/forge-core-contracts/src/research.rs (ResearchSource/ResearchPolicy)"
      - "crates/forge-core-cli/src/research_cmd.rs"
      - "contracts/examples/research-source.yaml, research-policy.yaml"
      - "docs/fixtures/research-v0/"

# ===================================================================
# §6  ORDEM DE MERGE (prioridade, NÃO dependência)
# ===================================================================
merge_order:
  recommended: ["F07", "F08", "F12", "F14"]
  rationale: >
    P1 (F07, F08) antes de P2 (F12) antes de P3 (F14). É PRIORIDADE, não
    dependência. F14 é ORTOGONAL a F08 (decisão grill F14.1 #3) — pode rodar
    paralelo sem toque. F12 não bloqueia nada.
  per_merge_resolution: >
    A cada merge -> resolver overlap dos arquivos shared (append-only, manter
    entradas de TODAS as branches) -> rodar green-loop completo (cargo check +
    clippy -D pedantic + test + fmt) -> confirmar anchor 122 (forge-core
    validate --json -> 122x "diagnostics": 0) -> commit de integração.
  merge_plan_reconciliation: >
    Este merge-plan.yaml vive em cada branch. No merge, o integrador mantiene a
    versão MAIS RECENTE por seção (worktree_status, per-branch status, audit
    trail = união). Não há conflito semântico — cada seção é independente.

# ===================================================================
# §7  OPEN QUESTIONS / cross-branch (resolve e marca aqui)
# ===================================================================
open_questions:
  - id: Q1
    question: "F14 deve esperar F08 (MCP)?"
    status: RESOLVED (grill F14.1, 2026-07-02)
    answer: "NÃO. F14 entrega standalone; MCP vira story pós-merge de ambos (F14.8)."
    affects: [f08, f14]
  - id: Q2
    question: "F14 bloqueia F12 ou F07?"
    status: RESOLVED
    answer: "NÃO. Ortogonal. Cada um mora em crate nova."
    affects: [f07, f12, f14]
  - id: Q3
    question: "Quem edita validate/lib.rs primeiro, F07 ou F14?"
    status: OPEN (mecânico)
    answer: >
      Ambos appendam validators no FIM. Se o integrador encontrar conflito,
      manter ambas as adições. F14 cuida ao estender validate_yaml_source_id_references
      (manter assinatura com 2 backings).
    affects: [f07, f14]


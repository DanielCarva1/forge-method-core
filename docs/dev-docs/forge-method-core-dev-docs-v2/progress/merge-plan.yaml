# ===================================================================
# §9  SALVAGUARDAS (operam por branch — não recriar)
# ===================================================================
safeguards:
  ci: "cargo clippy --workspace --all-targets -- -D clippy::pedantic (zero warnings ou quebra)"
  hook: "pi-green-loop: check + clippy -W pedantic + test + fmt por turno"
  anchor_122: 'forge-core validate --json -> 122x "diagnostics": 0'
  methodology: "grill -> improve -> documentar -> desenvolver -> medir"
  conventions: "AGENTS.md (sem anyhow/thiserror/Result<_,String>; enums de erro à mão; validation accumulating)"
  governance: "protocolo claim/check-write (skill forge-method)"

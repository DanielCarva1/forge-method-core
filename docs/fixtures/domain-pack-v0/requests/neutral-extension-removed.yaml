          authority: declaration_only
        hazards:
        - id: sample.foundation.hazard.unverified-delivery
          category: quality
          severity: high
          description: An apparently complete result may lack inspectable acceptance
            evidence.
          trigger_refs:
          - sample.foundation.policy.delivery-foundation
          mitigation_obligation_refs:
          - sample.foundation.obligation.delivery-foundation.evidenced
          evidence_claim_refs:
          - sample.foundation.claim.delivery-foundation.evidenced
        lifecycle_models:
        - id: sample.foundation.lifecycle.delivery
          description: Candidate-only description of a neutral delivery lifecycle;
            it does not activate transitions.
          initial_state_ref: sample.foundation.state.proposed
          terminal_state_refs:
          - sample.foundation.state.verified
          states:
          - id: sample.foundation.state.proposed
            description: A bounded result is proposed.
            entry_obligation_refs:
            - sample.foundation.obligation.delivery-foundation.evidenced
            exit_claim_refs:
            - sample.foundation.claim.delivery-foundation.evidenced
          - id: sample.foundation.state.verified
            description: Required evidence has been independently evaluated.
            entry_obligation_refs: []
            exit_claim_refs: []
          transitions:
          - id: sample.foundation.transition.verify
            from_state_ref: sample.foundation.state.proposed
            to_state_ref: sample.foundation.state.verified
            guard_claim_refs:
            - sample.foundation.claim.delivery-foundation.evidenced
            required_capability_refs:
            - sample.foundation.capability.repository-inspection
        evaluators:
        - id: sample.foundation.domain-evaluator.repository-inspection
          implementation:
            kind: built_in
            provider: repository_inspector
          accepted_evidence_kinds:
          - artifact_inspection
          minimum_strength: inspected_artifact
          authority: declaration_only
        fixtures:

      - id: reference.game-development.capability-requirement.first-use-playtest
        kind: evaluator
        probe_kind: runtime_handshake
        description: Both an admitted representative-runtime evaluator and an independently credentialed review lane must produce current evidence; one producer self-report cannot satisfy both claims.
        affected_claim_refs:
        - reference.game-development.claim.first-use-playtest.representative-session
        - reference.game-development.claim.first-use-playtest.independent-review
        resolution_options:
        - Acquire the declared Adapter and execute the representative check.
        - Keep the readiness boundary blocked and report the capability gap.
        blocks_before: execute
      decision_rules: []
      advisory_playbook:
        id: reference.game-development.playbook.first-use-playtest
        steps:
        - Prepare a clean build and a test protocol that does not teach the player the intended solution.
        - Observe a representative first-use session and record behavior rather than prompting toward success.
        - Treat confusion, inaccessible input, missing feedback, crashes, and inability to recover as disconfirming evidence.
        - Disposition findings, rerun the representative session, and keep execute readiness blocked until current evidence passes.

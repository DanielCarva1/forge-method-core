          evidence_rule_refs:
          - reference.game-development.claim.playable-loop
          - reference.game-development.claim.first-use-playtest.representative-session
          - reference.game-development.claim.packaging.installed-runtime-behavior
          authority: declaration_only
        - id: reference.game-development.capability.first-use-observer
          kind: human_review
          description: Declared independent observer or equivalent admitted evaluator for representative

          evidence_rule_refs:
          - reference.game-development.claim.first-use-playtest.representative-session
          - reference.game-development.claim.first-use-playtest.independent-review
          authority: declaration_only
        - id: reference.game-development.capability.packaging-toolchain
          kind: tool
          description: Declared clean packaging and installation toolchain for the target platform.

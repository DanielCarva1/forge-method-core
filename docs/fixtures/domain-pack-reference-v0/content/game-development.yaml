schema_version: '0.1'
domain_pack_content:
  pack:
    publisher: forge.reference
    name: game-development
    version: 1.0.0
  namespace: reference.game-development
  workflow_overlay:
    id: reference.game-development.overlay
    base_bundle_id: bundle.workflow-governance.golden-path-v0
    policies:
    - id: reference.game-development.policy.discovery
      compatibility_workflow_id: reference.game-development.workflow.discovery
      routing:
        priority: 10
        readiness_target: explore
        activation: required
        signals: []
      eligible_phases:
      - anytime
      prerequisites: []
      obligations:
      - id: reference.game-development.obligation.discovery
        description: Player/platform constraints, production feasibility, and material unknowns are independently investigated before product direction or a build plan is accepted.
        criticality: critical
        required_before: explore
        claim_refs:
        - reference.game-development.claim.discovery.player-context
        - reference.game-development.claim.discovery.production-feasibility
        - reference.game-development.claim.discovery.material-risks
      claims:
      - id: reference.game-development.claim.discovery.player-context
        statement: Target platform, representative audience, controls, accessibility needs, and distribution constraints are supported by current research from independent sources.
        evaluator_ref: reference.game-development.evaluator.discovery.player-context
        waiver:
          kind: not_waivable
      - id: reference.game-development.claim.discovery.production-feasibility
        statement: Engine/runtime fit, asset and content pipeline, performance budget, dependency and license constraints, and production feasibility are independently checked rather than assumed.
        evaluator_ref: reference.game-development.evaluator.discovery.production-feasibility
        waiver:
          kind: not_waivable
      - id: reference.game-development.claim.discovery.material-risks
        statement: A reviewer independent of the producing agent challenges the plan across design, engineering, art, audio, UX, QA, accessibility, performance, licensing, and distribution and records every material unknown with an evidence-producing resolution.
        evaluator_ref: reference.game-development.evaluator.discovery.material-risks
        waiver:
          kind: not_waivable
      evaluators:
      - id: reference.game-development.evaluator.discovery.player-context
        provider: research_source
        accepted_evidence_kinds:
        - research
        minimum_strength: independent_confirmation
        minimum_passing_observations: 2
        minimum_distinct_principals: 2
        max_age_seconds: 86400
        freshness: current_only
        disproof_policy: reject_any_disproof
      - id: reference.game-development.evaluator.discovery.production-feasibility
        provider: external_authority
        accepted_evidence_kinds:
        - external_authority
        minimum_strength: authoritative_acceptance
        minimum_passing_observations: 2
        minimum_distinct_principals: 2
        max_age_seconds: 86400
        freshness: current_only
        disproof_policy: reject_any_disproof
      - id: reference.game-development.evaluator.discovery.material-risks
        provider: independent_reviewer
        accepted_evidence_kinds:
        - independent_review
        minimum_strength: independent_confirmation
        minimum_passing_observations: 2
        minimum_distinct_principals: 2
        max_age_seconds: 86400
        freshness: current_only
        disproof_policy: reject_any_disproof
      capability_requirements:
      - id: reference.game-development.capability-requirement.discovery
        kind: evaluator
        probe_kind: runtime_handshake
        description: Admitted research, external-authority, and independent-review evaluators must produce current plural evidence for every discovery claim; declarations and the producing agent self-report are insufficient.
        affected_claim_refs:
        - reference.game-development.claim.discovery.player-context
        - reference.game-development.claim.discovery.production-feasibility
        - reference.game-development.claim.discovery.material-risks
        resolution_options:
        - Acquire the declared Adapter and execute the representative check.
        - Keep the readiness boundary blocked and report the capability gap.
        blocks_before: explore
      decision_rules:
      - id: reference.game-development.decision.discovery.product-direction
        activation: all_claims_verified
        claim_ref: null
        question: After the agent presents researched constraints and feasible options, which player experience, target platform, and scope boundary should govern the first validated slice?
        reason: product_direction
        alternatives:
        - id: reference.game-development.alternative.discovery.single-platform-vertical-slice
          description: Choose one target platform, one primary player fantasy, and one complete core loop for the first validated vertical slice.
          consequences:
          - Representative evidence arrives sooner with fewer environment variables.
          - Additional platforms, modes, and content remain explicitly deferred.
        - id: reference.game-development.alternative.discovery.multi-platform-broad-scope
          description: Pursue multiple platforms or several major systems in the first delivery scope.
          consequences:
          - Platform and integration risk increase before the core loop is validated.
          - The first representative playtest and packaging evidence will take longer.
        - id: reference.game-development.alternative.discovery.exploration-prototypes
          description: Delay a product-direction commitment while the agent runs bounded prototypes for the highest-risk options.
          consequences:
          - Technical and design uncertainty can be reduced before choosing direction.
          - No prototype is treated as a release commitment or substitute for later representative evidence.
        recommended_alternative_ref: reference.game-development.alternative.discovery.single-platform-vertical-slice
        blocking: true
        blocks_before: explore
      advisory_playbook:
        id: reference.game-development.playbook.discovery
        steps:
        - Translate the human idea into player outcome, constraints, unacceptable outcomes, and open questions.
        - Map required disciplines and capabilities, including design, engineering, art, audio, UX, QA, accessibility, performance, and distribution.
        - Research unfamiliar engine, platform, licensing, and packaging constraints instead of guessing.
        - Turn each material unknown into an evidence-producing spike, experiment, or explicit gap.
        - Research and evidence-gathering remain agent responsibilities; ask the human only for irreducible preference or product-direction choices after feasible options and consequences are explained.
        - Recommend the smallest single-platform vertical slice unless the human explicitly accepts the cost and risk of a broader direction.
    - id: reference.game-development.policy.playable-loop
      compatibility_workflow_id: reference.game-development.workflow.playable-loop
      routing:
        priority: 20
        readiness_target: execute
        activation: required
        signals: []
      eligible_phases:
      - anytime
      prerequisites:
      - policy_ref: reference.game-development.policy.discovery
        requirement: always
      obligations:
      - id: reference.game-development.obligation.playable-loop
        description: A vertical slice demonstrates one complete player loop with real input, feedback, failure, recovery, and target-runtime performance rather than disconnected assets or systems.
        criticality: critical
        required_before: execute
        claim_refs:
        - reference.game-development.claim.playable-loop
      claims:
      - id: reference.game-development.claim.playable-loop
        statement: A vertical slice demonstrates one complete player loop with real input, feedback, failure, recovery, and target-runtime performance rather than disconnected assets or systems.
        evaluator_ref: reference.game-development.evaluator.playable-loop
        waiver:
          kind: not_waivable
      evaluators:
      - id: reference.game-development.evaluator.playable-loop
        provider: representative_runtime
        accepted_evidence_kinds:
        - representative_execution
        minimum_strength: representative_execution
        minimum_passing_observations: 2
        minimum_distinct_principals: 2
        max_age_seconds: 86400
        freshness: current_only
        disproof_policy: reject_any_disproof
      capability_requirements:
      - id: reference.game-development.capability-requirement.playable-loop
        kind: evaluator
        probe_kind: runtime_handshake
        description: The complete loop must be executed in the representative runtime and confirmed through two current observations from distinct principals; build success or an author walkthrough is insufficient.
        affected_claim_refs:
        - reference.game-development.claim.playable-loop
        resolution_options:
        - Acquire the declared Adapter and execute the representative check.
        - Keep the readiness boundary blocked and report the capability gap.
        blocks_before: execute
      decision_rules: []
      advisory_playbook:
        id: reference.game-development.playbook.playable-loop
        steps:
        - Define the smallest end-to-end player loop and measurable fun/usability hypotheses.
        - Build a thin vertical slice through input, rules, feedback, state, failure, recovery, and persistence where applicable.
        - Run it in the representative target runtime and capture observations, crashes, frame behavior, and broken assumptions.
        - Prefer cutting scope over hiding incomplete integration behind mock screens or prose.
    - id: reference.game-development.policy.first-use-playtest
      compatibility_workflow_id: reference.game-development.workflow.first-use-playtest
      routing:
        priority: 30
        readiness_target: execute
        activation: required
        signals: []
      eligible_phases:
      - anytime
      prerequisites:
      - policy_ref: reference.game-development.policy.discovery
        requirement: always
      - policy_ref: reference.game-development.policy.playable-loop
        requirement: always
      obligations:
      - id: reference.game-development.obligation.first-use-playtest
        description: A representative uncoached first-use session succeeds and an independent reviewer confirms the protocol, observations, and finding disposition; neither an artifact nor a producer self-report is sufficient.
        criticality: critical
        required_before: execute
        claim_refs:
        - reference.game-development.claim.first-use-playtest.representative-session
        - reference.game-development.claim.first-use-playtest.independent-review
      claims:
      - id: reference.game-development.claim.first-use-playtest.representative-session
        statement: A representative first-time player can launch, understand, play, fail, recover, and complete the core loop without developer coaching, debug tools, or inferred success from artifact presence.
        evaluator_ref: reference.game-development.evaluator.first-use-playtest.representative-session
        waiver:
          kind: not_waivable
      - id: reference.game-development.claim.first-use-playtest.independent-review
        statement: An independent reviewer confirms that the first-use protocol was uncoached and representative, observations cover confusion, controls, accessibility, feedback, failure and recovery, and material findings were dispositioned before rerun.
        evaluator_ref: reference.game-development.evaluator.first-use-playtest.independent-review
        waiver:
          kind: not_waivable
      evaluators:
      - id: reference.game-development.evaluator.first-use-playtest.representative-session
        provider: representative_runtime
        accepted_evidence_kinds:
        - representative_execution
        minimum_strength: representative_execution
        minimum_passing_observations: 1
        minimum_distinct_principals: 1
        max_age_seconds: 86400
        freshness: current_only
        disproof_policy: reject_any_disproof
      - id: reference.game-development.evaluator.first-use-playtest.independent-review
        provider: independent_reviewer
        accepted_evidence_kinds:
        - independent_review
        minimum_strength: independent_confirmation
        minimum_passing_observations: 2
        minimum_distinct_principals: 2
        max_age_seconds: 86400
        freshness: current_only
        disproof_policy: reject_any_disproof
      capability_requirements:
      - id: reference.game-development.capability-requirement.first-use-playtest
        kind: evaluator
        probe_kind: runtime_handshake
        description: Both an admitted representative-runtime evaluator and an independently credentialed review lane must produce current evidence; one producer self-report cannot satisfy both claims.
        affected_claim_refs:
        - reference.game-development.claim.first-use-playtest.representative-session
        - reference.game-development.claim.first-use-playtest.independent-review
        resolution_options:
        - Acquire the declared Adapter and execute the representative check.
        - Keep the readiness boundary blocked and report the capability gap.
        blocks_before: execute
      decision_rules: []
      advisory_playbook:
        id: reference.game-development.playbook.first-use-playtest
        steps:
        - Prepare a clean build and a test protocol that does not teach the player the intended solution.
        - Observe a representative first-use session and record behavior rather than prompting toward success.
        - Treat confusion, inaccessible input, missing feedback, crashes, and inability to recover as disconfirming evidence.
        - Disposition findings, rerun the representative session, and keep execute readiness blocked until current evidence passes.
    - id: reference.game-development.policy.packaging-readiness
      compatibility_workflow_id: reference.game-development.workflow.packaging-readiness
      routing:
        priority: 40
        readiness_target: release
        activation: required
        signals: []
      eligible_phases:
      - anytime
      prerequisites:
      - policy_ref: reference.game-development.policy.discovery
        requirement: always
      - policy_ref: reference.game-development.policy.playable-loop
        requirement: always
      - policy_ref: reference.game-development.policy.first-use-playtest
        requirement: always
      obligations:
      - id: reference.game-development.obligation.packaging-readiness
        description: Release readiness requires an exact clean package identity, representative installed-runtime behavior, and an independently reviewed license, limitations, diagnostics, and rollback audit.
        criticality: critical
        required_before: release
        claim_refs:
        - reference.game-development.claim.packaging.clean-package-identity
        - reference.game-development.claim.packaging.installed-runtime-behavior
        - reference.game-development.claim.packaging.release-audit
      claims:
      - id: reference.game-development.claim.packaging.clean-package-identity
        statement: A clean reproducible build produces a versioned distributable whose package digest, target, dependency inputs, and version identity are deterministically recorded.
        evaluator_ref: reference.game-development.evaluator.packaging.clean-package-identity
        waiver:
          kind: not_waivable
      - id: reference.game-development.claim.packaging.installed-runtime-behavior
        statement: The exact distributable is installed outside the developer workspace and representative sessions confirm first launch, controls, persistence or reset, failure reporting, performance, and declared accessibility behavior.
        evaluator_ref: reference.game-development.evaluator.packaging.installed-runtime-behavior
        waiver:
          kind: not_waivable
      - id: reference.game-development.claim.packaging.release-audit
        statement: An independent reviewer confirms required licenses and notices, known limitations, diagnostics, support expectations, and a tested rollback path bind the exact package identity.
        evaluator_ref: reference.game-development.evaluator.packaging.release-audit
        waiver:
          kind: not_waivable
      evaluators:
      - id: reference.game-development.evaluator.packaging.clean-package-identity
        provider: deterministic_tool
        accepted_evidence_kinds:
        - deterministic_check
        minimum_strength: deterministic_verification
        minimum_passing_observations: 2
        minimum_distinct_principals: 1
        max_age_seconds: 86400
        freshness: current_only
        disproof_policy: reject_any_disproof
      - id: reference.game-development.evaluator.packaging.installed-runtime-behavior
        provider: representative_runtime
        accepted_evidence_kinds:
        - representative_execution
        minimum_strength: representative_execution
        minimum_passing_observations: 2
        minimum_distinct_principals: 2
        max_age_seconds: 86400
        freshness: current_only
        disproof_policy: reject_any_disproof
      - id: reference.game-development.evaluator.packaging.release-audit
        provider: independent_reviewer
        accepted_evidence_kinds:
        - independent_review
        minimum_strength: independent_confirmation
        minimum_passing_observations: 2
        minimum_distinct_principals: 2
        max_age_seconds: 86400
        freshness: current_only
        disproof_policy: reject_any_disproof
      capability_requirements:
      - id: reference.game-development.capability-requirement.packaging-readiness
        kind: evaluator
        probe_kind: runtime_handshake
        description: Clean-build tooling, representative install/runtime execution, and an independent release reviewer must each produce current evidence for their own claim; one artifact or check cannot authorize release.
        affected_claim_refs:
        - reference.game-development.claim.packaging.clean-package-identity
        - reference.game-development.claim.packaging.installed-runtime-behavior
        - reference.game-development.claim.packaging.release-audit
        resolution_options:
        - Acquire the declared Adapter and execute the representative check.
        - Keep the readiness boundary blocked and report the capability gap.
        blocks_before: release
      decision_rules: []
      advisory_playbook:
        id: reference.game-development.playbook.packaging-readiness
        steps:
        - Build from a clean environment using the declared target and dependency versions.
        - Install and launch the produced package outside the developer workspace.
        - Exercise first-run, persistence/reset, failure reporting, performance budget, and accessibility checks.
        - Record licenses, known limitations, version identity, rollback path, and current representative evidence before release.
  provided_domains:
  - id: reference.game-development.domain.game-discovery
    description: Unknown-unknown discovery for an agent-built game across product, design, technical, content, accessibility, QA, and distribution concerns.
    policy_refs:
    - reference.game-development.policy.discovery
    hazard_refs:
    - reference.game-development.hazard.unexamined-constraints
    lifecycle_model_refs:
    - reference.game-development.lifecycle.game-delivery
  - id: reference.game-development.domain.playable-vertical-slice
    description: Evidence-driven construction of a complete representative player loop before broad production.
    policy_refs:
    - reference.game-development.policy.playable-loop
    hazard_refs:
    - reference.game-development.hazard.false-progress
    lifecycle_model_refs:
    - reference.game-development.lifecycle.game-delivery
  - id: reference.game-development.domain.first-use-validation
    description: Uncoached representative first-use validation of comprehension, usability, playability, failure, and recovery.
    policy_refs:
    - reference.game-development.policy.first-use-playtest
    hazard_refs:
    - reference.game-development.hazard.untested-first-use
    - reference.game-development.hazard.author-bias
    lifecycle_model_refs:
    - reference.game-development.lifecycle.game-delivery
  - id: reference.game-development.domain.release-packaging
    description: Clean-build, install, launch, persistence, diagnostics, licensing, performance, accessibility, and rollback readiness.
    policy_refs:
    - reference.game-development.policy.packaging-readiness
    hazard_refs:
    - reference.game-development.hazard.developer-environment-only
    lifecycle_model_refs:
    - reference.game-development.lifecycle.game-delivery
  provided_capabilities:
  - id: reference.game-development.capability.game-development-knowledge
    kind: knowledge
    description: Declared cross-discipline knowledge requirement; declaration does not prove agent competence.
    evidence_rule_refs:
    - reference.game-development.claim.discovery.player-context
    - reference.game-development.claim.discovery.production-feasibility
    - reference.game-development.claim.discovery.material-risks
    authority: declaration_only
  - id: reference.game-development.capability.representative-game-runtime
    kind: runtime
    description: Declared ability to run the game in a representative target environment; availability must be probed.
    evidence_rule_refs:
    - reference.game-development.claim.playable-loop
    - reference.game-development.claim.first-use-playtest.representative-session
    - reference.game-development.claim.packaging.installed-runtime-behavior
    authority: declaration_only
  - id: reference.game-development.capability.first-use-observer
    kind: human_review
    description: Declared independent observer or equivalent admitted evaluator for representative first-use behavior.
    evidence_rule_refs:
    - reference.game-development.claim.first-use-playtest.representative-session
    - reference.game-development.claim.first-use-playtest.independent-review
    authority: declaration_only
  - id: reference.game-development.capability.packaging-toolchain
    kind: tool
    description: Declared clean packaging and installation toolchain for the target platform.
    evidence_rule_refs:
    - reference.game-development.claim.packaging.clean-package-identity
    - reference.game-development.claim.packaging.installed-runtime-behavior
    - reference.game-development.claim.packaging.release-audit
    authority: declaration_only
  - id: reference.game-development.capability.playtest-evidence-adapter
    kind: adapter
    description: Declared adapter surface for recording representative execution observations without granting review authority.
    evidence_rule_refs:
    - reference.game-development.claim.first-use-playtest.representative-session
    - reference.game-development.claim.first-use-playtest.independent-review
    authority: declaration_only
  hazards:
  - id: reference.game-development.hazard.unexamined-constraints
    category: domain_specific
    severity: high
    description: The agent and human share an untested assumption about a discipline, platform, audience, license, pipeline, or release constraint.
    trigger_refs:
    - reference.game-development.policy.discovery
    mitigation_obligation_refs:
    - reference.game-development.obligation.discovery
    evidence_claim_refs:
    - reference.game-development.claim.discovery.player-context
    - reference.game-development.claim.discovery.production-feasibility
    - reference.game-development.claim.discovery.material-risks
  - id: reference.game-development.hazard.false-progress
    category: quality
    severity: critical
    description: Generated code, assets, screenshots, or build success are mistaken for a playable integrated game.
    trigger_refs:
    - reference.game-development.policy.playable-loop
    mitigation_obligation_refs:
    - reference.game-development.obligation.playable-loop
    evidence_claim_refs:
    - reference.game-development.claim.playable-loop
  - id: reference.game-development.hazard.untested-first-use
    category: quality
    severity: critical
    description: The first real user encounters confusing goals, broken controls, missing feedback, inaccessible interaction, or an unrecoverable state.
    trigger_refs:
    - reference.game-development.policy.first-use-playtest
    mitigation_obligation_refs:
    - reference.game-development.obligation.first-use-playtest
    evidence_claim_refs:
    - reference.game-development.claim.first-use-playtest.representative-session
    - reference.game-development.claim.first-use-playtest.independent-review
  - id: reference.game-development.hazard.author-bias
    category: quality
    severity: high
    description: The author coaches the playtest or interprets intended behavior as observed success.
    trigger_refs:
    - reference.game-development.policy.first-use-playtest
    mitigation_obligation_refs:
    - reference.game-development.obligation.first-use-playtest
    evidence_claim_refs:
    - reference.game-development.claim.first-use-playtest.representative-session
    - reference.game-development.claim.first-use-playtest.independent-review
  - id: reference.game-development.hazard.developer-environment-only
    category: reliability
    severity: critical
    description: The game works only inside the developer workspace and fails when installed or launched by a user.
    trigger_refs:
    - reference.game-development.policy.packaging-readiness
    mitigation_obligation_refs:
    - reference.game-development.obligation.packaging-readiness
    evidence_claim_refs:
    - reference.game-development.claim.packaging.clean-package-identity
    - reference.game-development.claim.packaging.installed-runtime-behavior
    - reference.game-development.claim.packaging.release-audit
  lifecycle_models:
  - id: reference.game-development.lifecycle.game-delivery
    description: Candidate-only evidence gates from idea discovery through clean distributable readiness; composition never executes transitions.
    initial_state_ref: reference.game-development.state.discovery
    terminal_state_refs:
    - reference.game-development.state.release-ready
    states:
    - id: reference.game-development.state.discovery
      description: Outcome, constraints, disciplines, capabilities, and critical unknowns are being established.
      entry_obligation_refs:
      - reference.game-development.obligation.discovery
      exit_claim_refs:
      - reference.game-development.claim.discovery.player-context
      - reference.game-development.claim.discovery.production-feasibility
      - reference.game-development.claim.discovery.material-risks
    - id: reference.game-development.state.vertical-slice
      description: One complete representative player loop is being integrated and exercised.
      entry_obligation_refs:
      - reference.game-development.obligation.playable-loop
      exit_claim_refs:
      - reference.game-development.claim.playable-loop
    - id: reference.game-development.state.first-use-validation
      description: A clean uncoached representative session is being observed and findings dispositioned.
      entry_obligation_refs:
      - reference.game-development.obligation.first-use-playtest
      exit_claim_refs:
      - reference.game-development.claim.first-use-playtest.representative-session
      - reference.game-development.claim.first-use-playtest.independent-review
    - id: reference.game-development.state.release-ready
      description: The clean distributable and current evidence meet declared release gates.
      entry_obligation_refs:
      - reference.game-development.obligation.packaging-readiness
      exit_claim_refs:
      - reference.game-development.claim.packaging.clean-package-identity
      - reference.game-development.claim.packaging.installed-runtime-behavior
      - reference.game-development.claim.packaging.release-audit
    transitions:
    - id: reference.game-development.transition.discovery-to-vertical-slice
      from_state_ref: reference.game-development.state.discovery
      to_state_ref: reference.game-development.state.vertical-slice
      guard_claim_refs:
      - reference.game-development.claim.discovery.player-context
      - reference.game-development.claim.discovery.production-feasibility
      - reference.game-development.claim.discovery.material-risks
      required_capability_refs:
      - reference.game-development.capability.game-development-knowledge
    - id: reference.game-development.transition.vertical-slice-to-first-use
      from_state_ref: reference.game-development.state.vertical-slice
      to_state_ref: reference.game-development.state.first-use-validation
      guard_claim_refs:
      - reference.game-development.claim.playable-loop
      required_capability_refs:
      - reference.game-development.capability.representative-game-runtime
    - id: reference.game-development.transition.first-use-to-release-ready
      from_state_ref: reference.game-development.state.first-use-validation
      to_state_ref: reference.game-development.state.release-ready
      guard_claim_refs:
      - reference.game-development.claim.first-use-playtest.representative-session
      - reference.game-development.claim.first-use-playtest.independent-review
      - reference.game-development.claim.packaging.clean-package-identity
      - reference.game-development.claim.packaging.installed-runtime-behavior
      - reference.game-development.claim.packaging.release-audit
      required_capability_refs:
      - reference.game-development.capability.first-use-observer
      - reference.game-development.capability.packaging-toolchain
  evaluators:
  - id: reference.game-development.domain-evaluator.discovery-research
    implementation:
      kind: built_in
      provider: research_source
    accepted_evidence_kinds:
    - research
    minimum_strength: independent_confirmation
    authority: declaration_only
  - id: reference.game-development.domain-evaluator.discovery-external-authority
    implementation:
      kind: built_in
      provider: external_authority
    accepted_evidence_kinds:
    - external_authority
    minimum_strength: authoritative_acceptance
    authority: declaration_only
  - id: reference.game-development.domain-evaluator.independent-review
    implementation:
      kind: built_in
      provider: independent_reviewer
    accepted_evidence_kinds:
    - independent_review
    minimum_strength: independent_confirmation
    authority: declaration_only
  - id: reference.game-development.domain-evaluator.representative-runtime
    implementation:
      kind: adapter

schema_version: "0.1"
autonomy_policy_contract:
  id: autonomy.fixture.policy_mixed_with_manual_secret
  applies_to:
    kind: agent_role
    ids:
      - driver
  # Parametric axis covered: per-tool override can force rigorous even when
  # the default mode is permissive. secret_access=Manual must override a
  # Yolo default and force the rigorous lane whenever secret_access is in
  # the proposed tool scope, while other tool classes stay fast.
  # Proves the router honours in-scope manual overrides independently of the
  # default mode (the "two adapters = real seam" property).
  default_mode: yolo
  tool_classes:
    - class: file_edit
      mode: yolo
      risk_score: 15
      requires_approval_above: 80
    - class: terminal_command
      mode: sandbox_auto
      risk_score: 40
      requires_approval_above: 70
    - class: secret_access
      mode: manual
      risk_score: 100
      requires_approval_above: 1
  escalation:
    on_repeated_failure: 2
    on_high_risk_path: true
    on_semantic_uncertainty: true
    max_retries_before_human: 3
    cooldown_seconds: 120
  evidence_basis: null

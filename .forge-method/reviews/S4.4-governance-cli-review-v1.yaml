verdict: red
summary: "Governance claims are not safe as an authority mechanism: direct YAML edits are trusted, acquisition is a load/decide/write race, and CLI time parsing silently turns bad input into epoch 0."
critical_bugs:
  - file_line: "claim.rs:212-232"
    bug: "load_claims trusts every *.yaml document in the claims directory as authoritative ClaimContract state with no signature, ledger/spine proof, operation record, or claimant authorization check."
    why: "Any agent with filesystem write access can forge a YAML claim for any scope/claimant/status/expires_at, block other agents, make itself the claimant, resurrect/release claims, or delete/edit someone else's claim outside the lifecycle engine. The pure engine only validates transitions after loading this already-trusted state."
    fix: "Treat claim files as materialized projections only if backed by an authenticated append-only operation/spine entry: verify a signed/hashed write record for each current claim state, reject unsigned/manual documents, or move claims behind a single authority service/locked transaction path that agents cannot bypass by editing YAML."
  - file_line: "claim.rs:93-100"
    bug: "run_acquire performs load -> engine decision -> save without any interprocess lock or compare-and-swap."
    why: "Two agents acquiring the same free scope concurrently can both load the same pre-state, both receive Accepted, and both persist active claims in different files; status will then expose conflicting live ownership and the engine's duplicate-claim protection is bypassed by the race."
    fix: "Serialize lifecycle transitions with an advisory/exclusive lock on the claims directory (or a lock file), then reload under the lock before deciding and write atomically before releasing the lock. Alternatively use atomic create/CAS keyed by canonical scope."
  - file_line: "claim.rs:252-253"
    bug: "save_claim writes directly to the final YAML path with std::fs::write."
    why: "A crash or interrupted write can leave a truncated/malformed claim file; subsequent load_claims treats malformed YAML as EnvConfig, creating a repository-wide denial of service. Direct writes are also last-writer-wins under concurrent heartbeat/release."
    fix: "Write to a same-directory temp file, fsync file, atomically rename over the target, and fsync the directory; combine with the lifecycle lock so stale writers cannot overwrite newer state."
  - file_line: "main.rs:2212, main.rs:2280, main.rs:2326"
    bug: "--now-unix parse failures use parse().unwrap_or(0) instead of rejecting invalid input."
    why: "A typo like --now-unix garbage silently runs lifecycle decisions at epoch 0. That can create nonsensical 1970 leases, misclassify current claims during status, and hide test/operator mistakes in a governance command whose time is security-critical."
    fix: "Parse --now-unix with a fallible helper that exits with DD10 invalid-input (3) and an envelope/error message; never coerce invalid or missing values to 0."
medium_issues:
  - file_line: "claim.rs:215-217"
    issue: "read_dir errors are silently treated as an empty claim set. Missing directory may be acceptable, but permission denied, not-a-directory, or I/O errors should be EnvConfig; otherwise acquire can proceed while blind to existing claims."
  - file_line: "claim.rs:252-253"
    issue: "save_claim follows pre-existing symlinks at the target path. A malicious repo participant can place a symlink named like the sanitized claim id and cause the CLI to overwrite an arbitrary writable file outside the claims bus."
  - file_line: "claim.rs:252, claim.rs:336-346"
    issue: "slug_for_file is not injective: every non [A-Za-z0-9_-] character becomes '-'. Distinct claim ids can map to the same filename and overwrite each other; use hex/base64url encoding or include a digest."
  - file_line: "claim.rs:219-225"
    issue: "load_claims uses entries.flatten(), dropping read_dir entry errors silently. Directory iteration failures should be reported as EnvConfig because omitted files change authority."
  - file_line: "main.rs:2192-2216, main.rs:2260-2281, main.rs:2318-2327, main.rs:2383-2385"
    issue: "arg() returns an empty string for trailing flags, so missing values are often accepted as empty strings or coerced to defaults/0. Examples: --claims-dir with no value becomes an empty PathBuf, --ttl with no value silently becomes 600, and --id/--agent can become empty StableId values."
  - file_line: "main.rs:2210, main.rs:2278, main.rs:2324"
    issue: "Invalid numeric values for --ttl, --heartbeat-interval, and --now-unix are silently defaulted instead of rejected. TTL/heartbeat mistakes should be invalid-input, not hidden behavior changes."
  - file_line: "main.rs:2220, main.rs:2286, main.rs:2332"
    issue: "Unknown claim options are ignored. Typos such as --claim-dir or --agnt produce a command that may still run with defaults, which is unsafe for governance operations."
  - file_line: "main.rs:2383-2385"
    issue: "The safe arg accessor prevents panics but removes the parser's ability to distinguish an omitted value from an intentional empty value. Callers should use a required_arg helper that rejects missing/trailing values."
  - file_line: "claim.rs:281-291"
    issue: "ClaimRejected is constructed but not serialized as a structured envelope payload; reject_code is packed into error.code as 'code:DebugDetail'. This weakens the stated machine-readable failure contract."
security_analysis:
  filesystem_safety:
    status: broken
    evidence: "The bus is plain YAML loaded from claim.rs:212-232 and persisted with direct final-path writes at claim.rs:252-253. There is no lock, no atomic rename, no fsync, no no-follow/openat protection, and read_dir/entry errors can be ignored."
  path_traversal:
    status: risky
    evidence: "slug_for_file at claim.rs:336-346 replaces '/' and '\\', so claim-id traversal through the generated filename is mostly blocked on Unix/Windows. However --claims-dir itself is unrestricted, save_claim follows symlinks at claim.rs:253, load_claims follows symlinked *.yaml entries at claim.rs:226, and slug collisions can target the same final path."
  hand_edit_bypass:
    risk: high
    analysis: "Yes: an agent that can write to contracts/claims can forge authority by writing a syntactically valid ClaimContractDocument directly. load_claims does not verify that the document came from run_acquire/heartbeat/release or from an audited spine write; it simply deserializes and pushes doc.claim_contract into the authoritative set. The engine's protections against duplicate claims, non-claimants, resurrection, and expired reuse only apply to API-mediated transitions, not to manual edits before load. If the external integrity spine blocks unauthorized filesystem writes at a lower layer, that enforcement is not visible or invoked here; this CLI by itself is not a governance boundary."
  concurrent_writes:
    risk: high
    analysis: "All operations load an unlocked snapshot, compute a pure decision, then overwrite one file. Under 50 agents, duplicate acquisitions, stale heartbeat/release overwrites, and partial-write EnvConfig outages are expected. A global bus lock or transactional compare-and-swap is required."
design_notes:
  - "Consider keying active claim storage by canonical scope as well as claim id, or maintaining an atomic scope index, so same-scope duplicate acquisition cannot be represented by two independent files."
  - "Differentiate missing claims directory from unreadable/corrupt claims directory; only the former should produce an empty status/acquire set."
  - "Expose a verification/status command that reports unsigned/manual/tampered claim files if the filesystem bus remains editable."
  - "Make claim CLI parsing strict and envelope-consistent: unknown option -> invalid-input, missing value -> invalid-input, bad numeric -> invalid-input."
strengths:
  - "save_claim and load_claims use the same ClaimContractDocument wrapper, so normal CLI-authored files should round-trip."
  - "The claim-id filename sanitizer removes direct '/' and '\\' path separators from generated filenames."
  - "Heartbeat/release search by claim id before calling the engine, and not-found maps to InvalidDecisionShape/exit 3 as requested."
  - "Malformed YAML is not silently dropped once read; it surfaces as EnvConfig and blocks use instead of weakening authority silently."

verdict: red
summary: "Claim engine violates core lifecycle rules: expired claims can be silently reacquired/released, released claims can be resurrected by heartbeat, and malformed timestamps can grant indefinite authority."
critical_bugs:
  - file_line: "claim_engine.rs:264-266"
    bug: "acquire() skips any non-live claim, including Active/Stale claims whose lease has expired, then allows a different agent to acquire the same scope."
    why: "This directly violates design rule 2: expired claims must route to handoff/recovery and must not silently release work. An expired Active claim with handoff_required=true becomes invisible to acquisition blocking, so another agent can take the scope without handoff or review."
    fix: "When claim_holds_scope() is true, check status/expiry before is_live filtering. If Active/Stale and expired, return ExpiredRequiresHandoff or a dedicated RequiresRecovery/RequiresDriverReview decision unless the claim has already been transitioned through an allowed recovery path."
  - file_line: "claim_engine.rs:269-270"
    bug: "acquire() only rejects live claims held by a different agent; the same agent can acquire a second Active claim for the same scope."
    why: "This creates duplicate live authority for one scope, reuses the deterministic claim id, bypasses closed reclaim policy, and makes lease/status history ambiguous. Same-agent continuation should be heartbeat/renewal or explicit reclaim, not a fresh acquire."
    fix: "Reject any live existing claim for the same scope, including same claimant, or return the existing claim/require heartbeat. Implement explicit reclaim according to ReclaimPolicy."
  - file_line: "claim_engine.rs:315-332"
    bug: "heartbeat() ignores current status and can transition Released, HandoffRequired, HandoffRecorded, or Expired claims back to Active if expires_at is still in the future or unparsable."
    why: "A claimant can resurrect a released/handoff claim without a legal recovery transition, breaking lifecycle authority and auditability."
    fix: "Before extending the lease, require status Active or Stale. Return IllegalTransition for Released/Expired/HandoffRequired/HandoffRecorded, and treat unparsable expires_at as invalid/blocked rather than live."
  - file_line: "claim_engine.rs:343-356"
    bug: "release() has no expiry, status, or expiry_policy checks; a claimant can release an expired claim even when release_without_handoff_allowed is false."
    why: "This silently clears work that the contract says must go through handoff/recovery, violating design rules 2 and 3 and allowing loss of coordination evidence."
    fix: "Reject release when is_expired() is true and expiry_policy.handoff_required or !release_without_handoff_allowed. Also restrict legal source statuses, e.g. Active/Stale only."
  - file_line: "claim_engine.rs:211"
    bug: "is_expired() returns false when expires_at cannot be parsed."
    why: "Malformed lease timestamps make Active/Stale claims appear live forever, blocking legitimate acquisition and preventing expiry sweeps. This is fail-open for claim authority."
    fix: "Return a Result/tri-state expiry verdict and fail closed: invalid timestamps should reject lifecycle operations and be surfaced for recovery/repair."
medium_issues:
  - file_line: "claim_engine.rs:45-61"
    issue: "rfc3339_to_unix() validates month only; it accepts impossible dates/times such as 2026-02-31T25:99:99Z and normalizes them into other instants. Validate day-of-month, leap years, hour 0..23, minute/second 0..59, and define leap-second behavior."
  - file_line: "claim_engine.rs:211"
    issue: "Expiry boundary uses now_unix >= expires_at while the module state diagram says now > expires_at. Pick one contract meaning and test the exact boundary; current behavior expires at the first second equal to expires_at."
  - file_line: "claim_engine.rs:287-292"
    issue: "Claim id format repeats scope_id as its own disambiguator, so same-scope reacquire produces the same id and different agents after expiry can collide with prior records. Include claimant/sequence/nonce supplied by persistence, or treat id as stable scope id intentionally and forbid duplicate records."
  - file_line: "claim_engine.rs:303-332"
    issue: "Heartbeat freshness is not actually evaluated beyond expires_at. heartbeat_interval_seconds and last_heartbeat_at never influence Stale status, recovery, or release/reuse decisions despite design rule 3."
  - file_line: "claim_engine.rs:365-382"
    issue: "expire_stale() returns only claim_id and target status, not an updated ClaimContract with evaluated_at/reason_code/handoff_request_ref. The host must reconstruct state transitions, risking inconsistent audit fields."
  - file_line: "claim_engine.rs:385-403"
    issue: "project_active() preserves input order. That is deterministic for a fixed slice, but not canonical if callers load files from nondeterministic directory order; sort by scope/id/claim_id for stable bus output."
  - file_line: "claim_engine.rs:255-276"
    issue: "Pure acquire() cannot prevent two agents from racing from the same snapshot; expected_state_version is merely copied into the claim and never checked. The API should expose/require compare-and-swap metadata for the host."
nits:
  - file_line: "claim_engine.rs:347-357"
    issue: "release() creates now solely for status then has a stale comment suppressing unused now_unix; the variable is used through now, so remove the comment and `let _ = now_unix`."
  - file_line: "claim_engine.rs:25-26"
    issue: "Timestamp helper comment says correct for 1970-03..2100, but code does not enforce that range and tests do not cover leap day/month boundaries."
missing_operations:
  - operation: "explicit_reclaim_or_recover(claim, requester, policy_decision, now)"
    reason: "ReclaimPolicy is a closed enum in the contract, but no engine operation enforces SameAgentOnly/DriverReview/OwnerReview/HumanReview/Forbidden."
  - operation: "handoff_record/accept_handoff(claim, evidence_ref, actor, now)"
    reason: "Expired claims are supposed to route to handoff/recovery, but the engine can only report desired expiry status and cannot complete or validate handoff."
  - operation: "mark_stale_from_heartbeat(claim, now)"
    reason: "The contract has Stale status and heartbeat_interval_seconds, but the engine never derives Stale from missing heartbeats before final expiry."
  - operation: "validate_claim_contract(claim) -> Result"
    reason: "Malformed timestamps and illegal status/lease combinations need a first-class validation path instead of being interpreted as live or mutable."
  - operation: "compare_and_swap_acquire(snapshot_version, expected_state_version)"
    reason: "A pure decision over &[ClaimContract] is not enough for multi-agent safety; the persistence layer needs an engine-level CAS contract to close races."
strengths:
  - "The engine is deterministic with respect to injected now_unix and does not read the system clock."
  - "Non-claimants are consistently rejected for heartbeat and release."
  - "Expiry policy is represented as typed contract fields rather than inferred from lock-file existence."
  - "The timestamp formatter uses Euclidean division, which handles pre-epoch seconds more safely than truncating division."

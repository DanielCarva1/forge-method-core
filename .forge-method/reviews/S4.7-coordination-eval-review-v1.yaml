meta:
  story: "S4.7-coordination-eval"
  pass: 1
  reviewer_model: "codex-researcher"
  date: "2026-06-26"
  verdict: "YELLOW"
  summary: >
    No wrong-verdict bug exists on a VALIDATED contract: the score_coordination
    verdict chain (hard_failed > manual_review_open > missing_non_required >
    Passed) is correct, fail-closed on missing must_pass outcomes works, and the
    real-suite integration tests genuinely close C5. However there are several
    medium-severity robustness/spec issues that bite the moment score_coordination
    or the CLI is consumed by automation outside the happy path: score_coordination
    returns Passed on an empty/unvalidated contract; the CLI exits 0 even for a
    structurally broken or dangling-ref suite (contradicting its own doc comment);
    --suite/--repo-root with a missing value silently falls back to the default
    suite; and coordination_fixture_gaps treats absolute ref strings as escaping
    repo_root. Shippable for slice-4 once M2/M3 are at least documented; M1/M4
    should be fixed before any release automation trusts the gate.

findings:
  - id: M1
    severity: medium
    location: "forge-core-engine/src/coordination_eval.rs :: score_coordination"
    title: "score_coordination returns Passed on an empty or structurally invalid contract"
    description: |
      score_coordination performs NO internal validation. With an empty contract
      (dimensions.len() == 0) the loop runs zero times, so passed=0, failed=0,
      manual_review_open=0, missing_non_required=0, hard_failed=false, and the
      verdict falls through every guard to CoordinationVerdict::Passed
      (summary: "Passed: 0/0 passed, 0 failed, 0 manual-review open"). The same
      happens for a contract that validate_coordination_contract would reject
      (duplicates, no must_pass dim, etc.) -- score never consults required_level
      validity, only iterates what is there. The public API is documented as
      "Score a coordination contract" with no warning that the caller MUST run
      validate_coordination_contract first. Today the CLI only does `validate`
      (no scoring), so the shipped path is safe; but score_coordination is public
      and is the obvious entry point for the future MCP surface (slice 6) named
      in scope.out. A host that calls score without validate gets a false Passed
      on a contract that gates nothing. For a GOVERNANCE GATE this is a latent
      false-release footgun. (Note: integer overflow / panic -- none; the empty
      case is panic-free, just semantically wrong.)
    suggested_fix: >
      Either (a) call validate_coordination_contract at the top of
      score_coordination and return a Failed/ManualReviewRequired verdict (or a
      Result) when errors are present; or (b) at minimum add a hard guard that
      returns Failed when total == 0 or when no must_pass dimension exists, and
      state loudly in the doc comment that callers MUST validate first. Option
      (a) is preferred for a gate.

  - id: M2
    severity: medium
    location: "forge-core-cli/src/coordination.rs :: run_validate + dispatch (exit code)"
    title: "CLI exits 0 / ok=true even when the suite has structural errors or dangling refs"
    description: |
      run_validate unconditionally returns CliEnvelope::ok(...) after a successful
      deserialize -- the structural_errors and dangling_refs are reported in the
      payload (is_real=false), but env.ok stays true and the dispatch maps that to
      exit code 0:
        let exit = if env.ok { 0 } else { exit_code_for(&env.exit_reason.0) };
      This directly contradicts the module doc comment (coordination.rs lines
      ~10-16) which states: "Exit 0 = the suite is REAL (all 22 refs resolve, all
      9 dims well-formed). Exit 2 = structural problems or dangling refs reported".
      There is in fact NO code path that yields exit 2 for structural problems:
      exit_code_for maps "rejection"->2, but run_validate never emits rejection.
      A shell/CI consumer that checks `$? -eq 0` will treat a broken suite as
      passing the gate. The task's DD10 mapping (0=ok, 2=unknown subcommand,
      3=env_config, 5=other) arguably makes exit-0-on-deserialize-success
      defensible, but then the doc comment is wrong AND the only signal of
      "not real" is the JSON field is_real, which is fragile. No test covers a
      structurally-broken or dangling-ref suite.
    suggested_fix: >
      Decide intent: either (preferred for a gate) make run_validate return a
      non-zero exit (e.g. rejection/2 or a dedicated code) when
      structural_errors or dangling_refs are non-empty so `is_real == false`
      implies non-zero exit; or fix the doc comment to state that exit 0 only
      means "readable+deserializable" and that consumers MUST inspect the
      is_real JSON field. Add a test that a deliberately broken suite yields
      is_real=false (and, if the exit code is changed, the chosen non-zero code).

  - id: M3
    severity: medium
    location: "forge-core-cli/src/coordination.rs :: dispatch (validate arg loop)"
    title: "--suite / --repo-root with no value silently fall back to the default suite"
    description: |
      In the validate arg loop:
        "--suite" => { idx += 1; if idx < args.len() { suite = PathBuf::from(&args[idx]); } }
      If `--suite` (or `--repo-root`) is the LAST token, idx advances past the
      end, the `if` is false, and `suite` keeps its default value
      "contracts/evals/minimal-coordination-eval-suite.yaml". The command then
      validates the DEFAULT minimal suite and exits 0 -- the operator believes
      they validated their own suite. For a governance flag this silent-default
      behavior is dangerous: a typo like `--suite=foo.yaml` (note: `=` is not
      supported either, so `--suite=foo.yaml` is parsed as an unknown flag and
      exits 3, but a trailing `--suite foo.yaml` where foo.yaml is missing as a
      token still misroutes). Same defect for --repo-root.
    suggested_fix: >
      When the flag is last (idx >= args.len after increment), emit an
      env_config/usage error and exit non-zero instead of falling through to the
      default. Consider also supporting `--suite=<path>` syntax for ergonomics.

  - id: M4
    severity: medium
    location: "forge-core-engine/src/coordination_eval.rs :: coordination_fixture_gaps"
    title: "Absolute or backslash ref strings escape repo_root (false REAL)"
    description: |
      coordination_fixture_gaps resolves each ref via `repo_root.join(ref_str)`
      and checks `.exists()`. Per std::path semantics, if ref_str is an ABSOLUTE
      path (e.g. "/etc/passwd" on Unix or "C:\\Windows\\..." on Windows),
      Path::join discards repo_root and the check tests the absolute path. An
      absolute ref that happens to exist on the host therefore reports NO gap,
      producing a false "REAL suite" signal -- exactly the wrong direction for a
      gate that is supposed to prove the suite is real. Related: on Unix/WSL a
      ref string containing backslashes (e.g. "docs\\fixtures\\x.yaml" authored
      on Windows) is treated as a single literal component, not as a path
      separator, so legitimate refs from a Windows-authored suite fail to
      resolve under a Unix repo_root (false gap -- conservative, but noisy and
      inconsistent across platforms). Relative refs with no leading "./" work
      fine; trailing slashes are handled fine.
    suggested_fix: >
      Reject/flag ref strings that are absolute (ref_str starts_with '/' or
      matches a drive letter) -- treat them as gaps or as a structural error
      rather than silently resolving outside repo_root. Optionally normalize
      backslashes to forward slashes before join for cross-platform suites, or
      document that ref strings MUST use forward slashes.

  - id: M5
    severity: medium
    location: "forge-core-engine/src/coordination_eval.rs :: score_coordination (missing_non_required branch)"
    title: "all_must_pass_dimensions_required flag is misnamed and its missing-should_pass semantics are ambiguous vs DD42"
    description: |
      The verdict branch
        else if policy.all_must_pass_dimensions_required && missing_non_required > 0 {
            CoordinationVerdict::ManualReviewRequired
        }
      only fires for SHOULD_PASS dimensions that have NO supplied outcome
      (missing_non_required is incremented only in the ShouldPass, !has_outcome
      arm; a should_pass that fails with an outcome does NOT increment it and
      stays a non-blocking warning -- DD42-correct). So when the flag is true, a
      MISSING should_pass outcome escalates to a BLOCKING ManualReviewRequired
      verdict. This is in tension with DD42 ("ShouldPass dims that fail
      downgrade to a warning, not a hard fail") -- missing != failed, but the
      outcome for the operator is that a should_pass dim blocks release. The
      flag NAME ("all_must_pass_dimensions_required") strongly implies it
      governs must_pass dims only, yet its ONLY behavioral effect is on
      missing should_pass outcomes (must_pass missing already drives hard_failed
      regardless of the flag). The semantics are defensible (evidence
      completeness) but undocumented and misnamed -- exactly the kind of thing
      that causes future wrong-verdict bugs when someone toggles the flag
      expecting it to relax must_pass enforcement.
    suggested_fix: >
      Rename to something like `require_complete_evidence` or
      `block_on_missing_should_pass`, and document the exact semantics in the
      PassPolicy doc comment and in DD42. Alternatively, decide that missing
      should_pass should ALWAYS be a non-blocking warning (per a strict reading
      of DD42) and drop the branch, leaving the flag to govern something its
      name actually describes.

  - id: L1
    severity: low
    location: "forge-core-engine/src/coordination_eval.rs :: validate_coordination_contract"
    title: "validate does not catch metric_kind <-> required_level inconsistency"
    description: |
      A dimension with required_level = must_pass but metric_kind = manual_review
      is semantically incoherent (you cannot "must pass" a manual-review metric),
      yet validate accepts it. score_coordination ignores metric_kind entirely --
      only required_level drives the verdict -- so the inconsistency has no
      runtime effect, but it is a structural problem the validator is supposed to
      surface. The same applies to combinations like threshold metric_kind with
      required_level = manual_review_required. By design metric_kind is guidance
      to the host, but the validator's stated role ("metric_kind/required_level
      consistency") is not fully delivered.
    suggested_fix: >
      Either add a CoordinationValidationError variant for inconsistent
      metric_kind/required_level pairs, or document explicitly in the validator
      doc comment that metric_kind and required_level are independent and only
      metric_kind<->fields consistency is checked.

  - id: L2
    severity: low
    location: "forge-core-engine/src/coordination_eval.rs :: score_coordination"
    title: "outcome.dimension is not verified against the queried dimension"
    description: |
      score_coordination calls outcome_fn(&dim.dimension) and then uses o.passed
      without checking that o.dimension == dim.dimension. A buggy or malicious
      host closure could return an outcome for a different dimension; the engine
      would silently apply its passed flag to the wrong dim. This is host-trust
      territory and the design intentionally delegates evidence to the host, but
      a debug_assert! / warning here would catch wiring mistakes cheaply.
    suggested_fix: >
      Add a debug_assert!(o.dimension == dim.dimension) or push a warning when
      they differ. At minimum note the assumption in the doc comment.

  - id: L3
    severity: low
    location: "forge-core-engine/src/coordination_eval.rs :: score_coordination (summary format)"
    title: "summary uses {verdict:?} PascalCase, inconsistent with snake_case serde representation"
    description: |
      CoordinationVerdict has #[serde(rename_all = "snake_case")], so the JSON
      representation is "passed"/"failed"/"manual_review_required". But the
      human-readable summary is built with format!("{verdict:?}: ..."), producing
      "Passed: ...", "Failed: ...", "ManualReviewRequired: ...". The two
      representations of the same value disagree, which is a minor consistency
      wart for log-scraping / dashboards.
    suggested_fix: >
      Render the verdict via a small to_snake_case helper (or match) so the
      summary reads "passed: ...", "failed: ...", "manual_review_required: ...",
      matching the serialized form.

  - id: L4
    severity: low
    location: "forge-core-cli/src/coordination.rs :: dispatch (unknown flag) + exit_code_for"
    title: "Unknown flag exits 3 (env_config) though it is a usage error; doc-vs-code exit-2 gap"
    description: |
      An unknown flag in `coordination validate` returns exit 3 directly. The
      test dispatch_unknown_flag_exits_3 pins this, and the task's DD10 mapping
      does not explicitly assign unknown-flag, so it is arguably acceptable --
      but semantically an unknown flag is a CLI usage error, not an env_config
      error. Separately, exit_code_for maps "rejection"->2, but no caller in the
      coordination module ever produces "rejection" (see M2), so the
      exit-2-for-structural-problems path promised by the doc comment is dead.
    suggested_fix: >
      Either document that any non-env_config usage error maps to 3, or
      introduce a dedicated "usage_error" exit reason. Reconcile with M2.

  - id: L5
    severity: low
    location: "forge-core-engine/src/coordination_eval.rs :: score_coordination (synthetic outcome)"
    title: "Synthetic outcome for a missing should_pass marks passed=true"
    description: |
      When a should_pass dim has no host outcome, eff_passed is set true (the
      (None, ShouldPass) => (true, false) arm) and the synthesized outcome
      pushed to `outcomes` carries passed=true with notes "no host outcome
      supplied". The aggregate counters are correct (missing_non_required tracks
      the real state), but a consumer inspecting `outcomes` sees a passed=true
      entry for a dim that was never evidenced, which is misleading in an audit
      trail. For missing must_pass the synthetic is passed=false (correct); for
      missing manual_review passed=false (correct).
    suggested_fix: >
      For synthesized missing-outcome entries, set passed=false and rely on the
      counters/warnings to encode the non-blocking semantics, or add an explicit
      `evidence_present: bool`/status field to CoordinationOutcome so "not yet
      evidenced" is distinguishable from "passed".

positive_observations:
  - >
    DD40 is honored: the engine is pure machinery -- no model, no claim_engine
    wiring. score_coordination takes a host-provided outcome closure exactly
    like eval::score_router, and the module doc states this explicitly.
  - >
    The verdict chain precedence is correct: hard_failed (any must_pass dim
    failed or missing) takes priority over manual_review_open, which takes
    priority over the all_must_pass/missing_non_required branch, which falls
    through to Passed. No inversion found.
  - >
    Fail-closed on missing must_pass outcomes is correctly implemented
    ((None, MustPass) => (false, false); failed += 1; hard_failed = true) and
    explicitly tested by missing_must_pass_outcome_is_fail_closed (9/9 failed
    -> Failed).
  - >
    should_pass FAILURE with a supplied outcome is genuinely non-blocking:
    eff_passed=false -> warning only, hard_failed stays false -> verdict Passed
    (tested by should_pass_failure_is_warning_not_fail). DD42 satisfied on the
    fail path.
  - >
    The three real_suite_* integration tests genuinely close C5: they load the
    actual contracts/evals/minimal-coordination-eval-suite.yaml from disk,
    deserialize it, assert validate_coordination_contract returns no errors,
    assert coordination_fixture_gaps is empty against the real repo root, and
    assert score_coordination yields Passed with total=9. These are not mocks.
  - >
    validate_coordination_contract accumulates ALL problems (does not
    short-circuit), so a single call reports every structural issue. Duplicate
    detection correctly handles 3+ occurrences (each repeat after the first
    emits a DuplicateDimension error).
  - >
    Empty-contract handling in validate_coordination_contract is panic-free and
    correct: 9 MissingDimension + 1 NoMustPassDimension errors.
  - >
    Concurrent CLI `validate` runs are safe (stateless read-only file IO).

spec_compliance:
  DD40: >
    ok -- engine is pure machinery; no built-in scorer wires slice-4 engines to
    dimensions; host supplies outcomes via closure; CLI ships only the
    structural validate surface. (M1 is a robustness gap, not a DD40 violation.)
  DD41: >
    ok -- CoordinationOutcome.evidence: Vec<RepoPath> is file-backed per DC10;
    the engine scores host-provided payloads deterministically. The CLI does
    not yet expose a scoring/outcomes-loading surface, but that is explicitly
    scope.out (MCP surface, slice 6).
  DD42: >
    ok with caveat -- Passed/Failed/ManualReviewRequired taxonomy implemented;
    must_pass fail (incl. missing) is fail-closed (Failed); should_pass FAILURE
    is a non-blocking warning; manual_review blocks only when
    manual_review_blocks_release. Caveat: M5 -- when
    all_must_pass_dimensions_required=true a MISSING should_pass outcome
    escalates to blocking ManualReviewRequired, which is in tension with the
    DD42 "should_pass is non-blocking" spirit and is governed by a misnamed flag.

final_assessment: >
  Shippable for slice-4: the real-suite C5 closure is genuine, the verdict chain
  is correct on any contract that passes validate_coordination_contract, and
  fail-closed behavior on missing must_pass outcomes is solid. It is NOT ready
  to be consumed by release automation as-is: M2 (CLI exits 0 on a broken suite,
  contradicting the doc comment) and M3 (silent default on a missing --suite
  value) should be fixed or explicitly documented before the gate is wired into
  CI; M1 (score_coordination returns Passed on an empty/unvalidated contract)
  and M4 (absolute ref strings escape repo_root) should be fixed before the
  score API is exposed to the MCP surface in slice 6. None of the findings
  produce a wrong verdict on the validated real suite, so this is YELLOW, not
  RED.

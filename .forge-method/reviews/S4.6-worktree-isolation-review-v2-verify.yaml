meta:
  story: "S4.6-worktree-isolation"
  pass: 2
  reviewer_model: "adversarial-reviewer"
  date: "2026-06-26"
  verdict: "GREEN"
  summary: >
    GREEN — all five claimed fixes (C1, M1, M2, M3, L2) are genuinely CLOSED.
    The command-injection vector (C1) is defeated by TWO independent layers:
    (1) the engine now rejects shell metacharacters in branch_name, worktree_path,
    and base_ref via contains_shell_metachar, and (2) the CLI emission layer
    POSIX-single-quotes every interpolated value via the new shell_quote helper,
    which is correct for ALL inputs (empty, single-quote-only, newline). I
    re-attempted injection with `;`, `$()`, backtick, `&`, `|` in each field and
    confirmed both the engine rejection AND the single-quote wrapping in the
    output string. No regression was introduced: the enum stays exhaustive
    (compiler-enforced, ShellMetacharInField arm present in Display + code map),
    the serde snake_case rename round-trips cleanly and does not affect in-memory
    Eq, the normalize_path `..` collapse produces correct canonical paths with no
    false collision, and the case-fold branch comparison is an acceptable
    conservative fail-closed per DD30. ONE new LOW finding (N1): a duplicated
    dead contains_shell_metachar(&c.base_ref) block in validate_isolation_contract
    that can never execute — harmless but should be removed. No blocking issues;
    this is shippable.

fix_verification:
  - id: C1
    status: closed
    evidence: >
      TWO layers, both verified:
      LAYER 1 (engine rejection) — crates/forge-core-engine/src/isolation.rs:
      `fn contains_shell_metachar(s) -> bool { s.chars().any(|c| matches!(c, ';' | '&' | '|' | '$' | '`' | '(' | ')' | '<' | '>' | '\n' | '{' | '}')) }`.
      Called in validate_isolation_contract on base_ref (returns ShellMetacharInField),
      validate_branch_name (via shell_metachar_check → illegal_branch), and
      validate_worktree_path (via shell_metachar_check → illegal_path). So `;`,
      `$()`, backtick, `&`, `|`, `()`, `<>`, `{}`, newline in ANY of the three
      fields are rejected at the engine boundary with exit 2.
      LAYER 2 (emission quoting) — crates/forge-core-cli/src/isolation.rs:
      `pub fn shell_quote(s: &str) -> String { format!("'{}'", s.replace('\'', "'\\''")) }`.
      suggested_worktree_commands wraps ALL THREE fields:
        `format!("git worktree add -b {} {} {}", shell_quote(&c.branch_name), shell_quote(&c.worktree_path.0), shell_quote(&c.base_ref))`
      and `format!("cd {}", shell_quote(&c.worktree_path.0))`.
      merge_back_commands was refactored to reuse the same `shell_quote(a)` for every arg.
      RE-ATTEMPT: a hand-crafted contract with branch_name="x;y", worktree_path="p;q",
      base_ref="m;n" reaches suggested_worktree_commands and emits
      `git worktree add -b 'x;y' 'p;q' 'm;n'` and `cd 'p;q'` — every `;` sits
      INSIDE single quotes; none is a shell-breaking token. Confirmed by the
      `suggested_commands_shell_quote_every_field` test which counts total
      semicolons (3) against quoted-value matches (3) and asserts equality.
      shell_quote EDGE CASES verified by reasoning: empty → `''` (safe empty
      string); only-quote `"'` → `''\'''` (parses to one literal quote, correct);
      newline → `'a\nb'` (literal inside single quotes, safe). The ONLY character
      that matters for single-quote safety is `'` itself, and it IS escaped.
    note: >
      contains_shell_metachar OMITS `!`, `~`, `#`, `*?[` glob chars, `\r`, space,
      tab. This is NOT exploitable because shell_quote single-quotes ALL inputs —
      inside POSIX single quotes none of these are interpreted (including bash
      history `!`, which is only expanded in double quotes / unquoted). The
      engine list is defense-in-depth; shell_quote is the actual guarantee.
      No OTHER code path reaches a shell string unescaped: rationale fields in
      MergeStep are descriptive-only (never executed), and merge_back_commands
      quotes only args (correctly).

  - id: M1
    status: closed
    evidence: >
      crates/forge-core-engine/src/isolation.rs normalize_path rewritten:
        `".." => { if out.last().is_some_and(|s| s != "..") { out.pop(); } else { out.push("..".to_string()); } }`
      with `"" | "." => continue` and `other => out.push(other.to_ascii_lowercase())`.
      Trace for `../wt/x/../shared`: [..]→[..,wt]→[..,wt,x]→pop→[..,wt]→[..,wt,shared].
      Trace for `../wt/shared`: [..,wt,shared]. EQUAL → collision detected. ✓
      Test `path_collision_collapse_dotdot` asserts this exact case.
      Leading-dotdot preservation: `../../etc` → [..,..,etc] (excess `..` pushed,
      never popped past a leading `..`). Test `leading_dotdot_preserved_in_normalize`.
    note: >
      No false collision introduced. `a/b` and `a/c/../b` correctly collide (same
      physical dir). `../a` and `a` correctly do NOT collide (different depth).
      `a/..` and `.` both reduce to [] and collide — correct (both = current dir).

  - id: M2
    status: closed
    evidence: >
      crates/forge-core-contracts/src/isolation.rs:
      `#[serde(rename_all = "snake_case")]` on BOTH `IsolationStatus` (line ZIZ)
      and `MergePolicy` (line 0Rj). On-disk YAML now writes `active`/`rebase`,
      matching status_str/parse_status/policy_str/parse_merge_policy (all lowercase).
      Tests `isolation_status_serializes_snake_case` and
      `merge_policy_serializes_snake_case` assert both serialization (lowercase)
      and deserialization (parses lowercase).
    note: >
      serde attributes do NOT affect in-memory PartialEq/Eq (derive macros are
      independent), so the `save_then_load_round_trips` test (loaded[0] == c) is
      unaffected. Round-trip is consistent because both write and read sides now
      use snake_case.

  - id: M3
    status: closed
    evidence: >
      crates/forge-core-engine/src/isolation.rs detect_isolation_conflict:
      `if old.branch_name.eq_ignore_ascii_case(&new.branch_name) { return Err(DuplicateBranch { .. }); }`
      Test `branch_collision_case_insensitive` asserts `alice/s5` and `Alice/s5`
      now collide (Err DuplicateBranch).
    note: >
      Conservative false-block noted: on a case-SENSITIVE filesystem (Linux ext4),
      `alice/s5` and `Alice/s5` ARE distinct git refs, so the case-fold now blocks
      a second agent from using a case-variant branch that would be legitimate.
      This is acceptable per DD30 fail-closed stance and mirrors the path-side
      case-fold already adopted. It errs toward safety (block a potential
      collision) rather than allowing a silent ref overwrite.

  - id: L2
    status: closed
    evidence: >
      crates/forge-core-contracts/src/isolation.rs Display for IsolationError,
      IllegalTransition arm:
        `write!(f, "illegal transition {} -> {}", status_lc(*from), status_lc(*to))`
      where `fn status_lc(s: IsolationStatus) -> &'static str` returns
      "proposed"/"active"/"merging"/"merged"/"abandoned". No longer uses `{:?}`.
      Output is now `illegal transition proposed -> active` (lowercase, consistent
      with the snake_case convention everywhere else).
    note: The stable machine-readable code `illegal_transition` (in the CLI
      rejection code map) was already lowercase and is unaffected.

regression_check:
  enum_exhaustiveness: >
    ok — ShellMetacharInField was added to IsolationError with a Display arm
    (`field '{field}' contains a shell metacharacter: {value:?}`) and a CLI
    rejection code-map arm (`=> "shell_metachar_in_field"`). Rust match is
    non-exhaustive without wildcards, so the compiler GUARANTEES every arm is
    covered — no silent fallthrough possible. All 10 enum variants have matching
    arms in both Display and the code map.
  serde_rename_roundtrip: >
    ok — rename_all = "snake_case" changes only the serialized representation,
    not in-memory PartialEq/Eq. The save_then_load_round_trips test compares
    loaded[0] == c and passes because both serialization and deserialization
    now agree on snake_case. parse_status/parse_merge_policy already accepted
    lowercase, so hand-authored YAML now round-trips correctly (the original bug).
  normalize_dotdot_false_collision: >
    ok — traced multiple cases (a/b vs a/c/../b, ../a vs a, a/.. vs .). All
    collisions are CORRECT (same physical directory); no legitimately-distinct
    path is wrongly merged. Leading `..` segments are preserved (never popped
    past), so `../../etc` stays [..,..,etc] and does NOT false-collide with
    single-level escapes.
  case_fold_branch_false_block: >
    ok-with-note — on case-sensitive filesystems, two branches differing only by
    case are now blocked (previously allowed). This is a deliberate conservative
    fail-closed per DD30, mirroring the path-side case-fold. It prevents silent
    git-ref overwrite on case-insensitive filesystems (the project's /mnt/c
    drvfs). Acceptable; not a regression in the safety direction.

new_findings:
  - id: N1
    severity: low
    location: "crates/forge-core-engine/src/isolation.rs :: validate_isolation_contract (lines SjP-DKd, the second contains_shell_metachar block)"
    title: "Duplicated dead contains_shell_metachar(&c.base_ref) check — second block can never execute"
    description: >
      validate_isolation_contract contains TWO consecutive identical guards on
      base_ref:
        (1) `if contains_shell_metachar(&c.base_ref) { return Err(ShellMetacharInField { field: "base_ref", .. }); }`
        (2) `if contains_shell_metachar(&c.base_ref) { return Err(IllegalBranchName { branch_name: c.base_ref.clone(), .. }); }`
      Block (2) is dead code: if (1) did not return (no metachar), (2) checks the
      exact same predicate and cannot return either. It is also semantically
      wrong — it would label a base_ref problem as IllegalBranchName. This is a
      leftover edit artifact (likely the author wrote the check, then rewrote it
      with the dedicated ShellMetacharInField variant but forgot to delete the
      first draft). It has NO functional or security impact (never executes), but
      it is confusing and should be deleted. Non-blocking.

final_assessment: >
  SHIPPABLE. All five claimed fixes are genuinely closed with no regression. The
  C1 command-injection bar is met absolutely: every field that reaches a
  copy-pasted shell command is both rejected-at-engine (contains_shell_metachar)
  AND single-quoted-at-emission (shell_quote, correct for all inputs). I could
  not find any remaining path where branch_name/worktree_path/base_ref reaches a
  shell string unescaped. The sole new finding (N1) is dead duplicate code with
  zero runtime impact — remove it for cleanliness, but it does not block ship.
  Verdict: GREEN.

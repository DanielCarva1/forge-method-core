meta:
  story: "S4.7-coordination-eval"
  pass: 2
  reviewer_model: "codex-researcher"
  date: "2026-06-26"
  verdict: "GREEN"
  summary: >
    All seven claimed fixes (M1, M2, M3, M4, L2, L3, L5) are genuinely CLOSED
    and verified against the source, with one regression-equivalence spot-check
    on every existing happy-path test. The accepted-with-justification items
    (M5, L1, L4) are adequately documented. No path remains where a broken
    suite yields a false Passed or exit-0, and the verdict chain on a validated
    contract is unchanged. Two new LOW findings (drive-letter false-positive on
    a colon-bearing 2-char ref; shared PID-based temp filename under future
    parallel-test growth) are non-blocking. C5 closure is intact and the gate
    is now trustworthy for CI consumption. GREEN.

fix_verification:
  - id: M1
    status: closed
    evidence: >
      coordination_eval.rs lines ~196-220: score_coordination now calls
      `let structural = validate_coordination_contract(contract);` at the very
      top, and `if !structural.is_empty()` returns a CoordinationScore with
      `verdict: CoordinationVerdict::Failed`, `passed: 0`,
      `failed: contract.dimensions.len()`, warnings populated from the typed
      errors, and summary "failed: contract failed structural validation (N
      errors)". Re-attempt: empty contract (dimensions: Vec::new()) → validate
      returns 9 MissingDimension + 1 NoMustPassDimension (10 errors); score
      returns Failed (test score_empty_contract_is_failed_not_passed asserts
      verdict == Failed AND warnings non-empty). Duplicate-dim contract →
      validate returns DuplicateDimension → score returns Failed (test
      score_structurally_invalid_contract_is_failed). Happy path
      score_all_pass_yields_passed still flows through validate (empty errs)
      and yields Passed with 9/0/0. real_suite_yields_passed_with_full_outcomes
      also unaffected. CLOSED.

  - id: M2
    status: closed
    evidence: >
      coordination.rs run_validate (lines ~96-118): the final branch is now
      `if is_real { CliEnvelope::ok(...) } else { CliEnvelope::reject(...,
      ExitReason::RejectedByGate, msg, payload) }`. Verified against
      forge-core-contracts/src/envelope.rs: CliEnvelope::reject sets ok=false,
      exit_reason="rejected_by_gate", data=Some(payload), error=Some(CliError{
      code:"rejected_by_gate", message}). exit_code() matches
      "rejected_by_gate" → ExitReason::RejectedByGate.as_code() = 2 (locked by
      tests every_exit_reason_maps_to_expected_code and
      reject_envelope_carries_both_data_and_error_with_nonzero_exit). dispatch
      now uses `env.exit_code()` (line ~190). Test dispatch_broken_suite_exits_2
      writes a 1-dim suite that deserializes but fails structural validation,
      asserts exit==2 and JSON contains "ok": false / "is_real": false. Valid
      suite still exits 0 (dispatch_validate_returns_zero_for_real_suite).
      Re-attempt: a dangling-ref-only suite (structural empty, gaps non-empty)
      also hits is_real=false → reject → exit 2. CLOSED.

  - id: L5  # ordered here because it interacts with M1's counting
    status: closed
    evidence: >
      coordination_eval.rs ShouldPass arm (lines ~263-280): counting guard is
      now `if has_outcome && eff_passed { passed += 1; } else if has_outcome {
      /* warning */ }`. A missing should_pass outcome (has_outcome=false) no
      longer inflates passed. Synthesized entry (lines ~316-325) now uses
      `passed: false` with notes "no host outcome supplied". Regression check
      against should_pass_failure_is_warning_not_fail: that test supplies
      Some(outcome) with passed=false for the should_pass dim → has_outcome=true,
      eff_passed=false → warning branch, passed not incremented for that dim;
      other 8 must_pass pass → passed=8, hard_failed=false,
      missing_non_required=0 → verdict Passed. Unaffected, semantics preserved.
      CLOSED.

  - id: M3
    status: closed
    evidence: >
      coordination.rs dispatch (lines ~145-170): both `--suite` and
      `--repo-root` now do `idx += 1; let Some(val) = args.get(idx) else {
      eprintln!(...); return (String::new(), 3); };`. Tests
      dispatch_suite_without_value_exits_3 and
      dispatch_repo_root_without_value_exits_3 pin exit 3. Re-attempt for other
      silent-default paths: the only flags consumed are --suite, --repo-root,
      --no-json, --help/-h; --no-json is a boolean (no value), unknown flags
      exit 3. No other path mutates suite/repo_root from their defaults without
      an explicit value. CLOSED.

  - id: M4
    status: closed
    evidence: >
      coordination_eval.rs coordination_fixture_gaps visit closure (lines
      ~140-160): `is_absolute_like = ref_str.starts_with('/') ||
      ref_str.starts_with('\\') || ref_str.as_bytes().get(1).is_some_and(|&c|
      c == b':') || Path::new(ref_str).is_absolute();` and the gap is pushed if
      `is_absolute_like || ref_str.contains('\\')`. Re-attempt matrix:
      `/etc/passwd` → starts_with('/') flagged (test
      absolute_ref_is_reported_as_gap). `C:\Windows\system32\drivers\etc\hosts`
      → byte[1]==':' AND contains '\\' flagged. `\\server\share` →
      starts_with('\\') flagged. Mid-string backslash `docs\fixtures\x.yaml` →
      contains('\\') flagged (test backslash_ref_is_reported_as_gap). Real
      suite refs (forward-slash relative like "fixtures/...") → none of the
      predicates match, fall through to repo_root.join().exists() and resolve
      cleanly (real_suite_has_no_dangling_refs still passes). CLOSED.

  - id: L2
    status: closed
    evidence: >
      coordination_eval.rs lines ~307-313: inside `if let Some(o) =
      outcome.clone() { debug_assert!(o.dimension == dim.dimension,
      "outcome_fn returned outcome for {:?} while querying {:?}", o.dimension,
      dim.dimension); outcomes.push(o); }`. Verified it does not fire
      spuriously: every existing test that supplies outcomes uses the closure
      `|dim| Some(CoordinationOutcome { dimension: *dim, ... })` — the returned
      dimension is exactly the queried dim, so o.dimension == dim.dimension
      holds in every test. debug_assert is a no-op in release builds, so zero
      runtime cost for shipped binary. CLOSED.

  - id: L3
    status: closed
    evidence: >
      coordination_eval.rs verdict_snake helper (lines ~337-343) returns
      "passed" / "failed" / "manual_review_required", and summary format!
      (lines ~332-334) uses `verdict_snake(verdict)` instead of `{verdict:?}`.
      Test summary_verdict_is_snake_case asserts summary.starts_with("passed:")
      and !summary.contains("Passed"). The serialized CoordinationVerdict
      (serde rename_all = "snake_case") now matches the human summary. CLOSED.

accepted_documented:
  - id: M5
    note: >
      The flag name all_must_pass_dimensions_required is unchanged and remains a
      locked contract field (CoordinationEvalPassPolicy). The behavioral effect
      (missing should_pass outcome escalates to blocking ManualReviewRequired
      when the flag is true) is documented in the verdict-chain comment at lines
      ~297-301. The mismatch between name (implies must_pass scope) and effect
      (only affects missing should_pass) is a real future-bug risk IF a future
      author toggles the flag expecting it to relax must_pass enforcement.
      However, since the flag is a frozen schema field and the real suite sets
      it true, the current verdict is correct and the documentation is adequate
      as a guardrail. Acceptable to ship; recommend a follow-up to add a
      doc-comment paragraph on the struct field itself (currently the comment
      lives in score_coordination, not on the field).
  - id: L1
    note: >
      metric_kind is documented as host guidance, independent of required_level.
      A must_pass + manual_review metric_kind combination is incoherent but has
      no runtime effect (score_coordination ignores metric_kind for verdict
      purposes). Acceptable as documentation item. The validator doc comment at
      line ~118 still claims "metric_kind/required_level consistency" is checked,
      which overstates what is delivered — recommend tightening that sentence in
      a follow-up to say "metric_kind <-> fields consistency" only.
  - id: L4
    note: >
      Unknown flag exits 3 (invalid_decision_shape per DD10). Defensible: a
      malformed CLI invocation is a structural input error, and 3 is the
      closest DD10 bucket. No action required; the existing
      dispatch_unknown_flag_exits_3 test pins the behavior.

regression_check:
  happy_path_still_passed: >
    ok — score_all_pass_yields_passed (9/0/0, verdict Passed) and
    real_suite_yields_passed_with_full_outcomes (verdict Passed, total 9,
    failed 0) both still flow through the new validate-at-top guard. The guard
    returns empty errs on a valid contract, so it is a pure short-circuit with
    no correctness risk; the cost is one extra Vec allocation per score call
    (negligible for a 9-dim contract; a caller that does validate-then-score
    pays for validation twice, but that is a micro-cost and the validate call
    is O(9)).
  l5_counting_change: >
    ok — should_pass_failure_is_warning_not_fail supplies Some(outcome) with
    passed=false, so has_outcome=true and the new `if has_outcome && eff_passed`
    branch correctly skips incrementing passed for that dim; verdict remains
    Passed (8 must_pass pass, no hard fail, missing_non_required=0). The L5
    change only affects the MISSING-outcome sub-case (has_outcome=false), which
    this test does not exercise. No semantic regression.
  dead_code: >
    ok — the local exit_code_for helper from PASS 1 is gone; no remaining
    reference in coordination.rs. dispatch uses env.exit_code() exclusively.
    Searched the full file; no dangling symbol.
  debug_assert_spurious: >
    ok — every test that supplies outcomes uses dimension: *dim in the closure,
    so o.dimension == dim.dimension holds throughout. debug_assert is a no-op
    in release builds. No spurious panic risk in test or release.

new_findings:
  - id: N1
    severity: low
    location: "forge-core-engine/src/coordination_eval.rs :: coordination_fixture_gaps (drive-letter predicate)"
    title: "Drive-letter check byte[1]==':' false-positives on a 2-char relative ref containing a colon (e.g. 'a:b')"
    description: >
      The predicate `ref_str.as_bytes().get(1).is_some_and(|&c| c == b':')`
      flags ANY 2-character ref whose second byte is ':' as absolute. A
      legitimate (if unusual) repo-relative ref like "a:b" or "x:y" would be
      reported as a gap. Real impact is minimal: YAML ref strings are file
      paths, colons are forbidden in Windows filenames and rare in Unix
      paths, and the real suite uses forward-slash multi-component refs
      ("fixtures/lane_collision_detection.yaml" etc.) whose byte[1] is 'i'
      or similar. But the check is technically over-broad. A tighter
      predicate would require a 2-byte drive pattern AND the third byte to be
      '/' or '\\' (i.e. a real Windows absolute path). Non-blocking; note for
      a future hardening pass.
  - id: N2
    severity: low
    location: "forge-core-cli/src/coordination.rs :: dispatch_broken_suite_exits_2 (temp file naming)"
    title: "Temp file uses std::process::id() which is shared across parallel test threads in the same process"
    description: >
      The test writes to temp_dir().join(format!("forge-broken-suite-{}.yaml",
      std::process::id())). cargo test runs tests in parallel threads WITHIN ONE
      PROCESS, so std::process::id() is identical for all parallel tests. Today
      only one test uses this filename pattern, so there is no collision. But if
      a future test reuses the pattern, two threads could race on the same
      file (write/write or write/remove). Use a thread-safe unique suffix
      (e.g. AtomicU64 counter, or std::env::temp_dir().join(uuid)) to harden.
      Non-blocking today.

final_assessment: >
  Shippable. All five mediums and three lows flagged in PASS 1 as fixable are
  genuinely CLOSED in source with regression tests; the three accepted items
  (M5, L1, L4) are adequately documented with one minor doc-comment tightening
  recommended. No path remains where a broken suite yields a false Passed or
  exit-0: M1 closes the engine-level false-Passed on an unvalidated contract,
  M2 closes the CLI-level exit-0 on a structurally-broken or dangling-ref
  suite, M3 closes the silent-default on a missing flag value, and M4 closes
  the absolute/backslash ref escape. The verdict chain on a validated
  contract is unchanged and the original C5 closure tests
  (real_suite_loads_and_is_structurally_valid,
  real_suite_has_no_dangling_refs, real_suite_yields_passed_with_full_outcomes)
  still pass. Two new LOW findings (N1 drive-letter over-broad predicate, N2
  shared-PID temp filename) are non-blocking and suitable for a future
  hardening pass. The coordination-eval gate is now trustworthy for CI/release
  automation consumption. GREEN.

meta:
  story: "S4.5-conflict-detection"
  pass: 2
  reviewer_model: "codex-reviewer (adversarial) — PASS 2 verification"
  date: "2026-06-26"
  verdict: "GREEN"
  summary: >
    All five PASS-1 findings (M1-M4 + L1) are correctly closed in the current
    code: the structured payload is emitted on block via a new
    `CliEnvelope::reject` constructor, blocked_path now echoes the RAW submitted
    target, segment comparison is ASCII-case-folded (DD30), the TOCTOU window
    is documented, and the over-pop normalization is commented. No functional
    regression was found: the envelope serde contract holds, lowercasing is
    idempotent on every existing test path, and the raw_target thread compiles
    and produces the right value (covered by two new tests). Two low-severity
    cosmetic/test-coverage nits remain (a duplicated `# Errors` doc section in
    run_check_write, and no isolated unit test for `reject`'s serde shape);
    neither blocks shipping.

fix_verification:
  - id: M1
    status: closed
    evidence: >
      envelope.rs adds `pub fn reject(command, exit, message, data: T)` which
      sets `ok: false`, `data: Some(data)`, AND `error: Some(CliError{...})`
      with exit-driven exit_reason. run_check_write's `Blocked` branch builds a
      `WriteCheckPayload { allowed: false, blocks: payload_blocks, .. }` and
      returns `CliEnvelope::reject("check-write", ExitReason::RejectedByGate,
      msg, payload)`. conflict_code is emitted via the hard-coded
      `conflict_code_str` match (e.g. `WriteTargetClaimed =>
      "write_target_claimed"`), NOT Debug format. e2e test
      `peer_write_into_claimed_path_is_blocked` asserts
      `payload.blocks[0].conflict_code == "write_target_claimed"` and
      `payload.blocks[0].claimant == "alice"`. The original attack vector (an
      agent forced to regex prose; conflict_code brittle to enum refactor) is
      defeated — the wire string is now stable and independent of Debug.
    note: >
      The error.code field is left as plain "rejected_by_gate" (no sub-code),
      unlike rejected_envelope which enriches code with a reject_code prefix.
      This is acceptable because the structured `data.blocks` is a strictly
      richer self-correction surface than an error.code string would be; the
      PASS-1 fix_suggestion offered the error.code enrichment only as a minimum
      when the full payload was not feasible. Defeats the original defect.

  - id: M2
    status: closed
    evidence: >
      classify_target signature is now `fn classify_target(raw_target:
      &RepoPath, target_segments: &[String], ...)` and the hard-block arm stores
      `blocked_path: raw_target.clone()`. check_write_against_claims calls
      `classify_target(target, &target_norm, ...)` where `target` is the raw
      RepoPath from the `targets` slice (governed/ungoverned already used
      `target.clone()`). All three reported path families (blocked /
      governed_by_self / ungoverned) now use the identical RAW identity. New
      unit test `blocked_path_reports_raw_input_not_normalized` submits
      `a/../contracts/stories/S5.0.yaml` and asserts `blocks[0].blocked_path.0
      == raw`. e2e test also asserts the blocked_path string.
    note: None — matching still uses the normalized `target_segments` for
      comparison; only reporting uses the raw path. Clean separation.

  - id: M3
    status: closed
    evidence: >
      normalize_segments pushes `other.to_ascii_lowercase()` (was previously
      `other.to_string()`). Documented inline as DD30 with explicit
      fail-closed rationale ("a false block is safe ... a missed block is a
      collision"). The fold is applied symmetrically: scope_covers_any
      re-normalizes each claim path, check_write_against_claims normalizes each
      target — so `Contracts/Stories/S5.0.yaml` (claim) and
      `contracts/stories/s5.0.yaml` (target) now collide. New unit test
      `case_insensitive_matching_blocks_case_folded_peer` proves the case-folded
      peer is blocked.
    note: >
      The fold is ASCII-only (`to_ascii_lowercase`). Non-ASCII uppercase
      (e.g. Cyrillic, İ, Σ) is NOT folded, and NFC composition is not applied.
      On a Unicode-aware case-insensitive filesystem (macOS APFS default) two
      differently-cased or precomposed/decomposed non-ASCII paths could still
      diverge. This is a documented, low-severity residual gap (repo paths are
      overwhelmingly ASCII); the fix is strictly better than byte-exact and
      does not introduce a regression.

  - id: M4
    status: closed
    evidence: >
      run_check_write's doc comment now contains a `# Time-of-check vs
      time-of-use` paragraph stating the verdict is a POINT-IN-TIME advisory
      snapshot, that another agent may acquire a conflicting claim before the
      write lands, that the integrity spine remains the authoritative gate,
      and that "Callers MUST NOT treat `allowed` as a durable authorization."
    note: >
      This was a documentation-only ask (the TOCTOU window is inherent to
      check-then-write and cannot be fully closed by holding the lock during a
      later, separate write). The doc clearly communicates the advisory nature.
      Defeats the original finding.

  - id: L1
    status: closed
    evidence: >
      normalize_segments `..` arm now carries the comment: "Over-pop (leading
      or excess `..`) is intentionally absorbed: pop on an empty Vec is a
      no-op, so `../../etc` -> ["etc"]. Repo-root escape is NOT this engine's
      job (DD29 lexical only); the integrity spine resolves real on-disk
      paths."
    note: None.

regression_check:
  envelope_contract: >
    ok (with one minor coverage note). The `data` field keeps
    `#[serde(skip_serializing_if = "Option::is_none")]`; `reject` sets
    data=Some AND error=Some with ok=false, so BOTH fields serialize. The
    field doc was updated to document the exception ("Present iff ok==true,
    EXCEPT for rejection cases produced by CliEnvelope::reject"). A consumer
    deserializing this JSON gets both Option fields populated correctly
    (Option<T> deserializes fine from present JSON). No structural violation.
    CONCERN (low): there is NO isolated unit test in envelope.rs for the
    `reject` constructor — the existing tests cover only `ok` and `err`. The
    e2e test exercises it indirectly (check.data.expect works), but a round-
    trip test asserting reject JSON contains both "data" and "error" with
    ok:false would lock the contract. Not blocking.
  lowercase_normalization: >
    ok. Every pre-existing engine + CLI test uses lowercase ASCII paths
    (contracts/stories/S4.5.yaml, src/ev, docs/readme.md, etc.), so
    to_ascii_lowercase is idempotent on them — no previously-passing test is
    silently broken. The two new tests (case_insensitive_matching and
    blocked_path_reports_raw) pass by construction with the new logic. No
    false-block was introduced for ASCII paths.
  raw_target_threading: >
    ok. classify_target's first parameter is now `raw_target: &RepoPath`;
    check_write_against_claims passes the loop's `target` (the raw input).
    Compiles clean (no type mismatch — target_segments is passed separately as
    the already-normalized slice). The value is verified correct by the
    blocked_path_reports_raw_input_not_normalized unit test (asserts the
    exact raw string with a `..` segment).

new_findings:
  - id: N1
    severity: low
    location: "forge-core-cli/src/claim.rs :: run_check_write doc comment (just above #[must_use])"
    title: "Duplicated `# Errors` doc section (copy-paste artifact)"
    description: >
      The run_check_write doc comment contains TWO consecutive identical
      `# Errors` sections: `/// # Errors` + `/// EnvConfig (5) if the claims
      directory cannot be read.` appears twice back-to-back. This is a
      cosmetic rustdoc defect introduced when the TOCTOU paragraph was spliced
      in. No behavioral impact, but it will render as a duplicate heading in
      generated docs and looks sloppy for a contract file. Trivial to delete
      one of the two blocks.
  - id: N2
    severity: low
    location: "forge-core-contracts/src/envelope.rs :: tests module"
    title: "No isolated serde round-trip test for CliEnvelope::reject"
    description: >
      The new `reject` constructor changes the envelope's serialized shape
      (data present with ok:false). The envelope unit-test module covers
      `ok`, `err`, and round-trip only for `ok`. There is no test asserting
      that a `reject` envelope serializes with BOTH `data` and `error`
      present and `ok: false`, nor that it round-trips through
      serde_json::from_str. The behavior is correct by construction
      (skip_serializing_if omits only None), but a regression in the
      skip_serializing_if attribute or a future refactor of the constructor
      could silently drop the data field on rejection without any test
      catching it. Recommend adding a `reject_envelope_carries_data_and_error`
      test mirroring the existing ok/err tests.

final_assessment: >
  Shippable. All four mediums and the low from PASS 1 are genuinely closed —
  the structured block payload now carries stable snake_case conflict codes
  and full attribution, blocked_path is consistently raw, case-folding is
  handled and documented as DD30, the TOCTOU window is disclosed, and the
  over-pop behavior is annotated. No functional regression was found: the
  serde contract holds, no existing test breaks, and the raw_target threading
  compiles and is test-verified. The only residual items are two low-severity
  nits (a duplicated doc heading and a missing isolated reject-serialization
  test) that do not affect correctness or security. GREEN.

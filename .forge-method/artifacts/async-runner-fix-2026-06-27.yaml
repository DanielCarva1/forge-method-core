schema_version: "0.1.0"
artifact:
  id: async-runner-fix-2026-06-27
  kind: infra-fix
  status: done
  closed: 2026-06-27

  problem: |
    pi-subagents async runner died in ~1s ("process exited or disappeared before
    writing a result") in 100% of attempts. Blocked all background work.

  root_cause: |
    MODULE_NOT_FOUND when spawning runner.ts via jiti. The async spawn creates a
    NEW Node process (separate from the main pi) that reloads runner.ts; that
    process could not see the peerDependency @earendil-works/pi-coding-agent.

    Broken layout in the WSL extensions tree:
      ~/.pi/agent/npm/node_modules/@earendil-works/  had: pi-ai, pi-tui
                                                       MISSING: pi-coding-agent

    pi-coding-agent lives in ~/.local/lib/node_modules/ (global tree), but the
    extensions tree did not reference it. WSL installation was left incomplete.

  diagnosis_method: |
    1. Reproduced the exact spawn of spawnRunner() manually with stderr captured
       (spawnRunner uses stdio:"ignore", which hides the error).
    2. Captured: "Cannot find module '@earendil-works/pi-coding-agent'".
    3. Mapped the layout: pi-subagents declares pi-coding-agent as peerDependency.
    4. Confirmed the module exists in ~/.local/lib/node_modules/.

  fix: |
    1 symlink (pointing the existing module into the tree where the runner looks for it):
      ln -sfn ~/.local/lib/node_modules/@earendil-works/pi-coding-agent \
              ~/.pi/agent/npm/node_modules/@earendil-works/pi-coding-agent

    Manual re-spawn of runner.ts: BEFORE it died in 1s (exit 1), AFTER it ran the
    full 12s (timeout 124). Hypothesis confirmed.

  proof: |
    Smoke test async (delegate, trivial task): completed, 5 turns, process alive
    ~76s, result delivered back by pi. First COMPLETE async in this project.

    Parallel test (3 simultaneous async delegates, independent tasks):
      - W1 count-contracts:  DONE, 110.5s, 323 contracts
      - W2 crate-inventory:  DONE,  86.4s, 8 crates
      - W3 test-inventory:   DONE, 175.6s, 382 test fns
      - OVERLAP window: 24.8s (all simultaneous) => PARALLEL CONFIRMED
      - 0 stale, 0 intervention, results validated against real cargo test

  caveat: |
    The symlink is FRAGILE — a `pi update` that reinstalls node_modules may wipe it.
    If async dies again in 1s, recreate the symlink. A permanent fix would require
    an upstream fix in the pi installer (declare pi-coding-agent as a real dep or
    auto-symlink on install).

  non_causes: |
    - OneDrive off: NOT related (paths do not go through OneDrive).
    - WSL itself: NO (would be the same error on native Linux).
    - Duplicate pi (Windows+WSL): PARTIAL — not the direct cause, but the WSL
      installation was left incomplete, possibly due to interaction with the dual
      environment. The Windows install was correct (pi-coding-agent co-located).

  impact: |
    Unblocks the master/worker model: now I can fire N async subagents on
    genuinely independent tasks without blocking the driver turn, and pi delivers
    the results back. Slice 6 Front B/C can use real parallelism.

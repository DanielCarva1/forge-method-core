schema_version: "0.1.0"
artifact:
  id: async-runner-fix-2026-06-27
  kind: infra-fix
  status: done
  closed: 2026-06-27

  problem: |
    pi-subagents async runner morria em ~1s ("process exited or disappeared before
    writing a result") em 100% das tentativas. Bloqueava todo background work.

  root_cause: |
    MODULE_NOT_FOUND ao spawnar o runner.ts via jiti. O async spawn cria um processo
    Node NOVO (separado do pi principal) que recarrega runner.ts; esse processo não
    enxergava a peerDependency @earendil-works/pi-coding-agent.

    Layout quebrado na árvore de extensões do WSL:
      ~/.pi/agent/npm/node_modules/@earendil-works/  tinha: pi-ai, pi-tui
                                                       FALTAVA: pi-coding-agent

    O pi-coding-agent mora em ~/.local/lib/node_modules/ (árvore global), mas a
    árvore de extensões não o referenciava. Instalação WSL ficou incompleta.

  diagnosis_method: |
    1. Reproduzi o spawn exato do spawnRunner() manualmente com stderr capturado
       (o spawnRunner usa stdio:"ignore", escondendo o erro).
    2. Capturei: "Cannot find module '@earendil-works/pi-coding-agent'".
    3. Mapeei o layout: pi-subagents declara pi-coding-agent como peerDependency.
    4. Confirmei que o módulo existe em ~/.local/lib/node_modules/.

  fix: |
    1 symlink (apontando o módulo existente pra dentro da árvore onde o runner procura):
      ln -sfn ~/.local/lib/node_modules/@earendil-works/pi-coding-agent \
              ~/.pi/agent/npm/node_modules/@earendil-works/pi-coding-agent

    Re-spawn manual do runner.ts: ANTES morria em 1s (exit 1), DEPOIS rodou os 12s
    completos (timeout 124). Hipótese confirmada.

  proof: |
    Smoke test async (delegate, tarefa trivial): completou, 5 turns, processo vivo
    ~76s, resultado entregue de volta pelo pi. Primeiro async COMPLETO deste projeto.

    Parallel test (3 delegates async simultâneos, tarefas independentes):
      - W1 count-contracts:  DONE, 110.5s, 323 contratos
      - W2 crate-inventory:  DONE,  86.4s, 8 crates
      - W3 test-inventory:   DONE, 175.6s, 382 test fns
      - OVERLAP window: 24.8s (todos simultâneos) => PARALELO CONFIRMADO
      - 0 stale, 0 intervenção, resultados validados contra cargo test real

  caveat: |
    O symlink é FRÁGIL — um `pi update` que reinstalar node_modules pode apagá-lo.
    Se async voltar a morrer em 1s, recriar o symlink. Solução permanente exigiria
    upstream fix no instalador do pi (declarar pi-coding-agent como dep real ou
    auto-symlink na instalação).

  non_causes: |
    - OneDrive off: NÃO tem relação (caminhos não passam por OneDrive).
    - WSL em si: NÃO (seria o mesmo erro em Linux nativo).
    - pi duplo (Windows+WSL): PARCIAL — não causa direta, mas a instalação WSL
      ficou incompleta possivelmente por interação com o ambiente duplo. A
      instalação Windows estava correta (pi-coding-agent co-localizado).

  impact: |
    Desbloqueia o modelo master/worker: agora posso disparar N subagentes async em
    tarefas genuinamente independentes sem bloquear o turno do driver, e o pi
    entrega os resultados de volta. Slice 6 Frente B/C podem usar paralelismo real.

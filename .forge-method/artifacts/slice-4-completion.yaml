schema_version: "0.1"
artifact_kind: "slice-completion"
slice_id: "slice-4-governance"
title: "Slice 4 — Multi-agent governance (claims + conflict detection + worktree isolation + coordination gate)"
status: "done"
created_at: "2026-06-26"
closed_at: "2026-06-26"

intent: |
  Deliver the multi-agent governance promise (DC8): multiple agents / people can
  work on the same repo without worrying about conflicts, versioning, or
  overwrites. Four layers — logical claims (S4.3-S4.5), physical worktree
  isolation (S4.6), and the coordination-eval gate that proves it all works
  (S4.7). This is the wedge that lets the assistant orchestrate many subagents
  (the user's gpt-5.5 fleet) safely.

stories_delivered:
  S4.1: "Governance audit → .forge-method/artifacts/S4.1-governance-audit.yaml (found coordination contracts already exist in the spine)"
  S4.2: "Slice-4 spec → contracts/spec/slice-4-governance-spec.yaml (stories S4.3-S4.7, decisions DD15-DD18, autonomy-first ordering)"
  S4.3: "Claim engine → crates/forge-core-engine/src/claim_engine.rs (pure logic, 20 tests). 2-pass adversarial review: RED(5 criticals)→YELLOW(all closed)+7 regression."
  S4.4: "Governance CLI → crates/forge-core-cli/src/claim.rs (~700 lines, 16 tests). acquire|heartbeat|release|status. 4 criticals found+fixed. 259 tests."
  S4.5: "Conflict detection → conflict_detection.rs (engine, 16 tests) + claim.rs check-write (CLI) + CliEnvelope::reject constructor. Path matcher proven SOUND against attack attempts. 281 tests. C5 signal LIVE VERIFIED."
  S4.6: "Worktree isolation → isolation.rs (contract) + isolation.rs (engine) + isolation.rs (CLI) + io_util.rs (shared atomic_write/DirLock). propose|status|merge-plan|transition. 2-pass review: RED(1 critical injection)→GREEN. 342 tests."
  S4.7: "Coordination-eval gate → coordination_eval.rs (engine, 25 tests) + coordination.rs (CLI, 9 tests). validate. 2-pass review: YELLOW(5 medium)→GREEN. 371 tests."

capabilities_advanced:
  C5_multi_agent_coordination: "DELIVERED — the C5 success signal is CLOSED. Two agents acquire disjoint claims, write own paths freely, cross-writes blocked with typed reasons, the bus view shows both, and the coordination-eval gate proves the suite is REAL."
  C2_smart_orchestration: "ADVANCED — claim bus + conflict detection + isolation give the orchestrator the physical+logical scaffolding to dispatch and monitor workers."

multi_agent_governance_layers:
  layer2_logical_claims: "claim_engine + conflict_detection. Agents declare write scopes; the engine blocks overlapping writes BEFORE they happen. Path containment = segment-aware prefix match (defeats sibling trap), case-insensitive (DD30), only live claims block (DD27)."
  layer1_physical_isolation: "isolation contract. One agent = one git worktree + one branch. Engine DESCRIBES/VALIDATES (never shells out — DD31); suggests shell-quoted git commands. Closes accidental code overwrite."
  coordination_gate: "coordination_eval. The 9-dimension eval proves the governance surface works; the engine is a pure scorer (host provides outcomes, DC9); the suite is REAL (22 refs, 0 dangling)."


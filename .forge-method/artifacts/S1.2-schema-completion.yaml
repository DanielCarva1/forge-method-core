# ---------------------------------------------------------------------------
# design decisions (locked, with rationale)
# ---------------------------------------------------------------------------
design_decisions:
  DD1_phase_as_string_not_enum_on_document:
    decision: "Workflow.phase is a StableId (free-form string), not the Phase enum directly."
    rationale: "the 85 pre-migration workflows may carry phase labels in varied forms (canonical '3-plan', bare 'plan', bare '3', or none). A free-form string NEVER fails deserialization; Phase::parse() categorizes at routing time. This matches operation.rs which also stores phase as StableId. Trade-off accepted: invalid labels are caught at parse, not at load."
  DD2_stableid_default:
    decision: "StableId derives Default (= empty string)."
    rationale: "needed for #[serde(default)] on Workflow.phase so untagged workflows deserialize to empty phase. Empty string is a sound 'unassigned' sentinel; Phase::parse('') returns None. Derived not hand-written (clippy idiomaticity)."
  DD3_steps_are_directional_text:
    decision: "Workflow.steps is Vec<String> of directional text (what to achieve)."
    rationale: "explicit DC9 compliance. No persona role-play, no step-by-step scripting. The host LLM interprets directional steps within hard gates. This is what makes the product scale-with-the-model (DC9)."
  DD4_catalog_entry_is_routing_flattened_view:
    decision: "CatalogEntry is a flattened subset of Workflow (id, phase, workflow_ref, triggers, prerequisites, outputs)."
    rationale: "the orchestrator only needs routing signals, not full step text. A separate lighter type keeps the routing hot-path cheap and the catalog doc small. Proven by test catalog_entry_derives_from_workflow_fields."


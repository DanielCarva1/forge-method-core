  fail_closed_engine: "score_coordination on empty OR structurally-invalid contract → Failed (M1). No false Passed."
  fail_closed_cli: "run_validate on broken/dangling suite → exit 2 rejection with payload (M2). No silent exit-0."
  no_silent_default: "missing --suite/--repo-root value → exit 3 (M3)."
  no_path_escape: "absolute/backslash refs flagged as gaps (M4). false-REAL defeated."
  c5_closure: "real suite: 9 dims, 0 structural errors, 0 dangling refs, is_real=true → verdict Passed with full outcomes."


intent: |
  Close the C5 multi-agent success signal formally. Build the scorer engine over
  the 9 coordination dimensions (mirror of eval.rs's router scorer: engine = pure
  MACHINERY + GATE, host provides per-dimension OUTCOME — no model in core).
  Prove the minimal-coordination-eval-suite is REAL (all 22 refs resolve) and
  that the eval machinery produces a typed Passed verdict. Emit the
  slice-4-completion artifact.

delivered:
  engine_module: "crates/forge-core-engine/src/coordination_eval.rs — validate_coordination_contract, coordination_fixture_gaps, score_coordination, CoordinationOutcome, CoordinationVerdict, CoordinationScore, CoordinationValidationError, verdict_snake"
  cli_module: "crates/forge-core-cli/src/coordination.rs — run_validate (reject when !is_real), dispatch (errors on missing flag value), CoordinationValidatePayload"
  cli_command: "forge-core coordination validate --suite <path> [--repo-root <path>] [--no-json]"
  engine_exports: "lib.rs re-exports the 5 public symbols"
  suite_proof: "minimal-coordination-eval-suite.yaml — 22 refs, 0 dangling (already REAL); now formally VERIFIED by the gate"

decisions_locked:
  DD40: "Coordination-eval engine is PURE machinery (DC9 mirror of eval.rs). Engine validates contract structure + checks refs resolve + scores HOST-PROVIDED outcomes. No built-in scorer wires slice-4 engines to dimensions (coupling rejected). The gate is the value; the host/LLM provides verdict evidence."
  DD41: "Outcomes are file-backed (DC10): CoordinationOutcome.evidence: Vec<RepoPath>. A different LLM/operator writes an outcomes payload; the engine scores it deterministically. Multi-LLM interop applied to the eval gate."
  DD42: "Verdict taxonomy Passed | Failed | ManualReviewRequired. must_pass failure (incl MISSING outcome) = Failed (fail-closed). should_pass failure = WARNING (never hard fail). manual_review open blocks release only when manual_review_blocks_release=true."

hardening_from_adversarial_review:
  review_pass1: ".forge-method/reviews/S4.7-coordination-eval-review-v1.yaml"
  review_pass2: ".forge-method/reviews/S4.7-coordination-eval-review-v2-verify.yaml"
  pass1_verdict: "YELLOW — 0 criticals (no wrong-verdict on validated contracts), 5 mediums (M1-M5), 5 lows (L1-L5)"
  pass2_verdict: "GREEN — all 7 fixable closed (M1+M2+M3+M4+L2+L3+L5), 3 accepted-with-doc (M5+L1+L4), 1 new low nit (N1) tightened, no regression"
  mediums_closed:
    M1: "score_coordination now validates the contract at the top; on structural error it short-circuits to Failed with errors-as-warnings. A governance gate MUST be fail-closed — no false Passed on an empty/invalid contract."
    M2: "run_validate returns CliEnvelope::reject(RejectedByGate) when !is_real → exit 2 (not 0). CI/shell consumers checking $? cannot treat a broken/dangling suite as passing."
    M3: "--suite / --repo-root with no value now exit 3 (no silent fallback to default suite)."
    M4: "coordination_fixture_gaps detects absolute refs cross-platform (leading /, leading \\, Windows drive-letter + separator, std is_absolute) and any backslash → flagged as gaps. No false-REAL via host-path escape."
    L5: "synthesized missing-outcome entries now read passed=false (audit-trail honesty); ShouldPass arm no longer inflates passed count for unevidenced dims."
  lows_closed:
    L2: "debug_assert!(o.dimension == dim.dimension) catches host-closure wiring mistakes."
    L3: "summary uses verdict_snake() helper (lowercase, matches serde form)."
  tightened_n1: "drive-letter predicate now requires byte[2] separator — no false gap on a 2-char relative ref like 'a:b'."
  accepted_documented:
    M5: "all_must_pass_dimensions_required flag name unchanged (locked contract field; rename = schema migration). Semantics documented in verdict-chain comment."
    L1: "metric_kind is host guidance, independent of required_level. Documented."
    L4: "unknown flag exits 3 (invalid_decision_shape per DD10)."


# acceptance criteria
# ---------------------------------------------------------------------------
acceptance_criteria:
  - criterion: "boundary decision recorded with rationale and references to actual runtime/schema code"
    result: "PASS — runtime_evidence cites real loc/pub_items/field; rationale cites engine-architecture.yaml#crate_topology"
  - criterion: "no crate duplication; chosen crates have a clear single responsibility"
    result: "PASS — runtime stays as executor; engine is new and owns the method surface; responsibilities are disjoint"
  - criterion: "decision artifact exists at .forge-method/artifacts/S1.1-engine-boundary.yaml"
    result: "PASS"

checks:
  - "artifact parses as YAML"
  - "choice is one of (a/b/c) with evidence — choice: b"

# ---------------------------------------------------------------------------
# safety assessment for autonomous fan-out (the question S1.1 was meant to answer)
# ---------------------------------------------------------------------------
autonomous_fanout_safety:
  question: "Is it safe to run the catalog migration (S1.3-S1.6) via parallel subagents while the human is away?"
  answer: "YES — the autonomous work is purely MECHANICAL (md→yaml migration + phase/id normalization on 110 existing files), it touches no engine/runtime code, and the engine crate does not exist yet so there is nothing to conflict with."
  caveat: "the engine crate itself (the NEW method-surface logic) is NOT part of the fan-out. It is built serially by the parent after the catalog is migrated, because it makes architecture decisions that benefit from focused context. The fan-out only migrates the existing catalog."
  engine_decisions_during_absence: "if an engine-build subagent hits ambiguity, it records an open_question and proceeds conservatively — per human direction (research best practice → go with best recommendation; do not invent)."

next_workflow: "S1.2 — extend forge-core-contracts with workflow/phase/catalog typed contracts (the schema the migrated catalog will deserialize into)"

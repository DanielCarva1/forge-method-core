schema_version: "0.1"
story_id: "H1.1"
status: done
changes:
  - "Hardened rfc3339_to_unix with real calendar validation: month, day-per-month/leap-year, hour, minute, and second now fail closed before epoch conversion."
  - "Replaced unchecked lease expiry arithmetic in acquire() and heartbeat() with checked_lease_expiry(), returning ClaimRejection::InvalidRequest for unrepresentable TTLs or now+ttl overflow instead of panic/wrap."
  - "Made default_expiry_policy() validator-consistent by keeping handoff_required=true while setting handoff_request_ref to contracts/requests/claim-expiry-handoff-request.yaml and keeping release_without_handoff_allowed=false."
  - "Added a minimal CLI rejection-code arm for ClaimRejection::InvalidRequest so the public engine enum remains downstream-compilable."
tests_added:
  - "timestamp_rejects_invalid_calendar_values covers 2026-02-31, 2026-04-31, invalid h/m/s, valid leap day 2024-02-29, invalid non-leap 2026-02-29."
  - "acquire_rejects_ttl_overflow covers u64::MAX TTL representation failure."
  - "acquire_rejects_expires_at_overflow covers checked_add overflow at i64::MAX."
  - "heartbeat_rejects_ttl_overflow covers heartbeat TTL representation failure."
  - "heartbeat_rejects_expires_at_overflow covers heartbeat checked_add overflow with i64::MAX TTL at normal T0."
  - "acquire_default_expiry_policy_is_validator_consistent pins the local validate_claim invariant: handoff_required policies must not allow release without handoff and must include handoff_request_ref."

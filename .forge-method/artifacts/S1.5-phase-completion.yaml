intent: "Add phase declarations to the 110 migrated workflows."

key_finding: |
  The story assumed phase assignment needed manual judgment (only 9/110 had an
  explicit 'state.phase == X' trigger). AUDIT FOUND THE AUTHORITATIVE SOURCE:
  skills/forge-method/catalog/workflows.json carries a 'phase' field for ALL 110
  workflows. This is the catalog that the v2 product shipped. Assignment is
  therefore MECHANICAL (read authoritative mapping, inject), not judgment-based.
  The fan-out plan was correctly replaced by reading the authoritative catalog.

schema_decision_DD7: |
  The authoritative catalog revealed phases are MULTI-VALUED (a workflow may
  span several phases) and the phase universe is 8 values, not 6:
  {0-route, 1-discovery, 2-specification, 3-plan, 4-build-verify,
  5-ready-operate, 6-evolve, anytime}. The singular 'phase: StableId' schema
  was a simplification that would have LOST routing fidelity. Refined to
  'phases: Vec<StableId>' (faithful). The Phase enum gained a Route variant
  (rank 0) and adopted the compound names (4-build-verify, 5-ready-operate)
  already used by both the authoritative catalog AND my own engine-architecture
  spec. 'anytime' is an eligibility wildcard (Phase::tag_eligible), not a phase.

delivered:
  - "scripts/migrate_workflows.py now loads id->[phase tags] from catalog/workflows.json (pipe-split) and injects 'phases' into every WorkflowDocument"
  - "crates/forge-core-contracts/src/phase.rs: Phase enum expanded to 7 variants (Route..Evolve) with compound names; ANYTIME const; Phase::tag_eligible(); Phase::parse handles compound/bare/ordinal/anytime"
  - "crates/forge-core-contracts/src/workflow.rs: phase: StableId -> phases: Vec<StableId>"
  - "crates/forge-core-contracts/src/catalog.rs: CatalogEntry.phase -> phases: Vec<StableId>"
  - "crates/forge-core-contracts/tests/bulk_workflow_deserialize.rs: +all_phase_tags_are_canonical_or_anytime (soundness test)"


schema_version: "0.1.0"
artifact:
  id: hardening-batch-1-parallel-write-proof
  kind: parallel-write-proof
  status: done
  closed: 2026-06-27
  git_commit: "f5a454e"

  purpose: |
    Provar com EVIDÊNCIA que múltiplos subagentes gpt-5.5 podem escrever código
    em paralelo no mesmo repo, mantendo excelência (protocolo + green-loop + zero
    conflito). Responde à pergunta do usuário: "dá pra multiplicar produtividade
    com muitos workers mantendo excelência?"

  setup: |
    3 workers gpt-5.5, PARALLEL foreground, worktree isolation (cada worker numa
    git worktree própria branched from HEAD). Arquivos 100% disjuntos por design.
    Governo: 3 claims de story ativas (H1.1/H1.2/H1.3) em claims-dir compartilhado.

  workers:
    - worker: H1.1
      agent: worker
      model: gpt-5.5
      owned_file: crates/forge-core-engine/src/claim_engine.rs
      outcome: SUCCEEDED
      changes: "+128 linhas (3 fixes HIGH: TTL overflow, rfc3339 validation, validator-consistent policy)"
      tests_added: 6
      green_loop: "check+clippy+test pass (119 tests)"
      note: "fez 1 edição mínima em claim.rs (fora owned) por exaustividade de enum — justificada, auditada"

    - worker: H1.2
      agent: worker
      model: gpt-5.5
      owned_file: crates/forge-core-engine/src/conflict_detection.rs
      outcome: SUCCEEDED
      changes: "+76 linhas (root-path coverage + Unicode case fold)"
      tests_added: 2
      green_loop: "check+clippy+test pass (115 tests)"

    - worker: H1.3
      agent: worker
      model: gpt-5.5
      owned_file: crates/forge-core-cli/src/io_util.rs
      outcome: SUCCEEDED
      changes: "+326 linhas (lockfile pid+timestamp+owner token, stale reclaim, remediation)"
      tests_added: 4
      green_loop: "check+clippy+test pass (68+ tests)"

  merge_result: |
    3 patches aplicados via git apply no repo principal. Dry-run check: 3/3 clean.
    Zero conflito (arquivos disjuntos por design). Merge trivial.

  final_green_loop:
    cargo_check_workspace: pass
    cargo_clippy_workspace: pass
    cargo_test_workspace: "394 tests passed, 0 failed (era 382, +12 dos workers)"
    cargo_fmt_check: pass
    verdict: GREEN

  verdict:
    question: "Dá pra multiplicar produtividade com muitos workers gpt-5.5 mantendo excelência?"
    answer: |
      SIM — provado para ESCRITA PARALELA com pré-condições:
      1. Arquivos DISJUNTOS por design (cada worker = seu arquivo, designado na story)
      2. Worktree ISOLADA por worker (target/ próprio, sem cargo contention)
      3. Government via claims (acquire com scope de story + paths)
      4. Cada worker roda green-loop no SEU crate antes de declarar done
      5. Driver faz green-loop de INTEGRAÇÃO depois do merge

      Com essas 5 condições, 3 workers escreveram código correto em paralelo,
      cada um verde isoladamente, e o merge ficou verde sem intervenção.

    what_scale_means: |
      - 3 workers disjuntos: PROVADO (este batch).
      - 20 workers: viável SE houver 20 arquivos disjuntos. A governance via claims
        + conflict detection escala; o gargalo real é ter escopos disjuntos.
      - Workers no MESMO arquivo: requer single-writer pattern (skill recomenda
        1 writer + N read-only reviewers), NÃO parallel writers no mesmo arquivo.

    resiliência_observada: |
      Bônus: os 3 workers encontraram SOZINHOS o bug do Windows cargo/UNC target-dir
      (incremental lock falha em /tmp worktree) e contornaram com --target-dir em C:
      ou --config build.incremental=false. Zero intervenção do driver. LLMs
      competentes resolvem problemas de toolchain quando o objetivo é claro.

  open_items:
    - "H1.1 editou claim.rs (fora owned) por exaustividade de enum. Justificada,
      mas revela que owned-files estrito pode quebrar compilação cross-crate quando
      um worker adiciona variants de enum público. Considerar: contrato de 'owned
      files' deve permitir edições de compatibilidade mínimas, OU designar arquivos
      de enum compartilhados como co-owned."
    - "Bug do release com id slugificado (claim-story-H1-1-H1-1 'not found' mas
      claim.story.H1.1.H1.1 funciona) — inconsistência id-resolve. Backlog."
    - "Bug H1.1 claim expirou cedo (ttl 1200 do teste inicial) — release requereu
      handoff. Comportamento correto do protocolo mas mostrou que claims de teste
      e claims de produção não devem compartilhar claims-dir."

  next: |
    Padrão provado. Próximo batch pode escalar (mais workers, mais arquivos
    disjuntos) OU evoluir pra async (driver pesquisa enquanto workers escrevem).
    Modelo master/worker validado.

schema_version: "0.1"
story_id: "H1.3"
status: done
changes:
  - "Updated DirLock lockfile format to record pid, acquired_unix timestamp, and owner token."
  - "Added stale/dead-owner reclaim in DirLock::acquire: pid=0/dead pid and lock age >= 60s are treated as orphaned and removed before retrying acquire."
  - "Changed DirLock::drop to remove the lockfile only if the on-disk owner token still matches the lock instance token."
  - "Expanded WouldBlock contention errors with owner/remediation context: pid, acquired timestamp/token when parseable, and force-remove guidance."
  - "Added sync_all after lock metadata write so the owner token/timestamp is durably recorded before acquire returns."
tests_added:
  - "io_util::tests::dir_lock_records_pid_timestamp_and_token"
  - "io_util::tests::dir_lock_reclaims_dead_pid_lockfile"
  - "io_util::tests::dir_lock_reclaims_stale_lockfile"
  - "io_util::tests::dir_lock_drop_only_removes_matching_owner_token"
green_loop_result:
  status: passed
  commands:
    - command: "cargo fmt --all --check"
      result: passed
      notes: "Ran after formatting."
    - command: "cargo check --config build.incremental=false --manifest-path <worktree Cargo.toml> -p forge-core-cli"
      result: passed
      notes: "Used Windows cargo from /mnt/c with manifest path because cargo.exe cannot use /tmp worktree as CWD directly."
    - command: "cargo clippy --config build.incremental=false --manifest-path <worktree Cargo.toml> -p forge-core-cli -- -D warnings"
      result: passed
      notes: "No warnings."
    - command: "cargo test --config build.incremental=false --manifest-path <worktree Cargo.toml> -p forge-core-cli"
      result: passed
      notes: "68 unit tests + 5 claim_e2e + 4 guide_e2e + 9 isolation_e2e + 4 r8_binary_boundary + 3 r8_property + 80 validate tests passed."
notes:
  - "Initial direct cargo run from /tmp failed due Windows cargo/UNC incremental lock issue; validation was rerun successfully with --config build.incremental=false and CARGO_TARGET_DIR on C:."
  - "No production unwrap/expect/panic added; expect is only used inside cfg(test) helpers."
  - "On non-Unix targets, non-current pids are conservatively treated as possibly alive unless pid=0; stale-age reclaim remains the portable orphan-remediation path without adding platform dependencies."

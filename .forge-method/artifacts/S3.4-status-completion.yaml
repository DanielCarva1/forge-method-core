intent: "guide status — orient the host: current phase, eligible workflows, pending forward gate. The host reads this before deciding."

delivered:
  module: "crates/forge-core-cli/src/guide.rs"
  types:
    - "StatusPayload {schema_version, current_phase, eligible_workflows, pending_gates, next_phases}"
    - "StatusWorkflow {id, phases}"
    - "StatusGate {gate, unlocks}"
  fn: "run_status(catalog_dir, phase) -> CliEnvelope<StatusPayload>"
  main.rs_wiring: "`forge-core guide status --phase <phase> [--catalog-dir] [--no-json]`"

design:

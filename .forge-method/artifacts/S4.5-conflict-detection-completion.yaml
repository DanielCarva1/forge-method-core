intent: "Write-before-claim conflict detection — the engine half of layer-2 prevention. Before an agent edits a file, the engine answers: does another agent hold a LIVE claim over this path? If yes -> BLOCKED (exit 2). If the writer holds the claim -> ALLOWED (governed_by_self). If no claim covers it -> ALLOWED but ungoverned. This makes the multi-agent collision promise REAL: two agents with disjoint claims work freely; a cross-write into a peer's claimed scope is blocked with a typed, machine-readable reason."

delivered:
  engine_module: "crates/forge-core-engine/src/conflict_detection.rs"
  cli_command: "forge-core claim check-write --agent <id> --target <path> [--target <path>...] [--claims-dir] [--now-unix] [--no-json]"
  cli_fn: "crates/forge-core-cli/src/claim.rs :: run_check_write + conflict_code_str helper"
  acquire_extension: "claim acquire now accepts repeatable --path <repo-path> (the write set the agent intends to touch); stored in scope.paths"
  envelope_extension: "CliEnvelope::reject(command, exit, message, data) — carries structured data alongside a non-zero exit (for gates whose rejection is itself rich info)"

decisions_locked:
  DD26: "path containment = path-segment prefix match (exact file OR directory containment), NOT string prefix. Defeats the sibling trap (src/ev does NOT cover src/evil.rs)."
  DD27: "only LIVE claims block (status Active|Stale AND not expired). Expired/Released/HandoffRequired have no active owner -> do not block. Consistent with DD21 fail-closed lease."
  DD28: "a claim with empty scope.paths governs no path. Project/area claims coordinate generally, do not block individual writes."
  DD29: "lexical path normalization (drop `.` and collapse `..`), no symlink resolution. Repo-root escape is the spine's job, not the engine's."
  DD30: "ASCII-case-folding in normalize_segments. Matching is case-INSENSITIVE. Rationale: fail-closed — a false block (writer just acquires its own claim) is SAFE; a missed block (collision) is UNSAFE. The repo lives on /mnt/c (case-insensitive drvfs); targets are primarily Windows/macOS. ASCII-only fold (non-ASCII uppercase is a documented low-severity residual gap)."


    predicates: ["is_live", "is_expired", "claim_holds_scope"]
    types: ["AcquireRequest", "ClaimLifecycleDecision", "ClaimRejection", "ActiveClaimsView", "ActiveClaimSummary", "ClaimExpiry"]
    timestamps: "rfc3339_to_unix / unix_to_rfc3339 — Hinnant civil-from-days, no chrono dep, fail-closed on bad input"
  re_exports_in_lib: true

design_rules_enforced:
  rule1_authority_from_fields: "engine reads ClaimContract fields; never treats file existence as authority"
  rule2_expired_routes_to_handoff: "acquire + release reject expired open claims whose policy mandates handoff — NO silent reuse"
  rule3_heartbeat_is_evidence: "only Active|Stale claims heartbeatable; released/handoff claims cannot be resurrected"
  rule4_reclaim_is_closed: "engine enforces non-delegable rules (no steal, no duplicate, no silent loss); reclaim_policy review is delegated to driver/human (DC9)"


  pass_2: ".forge-method/reviews/S4.3-claim-engine-review-v2-verify.yaml — gpt-5.5 verdict YELLOW. All 5 fixes CONFIRMED CLOSED. 1 medium design note (reclaim_policy delegation — documented as deliberate DC9 boundary)."
  regression_tests_added: 7 (resurrect-blocked, release-policy, fail-closed-corrupt, boundary-inclusive, no-handoff-release-allowed, same-agent-duplicate-blocked, expired-handoff-blocked)

decisions_locked:
  DD19: "reclaim_policy is a DRIVER/HUMAN governance decision, NOT an engine decision (DC9). The engine enforces only the NON-DELEGABLE rules: no steal, no duplicate authority, no silent loss of handoff. Policy review (SameAgentOnly/DriverReview/OwnerReview/HumanReview/Forbidden) is evaluated by the driver layer + human. The engine's job is to make the illegal impossible, not to babysit policy nuance."
  DD20: "expiry boundary is INCLUSIVE: now_unix >= expires_at => expired. Pinned by test is_expired_boundary_is_inclusive_at_expires_at."
  DD21: "is_expired is FAIL-CLOSED: unparseable expires_at is treated as expired (corrupt lease is never live). A corrupt claim routes to handoff/recovery, never silent reuse."


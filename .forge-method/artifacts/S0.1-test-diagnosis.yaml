# ---------------------------------------------------------------------------
# ROOT CAUSE - single dominant cause
# ---------------------------------------------------------------------------
root_cause_primary:
  id: "RC1"
  category: "(d) missing assets / incomplete work"
  title: "docs/fixtures/operation-contract-v0/ directory (16 operation-contract fixtures) was DESIGNED and TESTED but NEVER CREATED"
  evidence:
    - "the dir does not exist: ls docs/ -> 'No such file or directory'"
    - "git log --all -- docs/ -> empty (docs/ NEVER in git history)"
    - "all 6 expected fixture filenames are absent from the entire repo"
    - "design doc forensic-reference/docs/13-operation-contract-v0.md line 530 'Fixture Set' LISTS the expected fixtures: facilitate-first-product-idea, mechanical-story-execute, release-gate-required, host-drift-invented-next-step (+ implied 16 total per validates_current_operation_fixtures assert_eq count==16)"
  cascade: "this single missing dir breaks the validator (reference_index_build_failed), the store reference index, the runtime fixture loader, and the CLI validate command. ~28 of 40 failures cascade from here."
  is_spine_design_bug: false
  spine_implicated: false
  why_not_spine: "the integrity spine (WAL append, validate_tool_effect before write, ed25519/sigstore crypto) is NOT touched by any failure. The spine LOGIC is sound; it is the TEST DATA + VALIDATION HARNESS that is incomplete. The spine never received its fixtures to prove itself."

# ---------------------------------------------------------------------------
# ROOT CAUSE - minor secondary
# ---------------------------------------------------------------------------
root_cause_secondary:
  id: "RC2"
  category: "(a) drift (assertion text) - latent, verify after RC1 fixed"
  title: "2 payload-rejection tests assert specific error substrings ('outside root', 'too large')"
  tests:
    - "execute_operation_rejects_payload_outside_root_by_default (validate.rs:3887) asserts error contains 'outside root'"
    - "execute_operation_rejects_payload_larger_than_policy (validate.rs:3913) asserts error contains 'too large'"
  nuance: "these tests ALSO depend on the missing fixture (operation_path = facilitate-first-product-idea.yaml), so RC1 blocks them first. AFTER fixtures exist, they may still fail if the payload-validation error wording drifted. Must verify post-RC1. If wording drifted, it is a local string-align fix, not a spine bug."


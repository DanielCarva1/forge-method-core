# ---------------------------------------------------------------------------
# fix path for S0.2 (diagnosis only here, but scoped to enable planning)
# ---------------------------------------------------------------------------
fix_path_for_S0_2:
  step_1_create_fixtures:
    action: "create docs/fixtures/operation-contract-v0/ with 16 operation-contract fixtures matching the OperationContractDocument schema"
    source_of_truth:
      - "forensic-reference/docs/13-operation-contract-v0.md (the Fixture Set section lists the canonical names + the contract shape)"
      - "contracts/operations/operation-contract-v0.yaml (the schema/enums: autonomy_mode, next_actor, etc.)"
      - "existing effect/request fixtures in contracts/effects/ and contracts/requests/ (the side contracts the fixtures reference must already exist - verify)"
    must_satisfy:
      - "all 16 deserialize into OperationContractDocument without error"
      - "all 16 pass validate_operation (no errors) - per validates_current_operation_fixtures"
      - "the 7 named fixtures (mechanical-story-execute, facilitate-first-product-idea, release-gate-required, destructive-effect-missing-inverse-blocked, host-drift-invented-next-step, read-write-conflict-notify) must carry the behavior their test expects (e.g., destructive-missing-inverse must be BLOCKED; release-gate-required must REQUIRE the gate)"
    note: "the fixtures encode INTENT (which operations are blocked, which wait for human). The test names tell us the expected behavior. This is real work but well-specified."
  step_2_verify_payload_strings:
    action: "after fixtures exist, re-run the 2 payload tests; if they still fail, align the error message to contain 'outside root' / 'too large' (or update the assertion if the new wording is better)"
  step_3_green:
    action: "cargo test --workspace must exit 0 with NO tests deleted or #[ignore]d"

risk_to_watch_in_S0_2:
  - "if creating the 16 fixtures reveals that OperationContractDocument schema does not match what the tests expect (e.g., a field the test sets that the type rejects), THAT would be a schema drift (a) - still not a spine bug, but worth flagging"
  - "if a fixture's expected behavior contradicts the runtime logic (e.g., destructive-missing-inverse should block but runtime allows it), THAT would be a runtime logic bug - inspect carefully, escalate if it touches the WAL/effect spine"

evidence_refs:
  - ".forge-method/evidence/S0.1-raw-test-output.log"
  - "forensic-reference/docs/13-operation-contract-v0.md#Fixture Set (line 530)"
  - "contracts/operations/operation-contract-v0.yaml"

schema_version: "0.1"
contract: "completion_contract"
status: "draft"
purpose: "Track whether scoped work is already complete, claimed, blocked, or invalidated before any agent claims or repeats it."
design_rules:
  - id: "minimal_not_task_db"
    rule: "This contract is not a full task database; it is the smallest typed completion authority needed to avoid duplicate work, stale claims, and done without proof."
  - id: "backend_independent"
    rule: "The contract shape must stay stable if storage moves from file-backed projection to SQLite, embedded KV, daemon state, or MCP service."
  - id: "proof_required_for_done"
    rule: "A task cannot be marked done unless proof_refs satisfies proof_policy.required_for_done."
  - id: "no_free_text_status"
    rule: "Status and backend values are closed enums for Rust serde compatibility."
rust_compatibility:
  serialization: "serde"
  id_policy: "stable_ascii_ids"
  timestamp_policy: "rfc3339_utc"
  enum_policy: "closed_for_v0_with_unknown_rejected"
  nullable_policy: "explicit_null_for_optional_references"
enums:
  task_kind:
    - "story"
    - "gate"
    - "artifact"
    - "product_area"
    - "integration"
    - "release"
  status:
    - "not_started"
    - "claimed"
    - "in_progress"
    - "blocked"
    - "done"
    - "invalidated"
  actor_role:
    - "driver"
    - "worker"
    - "human"
    - "runtime"
    - "unknown"
  storage_backend:
    - "file_projection"
    - "sqlite"
    - "embedded_kv"
    - "daemon_projection"
    - "mcp_service"
required_fields:
  - "id"
  - "task.task_id"
  - "task.kind"
  - "status.value"
  - "proof_policy.required_for_done"
  - "storage.canonical_id"
  - "storage.backend"
field_contract:
  id: "Stable completion contract id."
  task:
    task_id: "Stable task id; never inferred from prose."
    kind: "Closed enum task kind."
    product_area: "Optional product area owner boundary."
    lane_id: "Optional lane or claim boundary."
  status:
    value: "Closed enum status."
    changed_at: "RFC3339 UTC timestamp."
    changed_by: "Agent id, human id, or runtime id."
    changed_by_role: "Closed enum actor role."
    checked_at_state_version: "State version used when the status was last checked."
  claim:
    claim_contract_ref: "Optional ClaimContract reference."
    claim_expires_at: "Optional RFC3339 UTC expiration."
  proof_policy:
    required_for_done: "Boolean. True for build, gate, integration, and release completion."
    accepted_proof_kinds:
      - "test_report"
      - "gate_result"
      - "artifact_ref"
      - "human_approval"
      - "release_evidence"
  proof_refs: "List of evidence refs proving current status."
  invalidation:
    invalidated_by: "Optional actor id."
    invalidated_at: "Optional RFC3339 UTC timestamp."
    reason_code: "Optional stable reason code."
    supersedes_completion_id: "Optional prior completion id."
  storage:
    canonical_id: "Stable storage key for DB/daemon migration."
    backend: "Closed enum backend."
    event_log_ref: "Optional append-only log reference."
    projection_key: "Stable projection key."
    db_ready: "Boolean. True when field names and enums are stable enough for DB schema."
failure_modes_prevented:
  - "agent repeats already completed work"
  - "agent treats stale claim as active truth"
  - "agent marks done from chat confidence without evidence"
  - "file-backed v0 cannot migrate cleanly into Rust DB or daemon"

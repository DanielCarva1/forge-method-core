meta:
  topic: "Agentic software engineering throughput, quality, and fast/high-quality dual-mode operating models"
  query: "Evidence on coding-agent throughput vs quality, where agent time goes, whether lightweight protocols are net-positive, and how serious systems combine fast lanes with rigorous/risk-based gates"
  date: "2026-06-27"
  researcher_model: "OpenAI research subagent"
  confidence: "medium"
  sources_consulted: 17
key_findings:
  - id: "F1"
    finding: "Benchmark evidence shows coding agents improved dramatically from 2024 to 2025, but benchmark solve rate is not equivalent to real-world story throughput."
    evidence: "SWE-bench Verified is a 500-task human-filtered subset; OpenAI reported GPT-4o at 33.2% on Verified in 2024 after filtering 68.3% of original samples as problematic, while Anthropic reported Claude Opus 4 at 72.5% on SWE-bench in 2025. These are pass rates on issue-fix tasks, not product/story/day measurements."
    sources:
      - "https://openai.com/index/introducing-swe-bench-verified/"
      - "https://www.swebench.com/"
      - "https://www.anthropic.com/news/claude-4"
  - id: "F2"
    finding: "Real-world high-throughput claims are credible for narrow, verifiable, repetitive work and parallel execution, but are mostly vendor/customer case studies rather than controlled studies."
    evidence: "Cognition says Devin is best at clear requirements and verifiable 4-8 hour junior-engineer tasks; reports 67% PR merge rate vs 34% last year, 4x faster problem solving, 10x-14x migration gains, 20x vulnerability-fix efficiency in one case, and test coverage increases from 50-60% to 80-90%."
    sources:
      - "https://cognition.ai/blog/devin-annual-performance-review-2025"
      - "https://devin.ai/"
  - id: "F3"
    finding: "The most defensible enterprise throughput data suggests agents raise PR volume and reduce elapsed lead time, but only when the organization redesigns workflow around intent, small batches, and verification."
    evidence: "Cursor/Coinbase reports 2,400 developers using Cursor, 75% of PRs created by agents, 55% more PRs merged per engineer, average 7 hours/week manual-coding savings, idea-to-first-PR down from 8 days to under 30 minutes, and some teams reducing idea-to-production from 20 days to 1.8-2 days. This is a customer report, not independent measurement."
    sources:
      - "https://cursor.com/blog/coinbase"
  - id: "F4"
    finding: "Agent time is not spent only writing code; major time sinks are planning/scoping, tool and model latency, environment setup, test execution, verification, review, and rework."
    evidence: "DORA's 2026 analysis of 1,110 Google engineer responses says time saved writing is often reallocated to auditing, verification, and prompting; Anthropic's eval guidance tracks n_turns, n_toolcalls, tokens, and latency; Cognition cites Microsoft research that only about 20% of engineering time is coding."
    sources:
      - "https://dora.dev/insights/balancing-ai-tensions/"
      - "https://www.anthropic.com/engineering/demystifying-evals-for-ai-agents"
      - "https://cognition.ai/blog/devin-annual-performance-review-2025"
  - id: "F5"
    finding: "Always-heavy planning/protocol is not velocity-optimal; adaptive or 'Goldilocks' planning is supported by 2025 agent research."
    evidence: "The 'Learning When to Plan' study found always-planning is computationally expensive and can degrade long-horizon performance; intermediate planning frequencies outperformed always-plan and never-plan, and an SFT+RL dynamic-planning 8B agent beat a 70B zero-shot baseline while using 85% fewer output tokens."
    sources:
      - "https://arxiv.org/html/2509.03581v3"
  - id: "F6"
    finding: "Lightweight structure pays for itself when it converts ambiguous work into verifiable outcomes or prevents expensive downstream rework; before that point it can be pure tax."
    evidence: "OpenAI created SWE-bench Verified because underspecified issues, unfair tests, and environment failures distorted evaluation; Anthropic says evals seem like overhead early but later prevent reactive debugging loops and let teams upgrade models in days instead of weeks; Devin performs worse under ambiguous requirements and mid-task changes."
    sources:
      - "https://openai.com/index/introducing-swe-bench-verified/"
      - "https://www.anthropic.com/engineering/demystifying-evals-for-ai-agents"
      - "https://cognition.ai/blog/devin-annual-performance-review-2025"
  - id: "F7"
    finding: "Protocol-governed agents can outperform bare/vibe workflows on end-state quality when the protocol is evidence-first and risk-calibrated, but there is little direct controlled evidence comparing 'vibe coding' vs typed-contract agents."
    evidence: "Meta's RADAR uses eligibility gates, risk scoring, LLM review, and deterministic validation; across 535K+ reviewed diffs and 331K+ landed diffs it reports revert rate 1/3 of non-RADAR diffs and production-incident rate 1/50 of non-RADAR diffs, while reducing review latency. This supports structured gating, not Forge-style YAML specifically."
    sources:
      - "https://arxiv.org/html/2605.30208v1"
  - id: "F8"
    finding: "A single fast-lane plus rigorous-lane system with risk-based routing exists in production evidence: Meta RADAR."
    evidence: "RADAR classifies diffs by authorship/source, lets deterministic codemods use Blanket AutoAccept, sends AI codemods/runbooks through per-diff ACE checks, gates human diffs through RADAR Verification/Approval, and routes failures/high-risk changes to human review. It reached 25K reviewed diffs/day and reduced median diff review wall time by 35%."
    sources:
      - "https://arxiv.org/html/2605.30208v1"
  - id: "F9"
    finding: "Risk thresholds are a practical velocity knob: organizations can begin conservative, then widen the fast lane as safety data accumulates."
    evidence: "RADAR relaxed Diff Risk Score threshold from p25 to p50; approve rate reached 60.31% and verification pass rate 26.31% across 535K+ diffs, with reported revert and production-incident rates still lower than non-RADAR diffs. Authors caution this is observational, not randomized."
    sources:
      - "https://arxiv.org/html/2605.30208v1"
  - id: "F10"
    finding: "Mature review systems have already moved from heavyweight inspection to lightweight, small-batch, tool-supported review; this is the closest non-AI precedent for fast + quality."
    evidence: "Google's code-review case study found a markedly lightweight process using single reviewers, quick iterations, small changes, and tight tool integration; Google's review guidance says slow review reduces team velocity and recommends prompt responses."
    sources:
      - "https://sback.it/publications/icse2018seip.pdf"
      - "https://google.github.io/eng-practices/review/reviewer/speed.html"
  - id: "F11"
    finding: "Code review and testing are not free, but evidence supports selective use: small batches, automation shifted left to authors, and human review reserved for intent/risk/interface decisions."
    evidence: "DORA recommends shifting AI feedback to the author phase, building context-aware review agents, working in small batches, and questioning blanket async review when robust test automation provides faster feedback. Meta RADAR operationalizes the same pattern by waiving human review only for eligible low-risk diffs."
    sources:
      - "https://dora.dev/insights/balancing-ai-tensions/"
      - "https://arxiv.org/html/2605.30208v1"
  - id: "F12"
    finding: "End-state quality requires outcome-based verification, not just trust in generated code or output volume."
    evidence: "Anthropic recommends grading coding agents primarily by outcome tests, static analysis, state checks, and code-quality rubrics; DORA warns AI can inflate lines/PRs and recommends measuring outcomes such as review turnaround, rework, failed recovery, and incidents rather than accepted code volume."
    sources:
      - "https://www.anthropic.com/engineering/demystifying-evals-for-ai-agents"
      - "https://dora.dev/insights/balancing-ai-tensions/"
  - id: "F13"
    finding: "Inference: the structure payoff threshold is crossed when a task is ambiguous, high blast-radius, hard to verify after the fact, or likely to create reviewer/rework load greater than the protocol overhead."
    evidence: "This inference combines Devin's need for clear upfront requirements, Anthropic's finding that evals prevent reactive regression loops after scale, and RADAR's use of risk/eligibility gates to route only safe diffs through fast lanes."
    sources:
      - "https://cognition.ai/blog/devin-annual-performance-review-2025"
      - "https://www.anthropic.com/engineering/demystifying-evals-for-ai-agents"
      - "https://arxiv.org/html/2605.30208v1"
recommendations:
  - id: "R1"
    recommendation: "Implement explicit dual lanes in Forge: a Fast Lane for low-risk, small, test-backed changes and a Rigorous Lane for ambiguous, high-blast-radius, architectural, security, data, or user-visible changes."
    based_on:
      - "F5"
      - "F8"
      - "F9"
      - "F13"
    priority: "high"
  - id: "R2"
    recommendation: "Replace fixed-heavy YAML with adaptive typed contracts: minimal intent + acceptance evidence for Fast Lane; full discovery/design/risk contract only when a risk classifier triggers it."
    based_on:
      - "F5"
      - "F6"
      - "F11"
    priority: "high"
  - id: "R3"
    recommendation: "Make Forge's speed claim outcome-based: track lead time, agent wall time, tool/test time, human-contact time, rework cycles, defect escape, and review latency per lane rather than stories/day alone."
    based_on:
      - "F3"
      - "F4"
      - "F12"
    priority: "high"
  - id: "R4"
    recommendation: "For Fast Lane, require machine-checkable evidence only: changed-files summary, tests/linters/typechecks run, residual risk, rollback note, and acceptance criteria; avoid long prose planning."
    based_on:
      - "F8"
      - "F11"
      - "F12"
    priority: "high"
  - id: "R5"
    recommendation: "Add a calibration loop similar to RADAR: start with conservative eligibility, measure incidents/reverts/rework, then widen Fast Lane thresholds only for change classes with clean history."
    based_on:
      - "F8"
      - "F9"
    priority: "high"
  - id: "R6"
    recommendation: "Treat unstructured 'vibe coding' as an experiment mode, not the default: allow it for disposable prototypes or throwaway spikes, but require conversion to evidence-backed contracts before merge/ship."
    based_on:
      - "F7"
      - "F12"
      - "F13"
    priority: "medium"
  - id: "R7"
    recommendation: "Use small batches as a core protocol rule: split AI-generated work into reviewable/testable units so individual author speed does not become reviewer verification tax."
    based_on:
      - "F4"
      - "F10"
      - "F11"
    priority: "high"
  - id: "R8"
    recommendation: "Build an eval bank from Forge failures and regressions; start with 20-50 real tasks and promote mature capability evals into regression suites."
    based_on:
      - "F6"
      - "F12"
    priority: "medium"
gaps:
  - gap: "No rigorous public apples-to-apples study was found comparing Forge-like typed-contract agents against bare/vibe coding agents on the same backlog with both speed and defect outcomes."
    why: "Available evidence is mostly benchmark leaderboards, vendor/customer case studies, and adjacent production systems such as Meta RADAR."
  - gap: "Claims of '30+ stories/day' could not be independently verified in a controlled setting."
    why: "Public examples usually omit task size, defect escape, rework, review burden, and definition of 'story shipped'."
  - gap: "Exact time breakdown for modern coding agents across planning, tool latency, tests, review, and rework remains sparse."
    why: "Anthropic and DORA identify the categories, but public quantitative per-task time allocation is limited."
  - gap: "RADAR's results may not generalize to smaller teams or repos without Meta-scale monorepo tooling, CI, risk models, canaries, and incident telemetry."
    why: "RADAR authors explicitly note generalizability and internal-validity limits; diffs were not randomly assigned."
open_questions:
  - question: "What is Forge's empirical overhead per contract field, and which fields prevent enough rework to justify their time cost?"
  - question: "Which Forge task classes have sufficiently low blast radius and strong test or type coverage to qualify for a near-silent Fast Lane?"
  - question: "Can Forge build a lightweight risk score using changed paths, diff size, dependency fanout, test coverage, historical defects, and human-stated uncertainty?"
  - question: "What is the defect/rework rate of the user's observed 'vibe coding' baseline after 1 day, 1 week, and 1 month?"
  - question: "How much parallelism can Forge safely allow before review/verification becomes the bottleneck?"

meta:
  topic: "WAL append-only hand-rolled em Rust para claims multi-agente file-backed: formato, CRC, prefix recovery"
  query: "Projetar formato de registro WAL + CRC32C + prefix-recovery + atomicidade append + rotação + concorrência multi-processo"
  date: "2026-06-27"
  researcher_model: "OpenAI API research subagent"
  confidence: "high"
  sources_consulted: 18

design_decisions:
  - id: D1
    decision: "Usar framing binário self-delimiting por registro: magic(4) + version(1) + record_type(1) + flags(2) + seq(8) + payload_len(4) + header_crc32c(4) + payload + payload_crc32c(4). Todos inteiros little-endian."
    rationale: "WALs práticos usam registros variáveis com header pequeno contendo checksum, length e type: LevelDB/RocksDB usam checksum(4), length(2), type(1), data; PostgreSQL inclui total length, resource-manager/type e CRC; SQLite usa frame header fixo com checksum. Para este domínio, u32 payload_len evita fragmentação obrigatória de payloads >64KiB, seq u64 simplifica replay/idempotência/checkpoints, e magic+version tornam resync acidental menos provável e permitem evolução controlada."
    sources:
      - "https://chromium.googlesource.com/external/leveldb/+/HEAD/doc/log_format.md"
      - "https://github.com/facebook/rocksdb/wiki/Write-Ahead-Log-File-Format"
      - "https://doxygen.postgresql.org/structXLogRecord.html"
      - "https://www.sqlite.org/fileformat.html#the_wal_file"
  - id: D2
    decision: "Não fragmentar registros na primeira versão; impor max_payload_len configurável, recomendado 1 MiB, hard cap 16 MiB."
    rationale: "LevelDB/RocksDB fragmentam para blocos de 32KiB para DB log de alto throughput; claims/heartbeats/checkpoints de agentes são pequenos e se beneficiam de implementação mais auditável. Um u32 permite evolução, mas o cap impede OOM/corrupção maliciosa. Se snapshots/checkpoints crescerem, gravar snapshot em arquivo separado e emitir WAL record de checkpoint apontando para ele."
    sources:
      - "https://chromium.googlesource.com/external/leveldb/+/HEAD/doc/log_format.md"
      - "https://github.com/facebook/rocksdb/wiki/Write-Ahead-Log-File-Format"
  - id: D3
    decision: "Tipos de registro v1: 1=claim_acquire, 2=claim_release, 3=heartbeat, 4=checkpoint_ref, 5=tombstone, 6=wal_rotate_marker; tipos desconhecidos com flag skippable podem ser ignorados, sem flag devem parar recovery como incompatíveis."
    rationale: "Campos de tipo são prática comum em WALs; PostgreSQL usa resource-manager id e info para despachar redo, LevelDB/RocksDB usam type para FULL/FIRST/MIDDLE/LAST. Separar tipo do payload permite evolução sem depender de introspecção JSON/CBOR."
    sources:
      - "https://doxygen.postgresql.org/structXLogRecord.html"
      - "https://chromium.googlesource.com/external/leveldb/+/HEAD/doc/log_format.md"
  - id: D4
    decision: "Usar CRC-32C/Castagnoli, não CRC-32/IEEE nem xxHash nem SHA, para integridade acidental de storage."
    rationale: "LevelDB/RocksDB usam CRC32C para registros de log; PostgreSQL WAL usa pg_crc32c. CRC32C tem distância/erro-detection melhor para tamanhos comuns de blocos de storage e suporte de hardware em x86 SSE4.2/ARM, enquanto xxHash é hash não-criptográfico rápido sem propriedades CRC padronizadas para storage, e SHA é excessivo para corrupção acidental e não necessário contra adversário."
    sources:
      - "https://chromium.googlesource.com/external/leveldb/+/HEAD/doc/log_format.md"
      - "https://github.com/facebook/rocksdb/wiki/Write-Ahead-Log-File-Format"
      - "https://doxygen.postgresql.org/structXLogRecord.html"
      - "https://docs.rs/crc32c/latest/crc32c/"
  - id: D5
    decision: "Usar crate Rust `crc32c` para CRC-32C dedicado; alternativa aceitável é `crc` com algoritmo CRC_32_ISCSI/CASTAGNOLI. Não usar `crc32fast` se a exigência é Castagnoli."
    rationale: "A crate `crc32c` documenta explicitamente CRC-32-Castagnoli e implementações software/hardware. `crc32fast` é CRC-32 genérico/IEEE-oriented e não é a escolha correta para compatibilidade CRC32C. `crc` é mais genérica e reduz dependência especializada, mas exige fixar corretamente o algoritmo."
    sources:
      - "https://docs.rs/crc32c/latest/crc32c/"
      - "https://docs.rs/crate/crc32fast/latest"
      - "https://docs.rs/crc/latest/crc/"
  - id: D6
    decision: "Calcular payload_crc32c sobre header_sem_crcs + payload; calcular header_crc32c sobre bytes 0..20 do header (magic..payload_len), excluindo ambos CRCs."
    rationale: "CRC cobrindo type+data é usado em LevelDB/RocksDB para detectar corrupção que muda semântica do record type; PostgreSQL guarda CRC no header do record. Header CRC separado permite rejeitar payload_len absurdo antes de alocar/ler payload inteiro; payload CRC cobrindo header_sem_crcs também detecta corrupção coordenada em type/seq/len mais payload."
    sources:
      - "https://chromium.googlesource.com/external/leveldb/+/HEAD/doc/log_format.md"
      - "https://github.com/facebook/rocksdb/wiki/Write-Ahead-Log-File-Format"
      - "https://doxygen.postgresql.org/structXLogRecord.html"
  - id: D7
    decision: "Recovery é prefix recovery estrito: scan sequencial, aceitar apenas prefixo contíguo de registros válidos, parar no primeiro truncado/inválido, truncar para o offset do último registro válido sob lock exclusivo, depois replayar somente o prefixo."
    rationale: "WALs assumem replay ordenado até ponto consistente; RocksDB lê WALs em ordem de sequence number e LevelDB observa que o tail pode conter bloco parcial. Esse modelo evita heurísticas frágeis após corrupção e torna crash no meio do último append recuperável: o último record parcial é descartado."
    sources:
      - "https://github.com/facebook/rocksdb/wiki/Write-Ahead-Log-File-Format"
      - "https://chromium.googlesource.com/external/leveldb/+/HEAD/doc/log_format.md"
      - "https://www.postgresql.org/docs/current/wal-internals.html"
  - id: D8
    decision: "Append durável: adquirir fs4 lock exclusivo, abrir arquivo com append(true)+create(true), serializar record completo em Vec, chamar um único write_all para o buffer, sync_data ou sync_all antes de liberar lock quando a operação precisa ser committed."
    rationale: "POSIX especifica que com O_APPEND o offset é movido ao EOF antes de cada write sem modificação interveniente; Rust OpenOptions::append documenta posicionamento no fim para writes. Entretanto write pode ser parcial, então `write_all` é necessário; o lock fs4 serializa writers cooperativos e reduz risco de interleaving ou ordem indefinida entre 50 processos. fsync/sync_data é a fronteira de durabilidade."
    sources:
      - "https://pubs.opengroup.org/onlinepubs/9699919799/functions/write.html"
      - "https://doc.rust-lang.org/std/fs/struct.OpenOptions.html"
      - "https://docs.rs/fs4/latest/fs4/trait.FileExt.html"
  - id: D9
    decision: "Para criação/rotação/snapshot por rename, fsync do arquivo novo e fsync do diretório pai; para append normal em arquivo já existente, sync_data/sync_all do WAL basta para bytes do WAL."
    rationale: "Durabilidade de conteúdo de arquivo não implica durabilidade da entrada de diretório em Unix/Linux; protocolos crash-safe de rename precisam fsync do arquivo e do diretório. Isso importa para rotação e instalação de snapshot/checkpoint."
    sources:
      - "https://man7.org/linux/man-pages/man2/fsync.2.html"
      - "https://www2.sqlite.org/atomiccommit.html"
      - "https://man7.org/linux/man-pages/man2/rename.2.html"
  - id: D10
    decision: "Replayers sem mutação podem usar lock compartilhado; qualquer recovery que trunque, append, rotação ou snapshot deve usar lock exclusivo."
    rationale: "fs4 fornece locks whole-file shared/exclusive e documenta que são advisory. Leitura lock-free pode ver EOF antes de um append completar ou ver record parcial; o parser prefix-valid lida com isso, mas não deve truncar sem lock exclusivo porque poderia cortar um append em andamento."
    sources:
      - "https://docs.rs/fs4/latest/fs4/trait.FileExt.html"
      - "https://pubs.opengroup.org/onlinepubs/9699919799/functions/write.html"

record_format:
  byte_order: "little-endian"
  magic: "ASCII 'FMW1' (0x46 0x4d 0x57 0x31) at every record start"
  fixed_header_size_bytes: 24
  trailer_size_bytes: 4
  layout: |
    offset  size  field             type     notes
    0       4     magic             [u8;4]   constant b"FMW1"; rejects random bytes/resync accidents
    4       1     version           u8       current 1; incompatible versions stop recovery
    5       1     record_type       u8       1 acquire, 2 release, 3 heartbeat, 4 checkpoint_ref, 5 tombstone, 6 rotate
    6       2     flags             u16      bit0=skippable_unknown, bit1=payload_is_cbor, bit2=payload_is_json, rest reserved zero
    8       8     seq               u64      monotonic per WAL; assigned while holding exclusive lock
    16      4     payload_len       u32      bytes after header; validate <= max_payload_len before allocation
    20      4     header_crc32c     u32      CRC32C over bytes [0,20), excluding this field
    24      N     payload           bytes    canonical CBOR recommended for stable binary encoding; JSON acceptable for debug
    24+N    4     payload_crc32c    u32      CRC32C over header bytes [0,20) concatenated with payload
  record_types:
    claim_acquire: "payload: {claim_id, agent_id, resource_path, lease_ms, acquired_at_ms, metadata}"
    claim_release: "payload: {claim_id, agent_id, released_at_ms, reason}"
    heartbeat: "payload: {agent_id, at_ms, held_claim_ids[]}"
    checkpoint_ref: "payload: {snapshot_path, snapshot_crc32c, last_seq_in_snapshot, created_at_ms}; snapshot file is fsync+rename+dir-fsynced"
    tombstone: "payload: {claim_id/resource_path, tombstoned_at_ms, reason}; used to compact old releases/dead agents"
    wal_rotate_marker: "payload: {next_wal_file, last_seq}; emitted before switching active WAL"
  invariants:
    - "version == 1"
    - "reserved flags bits must be zero"
    - "payload_len <= configured max_payload_len"
    - "seq must be strictly increasing during normal replay; duplicate/old seq after checkpoint is ignored only if already covered by snapshot"
    - "payload encoding must be canonical if signed/deterministic tests compare bytes"

crc_choice:
  algorithm: "CRC-32C / Castagnoli"
  rust_crate: "crc32c"
  alternative_crate: "crc with CRC_32_ISCSI/CASTAGNOLI constant"
  rejected:
    crc32fast: "Fast, but targets CRC-32 rather than explicitly CRC-32C/Castagnoli; wrong default for storage-compatible CRC32C."
    xxhash: "Excellent fast non-cryptographic hash, but not a CRC and not standard WAL/storage checksum practice; weaker story for burst-error detection."
    sha256: "Cryptographic integrity is unnecessary for accidental torn writes/bit rot and costs more CPU/bytes; use only if adversarial tampering enters threat model."
  coverage:
    header_crc32c: "magic+version+record_type+flags+seq+payload_len"
    payload_crc32c: "same header prefix plus payload; excludes header_crc32c and excludes payload_crc32c itself"
  torn_write_detection: "If EOF occurs before 24-byte header, before payload_len bytes, or before 4-byte payload CRC, classify as truncated tail; if lengths are present but CRC mismatch, classify as invalid tail/corruption and stop at that record offset."

prefix_recovery_algorithm:
  steps:
    - "1. Open WAL read-only and get file_len. If this process may repair/truncate, first acquire fs4 exclusive lock; otherwise acquire shared lock or perform lock-free read-only replay with no truncation."
    - "2. Set offset=0, last_good_offset=0, expected_seq=None or snapshot_last_seq+1 if starting after checkpoint."
    - "3. If file_len - offset == 0: clean EOF; finish."
    - "4. If file_len - offset < 24: classify as truncated header tail; stop; last_good_offset remains previous offset."
    - "5. Read 24-byte header. Validate magic, version, reserved flags, known/skippable type policy, and header_crc32c. If invalid at EOF boundary, stop; if invalid in middle, stop and report corruption metric."
    - "6. Decode payload_len. If payload_len > max_payload_len, stop and report corruption; do not allocate."
    - "7. Compute record_end = offset + 24 + payload_len + 4 with checked arithmetic. If record_end > file_len: classify as truncated payload/trailer tail; stop."
    - "8. Read payload and payload_crc32c. Verify CRC32C(header[0..20] + payload). If mismatch, stop and report checksum failure."
    - "9. Validate seq monotonicity. If seq <= snapshot_last_seq, skip as already compacted; if seq is not previous+1 where contiguous sequencing is required, stop/report gap."
    - "10. Apply record to in-memory state in order: acquire creates/renews claim lease, release removes if agent/claim matches, heartbeat refreshes agent liveness, tombstone suppresses stale state, checkpoint_ref may update replay base only if referenced snapshot validates."
    - "11. Set last_good_offset=record_end; offset=record_end; repeat."
    - "12. If repair mode and last_good_offset < file_len, truncate WAL to last_good_offset while holding exclusive lock, then sync_all/sync_data the WAL. Do not truncate during lock-free reader mode."
    - "13. Return recovered state plus diagnostics: clean_eof/truncated_tail/checksum_failure/header_failure/gap_failure and last_good_seq."
  legitimate_eof_rule: "EOF exactly at a record boundary is legitimate. EOF with 1..23 header bytes, missing payload bytes, or missing payload CRC is a torn/truncated tail. CRC mismatch with full bytes is corruption or a torn write that reached full length but not stable content; still stop at first bad record."

append_atomicity_strategy:
  writer_protocol:
    - "Acquire fs4 FileExt::lock() exclusive on a separate lock file or the WAL file opened read/write; all Forge writers must cooperate because locks are advisory."
    - "Open active WAL with create(true), append(true), read(true) as needed; append(true) maps to O_APPEND-like semantics where each write is positioned at EOF."
    - "Determine next seq from in-memory tail cache or by reading last_good_seq while holding the lock; never assign seq outside the lock."
    - "Serialize full record into one contiguous Vec<u8>; compute header_crc32c and payload_crc32c before writing."
    - "Call write_all(&record_bytes). Prefer a single underlying write syscall for typical records; write_all still handles partial writes correctly."
    - "Call file.sync_data() after each claim state transition that must survive crash before acknowledgement. Use sync_all() if file metadata changes matter; for new WAL/rotation also fsync parent directory."
    - "Release lock only after sync succeeds. On sync/write error, report append failure and force next opener through recovery."
  atomicity_notes:
    - "O_APPEND/POSIX makes seek-to-EOF plus write atomic, but does not replace application-level concurrency control; fs4 lock is the serialization mechanism for 50 agents."
    - "PIPE_BUF applies to pipes/FIFOs, not as a regular-file WAL record atomicity limit. Do not rely on PIPE_BUF for WAL."
    - "On NFS/network filesystems, O_APPEND and advisory locks can have weaker semantics; repository should document local filesystem requirement for authoritative claim WAL."

rotation_strategy:
  compaction_model: "snapshot + truncate/rotate"
  triggers:
    - "WAL size > 64 MiB (configurable)"
    - "valid record count > 100000"
    - "startup replay time > target, e.g. 250 ms"
    - "released/tombstoned records exceed 4x live claims"
  protocol:
    - "1. Acquire exclusive fs4 lock."
    - "2. Run prefix recovery to get canonical live state and last_good_seq; repair/truncate tail if needed."
    - "3. Write snapshot temp file containing live claims, active agents, leases, and last_good_seq; include snapshot CRC32C."
    - "4. sync_all/sync_data snapshot temp, rename to stable snapshot name, fsync parent directory."
    - "5. Append checkpoint_ref record to current WAL and sync it, or create new WAL segment N+1 with a header/checkpoint_ref as first record."
    - "6. Prefer rotation over in-place truncate: create claims.wal.N+1, fsync dir, atomically update active pointer/manifest via temp+rename+dir-fsync. Archive/delete old WALs only after snapshot and manifest are durable."
    - "7. Tombstone records are useful for semantic compaction before snapshot, but do not reclaim bytes until snapshot+rotation."
  why_not_unbounded: "Append-only WAL replay cost grows without compaction; RocksDB archives/purges WALs after memtable flush because older logs become obsolete once state is persisted elsewhere."

multi_process_concurrency_model:
  writers: "All appends, repair truncations, snapshots and rotations take the same fs4 exclusive advisory lock. With 50 subagents this serializes claim state transitions and seq assignment."
  readers:
    safe_default: "Acquire fs4 shared lock for replay if a stable view is required; shared lock excludes writers under the cooperative protocol."
    lock_free_option: "Allowed only for observers that never truncate and tolerate a partial last record; they must use prefix parser and ignore invalid/truncated tail."
  reader_during_append: "A reader may see EOF before/during the writer's append if lock-free. The per-record length+CRC parser treats this as no more valid records. It must not persist this as corruption or truncate."
  recovery_repair: "Only a process holding exclusive lock may truncate to last_good_offset. This prevents cutting bytes another writer is appending."
  lock_limitations: "fs4 locks are advisory and whole-file; non-cooperating processes can still write. On Unix fs4 uses flock(2), on Windows LockFileEx. Avoid duplicate File handles/locks as fs4 docs warn."
  recommended_files: "Use `claims.wal.lock` for coordination plus active WAL segments `claims.wal.000001`, manifest `claims.wal.manifest`, and snapshots `claims.snapshot.<seq>`. A separate lock file avoids lock lifetime surprises during segment rename."

open_questions:
  - "Confirm target filesystems. If claims may live on NFS/SMB/WSL-mounted Windows paths, validate O_APPEND, fsync, rename and flock behavior empirically; otherwise require local filesystem."
  - "Choose payload encoding: canonical CBOR/MessagePack for compactness and deterministic bytes, or JSON for debuggability."
  - "Define exact lease conflict semantics during replay: last-writer-wins by seq, compare agent id on release, and stale heartbeat timeout policy."
  - "Decide whether every heartbeat requires fsync; batching heartbeats with interval fsync may be acceptable if leases are soft and reconstructable."
  - "Add fuzz/property tests: arbitrary byte truncation, bit flips in header/payload/crc, concurrent append stress with 50 processes, and recovery idempotence."


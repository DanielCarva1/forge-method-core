meta:
  project: "/mnt/c/forge-method-rust"
  audit_topic: "fail-points/panics in workspace claim persistence path"
  date: "2026-06-27"
  scope:
    - "crates/forge-core-cli/src/claim.rs"
    - "crates/forge-core-cli/src/io_util.rs"
    - "crates/forge-core-engine/src/claim_engine.rs"
    - "crates/forge-core-engine/src/conflict_detection.rs"
    - "crates/forge-core-engine/src/isolation.rs"
    - "crates/forge-core-store/src/lib.rs (IO/state-touching functions only)"
  ignored: "#[cfg(test)] modules and tests/"
  conventions_confirmed:
    - "hand-rolled errors; no anyhow/thiserror"
    - "validation favors Diagnostic accumulation"
    - "fail-loud tiers: recoverable Result/Diagnostic, improbable anomaly debug_assert, commit invariant abort only at commit boundary"
  scan_notes:
    - "No non-test unwrap/expect/panic/indexing/cast/parse hits found in claim.rs, conflict_detection.rs, or isolation.rs."
    - "io_util.rs has unwrap_or uses only; they are not panic points, but DirLock orphan-lock behavior is included in recommendations."
    - "claim_engine.rs byte indexing is guarded by bytes.len() == 20 before fixed offsets; not counted as out-of-bounds risk."
  commands_run:
    - "python3 non-test scanner for unwrap/expect/panic/unreachable/casts/parse/indexing across scoped files"
    - "nl -ba selected scoped files to confirm line numbers"
    - "rg scoped fail-point regex; output included tests and was manually filtered by #[cfg(test)] boundary"
    - "git diff --cached --quiet"

occurrences:
  - location: "crates/forge-core-engine/src/claim_engine.rs:285"
    kind: "cast"
    what_can_fail: "TTL conversion uses i64::try_from(req.ttl_seconds).unwrap_or(i64::MAX), then unchecked now_unix + ttl. Very large ttl or near-i64::MAX now can overflow/panic in debug and wrap in release, persisting a corrupt expires_at."
    tier_recommendation: "Result/Diagnostic"
    severity: "high"
  - location: "crates/forge-core-engine/src/claim_engine.rs:356"
    kind: "cast"
    what_can_fail: "Heartbeat extends lease with i64::try_from(claim.lease.ttl_seconds).unwrap_or(i64::MAX), then unchecked now_unix + ttl. Same debug overflow/release wrap risk as acquire, on persisted claim state."
    tier_recommendation: "Result/Diagnostic"
    severity: "high"
  - location: "crates/forge-core-engine/src/claim_engine.rs:54"
    kind: "parse"
    what_can_fail: "Day parses as i64 but is not validated against month/year. Example known issue: 2026-02-31 passes parse and days_from_civil at line 61 normalizes it instead of rejecting."
    tier_recommendation: "Result/Diagnostic"
    severity: "high"
  - location: "crates/forge-core-engine/src/claim_engine.rs:55"
    kind: "parse"
    what_can_fail: "Hour parses as i64 but is not constrained to 0..=23; values like 99 are accepted and rolled into epoch arithmetic at line 62."
    tier_recommendation: "Result/Diagnostic"
    severity: "high"
  - location: "crates/forge-core-engine/src/claim_engine.rs:56"
    kind: "parse"
    what_can_fail: "Minute parses as i64 but is not constrained to 0..=59; invalid timestamps can normalize into another instant instead of failing closed."
    tier_recommendation: "Result/Diagnostic"
    severity: "high"
  - location: "crates/forge-core-engine/src/claim_engine.rs:57"
    kind: "parse"
    what_can_fail: "Second parses as i64 but is not constrained to 0..=59; invalid timestamps can normalize into another instant instead of failing closed."
    tier_recommendation: "Result/Diagnostic"
    severity: "high"
  - location: "crates/forge-core-store/src/lib.rs:675"
    kind: "expect"
    what_can_fail: "apply_file_effect_transaction assumes prepare_file_writes returned Some whenever reasons is empty. A future branch that records no reason but returns None panics before returning an EffectApplicationResult."
    tier_recommendation: "debug_assert"
    severity: "medium"
  - location: "crates/forge-core-store/src/lib.rs:790"
    kind: "expect"
    what_can_fail: "apply_file_effect_transaction_with_wal has the same prepared-writes invariant as line 675; panic would bypass normal WAL/application diagnostics."
    tier_recommendation: "debug_assert"
    severity: "medium"
  - location: "crates/forge-core-store/src/lib.rs:2160"
    kind: "panic"
    what_can_fail: "unreachable! if AccessMode::Read reaches content preparation despite earlier rejection. This is an internal invariant; if validation changes, preflight can panic instead of producing a blocked diagnostic."
    tier_recommendation: "debug_assert"
    severity: "medium"
  - location: "crates/forge-core-store/src/lib.rs:2161"
    kind: "panic"
    what_can_fail: "unreachable! if a non-delete write reaches content preparation without payload despite earlier MissingPayloadForWrite handling."
    tier_recommendation: "debug_assert"
    severity: "medium"
  - location: "crates/forge-core-store/src/lib.rs:2366"
    kind: "panic"
    what_can_fail: "apply_prepared_write panics if a PreparedWrite has AccessMode::Read. This sits on the write-commit path; a panic would bypass the caller's io::Result rollback branch."
    tier_recommendation: "abort_at_commit"
    severity: "medium"
  - location: "crates/forge-core-store/src/lib.rs:2718"
    kind: "expect"
    what_can_fail: "repo_relative expects strip_prefix(root) to succeed. If root/path relationship is broken by caller input, relative-vs-absolute mismatch, or future traversal changes, validation/index building panics instead of accumulating a Diagnostic."
    tier_recommendation: "Result/Diagnostic"
    severity: "medium"
  - location: "crates/forge-core-store/src/lib.rs:2203"
    kind: "cast"
    what_can_fail: "write.content.len() as u64 persists byte_len. On current 64-bit targets this is effectively widening; on hypothetical usize wider than u64 it could truncate."
    tier_recommendation: "acceptable_now"
    severity: "low"
  - location: "crates/forge-core-store/src/lib.rs:2304"
    kind: "indexing"
    what_can_fail: "records[index] could panic if latest_indices contains an out-of-range index. Today indices come only from records.iter().enumerate(), so the invariant is local and strong."
    tier_recommendation: "debug_assert"
    severity: "low"
  - location: "crates/forge-core-store/src/lib.rs:2501"
    kind: "cast"
    what_can_fail: "write.content.len() as u64 persists WAL target_metadata.byte_len. Same practical widening/portability note as line 2203."
    tier_recommendation: "acceptable_now"
    severity: "low"

tiered_invariant_recommendations:
  - invariant: "Lease expiration must be monotonic and representable: expires_unix >= now_unix and checked_add(now_unix, ttl_i64) must succeed. Reject ttl_seconds > i64::MAX or overflowing now+ttl before constructing/persisting a claim."
    where_to_insert: "claim_engine.rs acquire() before line 285 and heartbeat() before line 356; propagate as typed rejection or boundary Diagnostic from CLI persistence path."
    tier: "Result/Diagnostic"
  - invariant: "RFC3339 parser must reject semantically invalid dates/times, not normalize them. Validate day against month/leap-year and h/m/s ranges before days_from_civil and epoch arithmetic."
    where_to_insert: "claim_engine.rs rfc3339_to_unix() after parse lines 53-57 and before line 61."
    tier: "Result/Diagnostic"
  - invariant: "Prepared writes invariant: reasons.is_empty() implies prepared.is_some(). In debug, assert this; in release, return Blocked/InternalInvariant diagnostic instead of panicking."
    where_to_insert: "store lib.rs lines 675 and 790."
    tier: "debug_assert"
  - invariant: "PreparedWrite must never carry AccessMode::Read. Keep unreachable/abort only at the actual commit boundary, and prefer a type-level PreparedAccessMode excluding Read for preflight paths."
    where_to_insert: "store lib.rs prepare_file_writes() lines 2160-2161 and apply_prepared_write() line 2366."
    tier: "abort_at_commit"
  - invariant: "repo_relative may only receive paths proven under root; validation should not panic on mismatch. Convert strip_prefix failure into Diagnostic::error or ReferenceIndexBuildError."
    where_to_insert: "store lib.rs repo_relative() line 2718 and callers collect_yaml_documents_recursive()/collect_known_paths_recursive()."
    tier: "Result/Diagnostic"
  - invariant: "Claim directory lock must be fail-loud for stale/orphan locks: lockfile should include pid/timestamp, acquisition should detect age/owner where possible, and timeout should return EnvConfig diagnostic with remediation."
    where_to_insert: "cli io_util.rs DirLock::acquire() lines 41-66 and Drop line 73."
    tier: "Result/Diagnostic"
  - invariant: "Effect store blocking lock should not hang indefinitely in automated flows. Prefer try_lock retry with deadline, returning EffectStoreLockError::WouldBlock/Lock diagnostic when exceeded."
    where_to_insert: "store lib.rs acquire_effect_store_lock_inner() blocking branch at lines 2682-2686; keep try_only branch at lines 2673-2681 as nonblocking tier."
    tier: "Result/Diagnostic"
  - invariant: "Path-derived temp/backup files should never silently accumulate after failed atomic writes; cleanup failures should be diagnostic where they can affect future commits."
    where_to_insert: "cli io_util.rs atomic_write() lines 14-22 and store lib.rs atomic_replace_file() lines 2391-2432."
    tier: "Result/Diagnostic"

summary:

schema_version: "0.1"
research: field_evidence_for_forge_rust_core
created_at: "2026-06-25"
status: active
policy:
  purpose: "Require Forge Core architecture decisions to cite field evidence, current research, or explicit product constraints."
  evidence_tiers:
    - id: tier_1_primary_research_or_official
      description: "Peer-reviewed/preprint papers, official vendor docs, official engineering writeups, protocol specs."
      decision_weight: "high"
    - id: tier_2_product_field_report
      description: "Production case studies, reputable engineering blogs, benchmark sites, tool docs."
      decision_weight: "medium"
    - id: tier_3_commentary
      description: "Opinion pieces, social posts, secondary summaries."
      decision_weight: "low"
  rule: "Future grill questions for architecture must include tradeoffs plus at least one relevant evidence reference when available."
  geographic_coverage:
    rule: "Research passes must intentionally include non-US/non-Western work, especially Chinese research and production systems, when the domain has active work there."
    rationale: "Agent systems, coding agents, multi-agent coordination, and model/runtime infrastructure have major contributions from Chinese universities, labs, and companies. Ignoring them creates a biased and weaker architecture review."
    minimum_behavior:
      - "Search for Chinese-origin papers, labs, and products alongside US/EU sources."
      - "Do not infer quality from geography; evaluate by evidence, adoption, reproducibility, and fit."
      - "Record country/institution only when confirmed by the source."
      - "If no relevant Chinese/non-Western source is found, say that explicitly instead of silently omitting the search."
sources:
  - id: grite_2606_19616
    tier: tier_1_primary_research_or_official
    title: "Before the Pull Request: Mining Multi-Agent Coordination"
    url: "https://arxiv.org/html/2606.19616"
    observed_claims:
      - "Coordination actions can live in append-only content-addressed logs."
      - "CRDT reconciliation plus advisory leases are viable for multi-agent coding coordination."
      - "Shared coordination state can travel with the code through git."
    forge_implications:
      - "Preserve append-only coordination events."
      - "Use CRDT projection for coordination state, not integration FSM."
      - "Use leases/claims as write-boundary signals."
  - id: grite_product
    tier: tier_2_product_field_report
    title: "neul-labs/grite"
    url: "https://github.com/neul-labs/grite"
    observed_claims:
      - "Repo-local issue state can be represented as append-only events in git refs."
      - "Deterministic CRDT conflict resolution avoids central service dependency."
    forge_implications:
      - "Keep Forge coordination repo-local and runtime-agnostic."
      - "Prefer append-only logs and projections over direct shared-file mutation."
  - id: coagent_2606_15376
    tier: tier_1_primary_research_or_official
    title: "CoAgent: Concurrency Control for Multi-Agent Systems"
    url: "https://arxiv.org/abs/2606.15376"
    confirmed_origin: "Shanghai Jiao Tong University, China"
    observed_claims:
      - "Classical locks and abort/retry waste long-running agent work."
      - "Agents can judge whether conflicting writes invalidate their plan."
      - "Notify-and-repair can preserve concurrency while staying close to serial correctness."
    forge_implications:
      - "Do not treat every read/write conflict as blind abort."
      - "Model read_set/write_set in a typed effect contract with notification and repair policy."
      - "Keep typed undo/repair surfaces on the roadmap for mutating tools."
      - "Require destructive tool effects to declare inverse/compensation metadata or stop before execution."
  - id: rac_2605_03409
    tier: tier_1_primary_research_or_official
    title: "Robust Agent Compensation (RAC): Teaching AI Agents to Compensate"
    url: "https://arxiv.org/html/2605.03409v2"
    observed_claims:
      - "Log-based recovery with compensation can avoid unintended side effects in agent workflows."
      - "Compensation pairs can be exposed through agent framework extension points, including MCP."
      - "Decoupling recovery from agent replanning can improve latency and token economy."
    forge_implications:
      - "Model compensation metadata as runtime contract data, not as freeform agent reasoning."
      - "Use typed inverse refs and validation gates for destructive effects."
      - "Do not rely on broad replanning loops to undo side effects."
  - id: runtime_enforcement_2503_18666
    tier: tier_1_primary_research_or_official
    title: "Customizable Runtime Enforcement for Safe and Reliable LLM Agents"
    url: "https://arxiv.org/html/2503.18666v2"
    observed_claims:
      - "Runtime rules can prevent unsafe executions across code and embodied-agent settings with low overhead."
    forge_implications:
      - "Enforce destructive-effect policy in Rust validation/runtime rather than prompt prose."
  - id: solver_policy_tool_agents_2603_20449
    tier: tier_1_primary_research_or_official
    title: "Solver-Aided Verification of Policy Compliance in Tool-Augmented LLM Agents"
    url: "https://arxiv.org/html/2603.20449v1"
    observed_claims:
      - "Prompt-only policy descriptions do not guarantee policy compliance."
      - "Tool calls can be checked against formal constraints before execution."
    forge_implications:
      - "Treat ToolEffectContract validation as a precondition for mutating tool execution."
      - "Block destructive effects before execution when required metadata is missing."
  - id: verifiable_safe_tool_use_2601_08012
    tier: tier_1_primary_research_or_official
    title: "Towards Verifiably Safe Tool Use for LLM Agents"
    url: "https://arxiv.org/html/2601.08012"
    observed_claims:
      - "Agent safety should move from ad hoc reliability fixes to proactive guardrails with formal guarantees."
      - "Structured labels on capabilities, confidentiality, and trust level can support enforceable tool safety."
    forge_implications:
      - "Represent destructive capability and inverse availability as structured fields."
      - "Use labels and contracts to reduce dependence on repeated human confirmation."
  - id: tool_use_orchestration_survey_2603_22862
    tier: tier_1_primary_research_or_official
    title: "The Evolution of Tool Use in LLM Agents: From Single-Tool Call to Multi-Tool Orchestration"
    url: "https://arxiv.org/html/2603.22862v2"
    confirmed_origin: "Harbin Institute of Technology / Huawei contributors, China"
    observed_claims:
      - "Long-horizon multi-tool agents must manage intermediate state, recovery, safety, cost, and verifiability."
    forge_implications:
      - "Tool-effect safety belongs in orchestration/runtime contracts, not individual prompt snippets."
      - "Recovery policy must be part of the contract surface for long-running agent work."
  - id: owasp_llm06_excessive_agency
    tier: tier_1_primary_research_or_official
    title: "OWASP LLM06:2025 Excessive Agency"
    url: "https://genai.owasp.org/llmrisk/llm062025-excessive-agency/"
    observed_claims:
      - "Damaging actions can result from excessive functionality, permissions, or autonomy."
      - "High-impact actions need independent verification or approval."
    forge_implications:
      - "Destructive effects should be review-gated even when an inverse exists."
      - "Do not expose broad mutating behavior to the host agent without typed authority."
  - id: microservices_saga_pattern
    tier: tier_2_product_field_report
    title: "Saga pattern"
    url: "https://microservices.io/patterns/data/saga.html"
    observed_claims:
      - "Long-running distributed transactions rely on explicitly designed compensating actions rather than automatic rollback."
    forge_implications:
      - "Compensation is a designed operation with audit trail, not a magical rewind."
      - "Destructive effect policy should require an explicit inverse or stop path."
  - id: agentscope_2402_14034
    tier: tier_1_primary_research_or_official
    title: "AgentScope: A Flexible yet Robust Multi-Agent Platform"
    url: "https://arxiv.org/abs/2402.14034"
    confirmed_origin: "Alibaba DAMO Academy / ModelScope ecosystem, China"
    observed_claims:
      - "Multi-agent applications face coordination complexity and erratic LLM behavior."
      - "Message exchange can be the core communication mechanism for robust multi-agent applications."
      - "Actor-style distribution and fault-tolerance mechanisms help local and distributed deployments."
    forge_implications:
      - "Keep coordination mechanics explicit rather than prompt-only."
      - "Treat distributed and local execution as first-class design cases."
      - "Investigate actor-like internal boundaries for Rust service/daemon later without forcing them into v0 contracts."
      - "Model fault tolerance and recovery as runtime contracts rather than prompt advice."
  - id: agentops_survey_2508_02121
    tier: tier_1_primary_research_or_official
    title: "A Survey on AgentOps: Categorization, Challenges, and Future Directions"
    url: "https://arxiv.org/html/2508.02121v1"
    observed_claims:
      - "Agent systems encounter intra-agent and inter-agent anomalies across execution lifecycles."
      - "AgentOps includes monitoring, anomaly detection, root cause analysis, and resolution."
      - "Traditional operations techniques are insufficient for LLM-based agent systems."
    forge_implications:
      - "Forge needs health/recovery contracts beyond claim TTL."
      - "Recovery should classify anomaly kind and resolution action explicitly."
  - id: agentops_observability_2411_05285
    tier: tier_1_primary_research_or_official
    title: "AgentOps: Enabling Observability of LLM Agents"
    url: "https://arxiv.org/abs/2411.05285"
    observed_claims:
      - "Agent observability requires tracing runtime artifacts and associated data across the lifecycle."
      - "Existing tooling often focuses on LLM metrics and prompt management while missing agent-specific artifacts."
    forge_implications:
      - "Health recovery should reference goals, claims, requests, gates, and evidence rather than only raw logs."
      - "Recovery evidence must be compact and typed."
  - id: multi_agent_distributed_systems_2026
    tier: tier_2_product_field_report
    title: "Multi-Agent Systems Have a Distributed Systems Problem"
    url: "https://christophermeiklejohn.com/ai/agents/distributed/zabriskie/2026/03/30/multi-agent-systems-have-a-distributed-systems-problem.html"
    observed_claims:
      - "Multiple coding agents working on one codebase exhibit distributed-systems failures such as lost updates, stale views, and missing recovery paths."
    forge_implications:
      - "Model stale state and missing recovery as first-class runtime failures."
      - "Do not solve multi-agent drift with more prompt text."
  - id: agent_protocol_taxonomy_2606_19135
    tier: tier_1_primary_research_or_official
    title: "A Technical Taxonomy of LLM Agent Communication Protocols"
    url: "https://arxiv.org/html/2606.19135v1"
    observed_claims:
      - "Agent communication protocols can be analyzed by counterparty, payload, interaction state, discovery mechanism, and schema flexibility."
      - "The protocol landscape is fragmented and may evolve toward layered protocol stacks."
    forge_implications:
      - "Do not create overlapping request/message protocols until the boundary is proven."
      - "RequestContract should explicitly model payload, interaction state, and schema fields."
  - id: communication_centric_llm_mas_2502_14321
    tier: tier_1_primary_research_or_official
    title: "Beyond Self-Talk: A Communication-Centric Survey of LLM-Based Multi-Agent Systems"
    url: "https://arxiv.org/html/2502.14321v3"
    confirmed_origin: "Beihang University, China"
    observed_claims:
      - "LLM-based multi-agent systems can be understood as communication protocol-constrained systems driven by communication goals and architectures."
      - "Communication efficiency, security vulnerabilities, benchmarking, and scalability are open challenges."
    forge_implications:
      - "Agent coordination requests need sender, receiver, intent, payload, dependencies, lifecycle status, and evidence refs."
      - "Do not let freeform chat carry coordination authority."
  - id: chatdev_2307_07924
    tier: tier_1_primary_research_or_official
    title: "ChatDev: Communicative Agents for Software Development"
    url: "https://arxiv.org/abs/2307.07924"
    confirmed_origin: "OpenBMB/Tsinghua-linked research ecosystem, China; verify exact institutional mapping before final claims"
    observed_claims:
      - "Specialized agents can coordinate software phases through structured communication."
      - "Communication protocol design affects hallucination and debugging behavior."
      - "Language can unify design, coding, and testing phases, but does not by itself solve shared-state safety."
    forge_implications:
      - "Preserve guided communication and role clarity."
      - "Do not rely on chat communication alone for state authority."
      - "Use ChatDev as historical evidence for facilitation/roles, not as sufficient coordination substrate."
  - id: llm_as_code_2606_15874
    tier: tier_1_primary_research_or_official
    title: "LLM-as-Code: Agentic Programming for Agent Harness"
    url: "https://arxiv.org/html/2606.15874v1"
    confirmed_origin: "author/institution origin not yet verified"
    observed_claims:
      - "Assigning deterministic looping, branching, sequencing, and stopping to probabilistic models causes token explosion and unreliable completion."
      - "Agent harnesses should make control flow executable, inspectable, and stateful."
    forge_implications:
      - "Strengthens the Rust core direction: deterministic protocol/runtime first, model as reasoning component."
      - "Supports replacing prompt-shaped Markdown with typed executable contracts."
  - id: code_as_agent_harness_2605_18747
    tier: tier_1_primary_research_or_official
    title: "Code as Agent Harness"
    url: "https://arxiv.org/abs/2605.18747"
    confirmed_origin: "institution mix not yet verified; do not classify geographically until source metadata is audited"
    observed_claims:
      - "Code can act as executable, inspectable, and stateful infrastructure for agent reasoning, action, environment modeling, and execution-based verification."
      - "Agent harness engineering has open challenges around evaluation beyond final task success, verification under incomplete feedback, consistent shared state, multi-agent coordination, and human oversight for safety-critical actions."
    forge_implications:
      - "Rust contract validation should be treated as product evidence, not optional hygiene."
      - "Decision-close and gate behavior should be verifiable harness behavior, not prose instruction."
  - id: cooperbench_2601_13295
    tier: tier_1_primary_research_or_official
    title: "CooperBench: Why Coding Agents Cannot be Your Teammates Yet"
    url: "https://arxiv.org/html/2601.13295v1"
    observed_claims:
      - "Collaborative coding tasks expose coordination failures beyond solo coding ability."
      - "Benchmarks need tasks with potential conflicts across realistic repositories."
      - "Cooperation requires conflict resolution, consensus, and social/coordination intelligence."
    forge_implications:
      - "Do not evaluate Forge only with solo-agent success."
      - "Add conformance tests for conflict, duplicate work, ownership, and handoff."
      - "Treat coordination as first-class, not polish."
  - id: multiagentbench_2503_01935
    tier: tier_1_primary_research_or_official
    title: "MultiAgentBench: Evaluating the Collaboration and Competition of LLM agents"
    url: "https://arxiv.org/abs/2503.01935"
    observed_claims:
      - "Single-agent or narrow-domain benchmarks fail to capture multi-agent coordination and competition."
      - "Evaluation should measure task completion plus collaboration/competition quality with milestone-based KPIs."
    forge_implications:
      - "Forge evals need coordination-quality dimensions, not only final task success."
      - "Use milestone-like fixture coverage for v0 until broader benchmark runners exist."
  - id: utboost_2025_acl
    tier: tier_1_primary_research_or_official
    title: "UTBoost: Rigorous Evaluation of Coding Agents on SWE-Bench"
    url: "https://aclanthology.org/2025.acl-long.189.pdf"
    observed_claims:
      - "Insufficient tests can incorrectly label generated patches as passed."
      - "Augmented tests uncovered many erroneous patches and changed benchmark rankings."
    forge_implications:
      - "Passing narrow local checks is not enough evidence for broad quality claims."
      - "Coordination evals should name failure signals and evidence coverage explicitly."
  - id: agentless_fse_2025
    tier: tier_1_primary_research_or_official
    title: "Demystifying LLM-Based Software Engineering Agents"
    url: "https://lingming.cs.illinois.edu/publications/fse2025.pdf"
    observed_claims:
      - "Benchmark tasks can include exact ground-truth patches, missing critical information, or misleading solutions."
      - "Simpler, constrained baselines can outperform more autonomous agent systems on cost and success."
    forge_implications:
      - "Forge evals must separate real capability from misleading input or overpowered autonomy."
      - "Keep evals cost-aware and compare against constrained baselines where possible."
  - id: anthropic_parallel_c_compiler
    tier: tier_2_product_field_report
    title: "Building a C compiler with a team of parallel Claudes"
    url: "https://www.anthropic.com/engineering/building-c-compiler"
    observed_claims:
      - "Large parallel agent teams can produce nontrivial systems when coordination is engineered."
      - "Cost, session count, and validation effort are material architecture constraints."
    forge_implications:
      - "Support agent teams, but require scoped work, evidence, validation, and cost-aware loops."
      - "Avoid unbounded autonomy without coordination contracts."
  - id: claude_worktrees
    tier: tier_1_primary_research_or_official
    title: "Run parallel sessions with worktrees"
    url: "https://code.claude.com/docs/en/worktrees"
    observed_claims:
      - "Worktrees isolate file edits for parallel sessions."
      - "Subagents and agent teams coordinate work above file isolation."
    forge_implications:
      - "Distinguish file isolation from coordination authority."
      - "Keep Product Area/lane claims even when worktrees are used."
  - id: a2a_protocol
    tier: tier_1_primary_research_or_official
    title: "Agent2Agent Protocol"
    url: "https://github.com/a2aproject/A2A"
    observed_claims:
      - "A2A enables interoperability between opaque agentic applications."
    forge_implications:
      - "Forge should not compete with A2A."
      - "Forge owns repo-local coordination/governance; A2A can be an adapter/messaging layer."
      - "Cross-runtime handoff should require target runtime identity/registry evidence."
      - "RequestContract should preserve lifecycle, context refs, and response expectations for handoff-style coordination."
  - id: mcp_tools_spec
    tier: tier_1_primary_research_or_official
    title: "Model Context Protocol Tools Specification"
    url: "https://modelcontextprotocol.io/specification/2025-11-25/server/tools"
    observed_claims:
      - "MCP tools are named capabilities with schemas and metadata."
    forge_implications:
      - "Expose Forge through MCP as schema-backed tools."
      - "Do not put method logic inside host-specific prompt prose."
      - "Do not represent commands as raw shell strings."
  - id: mcp_tool_annotations_2603
    tier: tier_1_primary_research_or_official
    title: "Tool Annotations as Risk Vocabulary: What Hints Can and Can't Do"
    url: "https://blog.modelcontextprotocol.io/posts/2026-03-16-tool-annotations/"
    observed_claims:
      - "Tool annotations provide risk hints such as read-only and destructive behavior, but they remain advisory metadata."
      - "Clients use annotations to drive confirmations and safety UI, not as complete authorization."
    forge_implications:
      - "Capability evidence may cite MCP schemas or annotations, but Forge must still keep its own authority gates."
      - "Runtime handoff cannot treat tool annotations as sufficient state authority."
  - id: mcp_security_best_practices_2026
    tier: tier_1_primary_research_or_official
    title: "Model Context Protocol Security Best Practices"
    url: "https://modelcontextprotocol.io/docs/tutorials/security/security_best_practices"
    observed_claims:
      - "MCP implementations need explicit security analysis beyond basic tool exposure."
      - "Confused-deputy, malicious-server, and tool-permission risks are implementation concerns."
    forge_implications:
      - "Forge MCP exposure must be deny-by-default and preserve command authority classes."
      - "MCP transport metadata must not become Forge workflow authority."
  - id: mcp_authorization_spec_2025_11_25
    tier: tier_1_primary_research_or_official
    title: "Model Context Protocol Authorization Specification"
    url: "https://modelcontextprotocol.io/specification/2025-11-25/basic/authorization"
    observed_claims:
      - "MCP authorization operates at the transport level for restricted MCP servers."
      - "Transport authorization is separate from application-specific action governance."
    forge_implications:
      - "Forge must keep transport authorization separate from OperationContract admission."
      - "MCP authorization does not grant mutation authority inside Forge."
  - id: slsa_framework_spec
    tier: tier_1_primary_research_or_official
    title: "Supply-chain Levels for Software Artifacts"
    url: "https://slsa.dev/spec/v1.1/"
    observed_claims:
      - "Software supply-chain integrity depends on provenance, build, source, and dependency controls."
      - "Consumers need evidence that artifacts are produced from expected source and build process."
    forge_implications:
      - "Forge adapter installs and updates should require provenance and immutable source refs."
      - "Distribution admission should be explicit and machine-readable."
  - id: slsa_artifact_verification_spec
    tier: tier_1_primary_research_or_official
    title: "SLSA Verifying Artifacts"
    url: "https://slsa.dev/spec/v1.0/verifying-artifacts"
    observed_claims:
      - "Provenance only mitigates authenticity risks when consumers inspect and verify it."
      - "Artifact verification compares provenance and artifact information against expected values."
    forge_implications:
      - "Forge must separate distribution evidence presence from local artifact verification."
      - "Forge update/install adapters must not mutate an install before verification evidence passes."
  - id: slsa_provenance_v1
    tier: tier_1_primary_research_or_official
    title: "SLSA Provenance v1"
    url: "https://slsa.dev/spec/v1.1/provenance"
    observed_claims:
      - "SLSA provenance describes how artifacts were produced so consumers can verify them against expectations."
      - "builder.id identifies the trusted build platform and provenance subjects identify output artifacts."
    forge_implications:
      - "Forge provenance verification must compare builder, source, and artifact subject against explicit expectations."
      - "Forge must not treat signed metadata as sufficient unless predicate semantics match the expected release."
  - id: slsa_verifier_project
    tier: tier_1_primary_research_or_official
    title: "SLSA Verifier"
    url: "https://github.com/slsa-framework/slsa-verifier"
    observed_claims:
      - "SLSA verifier checks cryptographic signatures on provenance and expected builder/source/ref values."
      - "SLSA verifier supports artifact verification for binary blobs."
    forge_implications:
      - "Forge should mirror the practical checks: signature, artifact digest, builder identity, source URI, and source ref."
      - "Forge host adapters should consume a single verifier result instead of implementing verifier policy themselves."
  - id: in_toto_statement_v1
    tier: tier_1_primary_research_or_official
    title: "in-toto Statement v1"
    url: "https://github.com/in-toto/attestation/blob/main/spec/v1/statement.md"
    observed_claims:
      - "The Statement layer binds a predicate type to one or more artifact subjects."
      - "Subjects are identified by cryptographic digest metadata."
    forge_implications:
      - "Forge must require predicateType and subject digest checks when consuming provenance."
      - "Forge should fail provenance verification if the local artifact digest is not a statement subject."
  - id: sigstore_client_spec
    tier: tier_1_primary_research_or_official
    title: "Sigstore Client Specification"
    url: "https://github.com/sigstore/architecture-docs/blob/main/client-spec.md"
    observed_claims:
      - "Verifier policy defines trusted identity, trusted transparency services, verification materials, and failure behavior."
      - "Verification should abort when required signature, identity, timestamp, or transparency checks fail."
    forge_implications:
      - "Forge Core should own verification policy and expose typed pass/fail evidence to adapters."
      - "Host adapters should not independently decide which release identities or log roots to trust."
  - id: rfc6962_merkle_audit_paths
    tier: tier_1_primary_research_or_official
    title: "RFC 6962 Certificate Transparency"
    url: "https://datatracker.ietf.org/doc/html/rfc6962"
    observed_claims:
      - "Merkle audit paths let auditors verify that a leaf is included in a committed Merkle tree root."
      - "Transparency logs support append-only auditability through signed tree roots and inclusion proofs."
    forge_implications:
      - "Forge transparency proofs should bind signed provenance to a Merkle inclusion root."
      - "Forge should keep public log root distribution and checkpoint validation as explicit trust policy."
  - id: sigstore_docs
    tier: tier_1_primary_research_or_official
    title: "Sigstore Documentation"
    url: "https://docs.sigstore.dev/"
    observed_claims:
      - "Software artifacts can be signed and verified with transparency-backed workflows."
      - "Signing evidence helps consumers verify artifact origin and integrity."
    forge_implications:
      - "Forge distribution policy should accept signature evidence as a trust input."
      - "Unsigned artifacts still need checksum and provenance evidence before admission."
  - id: tuf_specification
    tier: tier_1_primary_research_or_official
    title: "The Update Framework Specification"
    url: "https://theupdateframework.github.io/specification/latest/"
    observed_claims:
      - "Secure update systems need metadata that constrains trusted targets and versions."
      - "Update clients need rollback and freeze protection considerations."
      - "Root metadata update workflow uses version sequencing for rollback protection."
      - "TUF freeze attacks are limited by metadata expiration times."
    forge_implications:
      - "Forge updates need rollback metadata and version compatibility evidence."
      - "Floating refs or missing update metadata should block distribution admission."
      - "Forge can verify local metadata freshness by checking role type, version floors, and expires against a fixed update start time without claiming full TUF client behavior."
  - id: sigstore_security_model_tuf_trust_root
    tier: tier_1_primary_research_or_official
    title: "Sigstore Security Model - Trust Root"
    url: "https://docs.sigstore.dev/about/security/"
    observed_claims:
      - "The Sigstore Trust Root secures keys used by the Sigstore project."
      - "The Sigstore Trust Root leverages TUF principles and protects keys and certificates used to verify artifacts."
    forge_implications:
      - "Forge should keep Sigstore trusted-root freshness as a first-class verification boundary instead of assuming static trust material."
      - "Passing Fulcio/Rekor/TSA checks must not imply TUF trusted-root freshness."
  - id: sigstore_tuf_client_installation_docs
    tier: tier_1_primary_research_or_official
    title: "Sigstore Installation - Downloading The Update Framework client"
    url: "https://docs.sigstore.dev/cosign/system_config/installation/"
    observed_claims:
      - "Sigstore setup starts from trusted TUF root material."
      - "The TUF client downloads the latest unexpired root as part of its workflow."
    forge_implications:
      - "Forge's first TUF boundary should reject expired local trusted-root metadata and report that full client download/signature workflow remains outside scope."
  - id: in_toto_spec
    tier: tier_1_primary_research_or_official
    title: "in-toto Attestation Framework"
    url: "https://in-toto.io/"
    observed_claims:
      - "Supply-chain steps and artifacts can be represented as attestations."
      - "Provenance and layout evidence can help verify that an artifact followed an expected process."
    forge_implications:
      - "Forge adapter distribution should require provenance or attestation refs."
      - "Host adapters should not treat a downloaded binary as trusted without supply-chain evidence."
  - id: openai_agents_sdk
    tier: tier_1_primary_research_or_official
    title: "OpenAI Agents SDK"
    url: "https://developers.openai.com/api/docs/guides/agents"
    observed_claims:
      - "Agent applications should own orchestration, tool execution, approvals, and state."
    forge_implications:
      - "Forge Core should own operation contracts, approvals, side-effect policy, and state authority."
  - id: openai_agents_handoffs
    tier: tier_1_primary_research_or_official
    title: "OpenAI Agents SDK Handoffs"
    url: "https://openai.github.io/openai-agents-python/handoffs/"
    observed_claims:
      - "Handoffs allow an agent to delegate tasks to another specialized agent."

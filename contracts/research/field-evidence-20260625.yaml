  - id: fulcio_spec_short_lived_certificate_timestamping
    tier: tier_1_primary_research_or_official
    title: "Fulcio Specification"
    url: "https://github.com/sigstore/architecture-docs/blob/main/fulcio-spec.md"
    observed_claims:
      - "Fulcio uses ephemeral keys and short-lived certificates to avoid normal revocation-list requirements."
      - "Verifying a short-lived certificate requires timestamping evidence that the signature existed while the certificate was valid."
    forge_implications:
      - "Forge should require certificate lifetime policy plus trusted signing time for short-lived revocation policy verification."
      - "Forge should keep explicit CRL/OCSP status as a separate boundary."
  - id: rfc5280_x509_crl_profile
    tier: tier_1_primary_research_or_official
    title: "RFC 5280: Internet X.509 Public Key Infrastructure Certificate and Certificate Revocation List Profile"
    url: "https://datatracker.ietf.org/doc/html/rfc5280"
    observed_claims:
      - "RFC 5280 profiles X.509 certificates and certificate revocation lists as explicit PKI structures."
      - "CRL processing is a separate revocation mechanism and cannot be inferred from certificate validity alone."
    forge_implications:
      - "Forge must not report CRL-based revocation status unless it has actual CRL evidence."
  - id: rfc6960_ocsp_certificate_status
    tier: tier_1_primary_research_or_official
    title: "RFC 6960: X.509 Internet Public Key Infrastructure Online Certificate Status Protocol - OCSP"
    url: "https://datatracker.ietf.org/doc/html/rfc6960"
    observed_claims:
      - "OCSP provides online certificate status responses with status values such as good, revoked, and unknown."
      - "OCSP is a distinct protocol and not implied by certificate transparency or timestamp evidence."
    forge_implications:
      - "Forge must fail explicit_status_required until it has a dedicated OCSP/CRL verifier and freshness policy."
plan_level_implications:
  - id: evidence_before_architecture_questions
    rule: "Before accepting a structural contract field, check v2 audit plus external evidence."
  - id: coordination_scope_validated
    rule: "coordination_scope is supported by v2, grite, CooperBench, Claude worktrees, and field reports."
  - id: record_request_validated
    rule: "worker-to-driver request routing is supported by v2 single-driver design and append-only log evidence."
  - id: completion_contract_validated
    rule: "Completion state needs a typed contract with proof requirements and stable storage identity; locks alone do not prevent duplicate work or done-without-proof."
  - id: tool_effect_contract_validated
    rule: "Fine read/write conflict handling belongs in typed ToolEffectContract with notify-and-repair policy, not loose OperationContract prose."
  - id: destructive_effect_inverse_policy_validated
    rule: "Destructive ToolEffect writes must declare inverse/compensation metadata or stop for review before execution; this is an inference from CoAgent/RAC, runtime enforcement, tool-use policy, and excessive-agency evidence."
  - id: claim_contract_validated
    rule: "Fleet claims need typed TTL, heartbeat, ownership, and handoff-on-expiry; lock files alone are insufficient coordination evidence."
  - id: gate_contract_validated
    rule: "Validation scope must be explicit: lane evidence can feed broader gates, but cannot replace integration or release gates."
  - id: decision_close_contract_validated
    rule: "Decision-closing mutations need explicit review evidence and reopen policy; chat momentum is not authority. This is an inference from HITL, mixed-initiative, accountability, and runtime-control research, not a direct copied pattern."
  - id: runtime_handoff_contract_validated
    rule: "Cross-runtime handoff requires both target runtime registry evidence and capability evidence; interoperability protocols enable handoff but do not replace Forge authority."
  - id: request_contract_as_message_unit_validated
    rule: "RequestContract is the v0 durable communication unit; it must carry communication, payload, response, dependency, evidence, and status fields before a separate MessageContract is justified."
  - id: coordination_eval_contract_validated
    rule: "Multi-agent/team readiness requires coordination-specific eval dimensions covering duplicate work, lane collision, stale claims, conflict repair, request lifecycle, gates, handoff, destructive effects, and human guidance recovery."
  - id: health_recovery_contract_validated
    rule: "Claim TTL is not enough; runtime health and recovery need typed status, anomaly, evidence, and recovery action fields."
  - id: command_contract_validated
    rule: "CommandContract separation is supported by MCP schema-backed tools and security/conformance needs."
  - id: markdown_removal_validated
    rule: "Typed contracts are preferred for agent correctness; Markdown remains distribution-only."
  - id: funnel_autonomy_validated
    rule: "Funnel Autonomy should be encoded as operation policy: next actor, execution policy, stop policy, authority, and human checkpoint rules."
  - id: schema_generation_strategy_validated
    rule: "Rust/Serde structs are the executable source for core contract semantics; generated JSON Schema supports tooling/interoperability; compact agent views prevent schema bloat in context."
  - id: rust_runtime_operation_planning_validated
    rule: "The first Rust runtime boundary should validate OperationContractDocument and return typed RuntimePlan decisions before any command execution, file mutation, daemon, or host adapter owns authority."
  - id: runtime_store_state_read_validated
    rule: "Runtime may consume store-backed read snapshots for reference and state authority checks, but store/adapters own filesystem discovery and later mutation boundaries."
  - id: runtime_effect_staging_validated
    rule: "Runtime may stage command/effect refs from ready plans, but execution and irreversible commit require separate command runner and effect transaction boundaries."
  - id: runtime_command_runner_validated
    rule: "Runtime may execute only staged read-only CommandContract commands with disabled network, safe flags, platform/env/output guards, timeout, and typed execution result; shell and mutating commands stay blocked."
  - id: runtime_command_evidence_recording_validated
    rule: "Runtime command output should become a typed RuntimeCommandEvidenceRecord and be persisted by store as repo-relative append-only JSONL evidence; host-agent prose is not evidence authority."
  - id: runtime_effect_transaction_readiness_validated
    rule: "ToolEffectContract writes cannot be applied from write_set alone; runtime must require staged valid effects plus explicit RuntimeEffectPayload for every non-delete write before any file application boundary."
  - id: runtime_effect_application_validated
    rule: "Store may apply file-backed ToolEffect writes only with materialized payload hashes, file-backed freshness checks, safe repo-relative paths, temp-file replacement, and process-local rollback; crash durability needs a later WAL boundary."
  - id: runtime_effect_wal_recovery_validated
    rule: "File-effect application may record synced JSONL WAL entries with before-images and recover incomplete transactions by restoring before-images; compaction and concurrent-writer serialization remain later boundaries."
  - id: runtime_effect_wal_compaction_and_locking_validated
    rule: "Store may use standard-library file locks to serialize local effect writers and compact WAL by retaining incomplete transactions only; distributed locking and network filesystem semantics remain future boundaries."
  - id: operation_executor_payload_adapter_validated
    rule: "Adapters may load payload bytes for RuntimeOperationExecution only through explicit payload specs with size limits, repo-root scope by default, hash metadata, and no raw payload content in chat-facing execution JSON."
  - id: operation_executor_artifact_storage_projection_validated
    rule: "Store should project logical artifact_id, evidence_id, ledger_stream, and request_stream targets to canonical repo-local file paths while preserving logical refs; separate artifact storage adapters remain future work."

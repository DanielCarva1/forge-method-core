  - "Find current security guidance for MCP stdio/local process execution before implementing MCP server."
  - "Validate ToolEffectContract against real file-backed and future DB/daemon projections before implementation."
  - "Expand Chinese-language and China-origin source search for agent runtime, coding-agent orchestration, and multi-agent coordination before final Rust architecture lock."

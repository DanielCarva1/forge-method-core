answers:
  q1_journal_ledger_wal:
    answer: "No claim-specific journal/ledger/WAL/append-only log is implemented in the inspected claim persistence path. Claims are materialized as standalone YAML files in the bus directory, plus transient .forge-claim.lock and .tmp files during writes."
    evidence:
      - "crates/forge-core-cli/src/claim.rs:10-14 says the claim file is the materialized state and there is no parallel claim event-log."
      - "crates/forge-core-cli/src/claim.rs:493-505 only serializes YAML and calls atomic_write; no append/journal call appears."
      - "crates/forge-core-cli/src/io_util.rs:14-22 only temp-writes and renames; no fsync or log append."
      - "rg for WAL/journal/ledger in the inspected files finds comments and unrelated effect-index WAL flags, not a claim lifecycle WAL append."
  q2_active_state_reconstruction:
    answer: "Every invocation reconstructs state from disk by load_claims: read_dir(claims_dir), collect entries, retain extension == yaml, sort paths, read_to_string each file, deserialize ClaimContractDocument, then run pure projection/check/lifecycle logic. There is no cache or persistent index for claim state."
    evidence:
      - "Mutations call load_claims before deciding: acquire claim.rs:180; heartbeat claim.rs:222; release claim.rs:272."
      - "Readers call load_claims: status claim.rs:306; check-write claim.rs:365."
      - "load_claims implementation: claim.rs:451-485."
      - "Active projection filters is_live in project_active: claim_engine.rs:434-450."
      - "Write conflict detection receives the loaded slice and is pure: conflict_detection.rs:114-129."
  q3_bus_directory:
    answer: "The CLI default bus directory is relative path contracts/claims. From repo root /mnt/c/forge-method-rust, that resolves to /mnt/c/forge-method-rust/contracts/claims. It is configurable per CLI invocation with --claims-dir; library run_* functions accept claims_dir: &Path from the caller."
    evidence:
      - "Default for acquire: main.rs:2174; override: main.rs:2211-2213."
      - "Default for heartbeat/release: main.rs:2289; override: main.rs:2303-2305."
      - "Default for status: main.rs:2338; override: main.rs:2344-2346."
      - "Default for check-write: main.rs:2371; override: main.rs:2387-2389."
      - "run_acquire/run_heartbeat/run_release/run_status/run_check_write all receive claims_dir: &Path in claim.rs:148-151,206-210,256-260,302-304,359-363."
    caveat: "ClaimContract.contract_ref is hardcoded in engine-created claims as contracts/claims/claim-contract-v0.yaml at claim_engine.rs:293, independent of --claims-dir; this is schema/reference metadata, not the actual save path."

corruption_summary:
  - "No claim WAL/journal/CAS: atomic rename prevents visible torn YAML for cooperating save_claim writers, but there is no append-only recovery record and no expected-version compare before overwriting; unlocked concurrent writes are last-writer-wins."
  - "No fsync on temp file or containing directory: after crash/power loss, rename visibility atomicity does not imply durability, especially relevant on /mnt/c/WSL/DrvFS."
  - "Lockfile can become orphaned on crash and blocks mutating commands; it has no stale-owner detection, no mandatory enforcement, and Drop removes by path without ownership token validation."
  - "Readers (status/check-write) do not lock; they reconstruct from a file-by-file snapshot and can observe stale/mixed timing, while check-write remains TOCTOU advisory before the actual write."
  - "load_claims fail-closes on any malformed or unrelated *.yaml in the bus; a partial direct write or schema/non-claim YAML in claims_dir can DoS the whole claim bus."

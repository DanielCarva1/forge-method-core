schema_version: "0.1"
policy: "operation_executor_metadata_index_boundary"
status: "active"
summary: "Forge writes a compact append-only metadata index for committed file-backed effect targets so artifacts and evidence remain discoverable without promoting the index into a full provenance database."
canonical_terms:
  effect_target_metadata_record: "Append-only record describing one committed logical effect target and its projected physical repository path."
  logical_ref: "The contract-level target reference requested by the effect."
  physical_ref: "The repository-relative path selected by the store projection layer."
  metadata_index: "Repo-local NDJSON view used for discovery, audit, recovery planning, and future provenance export."
decision:
  selected_option: "compact_append_only_metadata_index"
  rejected_options:
    - id: "full_provenance_database_now"
      reason: "W3C PROV, RO-Crate, and OpenLineage support richer export models, but forcing them into the first local executor would expand storage/query scope before runtime semantics are stable."
    - id: "wal_only_discovery"
      reason: "WAL is the transaction/recovery log. Using it as the discovery surface would couple audit views to rollback internals and make artifact lookup unnecessarily brittle."
    - id: "file_scan_only"
      reason: "Scanning projected paths can find files but loses operation/effect/actor/hash context needed for trace-guided repair and bounded evidence retrieval."
rules:
  - id: "append_only"
    rule: "The metadata index is append-only NDJSON under `.forge-method/index/effect-targets.ndjson`."
  - id: "committed_effects_only"
    rule: "Records are emitted only for effects that reached applied status."
  - id: "no_raw_content"
    rule: "Metadata records must not include raw file contents, prompts, model outputs, or payload bytes."
  - id: "minimal_record_shape"
    rule: "Each record must include schema_version, record_kind, recorded_at, operation_id, effect_id, logical_ref, physical_ref, target_kind, access_mode, content_hash, byte_len, actor_agent_id, actor_role, destructive, and redaction_hint."
  - id: "wal_remains_transaction_authority"
    rule: "The WAL remains the transaction/recovery authority; the metadata index is a discoverability and audit projection."
  - id: "append_failure_is_runtime_failure"
    rule: "If an effect is applied but metadata cannot be appended, the runtime must report a failed execution instead of pretending the operation completed cleanly."
  - id: "export_deferred"
    rule: "Full PROV, RO-Crate, or OpenLineage export is deferred until there is a proven consumer or interoperability boundary."
evidence_basis:
  - source_id: "w3c_prov_dm"
    supports: "Generated entities should retain identifiable links to activities and agents."
  - source_id: "ro_crate_spec_1_1"
    supports: "Files can be aggregated with identifiers, metadata, relations, and provenance."
  - source_id: "workflow_run_ro_crate_2024"
    supports: "Workflow execution provenance can package run metadata, inputs, outputs, and context."
  - source_id: "openlineage_object_model"
    supports: "Lineage systems can capture runtime observations as events over jobs/runs/datasets without requiring immediate heavy graph storage."
  - source_id: "harnessfix_trace_guided_2606_06324"
    supports: "Trace-guided harness repair needs normalized provenance and scoped evidence references."
  - source_id: "agentic_harness_engineering_2604_25850"
    supports: "Harness changes should be traceable through typed policies, audits, and tests."
  - source_id: "agentleak_privacy_leakage_2602_11510"
    supports: "Internal channels and shared memory can leak private data, so indexes should use data minimization."
implementation_refs:
  - "crates/forge-core-store/src/lib.rs"
  - "crates/forge-core-runtime/src/lib.rs"
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-store/tests/reference_index.rs"
  - "crates/forge-core-runtime/tests/operation_plan.rs"
acceptance:
  - "Applied artifact/evidence/request effects return EffectTargetMetadataRecord values."
  - "Runtime execution appends `.forge-method/index/effect-targets.ndjson` after successful effect application."
  - "Metadata records include logical and physical refs, effect/operation ids, actor, hash, byte_len, timestamp, and redaction hint."
  - "Metadata index does not contain raw payload content."
  - "If metadata append fails, RuntimeOperationExecutionReason includes effect_metadata_append_failed."
inference_boundary: "The evidence supports compact append-only metadata for repo-local discoverability and future provenance export. It does not prove Forge should implement a graph database, remote lineage backend, or full RO-Crate export in the first Rust executor."
failure_modes_prevented:
  - "Artifacts exist but the agent cannot discover which operation/effect generated them."
  - "Host agents use WAL internals as an accidental artifact index."
  - "Recovery/debugging requires broad filesystem scans without actor/effect context."
  - "A metadata channel leaks raw generated content."
next_boundary:
  id: "sigstore_fulcio_certificate_identity_boundary"
  question: "How should Forge verify Fulcio certificate chain, certificate identity extensions, expected OIDC issuer, and workflow identity selectors against the trusted-root policy without treating policy validation as cryptographic proof?"

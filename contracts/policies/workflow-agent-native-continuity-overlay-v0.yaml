schema_version: '0.1'
workflow_governance_policy_overlay:
  id: overlay.workflow-governance.agent-native-continuity-v0
  base_bundle_id: bundle.workflow-governance.assurance-operations-v0
  policies:
  - id: policy.workflow.checkpoint-preview
    compatibility_workflow_id: checkpoint-preview
    routing:
      priority: 230
      readiness_target: execute
      activation: when_applicable
      signals: []
    eligible_phases:
    - anytime
    prerequisites: []
    obligations:
    - id: obligation.workflow.checkpoint-preview.state-bound
      description: The checkpoint binds the exact project state, release, ledger head, and governed work scope.
      criticality: critical
      required_before: execute
      claim_refs:
      - claim.workflow.checkpoint-preview.state-bound
    - id: obligation.workflow.checkpoint-preview.change-summary-evidenced
      description: Material completed, pending, and changed work is summarized with evidence references.
      criticality: critical
      required_before: execute
      claim_refs:
      - claim.workflow.checkpoint-preview.change-summary-evidenced
    - id: obligation.workflow.checkpoint-preview.safe-resume-explicit
      description: The next safe action, owner, blockers, and revalidation conditions are explicit.
      criticality: critical
      required_before: execute
      claim_refs:
      - claim.workflow.checkpoint-preview.safe-resume-explicit
    - id: obligation.workflow.checkpoint-preview.non-authoritative
      description: The preview is a durable projection and cannot grant completion, mutation, or release authority.
      criticality: critical
      required_before: execute
      claim_refs:
      - claim.workflow.checkpoint-preview.non-authoritative
    claims:
    - id: claim.workflow.checkpoint-preview.state-bound
      statement: The checkpoint binds the exact project state, release, ledger head, and governed work scope.
      evaluator_ref: evaluator.workflow.checkpoint-preview.state-bound
      waiver:
        kind: not_waivable
    - id: claim.workflow.checkpoint-preview.change-summary-evidenced
      statement: Material completed, pending, and changed work is summarized with evidence references.
      evaluator_ref: evaluator.workflow.checkpoint-preview.change-summary-evidenced
      waiver:
        kind: not_waivable
    - id: claim.workflow.checkpoint-preview.safe-resume-explicit
      statement: The next safe action, owner, blockers, and revalidation conditions are explicit.
      evaluator_ref: evaluator.workflow.checkpoint-preview.safe-resume-explicit
      waiver:
        kind: not_waivable
    - id: claim.workflow.checkpoint-preview.non-authoritative
      statement: The preview is a durable projection and cannot grant completion, mutation, or release authority.
      evaluator_ref: evaluator.workflow.checkpoint-preview.non-authoritative
      waiver:
        kind: not_waivable
    evaluators:
    - id: evaluator.workflow.checkpoint-preview.state-bound
      provider: repository_inspector
      accepted_evidence_kinds:
      - artifact_inspection
      minimum_strength: inspected_artifact
      minimum_passing_observations: 1
      minimum_distinct_principals: 1
      max_age_seconds: 86400
      freshness: current_only
      disproof_policy: require_uncontested_support
    - id: evaluator.workflow.checkpoint-preview.change-summary-evidenced
      provider: repository_inspector
      accepted_evidence_kinds:
      - artifact_inspection
      minimum_strength: inspected_artifact
      minimum_passing_observations: 1
      minimum_distinct_principals: 1
      max_age_seconds: 86400
      freshness: current_only
      disproof_policy: require_uncontested_support
    - id: evaluator.workflow.checkpoint-preview.safe-resume-explicit
      provider: repository_inspector
      accepted_evidence_kinds:
      - artifact_inspection
      minimum_strength: inspected_artifact
      minimum_passing_observations: 1
      minimum_distinct_principals: 1
      max_age_seconds: 86400
      freshness: current_only
      disproof_policy: require_uncontested_support
    - id: evaluator.workflow.checkpoint-preview.non-authoritative
      provider: repository_inspector
      accepted_evidence_kinds:
      - artifact_inspection
      minimum_strength: inspected_artifact
      minimum_passing_observations: 1
      minimum_distinct_principals: 1
      max_age_seconds: 86400
      freshness: current_only
      disproof_policy: require_uncontested_support
    capability_requirements:
    - id: capability.workflow.checkpoint-preview.durable-proof
      kind: tool
      probe_kind: local_command
      description: The exact durable evidence and verification capability required by checkpoint-preview is available; conversational
        assertion alone is insufficient.
      affected_claim_refs:
      - claim.workflow.checkpoint-preview.state-bound
      - claim.workflow.checkpoint-preview.change-summary-evidenced
      - claim.workflow.checkpoint-preview.safe-resume-explicit
      - claim.workflow.checkpoint-preview.non-authoritative
      resolution_options:
      - Acquire the missing repository, runtime, or qualified review capability and repeat the governed checks.
      - Narrow or defer the affected scope instead of claiming unsupported readiness.
      blocks_before: execute
    decision_rules:
    - id: decision.workflow.checkpoint-preview.material-gap
      activation: claim_unresolved
      claim_ref: claim.workflow.checkpoint-preview.non-authoritative
      question: How should the unresolved material checkpoint-preview gap constrain governed progress?
      reason: irreversible_risk
      alternatives:
      - id: alternative.checkpoint-preview.repair
        description: Repair the durable-truth gap and repeat verification.
        consequences:
        - Adds work while reducing unsupported authority.
      - id: alternative.checkpoint-preview.reduce-scope
        description: Remove or defer the affected scope.
        consequences:
        - Reduces scope without weakening the governance gate.
      - id: alternative.checkpoint-preview.seek-authority
        description: Seek an explicit disposition from the required human or external authority.
        consequences:
        - Preserves accountability without granting the agent autoauthority.
      recommended_alternative_ref: alternative.checkpoint-preview.repair
      blocking: true
      blocks_before: execute
    advisory_playbook:
      id: playbook.workflow.checkpoint-preview
      steps:
      - Recover the exact durable scope, sources, state, ownership, and unresolved uncertainty.
      - Inspect and link the strongest available evidence; retain contrary findings and limitations.
      - Repair, narrow, defer, or request the required authority before claiming governed readiness.

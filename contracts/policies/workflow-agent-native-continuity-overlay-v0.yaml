        - Reduces scope without weakening the governance gate.
      - id: alternative.product-area-map.seek-authority
        description: Seek an explicit disposition from the required human or external authority.
        consequences:
        - Preserves accountability without granting the agent autoauthority.
      recommended_alternative_ref: alternative.product-area-map.repair
      blocking: true
      blocks_before: execute
    advisory_playbook:
      id: playbook.workflow.product-area-map
      steps:
      - Recover the exact durable scope, sources, state, ownership, and unresolved uncertainty.
      - Inspect and link the strongest available evidence; retain contrary findings and limitations.
      - Repair, narrow, defer, or request the required authority before claiming governed readiness.

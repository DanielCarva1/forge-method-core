schema_version: "0.1"
policy: "operation_executor_repair_cli_boundary"
status: "active"
summary: "Forge exposes a narrow CLI repair command for rebuilding the effect target metadata index from committed WAL records, without introducing a broad doctor workflow or hidden automatic repair loop."
canonical_terms:
  rebuild_effect_index_command: "CLI command that invokes the store metadata rebuild API and renders structured JSON for agents/adapters."
  repair_cli: "Operational CLI surface for explicit repair actions whose authority remains in store/runtime code."
decision:
  selected_option: "narrow_rebuild_effect_index_cli"
  command:
    name: "forge-core rebuild-effect-index"
    default_wal: ".forge-method/wal/effects.ndjson"
    default_index: ".forge-method/index/effect-targets.ndjson"
    default_lock: ".forge-method/locks/effects.lock"
    json_flag: "--json"
  rejected_options:
    - id: "wait_for_full_doctor"
      reason: "Adapters need a stable operational entrypoint before a larger doctor protocol exists."
    - id: "automatic_rebuild_inside_execute_operation"
      reason: "Would hide repair work in the normal execution path and complicate failure semantics."
    - id: "manual_file_copy_instruction"
      reason: "Would push recovery back into host-agent improvisation and chat instructions."
rules:
  - id: "cli_orchestrates_store_repair"
    rule: "The CLI may parse args and render results, but rebuild authority stays in forge-core-store."
  - id: "json_primary"
    rule: "The command must support structured JSON output suitable for agents and adapters."
  - id: "failed_repair_exits_nonzero"
    rule: "Failed rebuild exits nonzero; noop and rebuilt statuses exit zero."
  - id: "no_dedupe_or_truncate"
    rule: "The command must not dedupe, truncate, compact, or delete index files until a separate index compaction boundary is closed."
  - id: "no_raw_content"
    rule: "The command output must not contain raw payload content."
evidence_basis:
  - policy_ref: "contracts/policies/thin-cli-validation-surface-boundary.yaml"
    supports: "Forge CLI should orchestrate typed library behavior and expose JSON as the primary machine surface."
  - source_id: "opendev_terminal_agents_2603_05344"
    supports: "Terminal-native agents benefit from strict controls and structured feedback."
  - source_id: "code_as_agent_harness_2605_18747"
    supports: "Harness infrastructure should expose executable and inspectable behavior."
  - source_id: "rust_api_guidelines_official"
    supports: "Public APIs should expose typed data rather than presentation-coupled behavior."
  - source_id: "harnessfix_trace_guided_2606_06324"
    supports: "Scoped repair operators should be explicit and validated against trace evidence."
implementation_refs:
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - "forge-core rebuild-effect-index accepts --root, --wal, --index, --lock, --recorded-at, and --json."
  - "Library function run_rebuild_effect_index calls forge-core-store rebuild with lock."
  - "Binary JSON output reports status, rebuilt_records, appended_records, records, reasons, and diagnostics."
  - "Failed rebuild exits nonzero; noop/rebuilt exit zero."
  - "Tests prove CLI rebuild output omits raw payload content."
inference_boundary: "The evidence supports a narrow repair command for adapters. It does not prove a full doctor workflow, automatic background repair, or index dedupe/truncation semantics."
failure_modes_prevented:
  - "Adapters know a store API exists but have no stable command to invoke."
  - "Agents repair index loss by manually editing files."
  - "Repair output becomes unstructured text that later agents misread."
next_boundary:
  id: "sigstore_fulcio_certificate_identity_boundary"
  question: "How should Forge verify Fulcio certificate chain, certificate identity extensions, expected OIDC issuer, and workflow identity selectors against the trusted-root policy without treating policy validation as cryptographic proof?"

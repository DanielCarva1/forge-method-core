schema_version: "0.1"
policy: "host_adapter_manifest_projection_boundary"
status: "active"
summary: "Host-specific projections for MCP tools, borrowed-shell command surfaces, and app UI are generated from the Rust host-adapter manifest and are explicitly non-authoritative."
canonical_terms:
  host_adapter_projection: "Derived host-facing command metadata generated from HostAdapterManifest for a specific transport or UI surface."
  mcp_tool_projection: "Projection that maps Forge command metadata to MCP-style tool names, input schemas, and tool annotations."
  borrowed_shell_projection: "Projection that maps Forge command metadata to argv-shaped CLI invocation metadata without shell strings."
  app_ui_projection: "Projection that maps Forge command metadata to UI grouping, confirmation, and authority badge metadata."
decision:
  selected_option: "derived_projection_with_preserved_authority_classes"
  rejected_options:
    - id: "projection_as_new_authority"
      reason: "Would let MCP, IDE, app, or borrowed-shell metadata diverge from Rust manifest authority."
    - id: "raw_shell_command_projection"
      reason: "Would turn host projection into shell-string execution guidance and increase local-runtime risk."
    - id: "mcp_only_projection"
      reason: "Would ignore Codex, Cursor, Claude, opencode, VS Code, pi.dev, app, and daemon surfaces that need the same authority metadata."
rules:
  - id: "projection_is_derived"
    rule: "Every host projection is derived from HostAdapterManifest."
  - id: "projection_not_authoritative"
    rule: "Projection output must set projection_authoritative=false."
  - id: "preserve_core_classes"
    rule: "Projection must preserve command_kind, mutation_class, authority_class, safe_auto_invocation_triggers, and output_treatment."
  - id: "mcp_annotations_are_hints"
    rule: "MCP annotations may mirror read-only/destructive/idempotent hints, but they do not replace Forge contract validation or command admission."
  - id: "no_shell_string_projection"
    rule: "Borrowed-shell projection must expose argv-shaped metadata, not shell command strings."
  - id: "mutating_commands_conservative"
    rule: "Mutating operation projections must require explicit invocation or confirmation and must not be auto-invoked."
evidence_basis:
  - source_id: "mcp_tools_spec"
    supports: "MCP tools are schema-backed capabilities with metadata suitable for projection."
  - source_id: "mcp_tool_annotations_2603"
    supports: "Tool annotations are useful hints for clients but are advisory and should not be treated as authorization."
  - source_id: "a2a_protocol"
    supports: "Agent interoperability uses discovery metadata while preserving application-local semantics."
  - source_id: "agent_protocol_taxonomy_2606_19135"
    supports: "Discovery, schema, payload, and interaction state are separable protocol dimensions."
  - source_id: "openai_agents_sdk"
    supports: "Agent systems expose tools/handoffs/guardrails as separate surfaces rather than one prompt-only control plane."
  - source_id: "local_llm_agents_vulnerable_runtimes_2606_21071"
    supports: "Local agent runtimes need strict tool dispatch and process-execution boundaries."
  - source_id: "code_as_agent_harness_2605_18747"
    supports: "Harness behavior should be executable, inspectable, and stateful."
implementation_refs:
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - "forge-core host-adapter-projection --target mcp_tools --json emits projection_authoritative=false."
  - "MCP projection includes inputSchema and annotations for every manifest command."
  - "execute-operation projects readOnlyHint=false, destructiveHint=true, and no safe auto-invocation."
  - "query-effect-index projects readOnlyHint=true and destructiveHint=false."
  - "borrowed_shell projection emits argv_prefix metadata rather than shell strings."
  - "app_ui projection emits confirmation_required=true for mutating operations."
inference_boundary: "The evidence supports derived schema/tool/UI projections. It does not yet prove a safe MCP server, installer, daemon, or host package runtime; those require a separate local-process security boundary."
failure_modes_prevented:
  - "MCP tool metadata diverges from Forge command authority."
  - "IDE/app labels hide that a command is mutating."
  - "Borrowed-shell projection gives the host a raw shell string to execute."
  - "Client-side readOnly/destructive hints are mistaken for Forge authorization."
next_boundary:
  id: "sigstore_fulcio_certificate_identity_boundary"
  question: "How should Forge verify Fulcio certificate chain, certificate identity extensions, expected OIDC issuer, and workflow identity selectors against the trusted-root policy without treating policy validation as cryptographic proof?"

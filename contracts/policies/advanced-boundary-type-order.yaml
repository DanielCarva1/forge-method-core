schema_version: "0.1"
policy: "advanced_boundary_type_order"
status: "accepted"
purpose: "Define the Rust/Serde implementation order for advanced boundary contracts after request/effect types."
decision:
  selected_strategy: "decision_close_then_runtime_handoff_then_health_recovery_then_coordination_eval"
  implementation_order:
    - stage: "decision_close_contract"
      reason: "Decision close governs phase transition, route change, spec lock, handoff close, and release-readiness authority. Without it, host agents can still convert chat momentum into durable project authority."
      acceptance:
        - "DecisionCloseContract fixtures deserialize through Rust/Serde."
        - "Closed decisions requiring grill must have grill_contract_ref and grill_result evidence."
        - "Blocked decisions must have blocked_reason and closed_at null."
    - stage: "runtime_handoff_contract"
      reason: "Cross-runtime handoff should only be suggestible after decision authority, gates, requests, and effects can be referenced safely."
      acceptance:
        - "Runtime identity and capability evidence deserialize."
        - "Double gate rejects missing registry or missing capability evidence."
    - stage: "health_recovery_contract"
      reason: "Health recovery depends on typed claims, requests, and handoff/recovery actions; it should not become a vague heartbeat log."
      acceptance:
        - "Runtime status, anomaly, evidence, request ref, claim ref, and recovery action deserialize."
        - "Stalled/crashed cases validate without turning TTL into silent release."
    - stage: "coordination_eval_contract"
      reason: "Evals should assess typed coordination behavior after the boundary families they evaluate exist."
      acceptance:
        - "Coordination eval dimensions deserialize."
        - "Eval fixtures cover duplicate work, lane collision, stale claim recovery, read/write repair, request lifecycle, integration gate, runtime handoff, destructive effect safety, and human guidance recovery."
  rejected_strategies:
    - id: "eval_first"
      reason: "Eval contracts would evaluate behavior whose typed contract surfaces are not implemented yet."
    - id: "runtime_handoff_first"
      reason: "Handoff suggestion is a decision boundary and should not precede typed decision-close authority."
    - id: "health_recovery_first"
      reason: "Recovery needs typed claim/request/effect context and can reuse decision/handoff boundaries once available."
rules:
  - id: "decision_close_before_more_autonomy"
    rule: "DecisionCloseContract is implemented before additional runtime handoff, recovery, or eval contracts."
  - id: "advanced_boundaries_use_existing_refs"
    rule: "Advanced boundary contracts reference existing claim, completion, gate, request, effect, operation, and evidence surfaces rather than embedding them."
  - id: "evals_follow_contract_behavior"
    rule: "Coordination evals are typed after the behaviors they measure have contract surfaces and validation rules."
evidence_basis:
  direct_patterns:
    - source_id: "langgraph_hitl"
      supports: "Durable human checkpoints should explicitly approve, edit, reject, or respond around high-risk decisions."
    - source_id: "mixed_initiative_aaai_2025"
      supports: "Human-agent collaboration needs dynamic control handoff and appropriate reliance."
    - source_id: "trustworthy_lma_raci"
      supports: "Accountability and responsibility assignment are core to trustworthy LLM-based multi-agent SE."
    - source_id: "llm_as_code_2606_15874"
      supports: "Branching, sequencing, and stopping should be executable harness behavior rather than model improvisation."
    - source_id: "code_as_agent_harness_2605_18747"
      supports: "Harness state, execution, and verification should be inspectable and stateful."
    - source_id: "a2a_protocol"
      supports: "Cross-agent/runtime interoperability needs explicit identity and payload boundaries."
    - source_id: "agentops_survey_2508_02121"
      supports: "Agent systems need typed monitoring, anomaly, and recovery concerns."
    - source_id: "cooperbench_2601_13295"
      supports: "Collaborative coding needs coordination-specific evaluation beyond final task success."
  inference_boundary: "The sources support typed decision checkpoints, handoff boundaries, recovery, and coordination evals. Forge's exact order is inferred from local contract dependencies and observed host-agent drift failures."
failure_modes_prevented:
  - "agent closes phase or release from stale next_action"
  - "runtime handoff is suggested without decision authority or capability evidence"
  - "claim TTL becomes silent release instead of typed recovery"
  - "evals claim team readiness before boundary behavior exists"

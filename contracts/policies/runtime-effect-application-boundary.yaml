schema_version: "0.1"
policy: "runtime_effect_application_boundary"
status: "accepted"
purpose: "Define the first real filesystem application boundary for ToolEffectContract writes after transaction readiness: store applies file-backed create/write/append/delete effects using materialized payload hashes, freshness checks, temp replacement, and process-local rollback."
decision:
  selected_strategy: "store_owned_file_effect_application_with_process_local_rollback"
  store_api:
    - "apply_file_effect_transaction(root: impl AsRef<Path>, effect: &ToolEffectContractDocument, payloads: &[EffectApplicationPayload]) -> EffectApplicationResult"
  store_owns:
    - "materialized payload hash validation"
    - "repo-relative path validation"
    - "file-backed read expected_hash checks"
    - "file-backed write expected_hash checks"
    - "create target absence checks"
    - "write/delete target presence checks"
    - "overwrite expected-hash requirement for write access mode"
    - "append by reading current content and replacing with content plus payload"
    - "temp-file write in the destination directory"
    - "sync_all on temp payload before replacement"
    - "backup/replace application and in-process rollback on later write failure"
  store_does_not_do:
    - "claim crash-durable multi-file transactions"
    - "coordinate concurrent writers"
    - "resolve non-file-backed state keys, globs, or completion ids"
    - "invent payload content"
    - "interpret command output as pass/fail"
    - "record WAL entries"
rules:
  - id: "payload_hash_required"
    rule: "Every non-delete payload must carry content_hash, and store must recompute sha256 before application."
  - id: "repo_relative_only"
    rule: "Application paths must be repo-relative and reject absolute paths, root components, prefixes, and parent-directory components."
  - id: "file_backed_targets_only"
    rule: "The first application boundary supports file_path, artifact_id, evidence_id, ledger_stream, and request_stream targets only."
  - id: "read_freshness_if_hash_present"
    rule: "File-backed read_set entries with expected_hash must match current file content before any write."
  - id: "overwrite_freshness_required"
    rule: "AccessMode::Write requires expected_hash and blocks if current content differs."
  - id: "create_must_not_exist"
    rule: "AccessMode::Create blocks when the target already exists."
  - id: "delete_must_exist"
    rule: "AccessMode::Delete blocks when the target is missing; destructive inverse/review policy remains ToolEffectContract validation authority."
  - id: "rollback_is_process_local"
    rule: "If a later write fails after earlier writes applied, store attempts to restore captured original bytes in reverse order."
  - id: "crash_durability_deferred"
    rule: "Power-loss/process-crash recovery and multi-file durable atomicity require a later WAL/recovery boundary."
tradeoffs:
  chosen:
    advantages:
      - "Moves Forge from planning to real controlled file effects without delegating writes to the host agent."
      - "Keeps filesystem mutation in forge-core-store instead of runtime."
      - "Prevents stale-read and stale-write mutations when expected hashes are present."
      - "Gives immediate rollback coverage for ordinary apply failures."
      - "Keeps durability claims honest by deferring WAL/crash recovery."
    disadvantages:
      - "Rollback does not protect against process crash between writes."
      - "Concurrent writers can still race without a later claim/lock or daemon boundary."
      - "Append is implemented as read-plus-replace, not as a concurrent append primitive."
      - "Non-file projections such as state keys and completion ids are not applied here."
  rejected:
    - id: "runtime_applies_files"
      reason: "Would collapse the runtime/store boundary and make execution policy responsible for persistence."
    - id: "direct_fs_write_without_temp"
      reason: "Risks partial writes and makes rollback harder."
    - id: "claim_full_acid_now"
      reason: "Current implementation lacks WAL, directory fsync, concurrent writer serialization, and crash recovery."
    - id: "host_agent_repairs_failed_write"
      reason: "Would push rollback back into prose and recreate the drift bug class."
acceptance:
  store:
    - "EffectApplicationPayload exists with target_ref, content, and content_hash."
    - "apply_file_effect_transaction applies create/write/append when freshness and payload hashes pass."
    - "apply_file_effect_transaction blocks stale reads before writing."
    - "apply_file_effect_transaction rolls back already-applied writes if a later write fails."
  validation:
    - "cargo test -p forge-core-store"
    - "cargo test --workspace"
    - "cargo clippy --workspace -- -D warnings"
evidence_basis:
  direct_patterns:
    - source_id: "cordon_semantic_transactions_2606_17573"
      supports: "Agent side effects need staged validation, commit boundaries, rollback, and audit."
    - source_id: "failure_atomic_updates_fast15"
      supports: "Multi-file failure atomicity requires explicit filesystem/transaction support; ordinary writes are not enough."
    - source_id: "rust_file_sync_all_official"
      supports: "Temp payload writes should sync file data and metadata before replacement."
    - source_id: "aries_wal_1992"
      supports: "Crash recovery and partial rollback require durable WAL-style records."
    - source_id: "storm_state_management_2605_20563"
      supports: "Write-time consistency checks should mediate shared-state mutations."
    - source_id: "rac_2605_03409"
      supports: "Rollback and compensation should be explicit runtime data, not replanning from chat."
  inference_boundary: "The evidence supports staged file-effect application, freshness checks, and honest durability boundaries. Forge's first implementation provides process-local rollback and temp replacement, not full ACID or crash recovery."
failure_modes_prevented:
  - "agent writes files from prose without payload hash"
  - "stale read state produces a write"
  - "overwrite happens without expected hash"
  - "create silently overwrites an existing artifact"
  - "later write failure leaves earlier writes applied without rollback attempt"
  - "Forge claims crash-safe multi-file transaction without WAL"
next_boundary:
  id: "runtime_effect_wal_compaction_and_locking_boundary"
  question: "After WAL recovery exists, how should Forge compact WAL records and serialize concurrent file-effect writers without requiring a daemon too early?"

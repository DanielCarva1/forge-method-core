schema_version: "0.1"
policy: "validator_library_migration_boundary"
status: "accepted"
purpose: "Define the first migration boundary from the legacy forge-contract-validator binary into reusable Rust validation library code."
decision:
  selected_strategy: "typed_diagnostics_library_first"
  first_library_crate: "forge-core-validate"
  migrate_first:
    - "ValidationReport and typed Diagnostic records."
    - "Evidence registry source id uniqueness and required source metadata."
    - "Inventory family uniqueness, evidence ref checks, policy refs presence, and schema/instance metadata shape that does not require filesystem traversal."
    - "Command contract safety checks that depend on typed command fields."
    - "Operation contract authority/control sanity checks that depend on typed operation fields, including effect refs for allowed mutating operations."
    - "Pure cross-file reference checks that receive a ReferenceIndex from adapters and resolve expected ReferenceKind values."
  keep_in_legacy_binary_temporarily:
    - "Repository filesystem traversal."
    - "Legacy side-contract family checks not yet represented as Rust structs."
    - "Human-readable stdout summary."
  migrated_to_store_boundary:
    - "Filesystem-backed ReferenceIndex construction through forge-core-store."
  rejected_strategies:
    - id: "migrate_binary_wholesale"
      reason: "Would move string-based traversal into a library before type boundaries are mature."
    - id: "leave_validator_binary_until_all_types_done"
      reason: "Would delay reusable diagnostics and keep validation coupled to CLI output."
    - id: "filesystem_first_library"
      reason: "Would make validation hard to reuse from app/MCP/daemon before pure typed rules exist."
rules:
  - id: "library_returns_data"
    rule: "forge-core-validate returns ValidationReport data; rendering belongs to CLI/binary adapters."
  - id: "pure_rules_before_repo_traversal"
    rule: "Rules that only need typed structs move before filesystem traversal rules."
  - id: "legacy_binary_can_coexist"
    rule: "The old binary may continue as compatibility and filesystem validator while library coverage grows."
  - id: "no_python_validation"
    rule: "Validation library tests and acceptance run through Cargo."
implementation_target:
  crate_refs:
    - "crates/forge-core-validate/Cargo.toml"
    - "crates/forge-core-validate/src/lib.rs"
    - "crates/forge-core-validate/tests/current_contracts.rs"
  acceptance:
    - "Current evidence registry validates with no errors."
    - "Current inventory lock validates with no errors when checked against current evidence registry."
    - "Current command contract instance validates with no errors."
    - "All current operation fixtures validate with no errors after Rust deserialization."
    - "Current v0 authority refs validate through ReferenceIndex without repository traversal inside semantic validators."
implementation_evidence:
  crate_refs:
    - "crates/forge-core-validate/src/lib.rs"
    - "crates/forge-core-validate/tests/current_contracts.rs"
  policy_refs:
    - "contracts/policies/typed-cross-file-reference-validation-boundary.yaml"
    - "contracts/policies/filesystem-reference-index-adapter-boundary.yaml"
    - "contracts/policies/thin-cli-validation-surface-boundary.yaml"
    - "contracts/policies/legacy-validator-parity-retirement-boundary.yaml"
    - "contracts/policies/generic-yaml-evidence-ref-validation-boundary.yaml"
    - "contracts/policies/legacy-validator-parity-matrix-boundary.yaml"
    - "contracts/policies/generic-known-ref-validation-boundary.yaml"
    - "contracts/policies/schema-enum-parity-boundary.yaml"
    - "contracts/policies/legacy-stdout-compatibility-boundary.yaml"
    - "contracts/policies/legacy-validator-retirement-policy-boundary.yaml"
  validation:
    - "cargo test -p forge-contract-validator"
    - "cargo test -p forge-core-validate validates_current_cross_file_references_with_pure_index"
    - "cargo test -p forge-core-validate typed_reference_validation_reports_missing_and_wrong_kind"
    - "cargo test -p forge-core-store"
    - "cargo test -p forge-core-cli"
    - "cargo test -p forge-core-store store_collects_validation_yaml_documents_for_source_id_checks"
    - "cargo test -p forge-core-store store_known_paths_satisfy_current_generic_known_refs"
    - "cargo test -p forge-core-validate yaml_source_id_validation_reports_unknown_sources"
    - "cargo test -p forge-core-validate yaml_known_repo_ref_validation_reports_missing_refs"
    - "cargo test -p forge-contract-validator enum"
    - "cargo test -p forge-contract-validator legacy_validator_and_forge_core_cli_both_pass_current_repo"
    - "cargo run -p forge-core-cli -- validate --root . --json"
evidence_basis:
  direct_patterns:
    - source_id: "schema_first_tool_apis_2603_13404"
      supports: "Structured validation diagnostics are part of schema-backed interface governance."
    - source_id: "code_as_agent_harness_2605_18747"
      supports: "Harness infrastructure should be executable, inspectable, and verification-oriented."
    - source_id: "policy_first_control_2603_18059"
      supports: "Policy decisions and traces should be structured lifecycle artifacts."
    - source_id: "rust_api_guidelines_official"
      supports: "Rust APIs should expose predictable typed data rather than presentation-coupled behavior."
  inference_boundary: "The sources support typed validation and structured diagnostics. Forge's exact first migration boundary follows the contracts already implemented as Rust types."
failure_modes_prevented:
  - "validator remains a println-only binary"
  - "filesystem traversal and output formatting block reuse from app or MCP"
  - "string-based legacy validation becomes the new Rust architecture"
  - "diagnostics cannot be consumed by agents or compact views"

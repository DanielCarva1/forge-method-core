schema_version: "0.1"
policy: "legacy_validator_parity_matrix_boundary"
status: "accepted"
purpose: "Define the coverage matrix and proof threshold for wrapping or retiring forge-contract-validator in favor of forge-core-cli."
decision:
  selected_strategy: "matrix_first_overlap_tests_then_wrapper_decision"
  retirement_status: "not_allowed_without_deprecation_release"
  wrapper_status: "allowed_as_compatibility_wrapper"
  proven_overlap:
    - id: "current_repo_passes_both"
      legacy_area: "current full repo validation pass"
      new_authority: "forge-core-cli validate"
      proof: "cargo test -p forge-contract-validator"
    - id: "recursive_source_id_failure"
      legacy_area: "recursive source_id unknown ref failure"
      new_authority: "forge-core-store document collection plus forge-core-validate source_id rules"
      proof: "cargo test -p forge-contract-validator"
  remaining_matrix_items:
    - id: "generic_known_ref_file_checks"
      legacy_area: "check_optional_file_ref, check_sequence_file_refs, check_known_ref, and related policy/migration references"
      status: "resolved_by_generic_known_ref_validation_boundary"
      required_proof: "cargo test -p forge-contract-validator legacy_validator_and_forge_core_cli_both_reject_missing_policy_ref"
    - id: "schema_enum_parity"
      legacy_area: "schema enum_set based checks"
      status: "resolved_by_schema_enum_parity_boundary"
      required_proof: "cargo test -p forge-contract-validator enum"
    - id: "legacy_stdout_summary_contract"
      legacy_area: "rust_contract_validation_passed stdout fields used by scripts"
      status: "resolved_by_legacy_stdout_compatibility_boundary"
      required_proof: "cargo test -p forge-contract-validator legacy_validator_and_forge_core_cli_both_pass_current_repo"
    - id: "remaining_generic_policy_refs"
      legacy_area: "generic refs in policy and migration YAML not modeled by typed contract families"
      status: "resolved_by_generic_known_ref_validation_boundary"
      required_proof: "cargo test -p forge-core-store store_known_paths_satisfy_current_generic_known_refs"
rules:
  - id: "no_wrapper_until_remaining_matrix_is_closed"
    rule: "forge-contract-validator may wrap forge-core-cli only after every remaining_matrix_item is resolved."
  - id: "every_retired_check_needs_reason"
    rule: "A legacy check can be removed only when a policy names why it is obsolete, redundant, or intentionally replaced."
  - id: "parity_tests_live_with_legacy_binary"
    rule: "Overlap tests that execute forge-contract-validator should live in the forge-contract-validator crate while it exists."
  - id: "new_cli_json_is_future_surface"
    rule: "forge-core-cli JSON remains the future machine surface even while legacy stdout compatibility is audited."
implementation_evidence:
  crate_refs:
    - "crates/forge-contract-validator/tests/parity.rs"
  validation:
    - "cargo test -p forge-contract-validator"
evidence_basis:
  direct_patterns:
    - source_id: "utboost_2025_acl"
      supports: "Validation adequacy requires targeted tests that expose false pass conditions."
    - source_id: "agentless_fse_2025"
      supports: "Constrained baselines help prevent overclaiming new agent/system machinery."
    - source_id: "code_as_agent_harness_2605_18747"
      supports: "Harness verification should be executable and inspectable."
    - source_id: "policy_first_control_2603_18059"
      supports: "Policy transitions should be traceable through stable evidence."
  inference_boundary: "The evidence supports proving parity before retirement. The specific matrix items are derived from local source comparison between forge-contract-validator and forge-core-cli."
failure_modes_prevented:
  - "legacy validator is deleted while still catching unique failures"
  - "green current-repo checks are mistaken for negative-case parity"
  - "stdout compatibility breaks existing scripts without migration decision"
  - "schema enum and generic ref checks disappear silently"
next_boundary:
  id: "rust_runtime_execution_boundary"
  question: "After validation and compatibility are stabilized, which Rust runtime execution boundary should be implemented next without recreating the old giant Python runtime?"

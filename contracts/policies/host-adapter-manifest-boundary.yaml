schema_version: "0.1"
policy: "host_adapter_manifest_boundary"
status: "active"
summary: "Forge Core exposes a typed host-adapter manifest generated from Rust command metadata so borrowed-shell adapters can discover command authority, mutation behavior, and safe invocation triggers without duplicating rules."
canonical_terms:
  host_adapter_manifest: "Machine-readable capability and authority map emitted by Forge Core for Codex, Cursor, Claude, opencode, VS Code, pi.dev, MCP, daemon, app, and custom adapters."
  borrowed_shell_adapter: "External host surface that calls Forge Core but must not redefine Forge runtime authority."
  command_authority_class: "Closed classification that tells an adapter whether a command has no workflow authority, requires OperationContract authority, or is operational maintenance only."
  mutation_class: "Closed classification that tells an adapter whether a command is read-only, append-only operational repair, or mutating product/runtime operation."
decision:
  selected_option: "rust_generated_manifest"
  rejected_options:
    - id: "per_adapter_docs"
      reason: "Would repeat authority rules across Codex, Cursor, Claude, opencode, VS Code, pi.dev, MCP, daemon, and app surfaces."
    - id: "mcp_schema_as_source_of_truth"
      reason: "MCP/tool metadata is useful for projection, but local Forge governance must stay in Rust command metadata and validated contracts."
    - id: "markdown_help_as_manifest"
      reason: "Markdown help is not enforceable authority and can degrade agent behavior through stale prose."
rules:
  - id: "rust_metadata_is_manifest_authority"
    rule: "The host-adapter manifest is generated by Rust code from Forge Core command metadata."
  - id: "adapters_preserve_classes"
    rule: "Adapters must preserve command_kind, mutation_class, authority_class, required_contracts, safe_auto_invocation_triggers, and output_treatment when projecting to host-specific surfaces."
  - id: "mutating_operation_not_auto_invoked"
    rule: "Commands with mutation_class=mutating_operation must not have safe_auto_invocation_triggers."
  - id: "operation_contract_required_for_mutation"
    rule: "execute-operation is the only current mutating operation path and requires OperationContract plus referenced CommandContract/ToolEffectContract inputs."
  - id: "advisory_context_not_workflow_authority"
    rule: "Read-only/advisory commands may support evidence discovery, diagnostics, or handoff preparation but cannot create next action, phase transition, completion, or release authority."
  - id: "projection_not_governance"
    rule: "MCP, A2A, IDE, CLI, daemon, or app projections may expose the manifest, but projections do not become the source of truth."
evidence_basis:
  - source_id: "mcp_tools_spec"
    supports: "Host tools should be schema-backed capabilities with metadata."
  - source_id: "mcp_tool_annotations_2603"
    supports: "Tool metadata can inform clients but must remain advisory, not complete authorization."
  - source_id: "a2a_protocol"
    supports: "Interoperability across opaque agent applications should not replace local governance."
  - source_id: "agent_protocol_taxonomy_2606_19135"
    supports: "Agent protocols need explicit discovery, payload, state, and schema boundaries."
  - source_id: "natural_language_agent_harnesses_2603_25723"
    supports: "Harness behavior should be portable explicit artifacts with lightweight adapters."
  - source_id: "code_as_agent_harness_2605_18747"
    supports: "Agent harness behavior should be executable, inspectable, stateful, and verifiable."
  - source_id: "cordon_semantic_transactions_2606_17573"
    supports: "Tool-using agents need runtime containment boundaries for commit, rollback, recovery, and audit."
  - source_id: "local_llm_agents_vulnerable_runtimes_2606_21071"
    supports: "Local agent runtimes need explicit analysis of tool dispatch, permissions, shell, and process execution surfaces."
implementation_refs:
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - "forge-core host-adapter-manifest --json emits schema_version, manifest_id, supported runtime kinds, authority boundary, and commands."
  - "Manifest includes validate, execute-operation, rebuild-effect-index, query-effect-index, and host-adapter-manifest."
  - "execute-operation is classified as mutating_operation and requires_operation_authority with no safe auto-invocation triggers."
  - "query-effect-index is classified as read_only and no_workflow_authority with evidence_discovery, diagnostics, and handoff_preparation triggers."
  - "Tests assert manifest command authority and JSON output."
inference_boundary: "The evidence supports schema-backed discovery and runtime-owned authority metadata. It does not prove that every host will obey the manifest; non-cooperating hosts still need adapter hardening, MCP/server projection, and conformance tests."
failure_modes_prevented:
  - "Codex, Cursor, Claude, or another host auto-runs a mutating command from chat momentum."
  - "A host adapter strips the fact that query-effect-index is advisory-only."
  - "MCP tool metadata becomes a second, divergent authority source."
  - "Markdown help drifts away from actual command authority."
next_boundary:
  id: "sigstore_fulcio_certificate_identity_boundary"
  question: "How should Forge verify Fulcio certificate chain, certificate identity extensions, expected OIDC issuer, and workflow identity selectors against the trusted-root policy without treating policy validation as cryptographic proof?"

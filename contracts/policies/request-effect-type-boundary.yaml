schema_version: "0.1"
policy: "request_effect_type_boundary"
status: "accepted"
purpose: "Define the Rust/Serde boundary between durable coordination requests and tool side-effect records."
decision:
  selected_strategy: "request_is_coordination_message_effect_is_tool_side_effect"
  request_contract_owns:
    - "communication performative, sender, receiver, thread, correlation, and reply identity"
    - "target identity for the requested coordination act"
    - "payload refs, dependency refs, response policy, lifecycle status, and append-only storage"
    - "safety fields that prevent requests from mutating integration state directly"
  tool_effect_contract_owns:
    - "effect kind and operation ref"
    - "actor, read_set, write_set, conflict detection, notification policy, and repair policy"
    - "inverse or compensation metadata for destructive writes"
    - "validation gates required before automatic inverse or repair"
  explicit_links:
    - "Requests may depend on tool effects through payload.dependency_refs."
    - "Tool effects may notify via request refs rather than embedding request payloads."
    - "Operations reference both families through explicit side-contract refs."
  rejected_strategies:
    - id: "single_coordination_event_contract"
      reason: "Would overload communication lifecycle and tool mutation safety into one broad contract, recreating prompt/prose drift in YAML."
    - id: "effect_embeds_request"
      reason: "Would make tool logs carry coordination authority and complicate append-only request lifecycle."
    - id: "request_embeds_effect"
      reason: "Would let coordination messages hide read/write/inverse policy and bypass effect validation."
rules:
  - id: "request_is_append_only"
    rule: "A RequestContract records coordination intent and response expectations; it cannot mutate integration state directly."
  - id: "effect_is_side_effect"
    rule: "A ToolEffectContract records or proposes side effects and must expose read/write sets and repair metadata."
  - id: "destructive_effect_requires_inverse_or_review"
    rule: "Delete-like or destructive writes require complete inverse metadata or a stop path with block, driver review, or human review."
  - id: "refs_not_nested_authority"
    rule: "Request/effect coordination uses stable refs; neither contract embeds the other's authority body."
  - id: "strict_rust_shape"
    rule: "Authority-bearing request/effect structs use deny_unknown_fields and closed enums where the taxonomy is owned by the contract."
implementation_evidence:
  crate_refs:
    - "crates/forge-core-contracts/src/request.rs"
    - "crates/forge-core-contracts/src/tool_effect.rs"
    - "crates/forge-core-validate/src/lib.rs"
    - "crates/forge-core-contracts/tests/load_current_contracts.rs"
    - "crates/forge-core-validate/tests/current_contracts.rs"
  fixtures:
    - "contracts/requests/*.yaml"
    - "contracts/effects/*.yaml"
  validation:
    - "cargo test -p forge-core-contracts --test load_current_contracts deserializes_request_and_effect_instances"
    - "cargo test -p forge-core-validate"
evidence_basis:
  direct_patterns:
    - source_id: "communication_centric_llm_mas_2502_14321"
      supports: "Agent coordination benefits from explicit communication goals, protocol structure, payloads, lifecycle, and security boundaries."
    - source_id: "agent_protocol_taxonomy_2606_19135"
      supports: "Agent protocols should distinguish counterparty, payload, interaction state, discovery, and schema flexibility."
    - source_id: "agentscope_2402_14034"
      supports: "Robust multi-agent systems need explicit message exchange and fault-tolerant coordination mechanics."
    - source_id: "coagent_2606_15376"
      supports: "Concurrent agent work needs read/write conflict notification and repair rather than blind abort or untyped overwrite."
    - source_id: "rac_2605_03409"
      supports: "Tool side effects need explicit compensation/recovery metadata for long-running agent workflows."
    - source_id: "owasp_llm06_excessive_agency"
      supports: "High-impact tool actions need constrained authority and independent verification or approval."
    - source_id: "policy_first_control_2603_18059"
      supports: "Policy decisions and traces should be joinable through stable ids at lifecycle boundaries."
  inference_boundary: "The sources support structured communication, typed side-effect policy, compensation, and lifecycle control. Forge's product-specific inference is to use RequestContract as the durable coordination message and ToolEffectContract as the side-effect safety record, linked by refs instead of merged."
failure_modes_prevented:
  - "chat message becomes state authority without typed request lifecycle"
  - "tool effect mutates files without read/write/inverse policy"
  - "destructive write proceeds because an agent described a rollback in prose"
  - "request/effect nesting creates two competing authority surfaces"
  - "host agent writes the next step into Forge state instead of appending a driver-reviewed request"

schema_version: "0.1"
policy: "sigstore_rfc3161_tsa_token_boundary"
status: "active"
summary: "Forge Core verifies RFC3161 TSA timestamp tokens offline by validating TSTInfo message imprint against timestamped signature bytes, CMS SignedData signature, TSA certificate chain, and the resulting signing time against the Fulcio certificate validity window."
canonical_terms:
  rfc3161_timestamp_token: "DER-encoded TimeStampResp or TimeStampToken ContentInfo whose SignedData encapsulates TSTInfo."
  timestamped_signature_bytes: "The exact signature bytes whose digest is recorded in TSTInfo.messageImprint."
  tsa_certificate_chain: "Policy-declared TSA certificates used as signer candidates, intermediates, and trusted root material for RFC3161 verification."
decision:
  selected_option: "sigstore_tsa_offline_verifier"
  rejected_options:
    - id: "manual_cms_parser_now"
      reason: "CMS SignedData, signed attributes, signer certificate selection, and TSA EKU validation are easy to under-verify when hand-rolled."
    - id: "network_tsa_client_in_runtime"
      reason: "Install/update verification needs offline, deterministic validation of existing evidence, not live timestamp issuance."
    - id: "token_parse_without_chain"
      reason: "Parsing TSTInfo and genTime without validating CMS signature and TSA chain would recreate presence-only authority."
rules:
  - id: "read_only_verifier"
    rule: "The RFC3161 verifier is read-only and must not install, update, rollback, delete, write project state, or mutate artifacts."
  - id: "signature_bytes_required"
    rule: "Forge must require the timestamped signature bytes alongside the RFC3161 token; the token is invalid unless messageImprint matches those bytes."
  - id: "tsa_chain_required"
    rule: "Forge must load timestamp_authority.certificate_refs from the trusted-root policy and use them as TSA verification material."
  - id: "policy_mode_required"
    rule: "RFC3161 verification may satisfy timestamp authority only when timestamp_authority.mode is rfc3161_tsa or either."
  - id: "certificate_window_required"
    rule: "The verified RFC3161 timestamp must fall within the Fulcio certificate validity window before Forge uses it as trusted signing time."
  - id: "freshness_not_implied"
    rule: "Passing RFC3161 verification does not verify CT SCTs, revocation, TUF metadata freshness, release rollback protection, or install/update mutation authority."
evidence_basis:
  - source_id: "rfc3161_timestamp_protocol"
    supports: "A TimeStampToken is CMS SignedData over TSTInfo and clients must verify the token signature, imprint, TSA identity, and acceptable policy."
  - source_id: "rfc5652_cms"
    supports: "CMS SignedData signature verification is a distinct cryptographic boundary."
  - source_id: "sigstore_tsa_rust_crate_docs"
    supports: "The selected Rust verifier parses RFC3161 token formats and validates imprint, CMS signature, and TSA certificate chain."
implementation_refs:
  - "contracts/policies/sigstore-rfc3161-tsa-token-boundary.yaml"
  - "contracts/migration/sigstore-rfc3161-tsa-token-boundary-grill-audit.yaml"
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - "forge-core host-adapter-verify-sigstore-timestamp-authority --json returns status=passed for policy mode rfc3161_tsa when token, timestamped signature bytes, TSA chain, CMS signature, message imprint, and Fulcio validity window all pass."
  - "The verifier fails when the RFC3161 token message imprint does not match timestamped signature bytes."
  - "The verifier fails when TSA certificate refs are missing."
  - "The verifier fails when verified RFC3161 time is outside the Fulcio certificate validity window."
  - "Verifier output separates rfc3161_tsa from rekor_integrated_time and lists remaining deferred CT, revocation, TUF, and install/update checks."
inference_boundary: "This boundary verifies RFC3161 TSA token evidence for existing signature bytes. It does not request timestamps from a TSA, verify certificate transparency SCTs, check revocation, verify TUF trusted-root freshness, decide release rollback safety, mutate installations, or verify post-quantum algorithms."
failure_modes_prevented:
  - "A token file path is treated as timestamp proof."
  - "TSTInfo.genTime is trusted without CMS signature validation."
  - "A valid token for one signature is reused for another signature."
  - "A TSA certificate chain or EKU failure is hidden behind successful DER parsing."
  - "RFC3161 timestamp verification is mistaken for revocation or TUF freshness."
next_boundary:
  id: "explicit_crl_ocsp_revocation_status_boundary"
  question: "How should Forge verify explicit CRL or OCSP certificate revocation status without treating CT, Rekor, timestamp, or short-lived certificate policy evidence as CRL/OCSP evidence?"

schema_version: '0.1'
workflow_governance_policy_overlay:
  id: overlay.workflow-governance.assurance-operations-v0
  base_bundle_id: bundle.workflow-governance.core-assurance-v0
  policies:
  - id: policy.workflow.investigation
    compatibility_workflow_id: investigation
    routing:
      priority: 40
      readiness_target: execute
      activation: when_applicable
      signals: []
    eligible_phases:
    - anytime
    prerequisites: []
    obligations:
    - id: obligation.workflow.investigation.symptom-bounded
      description: The observed symptom, affected scope, reproduction boundary, and material impact are explicit.
      criticality: critical
      required_before: execute
      claim_refs:
      - claim.workflow.investigation.symptom-bounded
    - id: obligation.workflow.investigation.hypotheses-probed
      description: Competing hypotheses are tested against discriminating evidence rather than narrative plausibility.
      criticality: critical
      required_before: execute
      claim_refs:
      - claim.workflow.investigation.hypotheses-probed
    - id: obligation.workflow.investigation.conclusion-calibrated
      description: The conclusion states confidence, contrary evidence, and unresolved uncertainty without overstating causality.
      criticality: critical
      required_before: execute
      claim_refs:
      - claim.workflow.investigation.conclusion-calibrated
    - id: obligation.workflow.investigation.next-action-safe
      description: The next action is safe, owned, and proportionate to the remaining uncertainty.
      criticality: critical
      required_before: execute
      claim_refs:
      - claim.workflow.investigation.next-action-safe
    claims:
    - id: claim.workflow.investigation.symptom-bounded
      statement: The observed symptom, affected scope, reproduction boundary, and material impact are explicit.
      evaluator_ref: evaluator.workflow.investigation.symptom-bounded
      waiver:
        kind: not_waivable
    - id: claim.workflow.investigation.hypotheses-probed
      statement: Competing hypotheses are tested against discriminating evidence rather than narrative plausibility.
      evaluator_ref: evaluator.workflow.investigation.hypotheses-probed
      waiver:
        kind: not_waivable
    - id: claim.workflow.investigation.conclusion-calibrated
      statement: The conclusion states confidence, contrary evidence, and unresolved uncertainty without overstating causality.
      evaluator_ref: evaluator.workflow.investigation.conclusion-calibrated
      waiver:
        kind: not_waivable
    - id: claim.workflow.investigation.next-action-safe
      statement: The next action is safe, owned, and proportionate to the remaining uncertainty.
      evaluator_ref: evaluator.workflow.investigation.next-action-safe
      waiver:
        kind: not_waivable
    evaluators:
    - id: evaluator.workflow.investigation.symptom-bounded
      provider: repository_inspector
      accepted_evidence_kinds:
      - artifact_inspection
      minimum_strength: inspected_artifact
      minimum_passing_observations: 1
      minimum_distinct_principals: 1
      max_age_seconds: 86400
      freshness: current_only
      disproof_policy: require_uncontested_support
    - id: evaluator.workflow.investigation.hypotheses-probed
      provider: repository_inspector
      accepted_evidence_kinds:
      - artifact_inspection
      minimum_strength: inspected_artifact
      minimum_passing_observations: 1
      minimum_distinct_principals: 1
      max_age_seconds: 86400
      freshness: current_only
      disproof_policy: require_uncontested_support
    - id: evaluator.workflow.investigation.conclusion-calibrated
      provider: repository_inspector
      accepted_evidence_kinds:
      - artifact_inspection
      minimum_strength: inspected_artifact
      minimum_passing_observations: 1
      minimum_distinct_principals: 1
      max_age_seconds: 86400
      freshness: current_only
      disproof_policy: require_uncontested_support
    - id: evaluator.workflow.investigation.next-action-safe
      provider: repository_inspector
      accepted_evidence_kinds:
      - artifact_inspection
      minimum_strength: inspected_artifact
      minimum_passing_observations: 1
      minimum_distinct_principals: 1
      max_age_seconds: 86400
      freshness: current_only
      disproof_policy: require_uncontested_support
    capability_requirements:
    - id: capability.workflow.investigation.required-proof
      kind: tool
      probe_kind: local_command
      description: The required independent or executable capability for investigation is available for the exact governed
        scope.
      affected_claim_refs:
      - claim.workflow.investigation.symptom-bounded
      - claim.workflow.investigation.hypotheses-probed
      - claim.workflow.investigation.conclusion-calibrated
      - claim.workflow.investigation.next-action-safe
      resolution_options:
      - Acquire the missing qualified capability and repeat the governed checks.
      - Narrow or defer the affected scope instead of claiming unsupported readiness.
      blocks_before: execute
    decision_rules:
    - id: decision.workflow.investigation.material-gap
      activation: claim_unresolved
      claim_ref: claim.workflow.investigation.next-action-safe
      question: How should the unresolved material investigation gap constrain this release?
      reason: irreversible_risk
      alternatives:
      - id: alternative.investigation.repair
        description: Repair the gap and repeat the required verification.
        consequences:
        - Adds work while reducing unsupported risk.
      - id: alternative.investigation.reduce-scope
        description: Remove or defer the affected scope.
        consequences:
        - Reduces scope without weakening the gate.
      - id: alternative.investigation.seek-authority
        description: Seek an explicit disposition from the required authority.
        consequences:
        - Preserves accountability for any residual risk.
      recommended_alternative_ref: alternative.investigation.repair
      blocking: true
      blocks_before: execute
    advisory_playbook:
      id: playbook.workflow.investigation
      steps:
      - Bound the investigation outcome, affected surface, uncertainty, owners, and proof requirements.
      - Execute the strongest available checks, retain provenance, and surface disproof or limitations.
      - Repair, narrow, defer, or obtain the required authority before claiming execute readiness.

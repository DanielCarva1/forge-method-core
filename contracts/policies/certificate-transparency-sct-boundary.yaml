schema_version: "0.1"
policy: "certificate_transparency_sct_boundary"
status: "active"
summary: "Forge Core verifies supplied RFC6962 Signed Certificate Timestamp bytes offline against a supplied DER certificate and policy-declared raw CT log verification keys, while keeping CT inclusion proof, revocation, TUF freshness, and install/update authority out of scope."
canonical_terms:
  certificate_transparency_sct: "RFC6962 SignedCertificateTimestamp bytes returned by a CT log for a certificate or precertificate."
  ct_log_id: "32-byte RFC6962 log key id, encoded in Forge policy as hex or base64."
  ct_log_public_key: "Raw CT log verification key bytes accepted by the Rust sct verifier for this boundary."
decision:
  selected_option: "offline_sct_signature_verifier"
  rejected_options:
    - id: "presence_only_sct"
      reason: "A file path or embedded extension presence is not cryptographic evidence."
    - id: "live_ct_log_query_now"
      reason: "Online inclusion proof fetching and maximum-merge-delay auditing are separate trust and availability boundaries."
    - id: "manual_sct_parser_now"
      reason: "Hand-rolling SCT parsing and signature verification adds cryptographic risk without product value."
rules:
  - id: "read_only_verifier"
    rule: "The SCT verifier is read-only and must not install, update, rollback, delete, write project state, or mutate artifacts."
  - id: "policy_log_material_required"
    rule: "Forge must load certificate_transparency.log_ids and certificate_transparency.public_key_refs from the Sigstore trusted-root policy and fail if the two lists do not pair exactly."
  - id: "certificate_required"
    rule: "Forge must require the certificate bytes used by the SCT signature verification."
  - id: "sct_bytes_required"
    rule: "Forge must require explicit SCT byte paths for this boundary; extracting embedded certificate SCT extensions is deferred."
  - id: "timestamp_unit_required"
    rule: "Forge must pass verification time as Unix epoch milliseconds because RFC6962 SCT timestamps are millisecond values."
  - id: "freshness_not_implied"
    rule: "Passing SCT signature verification does not verify CT inclusion proof, maximum merge delay, revocation status, TUF metadata freshness, release rollback protection, or install/update mutation authority."
evidence_basis:
  - source_id: "rfc6962_certificate_transparency"
    supports: "RFC6962 defines SCTs as CT log promises and separates SCT verification from later log auditing."
  - source_id: "sigstore_fulcio_certificate_transparency_docs"
    supports: "Fulcio CT evidence is separate from Rekor artifact transparency and can be verified offline, while inclusion proof remains separate."
  - source_id: "rustls_sct_crate_docs"
    supports: "The selected Rust verifier verifies SCT signatures for supplied DER certificates against trusted log material."
implementation_refs:
  - "contracts/policies/certificate-transparency-sct-boundary.yaml"
  - "contracts/migration/certificate-transparency-sct-boundary-grill-audit.yaml"
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - "forge-core host-adapter-verify-certificate-transparency-sct --json returns status=passed when supplied SCT bytes verify against the supplied certificate and policy CT log keys."
  - "The verifier fails when the SCT log id is not present in policy."
  - "The verifier fails when the SCT timestamp is in the future relative to the supplied verification_time_unix_ms."
  - "The host adapter manifest exposes the SCT verifier as read-only validation with no workflow authority."
  - "Verifier output lists deferred embedded SCT extraction, CT inclusion proof, MMD audit, revocation, TUF freshness, and install/update authority."
inference_boundary: "This boundary verifies supplied RFC6962 SCT signatures offline for supplied certificate bytes and policy-declared raw CT log verification keys. It does not extract embedded SCT extensions, fetch CT inclusion proofs, audit maximum merge delay, check revocation, refresh TUF trusted roots, mutate installations, or decide release update authority."
failure_modes_prevented:
  - "A SCT path is treated as proof."
  - "A SCT from an unknown CT log is accepted."
  - "An SCT timestamp in the future is accepted."
  - "CT SCT verification is mistaken for revocation, TUF freshness, or update authority."
next_boundary:
  id: "explicit_crl_ocsp_revocation_status_boundary"
  question: "How should Forge verify explicit CRL or OCSP certificate revocation status without treating CT, Rekor, timestamp, or short-lived certificate policy evidence as CRL/OCSP evidence?"

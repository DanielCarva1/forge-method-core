schema_version: "0.1"
policy: "sigstore_dsse_in_toto_subject_boundary"
status: "active"
summary: "Forge Core verifies Sigstore v0.3 DSSE bundles whose payload is an in-toto statement by binding payloadType, DSSE PAE signature, in-toto subject digest, Fulcio certificate identity, and Rekor transparency evidence without claiming TSA, CT, revocation, TUF freshness, or install authority."
canonical_terms:
  sigstore_dsse_in_toto_subject_binding: "Read-only verification that a Sigstore DSSE bundle signs an in-toto statement whose subject digest matches the artifact and whose signing certificate, Fulcio identity, and Rekor evidence all bind to the same attestation."
  dsse_pae: "Dead Simple Signing Envelope pre-authentication encoding over payload type and serialized payload body."
  in_toto_statement_payload: "The exact decoded DSSE payload bytes parsed as an in-toto Statement after signature verification; Forge must not reserialize it before verifying the DSSE signature."
decision:
  selected_option: "separate_dsse_in_toto_subject_verifier"
  rejected_options:
    - id: "extend_message_signature_verifier"
      reason: "Message Signature signs an artifact digest directly; DSSE signs typed payload bytes whose subject semantics live inside the in-toto statement."
    - id: "accept_any_dsse_media_type"
      reason: "Sigstore DSSE bundles define payloadType=application/vnd.in-toto+json for in-toto statements; loose media types would blur verifier semantics."
    - id: "multi_signature_threshold_now"
      reason: "Sigstore DSSE bundle guidance requires a single signature for this bundle branch; threshold policy is a later authority boundary."
rules:
  - id: "read_only_verifier"
    rule: "The DSSE/in-toto verifier is read-only and must not install, update, rollback, delete, write project state, or mutate artifacts."
  - id: "v03_dsse_bundle_required"
    rule: "This boundary accepts application/vnd.dev.sigstore.bundle.v0.3+json bundles with dsseEnvelope content only."
  - id: "payload_type_required"
    rule: "The DSSE envelope payloadType must be application/vnd.in-toto+json."
  - id: "single_signature_required"
    rule: "The DSSE envelope must contain exactly one signature."
  - id: "pae_signature_required"
    rule: "The verifier must validate the DSSE signature over PAE(payloadType, original payload bytes) using the leaf certificate public key."
  - id: "statement_subject_digest_required"
    rule: "The decoded in-toto Statement subject must include the artifact SHA-256 digest computed by Forge."
  - id: "predicate_type_explicit"
    rule: "The verifier must report the in-toto statement predicateType and enforce expected_predicate_type when supplied."
  - id: "certificate_material_required"
    rule: "The bundle certificate rawBytes must match the provided leaf certificate used by Fulcio identity verification."
  - id: "fulcio_identity_required"
    rule: "Fulcio certificate identity verification must pass using the Rekor integrated time as the certificate validity time."
  - id: "rekor_inclusion_required"
    rule: "Rekor log entry inclusion and checkpoint verification must pass against the expected Rekor log id and public key."
  - id: "rekor_dsse_body_binding_required"
    rule: "The Rekor body must bind the DSSE payload hash, envelope hash, and signature content for the supported DSSE body shape."
  - id: "typed_output_required"
    rule: "Verifier output must include status, artifact digest, payload hash, envelope hash, signature hash, statement type, predicate type, Rekor integrated time, Fulcio status, Rekor status, reasons, verified_evidence, and inference_boundary."
evidence_basis:
  - source_id: "sigstore_bundle_format_docs"
    supports: "Sigstore bundles separate verification material from content and distinguish Message Signature from DSSE envelope attestations."
  - source_id: "dsse_protocol_spec"
    supports: "DSSE signature verification is over PAE(payloadType, serialized payload body)."
  - source_id: "intoto_statement_subject_spec"
    supports: "in-toto statement subjects identify artifact digests the attestation applies to."
  - source_id: "sigstore_go_artifact_policy"
    supports: "Artifact digest policy and certificate identity policy are distinct checks."
  - source_id: "fulcio_spec_oidc_certificate_binding"
    supports: "Fulcio certificates bind identity and public key material used for verification."
  - source_id: "sigstore_rekor_docs"
    supports: "Rekor evidence proves transparency log inclusion for signed releases."
implementation_refs:
  - "contracts/policies/sigstore-dsse-in-toto-subject-boundary.yaml"
  - "contracts/migration/sigstore-dsse-in-toto-subject-boundary-grill-audit.yaml"
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - "forge-core host-adapter-verify-sigstore-dsse-in-toto-subject --json returns status=passed for a generated v0.3 DSSE bundle whose artifact digest, in-toto subject, certificate key, Fulcio identity, and Rekor body all match."
  - "The verifier fails when payloadType is not application/vnd.in-toto+json."
  - "The verifier fails when the DSSE envelope contains zero or multiple signatures."
  - "The verifier fails when the in-toto statement subject digest does not match the artifact."
  - "The verifier fails when the Rekor DSSE body payload hash, envelope hash, or signature does not match the bundle."
  - "The host adapter manifest exposes host-adapter-verify-sigstore-dsse-in-toto-subject as read-only validation with no workflow authority."
  - "Verifier output states that Message Signature bundles, RFC3161 TSA signatures, CT SCTs, revocation, TUF freshness, policy thresholds, install/update authority, and post-quantum algorithms are outside this boundary."
geographic_coverage:
  searched_non_western_sources: true
  result: "No stronger China-origin source was found for DSSE/Sigstore/in-toto protocol semantics. The relevant authority is protocol/spec documentation. China-origin agent papers remain relevant to orchestration, not cryptographic payload verification."
inference_boundary: "This boundary verifies Sigstore v0.3 DSSE/in-toto subject binding across payloadType, DSSE PAE signature, artifact digest, in-toto statement subject, certificate signing key, Fulcio identity evidence, Rekor body, and Rekor inclusion evidence. It does not verify messageSignature bundles, RFC3161 TSA signatures, certificate transparency SCTs, revocation status, TUF metadata freshness, policy thresholds, installer mutation authority, multi-signature threshold policy, or post-quantum algorithms."
failure_modes_prevented:
  - "Agent treats a DSSE bundle file as proof without checking the in-toto subject digest."
  - "DSSE payload is parsed after being reserialized instead of verifying exact signed bytes."
  - "Message Signature and DSSE semantics collapse into one opaque bundle status."
  - "Rekor inclusion is accepted for a different DSSE payload, envelope, or signature than the bundle content."
next_boundary:
  id: "sigstore_timestamp_authority_boundary"
  question: "How should Forge verify Sigstore timestamp authority evidence, certificate validity windows, CT SCTs, revocation, and TUF freshness without overclaiming from Rekor inclusion alone?"

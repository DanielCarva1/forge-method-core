schema_version: "0.1"
policy: "runtime_handoff_type_boundary"
status: "accepted"
purpose: "Define how Forge Rust types cross-runtime handoff without becoming host-specific or trusting another runtime from prose."
decision:
  selected_strategy: "adapter_agnostic_handoff_with_registry_capability_double_gate"
  runtime_handoff_contract_owns:
    - "source and target runtime identity"
    - "task boundary and required capability"
    - "double-gate state for registry evidence and capability evidence"
    - "compact handoff payload with state version, context refs, forbidden refs, and authority refs"
    - "blocked/suggestible/requested/accepted/rejected lifecycle"
  runtime_registry_entry_owns:
    - "target runtime availability, protocol refs, capability refs, and trust policy"
    - "policy that external runtimes may not mutate Forge state directly"
    - "requirement that state changes return as requests"
  runtime_capability_owns:
    - "capability kind, protocol surface, schema ref, constraints, and safety hints"
    - "requirement that capability output becomes evidence-ref addressable"
    - "prompt-injection and unfiltered agent-card trust flags"
  rejected_strategies:
    - id: "host_specific_handoff_fields"
      reason: "Would bake Codex/Cursor/Claude/OpenCode implementation details into Forge core instead of keeping adapters thin."
    - id: "capability_from_chat"
      reason: "Would let an agent hand off because it believes another host can do the job, without registry or schema evidence."
    - id: "full_chat_context_transfer"
      reason: "Would increase drift, prompt-injection surface, and context cost while bypassing compact Forge authority refs."
rules:
  - id: "double_gate_before_suggestion"
    rule: "A runtime handoff cannot be suggestible/requested/accepted without registry_evidence_ref and capability_evidence_ref when those gates are required."
  - id: "blocked_handoff_names_missing_gate"
    rule: "A blocked runtime handoff must state blocked_reason and must be missing at least one required double-gate evidence ref."
  - id: "handoff_preserves_forge_authority"
    rule: "Handoff payload must include authority_refs; receiving runtimes obey claims, gates, requests, effects, and decision-close contracts."
  - id: "context_is_compact"
    rule: "Handoff payload passes context_refs and explicitly forbidden_context_refs; full chat history and unfiltered agent-card text are forbidden by default."
  - id: "capability_output_is_evidence"
    rule: "Runtime capabilities that receive handoffs must produce evidence-ref addressable output."
  - id: "external_runtime_no_direct_state_mutation"
    rule: "Runtime registry trust policy must prevent direct Forge state mutation and require request-based state changes."
implementation_evidence:
  crate_refs:
    - "crates/forge-core-contracts/src/runtime.rs"
    - "crates/forge-core-validate/src/lib.rs"
    - "crates/forge-core-contracts/tests/load_current_contracts.rs"
    - "crates/forge-core-validate/tests/current_contracts.rs"
  fixtures:
    - "contracts/runtimes/cursor-browser-validation-runtime.yaml"
    - "contracts/runtimes/cursor-browser-validation-missing-capability.yaml"
    - "contracts/runtimes/registry-cursor-browser-agent.yaml"
    - "contracts/runtimes/capability-browser-validation.yaml"
  validation:
    - "cargo test -p forge-core-contracts --test load_current_contracts deserializes_runtime_boundary_instances"
    - "cargo test -p forge-core-validate validates_current_runtime_boundary_instances"
evidence_basis:
  direct_patterns:
    - source_id: "a2a_protocol"
      supports: "Cross-application agent interoperability requires explicit identity and payload boundaries."
    - source_id: "mcp_tools_spec"
      supports: "Capabilities should be exposed as named schema-backed tools rather than prose."
    - source_id: "mcp_tool_annotations_2603"
      supports: "Capability/tool risk metadata is useful but advisory; it cannot replace Forge authority gates."
    - source_id: "openai_agents_handoffs"
      supports: "Handoff/delegation is a real agent orchestration pattern."
    - source_id: "langgraph_multi_agent_handoffs"
      supports: "Handoffs require explicit context engineering rather than arbitrary message transfer."
    - source_id: "agentscope_2402_14034"
      supports: "Robust multi-agent systems need explicit communication and fault-tolerant coordination mechanisms."
    - source_id: "fudan_agent4se_survey"
      supports: "SE agents need both software-engineering and multi-agent-system perspectives."
    - source_id: "agent_protocol_survey_2504_16736"
      supports: "Fragmented agent protocols benefit from layered architecture instead of one broad protocol."
  inference_boundary: "The sources support protocol identity, schema-backed capability surfaces, handoff, and context engineering. Forge's product-specific inference is the double gate plus compact authority-preserving payload before handoff can be suggested."
failure_modes_prevented:
  - "agent routes work to an unavailable or unregistered runtime"
  - "agent routes work to a runtime that lacks the required capability"
  - "handoff transfers full chat history and loses state authority"
  - "external runtime writes Forge state directly"
  - "MCP/A2A capability metadata is mistaken for Forge authorization"

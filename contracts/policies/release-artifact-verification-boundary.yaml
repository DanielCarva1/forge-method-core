schema_version: "0.1"
policy: "release_artifact_verification_boundary"
status: "active"
summary: "Host adapter install/update must verify local artifact bytes and required distribution metadata before any installation mutation is allowed."
canonical_terms:
  artifact_verification: "Rust read-only check that compares local artifact bytes against the expected sha256 digest and validates required metadata references."
  verification_evidence: "Machine-readable result proving which local checks passed, which failed, and which stronger supply-chain checks remain deferred."
  deferred_cryptographic_verification: "Explicit list of signature, provenance predicate, or transparency-log checks not yet performed by this local verifier."
decision:
  selected_option: "local_artifact_verification_before_install_mutation"
  rejected_options:
    - id: "distribution_admission_as_verification"
      reason: "Admission checks evidence shape, but does not prove downloaded bytes match the declared artifact."
    - id: "checksum_as_complete_supply_chain_security"
      reason: "Checksum detects byte mismatch but does not verify signer identity, build provenance, or transparency-log inclusion."
    - id: "host_adapter_verifies_bytes_ad_hoc"
      reason: "Host-specific verification would drift across Codex, Cursor, Claude, OpenCode, VS Code, pi.dev, and Forge standalone."
rules:
  - id: "read_only_verifier"
    rule: "Artifact verification is read-only and must not install, update, delete, rollback, or mutate project state."
  - id: "sha256_required"
    rule: "A valid expected sha256 digest is required."
  - id: "bytes_must_match_digest"
    rule: "Computed local artifact sha256 must match the expected digest."
  - id: "metadata_refs_required"
    rule: "Provenance, immutable source ref, version compatibility, rollback ref, and update summary ref are required."
  - id: "floating_source_rejected"
    rule: "Floating source refs such as branch names are rejected during verification."
  - id: "deferred_checks_explicit"
    rule: "If cryptographic signature, provenance predicate, or transparency-log verification is not implemented, the verifier output must name those checks as deferred."
  - id: "failed_verification_blocks_mutation"
    rule: "Any failed verification must block adapter install/update mutation."
evidence_basis:
  - source_id: "slsa_artifact_verification_spec"
    supports: "Provenance only mitigates artifact authenticity risks when consumers inspect and verify it against expectations."
  - source_id: "sigstore_docs"
    supports: "Full artifact verification includes signature, certificate identity, root of trust, and Rekor inclusion checks."
  - source_id: "tuf_specification"
    supports: "Update clients need trusted target metadata and protection against rollback, freeze, and mix-and-match attacks."
  - source_id: "in_toto_spec"
    supports: "End users should be able to verify the supply-chain path from inception to deployment."
implementation_refs:
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - "forge-core host-adapter-verify-artifact --json returns status=passed for a readable artifact whose sha256 and required metadata refs match policy."
  - "The verifier returns status=failed for digest mismatch."
  - "The verifier returns status=failed when provenance, immutable source ref, version compatibility, rollback, or update summary metadata is missing."
  - "The host adapter manifest exposes host-adapter-verify-artifact as read-only validation with no workflow authority."
  - "The verifier output includes deferred_verification for signature cryptography, provenance predicate semantics, and transparency-log inclusion until those checks are implemented."
inference_boundary: "This boundary verifies local bytes and metadata presence/shape. It does not yet perform cryptographic signature verification, provenance predicate evaluation, Rekor/transparency-log lookup, TUF target metadata validation, install mutation, or rollback execution."
failure_modes_prevented:
  - "Downloaded artifact differs from the declared release digest."
  - "Adapter proceeds after admission metadata without checking local bytes."
  - "Agent claims complete supply-chain verification when only checksum verification happened."
  - "Update proceeds without provenance, version compatibility, rollback, or summary metadata."
next_boundary:
  id: "sigstore_fulcio_certificate_identity_boundary"
  question: "How should Forge verify Fulcio certificate chain, certificate identity extensions, expected OIDC issuer, and workflow identity selectors against the trusted-root policy without treating policy validation as cryptographic proof?"

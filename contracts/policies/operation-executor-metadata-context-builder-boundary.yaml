schema_version: "0.1"
policy: "operation_executor_metadata_context_builder_boundary"
status: "active"
summary: "Forge builds compact diagnostic and handoff context from metadata query results by grouping effect targets, bounding output size, preserving only metadata, and carrying the non-authority boundary forward."
canonical_terms:
  metadata_context_builder: "Read-only function that turns metadata query results into compact grouped context for diagnostics or handoff."
  metadata_context_group: "Bounded summary for one target_kind plus logical_ref group, carrying record count and latest metadata only."
  bounded_context: "Output with explicit max_groups and omitted_groups so adapter context cannot grow without limit."
decision:
  selected_option: "grouped_bounded_latest_metadata_context"
  rejected_options:
    - id: "emit_full_query_records_as_context"
      reason: "Would preserve too much history and increase context cost for agents."
    - id: "embed_raw_payloads"
      reason: "Would violate redaction and data minimization policy."
    - id: "context_as_transition_summary"
      reason: "Would turn diagnostic/handoff context into workflow authority."
rules:
  - id: "read_only_no_store_mutation"
    rule: "Context building must not read raw target files, write files, repair indexes, compact indexes, or mutate Forge state."
  - id: "group_by_target_identity"
    rule: "Context groups are keyed by target_kind plus logical_ref."
  - id: "latest_metadata_only"
    rule: "Each group includes count and latest metadata, not every historical record."
  - id: "bounded_output"
    rule: "Context output is bounded by max_groups and reports omitted_groups."
  - id: "authority_boundary_preserved"
    rule: "Context output must include authority_boundary.is_workflow_authority=false."
  - id: "no_raw_content"
    rule: "Context output must not include raw payload content or read physical target bytes."
  - id: "query_failure_remains_failure"
    rule: "CLI context mode must exit nonzero when the underlying metadata query fails."
evidence_basis:
  - source_id: "tool_schema_compression_2605_26165"
    supports: "Large schema/context surfaces can exhaust agent context, requiring compact views."
  - source_id: "harnessfix_trace_guided_2606_06324"
    supports: "Trace-guided repair benefits from scoped evidence retrieval."
  - source_id: "agentic_harness_engineering_2604_25850"
    supports: "Harness components need observable evidence tied to outcomes."
  - source_id: "agentleak_privacy_leakage_2602_11510"
    supports: "Agent data surfaces should minimize unnecessary raw content exposure."
  - source_id: "natural_language_agent_harnesses_2603_25723"
    supports: "Portable harness behavior should use durable artifacts and lightweight adapters."
  - source_id: "code_as_agent_harness_2605_18747"
    supports: "Harness behavior should be executable, inspectable, stateful, and verification-oriented."
implementation_refs:
  - "crates/forge-core-store/src/lib.rs"
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-store/tests/reference_index.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - "forge-core-store exposes build_effect_metadata_context."
  - "Context groups by target_kind plus logical_ref and keeps latest metadata plus record_count."
  - "Context output reports total_groups, returned_groups, omitted_groups, and included_records."
  - "forge-core query-effect-index --context renders bounded JSON context."
  - "Context output preserves authority_boundary.is_workflow_authority=false."
  - "Tests prove context output omits raw payload markers."
inference_boundary: "The evidence supports compact grouped context for agent diagnostics and handoff. It does not yet define which host adapters call the builder automatically or how UI/app surfaces should render it."
failure_modes_prevented:
  - "Agent receives unbounded metadata history and loses the actionable signal."
  - "Handoff context leaks raw payload content."
  - "Diagnostic context is mistaken for permission to mutate state or advance workflow."
next_boundary:
  id: "sigstore_fulcio_certificate_identity_boundary"
  question: "How should Forge verify Fulcio certificate chain, certificate identity extensions, expected OIDC issuer, and workflow identity selectors against the trusted-root policy without treating policy validation as cryptographic proof?"

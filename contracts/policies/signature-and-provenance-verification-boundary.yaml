schema_version: "0.1"
policy: "signature_and_provenance_verification_boundary"
status: "active"
summary: "Forge Core verifies signed release provenance in Rust before adapters may install or update a host adapter or runtime artifact."
canonical_terms:
  signed_provenance: "Detached signed in-toto/SLSA provenance whose signature, artifact subject, builder identity, source URI, source ref, and transparency proof are verified by Forge Core."
  forge_transparency_proof: "Adapter-neutral Merkle inclusion proof that binds provenance digest and signature digest to a checkpoint root known to Forge."
  sigstore_backend: "Future optional backend that verifies canonical Sigstore bundles, Fulcio identity, and public Rekor checkpoints without changing host adapter policy."
decision:
  selected_option: "rust_owned_offline_signed_provenance_verifier"
  rejected_options:
    - id: "host_adapter_runs_cosign_or_slsa_verifier"
      reason: "Would duplicate trust logic across Codex, Cursor, Claude, OpenCode, VS Code, pi.dev, and Forge standalone."
    - id: "use_experimental_sigstore_crate_as_core_authority_now"
      reason: "Current Rust Sigstore libraries are promising but either experimental or still simplify important attestation checks."
    - id: "metadata_presence_as_provenance_verification"
      reason: "SLSA and in-toto require consumers to inspect signed provenance against expectations."
rules:
  - id: "read_only_verifier"
    rule: "The verifier is read-only and must not install, update, rollback, delete, or mutate Forge project state."
  - id: "signed_provenance_required"
    rule: "Provenance bytes must have a valid detached Ed25519 signature under the expected release public key."
  - id: "intoto_slsa_required"
    rule: "Provenance must be an in-toto Statement with predicateType=https://slsa.dev/provenance/v1."
  - id: "artifact_subject_required"
    rule: "The statement subject digest must match the local artifact sha256."
  - id: "builder_and_source_expectations_required"
    rule: "Builder ID, source URI, and source ref must match explicit expected values."
  - id: "transparency_proof_required"
    rule: "A transparency proof must bind provenance digest and signature digest to a Merkle inclusion root."
  - id: "host_adapters_obey_result"
    rule: "Adapters may consume only the typed verification result; they must not reinterpret unsigned files or raw metadata as trusted."
evidence_basis:
  - source_id: "slsa_provenance_v1"
    supports: "SLSA provenance lets consumers verify how artifacts were produced and compare against expectations."
  - source_id: "slsa_artifact_verification_spec"
    supports: "Provenance is useful only when inspected and verified by the consumer."
  - source_id: "slsa_verifier_project"
    supports: "Practical SLSA verification checks cryptographic signatures, builder identity, source repository/ref, and artifact digest."
  - source_id: "in_toto_statement_v1"
    supports: "in-toto Statement binds predicates to subjects with digest metadata."
  - source_id: "sigstore_client_spec"
    supports: "Verification policy is application-specific and should abort when signature, identity, or transparency checks fail."
  - source_id: "rfc6962_merkle_audit_paths"
    supports: "Merkle audit paths prove a leaf is included in a committed tree root."
implementation_refs:
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - "forge-core host-adapter-verify-provenance --json returns status=passed for a signed SLSA/in-toto statement whose artifact subject, builder, source URI, source ref, signature, and transparency proof match."
  - "The verifier fails when the signed provenance does not contain the expected source ref."
  - "The verifier fails when the detached provenance signature is invalid."
  - "The host adapter manifest exposes host-adapter-verify-provenance as read-only validation with no workflow authority."
  - "The verifier output states its inference boundary instead of claiming Fulcio/Rekor public verification."
inference_boundary: "This boundary verifies detached Ed25519 signed provenance, SLSA/in-toto statement semantics, expected builder/source/artifact claims, and Forge transparency proof inclusion. It does not yet verify Sigstore Fulcio certificate chains, canonical Sigstore bundles, public Rekor checkpoints, certificate transparency, or revocation."
failure_modes_prevented:
  - "Agent installs an artifact whose provenance is unsigned."
  - "Agent accepts signed provenance for a different artifact digest."
  - "Agent accepts provenance from the wrong builder, repository, or source ref."
  - "Agent treats transparency metadata presence as inclusion proof."
next_boundary:
  id: "sigstore_fulcio_certificate_identity_boundary"
  question: "How should Forge verify Fulcio certificate chain, certificate identity extensions, expected OIDC issuer, and workflow identity selectors against the trusted-root policy without treating policy validation as cryptographic proof?"

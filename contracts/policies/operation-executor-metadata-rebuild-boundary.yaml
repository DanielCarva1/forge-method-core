schema_version: "0.1"
policy: "operation_executor_metadata_rebuild_boundary"
status: "active"
summary: "Forge can rebuild the effect target metadata index only from committed WAL records that carry enough non-content metadata to recreate index rows without reading payload contents or scanning unrelated workspace files."
canonical_terms:
  metadata_rebuild: "Derivation of EffectTargetMetadataRecord rows from committed WAL write_applied records."
  rebuildable_wal_record: "A write_applied WAL record with target_ref, physical_target_ref, and target_metadata."
  legacy_wal_record: "A WAL record written before target_metadata existed; it remains readable but cannot prove full metadata rebuild."
decision:
  selected_option: "wal_committed_metadata_rebuild"
  rejected_options:
    - id: "scan_filesystem_and_infer_metadata"
      reason: "Filesystem scans can find projected files but cannot prove operation_id, effect_id, actor, target_kind, or access_mode."
    - id: "rebuild_from_chat_or_agent_memory"
      reason: "Agent memory is not durable transaction evidence and is vulnerable to drift."
    - id: "claim_legacy_wal_complete"
      reason: "Old WAL write_applied records lack operation_id, actor, target_kind, access_mode, content hash, and byte length."
rules:
  - id: "wal_write_applied_carries_metadata"
    rule: "New write_applied WAL records must include target_metadata with operation_id, target_kind, access_mode, content_hash, byte_len, actor_agent_id, actor_role, destructive, and redaction_hint."
  - id: "committed_transactions_only"
    rule: "Metadata rebuild must use only write_applied records from transactions with a commit stage."
  - id: "legacy_wal_noop"
    rule: "Committed legacy WAL records without target_metadata must be ignored rather than filled by guesses."
  - id: "no_content_read_for_rebuild"
    rule: "Metadata rebuild must not read target file contents or payload bytes."
  - id: "append_only_rebuild"
    rule: "The first rebuild API appends rebuilt metadata records to a caller-provided index path and does not perform dedupe, truncation, or compaction."
  - id: "lockable_rebuild"
    rule: "A lock wrapper must exist for callers that need rebuild serialized with effect writes."
evidence_basis:
  - source_id: "aries_wal_1992"
    supports: "Recovery requires durable log records that can drive redo/undo after failure."
  - source_id: "failure_atomic_updates_fast15"
    supports: "Crash-safe recovery must distinguish completed from incomplete transactions."
  - source_id: "w3c_prov_dm"
    supports: "Generated entities should remain tied to activities and agents by durable identifiers."
  - source_id: "openlineage_object_model"
    supports: "Lineage observations should be reconstructible as job/run/dataset events without depending on payload contents."
  - source_id: "harnessfix_trace_guided_2606_06324"
    supports: "Trace-guided repair depends on normalized, scoped evidence rather than broad post-hoc inference."
  - source_id: "agentleak_privacy_leakage_2602_11510"
    supports: "Internal metadata channels should minimize sensitive data exposure."
implementation_refs:
  - "crates/forge-core-store/src/lib.rs"
  - "crates/forge-core-store/tests/reference_index.rs"
acceptance:
  - "New write_applied WAL records serialize target_metadata."
  - "rebuild_effect_target_metadata_index appends metadata rows for committed WAL transactions."
  - "Rebuild ignores incomplete transactions and legacy write_applied records without target_metadata."
  - "Rebuild output does not contain raw payload content."
  - "Existing legacy WAL fixtures continue deserializing because target_metadata has a serde default."
inference_boundary: "The evidence supports WAL-driven rebuild for repo-local metadata indexes. It does not prove automatic background repair, dedupe semantics, or a user-facing CLI command shape."
failure_modes_prevented:
  - "Index loss forces agents to scan arbitrary files and infer provenance."
  - "Recovered metadata is fabricated from incomplete WAL or chat memory."
  - "Legacy WAL is treated as stronger evidence than it is."
next_boundary:
  id: "sigstore_fulcio_certificate_identity_boundary"
  question: "How should Forge verify Fulcio certificate chain, certificate identity extensions, expected OIDC issuer, and workflow identity selectors against the trusted-root policy without treating policy validation as cryptographic proof?"

schema_version: "0.1"
policy: "certificate_revocation_policy_boundary"
status: "active"
summary: "Forge Core verifies the Sigstore-style short-lived certificate policy branch by checking declared policy mode, certificate lifetime, and trusted signing time inside the certificate validity window. Explicit supplied/offline CRL status and direct-issuer or strictly supplied delegated-responder OCSP status are separate read-only source boundaries whose affected packages passed locked all-target compilation; runtime evidence remains pending. Network retrieval and TUF freshness remain out of scope."
canonical_terms:
  certificate_revocation_policy: "A typed policy section that tells Forge which revocation strategy is acceptable for this verifier."
  short_lived_certificate_strategy: "A policy strategy where a Fulcio-style short-lived certificate plus trusted signing time is accepted without CRL or OCSP network status for this boundary."
  explicit_revocation_status: "CRL or OCSP evidence that directly reports whether a certificate is good, revoked, or unknown."
  trusted_signing_time: "A signing time already established by a separate timestamp authority boundary, such as verified Rekor integrated time or RFC3161 TSA evidence."
decision:
  selected_option: "short_lived_certificate_policy_verifier"
  rejected_options:
    - id: "claim_not_revoked_without_evidence"
      reason: "Would overclaim because neither certificate validity nor CT/Rekor presence is explicit revocation status."
    - id: "crl_ocsp_fetch_now"
      reason: "Network fetch, responder trust, caching, freshness, and failure policy require a separate explicit status boundary."
    - id: "treat_timestamps_as_revocation"
      reason: "Timestamps prove when a signature existed, not whether an authority later revoked a certificate."
rules:
  - id: "read_only_verifier"
    rule: "The revocation policy verifier is read-only and must not install, update, rollback, delete, write project state, or mutate artifacts."
  - id: "policy_required"
    rule: "Forge must require sigstore_trusted_root_policy.revocation.mode for this verifier."
  - id: "short_lived_mode_required_for_pass"
    rule: "Only revocation.mode=short_lived_certificate can pass in this boundary."
  - id: "lifetime_limit_required"
    rule: "For short_lived_certificate mode, Forge must require max_certificate_lifetime_seconds and fail if certificate lifetime exceeds it."
  - id: "trusted_time_required"
    rule: "Forge must require trusted_signing_time_unix and fail if it falls outside the certificate validity window."
  - id: "explicit_status_not_implied"
    rule: "Passing this verifier means revocation is not checked by short-lived policy; it must not be reported as CRL/OCSP good or not revoked."
  - id: "explicit_status_separate"
    rule: "revocation.mode=explicit_status_required does not pass this short-lived-policy command; callers must use the dedicated supplied/offline CRL or OCSP verifier. The OCSP product CLI source accepts either no delegated material for direct-issuer behavior or a strict supplied responder certificate with ordered issuer-chain paths, and grants no network or mutation authority; runtime evidence remains pending."
evidence_basis:
  - source_id: "sigstore_security_model_short_lived_certificates"
    supports: "Sigstore uses short-lived certificates and a transparency/timestamp model instead of normal long-lived certificate revocation flows."
  - source_id: "fulcio_spec_short_lived_certificate_timestamping"
    supports: "Fulcio specifies short-lived certificates and requires timestamping evidence to prove signing happened while the certificate was valid."
  - source_id: "rfc5280_x509_crl_profile"
    supports: "X.509 CRLs are a separate revocation profile and cannot be inferred from certificate validity alone."
  - source_id: "rfc6960_ocsp_certificate_status"
    supports: "OCSP is a separate online status protocol with good, revoked, and unknown outcomes."
implementation_refs:
  - "contracts/policies/certificate-revocation-policy-boundary.yaml"
  - "contracts/migration/certificate-revocation-policy-boundary-grill-audit.yaml"
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - "forge-core host-adapter-verify-certificate-revocation-policy --json returns status=passed when short_lived_certificate policy, certificate lifetime, and trusted signing time all match."
  - "The verifier fails when certificate lifetime exceeds max_certificate_lifetime_seconds."
  - "The short-lived-policy verifier fails closed for revocation.mode=explicit_status_required and directs authority to the separate supplied/offline CRL or OCSP verifier rather than implying status."
  - "The host adapter manifest exposes the verifier as read-only validation with no workflow authority."
  - "Verifier output states revocation_status=not_checked_by_short_lived_policy on pass and lists CRL/OCSP/TUF/install authority as deferred."
inference_boundary: "This command verifies only the policy acceptability of a Sigstore-style short-lived certificate revocation strategy using supplied certificate validity and trusted signing time. Separate read-only boundaries verify supplied/offline CRL evidence and direct-issuer or strictly supplied delegated-responder OCSP evidence. OCSP runtime evidence remains pending. No revocation command fetches network evidence, refreshes TUF trusted roots, mutates installations, signs artifacts, or decides release update authority."
failure_modes_prevented:
  - "Certificate validity is mislabeled as explicit revocation status."
  - "CT or Rekor evidence is treated as CRL/OCSP evidence."
  - "A long-lived certificate silently passes a short-lived policy."
  - "A trusted signing time outside certificate validity is accepted."
  - "Revocation policy verification is mistaken for TUF freshness or update authority."
next_boundary:
  id: "revocation_network_retrieval_policy"
  question: "Should a future host/network adapter retrieve revocation evidence without broadening the supplied/offline verifier or granting install/update authority?"

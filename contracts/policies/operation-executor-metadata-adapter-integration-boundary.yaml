schema_version: "0.1"
policy: "operation_executor_metadata_adapter_integration_boundary"
status: "active"
summary: "Host adapters may automatically request compact metadata context only for evidence discovery, diagnostics, or handoff preparation; all adapter presentations remain advisory context and cannot create workflow authority."
canonical_terms:
  adapter_trigger: "Closed reason a host adapter gives for presenting metadata context to an agent or human."
  advisory_context: "Machine-readable context that helps the host explain, diagnose, or hand off work without becoming a next action, state transition, or completion decision."
  cooperating_adapter: "Codex, Cursor, Claude, opencode, VS Code, pi.dev, Forge standalone, MCP, daemon, or app surface that calls Forge Core and preserves its typed authority boundaries."
decision:
  selected_option: "adapter_agnostic_advisory_context"
  automatic_triggers:
    - "evidence_discovery"
    - "diagnostics"
    - "handoff_preparation"
  manual_only_triggers:
    - "manual_inspection"
  rejected_options:
    - id: "adapter_specific_authority"
      reason: "Would let Codex, Cursor, Claude, or another host redefine Forge workflow control."
    - id: "always_auto_context"
      reason: "Would add context noise and could nudge agents toward irrelevant evidence."
    - id: "render_as_next_action"
      reason: "Would recreate the bug class where host-agent narration becomes Forge direction."
rules:
  - id: "all_hosts_use_same_context_contract"
    rule: "Codex, Cursor, Claude, opencode, VS Code, pi.dev, Forge standalone, MCP, daemon, and app adapters use the same metadata context contract."
  - id: "automatic_invocation_is_trigger_bound"
    rule: "Automatic metadata context invocation is allowed only for evidence_discovery, diagnostics, and handoff_preparation."
  - id: "manual_inspection_not_automatic"
    rule: "manual_inspection may be invoked explicitly, but adapters must not run it opportunistically."
  - id: "presentation_is_advisory"
    rule: "Adapter presentation mode is advisory_context and may_create_workflow_authority=false."
  - id: "preserve_authority_boundary"
    rule: "Adapters must preserve authority_boundary and required_output_treatment fields when rendering or summarizing context."
  - id: "normal_authority_contracts_required"
    rule: "OperationContract, GateContract, DecisionCloseContract, CompletionContract, ClaimContract, RequestContract, and ToolEffectContract remain the authority path for workflow control."
evidence_basis:
  - source_id: "natural_language_agent_harnesses_2603_25723"
    supports: "Harness behavior should be portable explicit contracts with lightweight adapters."
  - source_id: "mcp_tools_spec"
    supports: "Capabilities should be exposed as schema-backed tools and metadata, not prose-only behavior."
  - source_id: "mcp_tool_annotations_2603"
    supports: "Tool annotations can inform safety UI, but remain advisory rather than complete authorization."
  - source_id: "a2a_protocol"
    supports: "Cross-application agent interoperability should not replace local governance."
  - source_id: "agent_protocol_taxonomy_2606_19135"
    supports: "Agent protocols need explicit counterparty, payload, interaction state, discovery, and schema boundaries."
  - source_id: "runtime_governance_paths_2603_16586"
    supports: "Runtime policy should govern execution paths instead of relying on prompt-only reminders."
  - source_id: "opendev_terminal_agents_2603_05344"
    supports: "Terminal agents benefit from separated harness, context engineering, safety, and persistent memory."
  - source_id: "code_as_agent_harness_2605_18747"
    supports: "Harness behavior should be executable, inspectable, stateful, and evaluated beyond final task success."
implementation_refs:
  - "crates/forge-core-store/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-store/tests/reference_index.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - "EffectMetadataContextBuildOptions carries adapter_kind and adapter_trigger."
  - "EffectMetadataContextBuildResult carries adapter_presentation."
  - "adapter_presentation reports presentation_mode=advisory_context and may_create_workflow_authority=false."
  - "automatic_invocation_allowed is true only for evidence_discovery, diagnostics, and handoff_preparation."
  - "forge-core query-effect-index --context accepts --adapter-kind and --adapter-trigger."
  - "Tests prove a Codex diagnostics context is advisory and automatic-invocation allowed."
inference_boundary: "The evidence supports adapter-agnostic advisory context and closed auto-invocation triggers. It does not yet define host package installation, MCP tool manifests, daemon lifecycle, or UI rendering."
failure_modes_prevented:
  - "Codex summarizes metadata context as the next Forge action."
  - "Cursor or another host treats evidence lookup as route-change authority."
  - "Adapters run metadata context constantly and pollute agent context."
  - "MCP/app presentation strips the non-authority warning."
next_boundary:
  id: "sigstore_fulcio_certificate_identity_boundary"
  question: "How should Forge verify Fulcio certificate chain, certificate identity extensions, expected OIDC issuer, and workflow identity selectors against the trusted-root policy without treating policy validation as cryptographic proof?"

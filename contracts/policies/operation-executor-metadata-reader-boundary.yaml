schema_version: "0.1"
policy: "operation_executor_metadata_reader_boundary"
status: "active"
summary: "Forge exposes a read-only duplicate-tolerant query surface for effect target metadata so agents can discover artifact/evidence/request targets without scanning raw NDJSON or rewriting append-only indexes."
canonical_terms:
  metadata_reader: "Read-only store API that loads, validates, filters, and returns effect target metadata records."
  latest_per_target_view: "In-memory view that returns the last matching record per target_kind plus logical_ref key without mutating the append-only index."
  evidence_lookup: "Use of effect metadata to locate generated artifacts, evidence, request streams, or ledger streams; it is not transition authority."
decision:
  selected_option: "read_only_duplicate_tolerant_query"
  command:
    name: "forge-core query-effect-index"
    default_index: ".forge-method/index/effect-targets.ndjson"
    json_flag: "--json"
    filters:
      - "--logical-ref"
      - "--effect-id"
      - "--operation-id"
      - "--target-kind"
      - "--latest"
  rejected_options:
    - id: "raw_ndjson_scan_by_agent"
      reason: "Pushes parsing, filtering, and duplicate handling back into host-agent improvisation."
    - id: "compact_before_reading"
      reason: "Compaction is destructive maintenance and still lacks pressure, backup, lock, and stale-reader semantics."
    - id: "reader_as_authority"
      reason: "Metadata records prove where an effect wrote, not whether a phase transition, route change, or human decision is authorized."
rules:
  - id: "read_only_no_side_effects"
    rule: "The metadata reader must not rewrite, dedupe, truncate, compact, delete, or repair index files."
  - id: "serde_validation_required"
    rule: "Every NDJSON line must deserialize as EffectTargetMetadataRecord; malformed lines fail the query."
  - id: "duplicate_tolerant_latest_view"
    rule: "The --latest view collapses duplicates in memory by target_kind plus logical_ref, preserving the latest appended matching record."
  - id: "structured_filters"
    rule: "Queries support logical_ref, effect_id, operation_id, target_kind, and latest_per_target filters as typed fields."
  - id: "no_raw_content"
    rule: "Query results must not include raw payload content."
  - id: "evidence_not_authority"
    rule: "Effect metadata can locate evidence and artifacts, but cannot authorize transition, completion, release, or route changes."
evidence_basis:
  - source_id: "openlineage_object_model"
    supports: "Lineage systems expose queryable runtime observations without treating the observation log itself as workflow authority."
  - source_id: "w3c_prov_dm"
    supports: "Provenance uses explicit identifiers and relations for produced/used entities."
  - source_id: "harnessfix_trace_guided_2606_06324"
    supports: "Trace-guided repair benefits from scoped evidence retrieval rather than broad context scans."
  - source_id: "agentic_harness_engineering_2604_25850"
    supports: "Harness evolution needs observable components and evidence tied to outcomes."
  - source_id: "schema_first_tool_apis_2603_13404"
    supports: "Structured API contracts reduce interface misuse compared with free-form documentation."
  - source_id: "agentleak_privacy_leakage_2602_11510"
    supports: "Agent data surfaces should minimize unnecessary exposure of sensitive or raw payload content."
  - source_id: "rust_api_guidelines_official"
    supports: "Public APIs should expose typed, predictable data structures."
implementation_refs:
  - "crates/forge-core-store/src/lib.rs"
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-store/tests/reference_index.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - "forge-core-store exposes query_effect_target_metadata_index with typed filters and structured result status."
  - "forge-core query-effect-index supports --root, --index, --logical-ref, --effect-id, --operation-id, --target-kind, --consumer-use, --latest, and --json."
  - "The latest view collapses duplicate target records in memory without mutating the index."
  - "Malformed index records fail with IndexParseFailed."
  - "Tests prove query output omits raw payload content."
inference_boundary: "The evidence supports structured, read-only evidence lookup. It does not prove metadata records can authorize workflow transitions or replace OperationContract, GateContract, DecisionCloseContract, or human checkpoints."
failure_modes_prevented:
  - "Agent scans NDJSON manually and mishandles duplicates."
  - "Agent treats duplicate index rows as corruption and tries destructive cleanup."
  - "Agent uses an effect metadata row as permission to advance process state."
  - "Query output leaks raw payload content into chat or adapter logs."
next_boundary:
  id: "sigstore_fulcio_certificate_identity_boundary"
  question: "How should Forge verify Fulcio certificate chain, certificate identity extensions, expected OIDC issuer, and workflow identity selectors against the trusted-root policy without treating policy validation as cryptographic proof?"

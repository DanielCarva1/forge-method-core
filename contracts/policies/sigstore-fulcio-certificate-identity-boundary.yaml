schema_version: "0.1"
policy: "sigstore_fulcio_certificate_identity_boundary"
status: "active"
summary: "Forge Core verifies a Fulcio-style certificate chain and release identity selectors against an already validated Sigstore trusted-root policy, while keeping bundle subject binding, transparency, timestamp, revocation, and TUF freshness out of this boundary."
canonical_terms:
  fulcio_certificate_identity_verification: "Read-only verification that a certificate chain is rooted in declared Fulcio trust material and that the leaf certificate matches the policy's OIDC issuer and identity selectors."
  certificate_chain_evidence: "Leaf certificate plus issuer certificates supplied to the verifier for signature, issuer/subject, validity-window, and trust-root reference checks."
  certificate_identity_selectors: "Policy fields such as expected_oidc_issuer, expected_certificate_identity, expected_github_repository, expected_github_ref, and expected_github_sha."
decision:
  selected_option: "forge_owned_read_only_fulcio_identity_verifier"
  rejected_options:
    - id: "trust_policy_means_identity_verified"
      reason: "The trusted-root policy only proves required policy shape and trust material refs; it does not inspect any certificate."
    - id: "single_string_identity_match"
      reason: "Sigstore identity representation depends on issuer, SAN, and workflow-specific certificate extensions."
    - id: "full_sigstore_bundle_verification_here"
      reason: "Bundle subject binding, transparency evidence, timestamp signatures, revocation, and TUF freshness require separate fixtures and failure modes."
rules:
  - id: "read_only_verifier"
    rule: "The Fulcio identity verifier is read-only and must not install, update, rollback, delete, write project state, or mutate release artifacts."
  - id: "trust_policy_required"
    rule: "A Sigstore trusted-root policy must be parsed and must pass policy validation before Fulcio identity evidence can pass."
  - id: "certificate_chain_required"
    rule: "The verifier requires a leaf certificate and at least one issuer certificate path."
  - id: "trusted_root_ref_match_required"
    rule: "At least one issuer certificate path must match a declared Fulcio certificate_authority_ref from the trusted-root policy."
  - id: "issuer_subject_chain_required"
    rule: "Every certificate issuer must match the next certificate subject, and signatures must verify against the next certificate public key."
  - id: "root_self_signed_required"
    rule: "The terminal issuer certificate must be self-signed and must verify with its own public key."
  - id: "validity_window_required"
    rule: "The leaf certificate must be valid at the supplied verification_time_unix."
  - id: "code_signing_usage_required_when_present"
    rule: "If the leaf contains Extended Key Usage, it must include code signing or anyExtendedKeyUsage."
  - id: "san_identity_required"
    rule: "expected_certificate_identity must match a leaf Subject Alternative Name identity when present."
  - id: "oidc_issuer_required"
    rule: "The leaf must expose the expected OIDC issuer through Fulcio issuer extension evidence."
  - id: "github_selector_required_when_declared"
    rule: "Declared GitHub repository/ref/sha selectors must match Fulcio workflow extension evidence when present in policy."
  - id: "typed_output_required"
    rule: "Verifier output must include status, reasons, observed identities, observed issuer, observed workflow selectors, verified_evidence, and inference_boundary."
evidence_basis:
  - source_id: "sigstore_overview_verification_flow"
    supports: "Sigstore verification separates artifact signature, certificate identity, trust roots, and transparency evidence."
  - source_id: "fulcio_spec_oidc_certificate_binding"
    supports: "Fulcio binds OIDC identity and workflow metadata into certificate SAN and extensions."
  - source_id: "fulcio_oid_info"
    supports: "Fulcio identity selectors include provider-generic OID extensions."
  - source_id: "rfc5280_subject_alt_name_and_key_usage"
    supports: "SAN and key usage are certificate-level identity and usage controls."
  - source_id: "sigstore_identity_representation_issue"
    supports: "Identity policy must include issuer plus explicit identity selectors."
  - source_id: "sigstore_fido_identity_assurance_2025"
    supports: "Identity assurance can evolve independently of the base Sigstore architecture."
implementation_refs:
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - "forge-core host-adapter-verify-fulcio-certificate-identity --json returns status=passed for a generated chain whose SAN, OIDC issuer, and workflow selectors match the policy."
  - "The verifier fails when the expected OIDC issuer differs from the leaf certificate extension."
  - "The verifier fails when the leaf certificate is signed by an issuer that is not rooted in a declared Fulcio certificate_authority_ref."
  - "The host adapter manifest exposes host-adapter-verify-fulcio-certificate-identity as read-only validation with no workflow authority."
  - "Verifier output states that bundle subject binding, Rekor inclusion, CT proof, TSA signatures, revocation, TUF freshness, and install/update authority are outside this boundary."
geographic_coverage:
  searched_non_western_sources: true
  result: "Japan-origin Sigstore/FIDO identity-assurance research was relevant as future identity assurance evidence. No directly stronger China-origin source was found for Fulcio/X.509/OIDC certificate verification during this pass."
  implication: "Use China-origin agent/runtime papers for orchestration and state-governance boundaries; do not cite unrelated geography for cryptographic policy."
inference_boundary: "This boundary verifies a supplied Fulcio-style certificate chain and certificate identity selectors against Forge's typed Sigstore trusted-root policy. It does not verify Sigstore bundle subject binding, artifact signature binding, Rekor inclusion or signed checkpoints, certificate transparency SCTs, RFC3161 TSA signatures, revocation status, TUF metadata freshness, installer mutation authority, or future FIDO assurance."
failure_modes_prevented:
  - "Agent treats a validated trusted-root policy as if a concrete certificate identity had already been verified."
  - "Host adapter compares a release identity string without checking OIDC issuer and certificate extensions."
  - "Release update proceeds on a certificate signed by an undeclared issuer."
  - "Fulcio identity evidence is overclaimed as complete Sigstore bundle verification."
next_boundary:
  id: "sigstore_bundle_subject_binding_boundary"
  question: "How should Forge bind artifact digest, Sigstore bundle signature material, Fulcio certificate identity evidence, Rekor transparency evidence, and timestamp evidence without collapsing them into one opaque pass/fail?"

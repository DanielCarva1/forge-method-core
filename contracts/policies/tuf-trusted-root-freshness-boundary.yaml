schema_version: "0.1"
policy: "tuf_trusted_root_freshness_boundary"
status: "active"
summary: "Forge Core verifies supplied local TUF trusted-root freshness evidence by checking metadata role type, version floors, and expiration timestamps against a fixed update start time, while keeping TUF signatures, repository fetch, hash binding, and install/update authority out of scope."
canonical_terms:
  tuf_trusted_root_freshness: "A read-only check that supplied TUF root metadata is not expired at update start time and is not below the caller's known version floor."
  update_start_time: "The fixed reference time used for TUF freshness checks in one update attempt."
  version_floor: "A minimum metadata version already known by the caller, used to detect rollback for this boundary."
  freeze_protection: "Rejecting metadata whose expires value is not later than update_start_time."
  rollback_protection: "Rejecting metadata whose version is below the supplied version floor."
decision:
  selected_option: "local_metadata_freshness_verifier"
  rejected_options:
    - id: "claim_full_tuf_client"
      reason: "Would overclaim because Forge is not yet downloading metadata, walking root rotation, verifying signatures, or binding target hashes."
    - id: "presence_only_trusted_root"
      reason: "A trusted_root_ref or root.json path alone does not prove freshness or rollback resistance."
    - id: "host_adapter_runs_tuf_policy"
      reason: "Would make Codex, Cursor, Claude, OpenCode, VS Code, pi.dev, and Forge standalone drift on update trust semantics."
rules:
  - id: "read_only_verifier"
    rule: "The TUF freshness verifier is read-only and must not download metadata, install, update, rollback, delete, write project state, or mutate artifacts."
  - id: "tuf_policy_required"
    rule: "Forge must require sigstore_trusted_root_policy.root_source=tuf for this verifier."
  - id: "root_metadata_required"
    rule: "Forge must require supplied root metadata and verify signed._type=root."
  - id: "optional_top_level_metadata"
    rule: "If timestamp, snapshot, or targets metadata paths are supplied, Forge must check their matching signed._type, version, and expires fields too."
  - id: "expiration_required"
    rule: "Every checked metadata role must include signed.expires in UTC ISO 8601 form and expire after update_start_time_unix."
  - id: "version_floor_required_when_supplied"
    rule: "When a minimum version is supplied for a checked role, Forge must fail if signed.version is below that floor."
  - id: "freshness_not_authenticity"
    rule: "Passing this verifier must not be reported as TUF signature verification, root key rotation validation, target hash verification, repository consistency, or install/update authority."
evidence_basis:
  - source_id: "tuf_specification"
    supports: "TUF client workflow uses root version checks for rollback protection and metadata expiration for freeze protection."
  - source_id: "sigstore_security_model_tuf_trust_root"
    supports: "Sigstore secures its trust root through TUF and uses it to distribute trusted keys and certificates."
  - source_id: "sigstore_tuf_client_installation_docs"
    supports: "Sigstore client setup starts from a trusted TUF root and retrieves the latest unexpired root during workflow."
implementation_refs:
  - "contracts/policies/tuf-trusted-root-freshness-boundary.yaml"
  - "contracts/migration/tuf-trusted-root-freshness-boundary-grill-audit.yaml"
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - "forge-core host-adapter-verify-tuf-trusted-root-freshness --json returns status=passed for supplied root metadata whose _type, version floor, and expires checks pass."
  - "The verifier fails expired root metadata."
  - "The verifier fails root metadata below the supplied minimum version."
  - "The verifier fails when the Sigstore trust policy root_source is not tuf."
  - "The host adapter manifest exposes the verifier as read-only validation with no workflow authority."
  - "Verifier output lists TUF signatures, root key rotation, hash binding, repository download, and install/update authority as deferred."
inference_boundary: "This boundary verifies freshness and anti-rollback fields in supplied local TUF metadata only. It does not verify TUF signatures or thresholds, walk root key rotation, fetch repository metadata, verify timestamp/snapshot/target hash binding, mutate installations, or decide release update authority."
failure_modes_prevented:
  - "A root.json path is treated as fresh by presence."
  - "Expired TUF root metadata passes update trust checks."
  - "Older metadata below the known version floor is accepted."
  - "Host adapters independently reinterpret TUF freshness."
  - "TUF freshness is mistaken for TUF signature verification or install/update authority."
next_boundary:
  id: "explicit_crl_ocsp_revocation_status_boundary"
  question: "How should Forge verify explicit CRL or OCSP revocation status, freshness, and offline failure policy without blocking the short-lived certificate strategy?"

schema_version: "0.1"
policy: "rust_only_backlog_reconciliation"
status: "accepted"
purpose: "Define how Forge Core separates the legacy Python/Markdown backlog from the new Rust-only borrowed-shell runtime backlog."
decision:
  authoritative_backlog_ref: "contracts/backlog/rust-only-core-backlog.yaml"
  legacy_backlog_refs:
    - "forensic-reference/legacy-forge-state/artifacts/prd-forge-v2.md"
    - "forensic-reference/legacy-forge-state/stories/v2-*.yaml"
  legacy_status: "forensic_reference_only"
  rust_backlog_status: "current_implementation_authority"
rules:
  - id: "no_python_story_authority"
    rule: "Any story, PRD item, acceptance criterion, or implementation note that targets Python runtime files is not codable work for the new core."
  - id: "typed_contract_backlog_only"
    rule: "New implementation work must be represented as typed YAML/JSON contracts and Rust acceptance, not Markdown prose or chat memory."
  - id: "evidence_before_story_lock"
    rule: "A story that changes architecture, authority, host behavior, autonomy, multi-agent coordination, safety, install/update, or human guidance must cite evidence_refs and known failure modes before it becomes ready."
  - id: "rust_acceptance_required"
    rule: "Every codable story must include Rust validation commands or Rust test targets. Python scripts are not valid acceptance for the new core."
  - id: "markdown_debt_not_authority"
    rule: "Markdown staging files may be used only to locate prior thinking. They must not be loaded by runtime flows and must be replaced or deleted when typed contracts exist."
  - id: "legacy_done_does_not_mean_rust_done"
    rule: "A legacy story marked done remains not done for the Rust-only core unless a Rust contract, Rust implementation, and Rust validation evidence exists."
implementation_guidance:
  first_action: "Use contracts/backlog/rust-only-core-backlog.yaml to choose the next coding slice."
  forbidden_action: "Do not continue forensic-reference/legacy-forge-state/stories/v2-* as if they were the current Rust implementation plan."
  allowed_legacy_use:
    - "Extract failure modes from old Python behavior."
    - "Compare desired human experience against old transcripts."
    - "Use old tests only as behavioral examples, then rewrite acceptance in Rust."
evidence_basis:
  direct_patterns:
    - source_id: "schema_first_tool_apis_2603_13404"
      supports: "Schema-backed contracts reduce interface-level misuse compared with free-form docs."
    - source_id: "agent_harness_engineering_survey_2026"
      supports: "Agent harness reliability depends on explicit execution, tool, context, lifecycle, observability, validation, and governance layers."
    - source_id: "swe_agent_2405_15793"
      supports: "Agent-computer interfaces affect coding-agent performance; host prompts alone are not the product boundary."
    - source_id: "multi_agent_failure_modes_2503_13657"
      supports: "Multi-agent systems fail through coordination and system-design issues that need typed prevention and evaluation."
    - source_id: "fudan_agent4se_survey"
      supports: "Software-engineering agents must be evaluated from SE output and agent-system perspectives."
    - source_id: "communication_centric_llm_mas_2502_14321"
      supports: "Agent coordination should be protocol-constrained and not delegated to freeform chat."
  inference_boundary: "The evidence supports replacing prompt/prose authority with typed runtime contracts. The exact Forge story map is a product decision derived from current repository gaps."
failure_modes_prevented:
  - "Agent resumes old Python stories and calls that progress."
  - "Markdown staging prose becomes runtime authority again."
  - "A story is marked ready without evidence, failure modes, or Rust validation."
  - "Host agents treat chat history as stronger than Forge contracts."

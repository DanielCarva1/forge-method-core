schema_version: "0.1"
policy: "operation_executor_metadata_consumer_boundary"
status: "active"
summary: "Effect metadata query results may be consumed for discovery, diagnostics, and compact handoff context only; they are explicitly not authority for workflow control, state mutation, completion, release, route change, or decision close."
canonical_terms:
  metadata_consumer_use: "Closed enum declaring why an adapter/runtime is querying effect target metadata."
  workflow_authority: "Permission to advance phase, change route, close a decision, mark completion, declare release readiness, or mutate integration state."
  authority_boundary: "Structured query result section that tells host agents which contracts are required when they need workflow authority."
decision:
  selected_option: "closed_consumer_use_with_authority_boundary"
  allowed_consumer_uses:
    - "discovery"
    - "diagnostics"
    - "handoff_context"
  rejected_consumer_uses:
    - id: "workflow_authority"
      reason: "Metadata proves an effect target exists; it does not prove authority to control Forge state."
    - id: "phase_transition"
      reason: "Phase transition requires OperationContract, GateContract, DecisionCloseContract, or explicit human authority."
    - id: "state_mutation"
      reason: "Mutation must flow through OperationContract and ToolEffectContract execution, not metadata lookup."
rules:
  - id: "consumer_use_is_closed_enum"
    rule: "Metadata query consumers must declare one of discovery, diagnostics, or handoff_context."
  - id: "query_output_declares_non_authority"
    rule: "Every metadata query result must include authority_boundary.is_workflow_authority=false."
  - id: "workflow_authority_requires_contracts"
    rule: "Workflow authority requires normal Forge authority contracts, not metadata records."
  - id: "cli_rejects_authority_consumer_use"
    rule: "forge-core query-effect-index must reject unsupported consumer uses such as workflow_authority."
  - id: "adapters_may_not_upgrade_query_results"
    rule: "Codex, Cursor, Claude, opencode, VS Code, pi.dev, MCP, daemon, and app adapters may render metadata query results but cannot reinterpret them as authority."
evidence_basis:
  - source_id: "runtime_governance_paths_2603_16586"
    supports: "Agent execution governance should be deterministic over paths instead of prompt-only policy."
  - source_id: "natural_language_agent_harnesses_2603_25723"
    supports: "Portable harness behavior needs explicit contracts and lightweight adapters."
  - source_id: "policy_first_control_2603_18059"
    supports: "Runtime policy should control agent actions before tool effects are accepted."
  - source_id: "schema_first_tool_apis_2603_13404"
    supports: "Closed structured APIs reduce interface misuse compared with free-form documentation."
  - source_id: "code_as_agent_harness_2605_18747"
    supports: "Harness behavior should be executable, inspectable, stateful, and verified beyond final task success."
  - source_id: "storm_state_management_2605_20563"
    supports: "State consistency and write mediation should happen at runtime boundaries, not after host-agent improvisation."
  - source_id: "agentic_harness_engineering_2604_25850"
    supports: "Harness evolution needs observable components and evidence tied to decisions."
implementation_refs:
  - "crates/forge-core-store/src/lib.rs"
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-store/tests/reference_index.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - "EffectTargetMetadataIndexQuery carries consumer_use as a closed enum."
  - "EffectTargetMetadataIndexQueryResult includes authority_boundary with is_workflow_authority=false."
  - "forge-core query-effect-index accepts --consumer-use discovery|diagnostics|handoff_context."
  - "forge-core query-effect-index rejects workflow_authority."
  - "Tests prove query output identifies forbidden workflow authority."
inference_boundary: "The evidence supports explicit consumer-use and non-authority boundaries for metadata lookup. It does not yet define a compact handoff-context builder, diagnostic report format, or adapter-specific UI."
failure_modes_prevented:
  - "Host agent reads an artifact metadata row and treats it as permission to advance phase."
  - "Adapter uses query-effect-index as a hidden state transition oracle."
  - "Metadata lookup output omits the contracts needed for workflow authority."
next_boundary:
  id: "sigstore_fulcio_certificate_identity_boundary"
  question: "How should Forge verify Fulcio certificate chain, certificate identity extensions, expected OIDC issuer, and workflow identity selectors against the trusted-root policy without treating policy validation as cryptographic proof?"

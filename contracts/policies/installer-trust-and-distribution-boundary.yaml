schema_version: "0.1"
policy: "installer_trust_and_distribution_boundary"
status: "active"
summary: "Host adapters and Rust binaries may be installed or updated only after distribution admission proves immutable source provenance, artifact integrity, version compatibility, rollback metadata, and a human-readable update summary."
canonical_terms:
  distribution_admission: "Rust decision that allows or blocks install/update distribution based on supply-chain evidence before any adapter mutates a user's installation."
  immutable_source_ref: "Source reference pinned to an immutable commit-like hash rather than a floating branch."
  artifact_integrity_evidence: "Checksum or signature evidence that identifies the artifact being installed."
  provenance_ref: "Reference to build or supply-chain provenance, such as SLSA/in-toto-style attestation metadata."
  rollback_ref: "Reference to metadata that explains how to return to the previous known-good install state."
decision:
  selected_option: "evidence_gated_distribution_admission"
  rejected_options:
    - id: "github_ref_install_without_admission"
      reason: "Floating branches and unverified downloads do not prove artifact origin, integrity, or compatibility."
    - id: "checksum_only_for_all_channels"
      reason: "Checksum proves bytes but not build/source provenance or rollback readiness."
    - id: "self_update_bypasses_admission"
      reason: "Self-update is a high-impact action and must not bypass trust policy."
    - id: "dev_channel_general_install"
      reason: "Development channel artifacts are not suitable for general users without a separate development trust model."
rules:
  - id: "deny_by_default"
    rule: "Distribution admission is blocked until required evidence is present."
  - id: "immutable_source_required"
    rule: "source_ref must contain an immutable commit-like hash; floating branch refs are rejected."
  - id: "artifact_integrity_required"
    rule: "At least one valid sha256 checksum or signature reference is required."
  - id: "provenance_required"
    rule: "A provenance or attestation reference is required."
  - id: "version_compatibility_required"
    rule: "Artifact version and compatible Forge Core version are required."
  - id: "rollback_required"
    rule: "Rollback metadata is required before update/install admission."
  - id: "update_summary_required"
    rule: "A summary reference is required so an agent can explain what changed to the human."
  - id: "canary_requires_opt_in"
    rule: "Canary distribution requires explicit opt-in; dev channel is blocked for general install."
evidence_basis:
  - source_id: "slsa_framework_spec"
    supports: "Provenance and expected source/build evidence for software artifacts."
  - source_id: "sigstore_docs"
    supports: "Signing and transparency-backed verification for software artifacts."
  - source_id: "tuf_specification"
    supports: "Secure update clients need trusted target/version metadata and rollback considerations."
  - source_id: "in_toto_spec"
    supports: "Attestations can represent supply-chain steps and provenance."
  - source_id: "owasp_llm06_excessive_agency"
    supports: "High-impact actions should avoid excessive autonomy and permissions."
implementation_refs:
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - "forge-core host-adapter-distribution-policy --json emits default_admission=blocked."
  - "Distribution policy requires immutable source ref, artifact checksum/signature, provenance, version compatibility, rollback, and update summary."
  - "forge-core host-adapter-admit-distribution blocks missing source/provenance/rollback evidence."
  - "Admission rejects floating source refs such as @main."
  - "Admission allows complete stable evidence with sha256, immutable source ref, provenance, compatibility, rollback, and summary."
  - "Canary requires explicit opt-in; dev channel is blocked for general install."
inference_boundary: "The evidence supports admission requirements and metadata shape. It does not yet implement cryptographic verification, transparency-log lookup, package signing, release publishing, or rollback execution."
failure_modes_prevented:
  - "User installs a host adapter from a floating branch with no provenance."
  - "Update proceeds without rollback metadata."
  - "Agent presents a dev build as a normal user update."
  - "Self-update bypasses supply-chain trust checks."
next_boundary:
  id: "sigstore_fulcio_certificate_identity_boundary"
  question: "How should Forge verify Fulcio certificate chain, certificate identity extensions, expected OIDC issuer, and workflow identity selectors against the trusted-root policy without treating policy validation as cryptographic proof?"

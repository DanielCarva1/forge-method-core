schema_version: "0.1"
policy: "legacy_stdout_compatibility_boundary"
status: "accepted"
purpose: "Decide how forge-contract-validator behaves after forge-core-cli becomes the validation authority."
decision:
  selected_strategy: "compatibility_wrapper_with_legacy_stdout"
  legacy_binary: "forge-contract-validator"
  validation_authority: "forge-core-cli run_validate"
  legacy_stdout_contract:
    status: "preserved"
    success_prefix: "rust_contract_validation_passed"
    fields:
      - "yaml_files"
      - "gate_contracts"
      - "decision_contracts"
      - "runtime_contracts"
      - "tool_effect_contracts"
      - "request_contracts"
      - "eval_contracts"
      - "recovery_contracts"
      - "operation_policies"
      - "command_contracts"
      - "inventory_contracts"
      - "evidence_sources"
      - "operation_fixtures"
  machine_surface:
    canonical: "forge-core validate --root <path> --json"
    compatibility: "forge-contract-validator <path>"
  retirement_status: "not_allowed_without_deprecation_release"
rules:
  - id: "legacy_binary_must_not_own_validation"
    rule: "forge-contract-validator may render compatibility output, but pass/fail authority must come from forge-core-cli/run_validate."
  - id: "legacy_stdout_is_public_compat_contract"
    rule: "Do not change the rust_contract_validation_passed prefix or field names without an explicit breaking release/deprecation policy."
  - id: "json_is_new_agent_surface"
    rule: "New automation, agents, MCP, app, and CI integrations should consume forge-core-cli JSON, not parse legacy stdout."
  - id: "failure_output_is_diagnostics"
    rule: "On failure, the compatibility binary prints structured diagnostic fields to stderr and exits non-zero."
implementation_evidence:
  crate_refs:
    - "crates/forge-contract-validator/src/main.rs"
    - "crates/forge-contract-validator/tests/parity.rs"
    - "crates/forge-core-cli/src/lib.rs"
  validation:
    - "cargo test -p forge-contract-validator legacy_validator_and_forge_core_cli_both_pass_current_repo"
    - "cargo test -p forge-contract-validator"
evidence_basis:
  direct_patterns:
    - source_id: "semver_2_0_0"
      supports: "Changing public behavior in an incompatible way requires a major/breaking release boundary."
    - source_id: "cli_guidelines_clig_dev"
      supports: "CLI success/failure should be represented by exit code; machine-readable output belongs on stdout."
    - source_id: "rust_cli_machine_readable_output"
      supports: "Rust CLIs should expose JSON or another self-describing machine-readable output."
    - source_id: "bash_in_the_wild_2022"
      supports: "Shell scripts are widespread and brittle enough that compatibility output should be treated carefully."
    - source_id: "code_as_agent_harness_2605_18747"
      supports: "Validation should be executable and inspectable harness behavior."
    - source_id: "policy_first_control_2603_18059"
      supports: "Policy transitions need explicit traceable evidence."
  inference_boundary: "The sources support backward-compatible CLI migration and structured output. Forge's exact wrapper shape is a local product decision based on the current legacy stdout contract."
failure_modes_prevented:
  - "scripts break because the legacy validator disappears or changes stdout"
  - "legacy string-scanning validator remains a second validation authority"
  - "new agents keep parsing legacy stdout instead of JSON"
  - "major behavior changes ship as silent internal refactors"
next_boundary:
  id: "rust_runtime_execution_boundary"
  question: "After validation and compatibility are stabilized, which Rust runtime execution boundary should be implemented next without recreating the old giant Python runtime?"

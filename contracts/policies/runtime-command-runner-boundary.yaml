schema_version: "0.1"
policy: "runtime_command_runner_boundary"
status: "accepted"
purpose: "Define how forge-core-kernel executes staged read-only CommandContract commands without allowing host-agent prose, shell strings, mutation, network, or irreversible commit."
decision:
  selected_strategy: "staged_read_only_command_runner_with_typed_result"
  runtime_api:
    - "run_staged_read_only_command(staging: &RuntimeEffectStagingPlan, command: &CommandContractDocument, context: &CommandExecutionContext) -> RuntimeCommandExecution"
  runner_owns:
    - "verify staging status is staged"
    - "verify command id exists in staged command refs"
    - "validate CommandContractDocument before execution"
    - "reject non-read-only command side effects"
    - "reject network-enabled commands"
    - "reject shell executors and shell-string authority"
    - "reject unsafe flags for file writes, publishing, or package installs"
    - "check platform compatibility"
    - "check required and forbidden environment variables"
    - "execute through direct process argv, not shell string"
    - "capture bounded stdout and stderr"
    - "enforce timeout with explicit child kill and wait"
    - "return typed status, reasons, exit code, timeout flag, duration, output, and truncation flags"
  runtime_does_not_do:
    - "execute mutating commands"
    - "execute shell scripts or shell command strings"
    - "grant network authority"
    - "install packages"
    - "write project files"
    - "apply ToolEffectContract writes"
    - "commit or rollback effects"
    - "record command evidence to store"
    - "select commands from natural-language host-agent text"
rules:
  - id: "staged_command_ref_required"
    rule: "A command can run only when RuntimeEffectStagingPlan.status is staged and the command id appears in command_refs."
  - id: "read_only_only"
    rule: "The first command runner boundary executes only CommandSideEffectPolicy::ReadOnly commands."
  - id: "network_disabled_only"
    rule: "NetworkPolicy must be disabled for command execution in this boundary."
  - id: "no_shell_boundary"
    rule: "Powershell, sh, shell strings, and shell-authorized commands are blocked until a separate shell-specific policy exists."
  - id: "safe_flags_required"
    rule: "writes_files, publishes, and installs_packages safety flags must be false."
  - id: "timeout_required"
    rule: "timeout_ms must be positive, and timeout handling must kill and wait on the child process."
  - id: "bounded_output_required"
    rule: "stdout and stderr must be captured with output_policy.max_bytes and truncation flags."
  - id: "typed_result_required"
    rule: "Execution must return RuntimeCommandExecution, never freeform host-agent interpretation."
tradeoffs:
  chosen:
    advantages:
      - "Turns command execution into a runtime-owned boundary instead of a host-agent habit."
      - "Gives adapters one portable execution result shape across Codex, Cursor, opencode, Claude, VS Code, pi.dev, and future Forge app."
      - "Allows useful validation/build/read-only commands before mutating transaction semantics are done."
      - "Keeps irreversible effects and evidence recording outside this narrow runner."
      - "Makes timeout and child-process cleanup explicit in Rust."
    disadvantages:
      - "Shell scripts and existing project-specific shell validation commands remain blocked until a later policy."
      - "Read-only is a declared contract and cannot fully prove that an arbitrary executable will not write internally."
      - "The runner returns evidence but does not persist it yet."
      - "Adapters still need a later command registry/store boundary to resolve command refs into command documents."
  rejected:
    - id: "host_agent_runs_shell_from_next_step"
      reason: "Recreates drift where the host agent interprets Forge state and invents execution."
    - id: "execute_all_staged_commands"
      reason: "Would run mutating, network, publish, or shell commands before their policy and transaction boundaries exist."
    - id: "defer_all_commands_until_effect_transactions"
      reason: "Would block useful read-only validation even though staged command admission can be made narrow and auditable now."
    - id: "use_shell_for_portability"
      reason: "Shell improves convenience but widens injection, quoting, platform, and process-control risk."
acceptance:
  crate:
    - "CommandExecutionContext exists in forge-core-kernel."
    - "RuntimeCommandExecution returns typed status, reasons, exit code, timeout, duration, output, truncation, and validation counts."
    - "run_staged_read_only_command executes only staged read-only commands."
    - "Shell executors, mutating commands, network commands, unsafe flags, missing env, forbidden env, unsupported platform, and zero timeout block before spawn."
  tests:
    - "staged read-only cargo command succeeds and returns typed evidence."
    - "unstaged command is not run."
    - "mutating command is blocked before spawn."
    - "shell executor is blocked."
    - "zero timeout is blocked."
  validation:
    - "cargo test -p forge-core-kernel"
    - "cargo test --workspace"
    - "cargo clippy --workspace -- -D warnings"
evidence_basis:
  direct_patterns:
    - source_id: "cordon_semantic_transactions_2606_17573"
      supports: "Separate staged execution from irreversible commit and rollback."
    - source_id: "runtime_governance_paths_2603_16586"
      supports: "Evaluate actions through runtime policy before execution."
    - source_id: "runtime_enforcement_2503_18666"
      supports: "Runtime-enforced rules can block unsafe actions before tool execution."
    - source_id: "solver_policy_tool_agents_2603_20449"
      supports: "Tool calls should be constrained by formal preconditions before execution."
    - source_id: "tool_use_orchestration_survey_2603_22862"
      supports: "Tool orchestration needs recoverability, safety, and verifiability around execution."
    - source_id: "local_llm_agents_vulnerable_runtimes_2606_21071"
      supports: "Local agent runtime shell/filesystem/process layers are privileged attack surfaces."
    - source_id: "parallax_cognitive_executive_separation_2604_12986"
      supports: "Separate reasoning/planning from action execution and validation."
    - source_id: "rust_std_child_process_official"
      supports: "Child processes require explicit wait or kill/wait; dropping Child is not cleanup."
  inference_boundary: "The evidence supports runtime-owned admission, typed execution, cognitive/executive separation, and process cleanup. Forge's exact enum names and output fields are local Rust implementation choices."
failure_modes_prevented:
  - "host agent runs a shell command copied from prose"
  - "unstaged command executes because it appears plausible"
  - "mutating command runs before ToolEffectContract transaction semantics"
  - "network or publish command runs inside a read-only validation step"
  - "long-running child process survives timeout"
  - "large stdout/stderr floods the host context"
  - "command output is summarized by the model without typed evidence"
next_boundary:
  id: "runtime_effect_transaction_boundary"
  question: "After read-only command evidence can be recorded, how should Forge load ToolEffectContract bodies, check read/write freshness, and apply append/create/write effects with transaction and rollback semantics?"

schema_version: "0.1"
policy: "sigstore_bundle_subject_binding_boundary"
status: "active"
summary: "Forge Core verifies Sigstore v0.3 Message Signature bundle subject binding by composing artifact digest, bundle signature content, Fulcio certificate identity, and Rekor transparency evidence without claiming DSSE, TSA, revocation, or TUF freshness."
canonical_terms:
  sigstore_bundle_subject_binding: "Read-only verification that the artifact digest, bundle messageSignature digest, certificate signing key, Fulcio identity evidence, and Rekor body/inclusion evidence all refer to the same signed subject."
  message_signature_bundle: "Sigstore bundle content branch where messageSignature signs an artifact digest rather than a DSSE in-toto statement."
  rekor_body_binding: "Check that the Rekor log entry body embeds the same artifact digest and signature as the bundle content."
decision:
  selected_option: "message_signature_subject_binding_before_dsse"
  rejected_options:
    - id: "single_full_bundle_verifier"
      reason: "Would collapse messageSignature, DSSE, Rekor, TSA, CT, revocation, and TUF freshness into an opaque result with weak failure isolation."
    - id: "bundle_presence_is_enough"
      reason: "A bundle may contain verification material and content, but Forge must bind those fields to the artifact and policy."
    - id: "dsse_now"
      reason: "DSSE needs in-toto payload canonicalization, payload type, single signature constraints, and statement subject matching as a separate boundary."
rules:
  - id: "read_only_verifier"
    rule: "The bundle subject verifier is read-only and must not install, update, rollback, delete, write project state, or mutate artifacts."
  - id: "message_signature_v03_only"
    rule: "This boundary accepts application/vnd.dev.sigstore.bundle.v0.3+json bundles with messageSignature content only."
  - id: "artifact_digest_required"
    rule: "The verifier must compute artifact SHA-256 and compare it to the bundle messageDigest."
  - id: "certificate_material_required"
    rule: "The bundle certificate rawBytes must match the provided leaf certificate used by Fulcio identity verification."
  - id: "signature_key_binding_required"
    rule: "The bundle signature must verify over the bundle message digest with the P-256 public key from the leaf certificate."
  - id: "fulcio_identity_required"
    rule: "Fulcio certificate identity verification must pass using the Rekor integrated time as the certificate validity time."
  - id: "rekor_inclusion_required"
    rule: "Rekor log entry inclusion and checkpoint verification must pass against the expected Rekor log id and public key."
  - id: "rekor_body_binding_required"
    rule: "The Rekor body must embed the same artifact digest and signature content as the bundle."
  - id: "typed_output_required"
    rule: "Verifier output must include status, digest, signature hash, Rekor integrated time, Fulcio status, Rekor status, reasons, verified_evidence, and inference_boundary."
evidence_basis:
  - source_id: "sigstore_bundle_format_docs"
    supports: "Bundle verification material and content are distinct, and messageSignature is a signature over an artifact hash."
  - source_id: "sigstore_go_artifact_policy"
    supports: "Artifact digest policies and certificate identity policies are separate and both are required for safe verification."
  - source_id: "fulcio_spec_oidc_certificate_binding"
    supports: "Fulcio certificates bind identity and public key material used for verification."
  - source_id: "sigstore_rekor_docs"
    supports: "Rekor evidence proves signed software release transparency log inclusion."
  - source_id: "intoto_statement_subject_spec"
    supports: "DSSE/in-toto subject binding is a separate future branch."
  - source_id: "software_signing_industry_study_2025"
    supports: "Software signing needs clear policy and usable verification boundaries, not signing metadata alone."
implementation_refs:
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - "forge-core host-adapter-verify-sigstore-bundle-subject --json returns status=passed for a generated v0.3 messageSignature bundle whose artifact digest, certificate key, Fulcio identity, and Rekor body all match."
  - "The verifier fails when the bundle messageDigest does not match the artifact."
  - "The verifier fails when the Rekor body digest or signature does not match the bundle."
  - "The verifier fails when Fulcio identity verification fails at the Rekor integrated time."
  - "The host adapter manifest exposes host-adapter-verify-sigstore-bundle-subject as read-only validation with no workflow authority."
  - "Verifier output states that DSSE envelopes, RFC3161 TSA signatures, CT SCTs, revocation, TUF freshness, policy thresholds, install/update authority, and post-quantum algorithms are outside this boundary."
geographic_coverage:
  searched_non_western_sources: true
  result: "No directly stronger China-origin source was found for Sigstore bundle subject binding during this pass. The relevant authority is the Sigstore/in-toto protocol and mature verifier behavior."
  implication: "Use China-origin agent/runtime papers for orchestration and state-governance decisions; do not pad cryptographic boundaries with unrelated geography."
inference_boundary: "This boundary verifies Sigstore v0.3 messageSignature subject binding across artifact digest, certificate signing key, Fulcio identity evidence, Rekor body, and Rekor inclusion. It does not verify DSSE envelopes, RFC3161 TSA signatures, certificate transparency SCTs, revocation status, TUF metadata freshness, policy thresholds, installer mutation authority, or post-quantum algorithms."
failure_modes_prevented:
  - "Agent treats a bundle file as proof without checking the artifact digest it signs."
  - "Bundle signature is accepted without being tied to the Fulcio certificate public key."
  - "Rekor inclusion is accepted for a different digest or signature than the bundle content."
  - "Message Signature support is overclaimed as DSSE/in-toto subject support."
next_boundary:
  id: "sigstore_dsse_in_toto_subject_boundary"
  question: "How should Forge verify DSSE Sigstore bundles whose payload is an in-toto statement, including payload type, single-signature constraint, subject digest matching, and certificate identity?"

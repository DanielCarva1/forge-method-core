schema_version: "0.1"
policy: "sigstore_rekor_backend_boundary"
status: "active"
summary: "Forge Core verifies Rekor log entry inclusion and signed checkpoints in Rust before adapters may treat transparency evidence as valid release evidence."
canonical_terms:
  sigstore_rekor_backend: "Rust-owned verifier boundary that checks Rekor log entry parsing, expected log identity, signed checkpoint authenticity, and Merkle inclusion proof validity."
  rekor_log_entry: "A Rekor API log entry containing body, log identity, integrated time, index, inclusion proof, checkpoint, and signed-entry metadata."
  signed_checkpoint: "Transparency log checkpoint signed by a trusted Rekor key and used as the committed root for Merkle inclusion verification."
  fulcio_bundle_identity_backend: "Future boundary that verifies canonical Sigstore bundle content, Fulcio certificate chains, identity policy, timestamping, and revocation without changing host adapter authority."
decision:
  selected_option: "rust_owned_rekor_checkpoint_verifier"
  rejected_options:
    - id: "host_adapter_calls_cosign_or_rekor_directly"
      reason: "Would duplicate trust-root and verification behavior across Codex, Cursor, Claude, OpenCode, VS Code, pi.dev, and Forge standalone."
    - id: "treat_sigstore_bundle_presence_as_complete_verification"
      reason: "Sigstore bundle material must be interpreted under explicit policy; presence alone does not verify certificate identity or transparency."
    - id: "make_sigstore_rs_a_runtime_dependency_for_rekor_now"
      reason: "sigstore-rs is useful field evidence, but importing it for a narrow offline Rekor proof would bring pre-1.0 API and network/TLS dependencies into the core."
rules:
  - id: "read_only_rekor_verifier"
    rule: "The Rekor verifier is read-only and must not install, update, rollback, delete, or mutate Forge project state."
  - id: "expected_log_id_required"
    rule: "Verification must compare the observed Rekor log id with an explicit expected log id."
  - id: "trusted_rekor_key_required"
    rule: "Verification must use a Rekor public key supplied by a trusted-root policy or explicit test fixture."
  - id: "signed_checkpoint_required"
    rule: "A Rekor entry without a signed checkpoint is not accepted as transparency proof."
  - id: "merkle_inclusion_required"
    rule: "The Rekor entry body must verify against the inclusion proof and the checkpoint root."
  - id: "fulcio_not_implied"
    rule: "Passing Rekor verification must not be reported as Fulcio certificate chain, identity, revocation, TSA, or full Sigstore bundle verification."
  - id: "host_adapters_obey_typed_result"
    rule: "Adapters may consume only the typed verification result; they must not reinterpret raw Rekor metadata as workflow authority."
evidence_basis:
  - source_id: "sigstore_rekor_docs"
    supports: "Rekor is a transparency log and provides inclusion/log integrity verification tooling."
  - source_id: "transparency_dev_checkpoint_format"
    supports: "Signed checkpoint format enables interoperable signed log roots and witness workflows."
  - source_id: "rfc6962_merkle_audit_paths"
    supports: "Merkle audit paths prove leaf inclusion in a committed tree root."
  - source_id: "sigstore_rs_014_rekor_backend"
    supports: "The Rust implementation confirms the Rekor checkpoint/inclusion semantics Forge implements directly."
  - source_id: "sigstore_bundle_format_docs"
    supports: "Sigstore bundle verification includes verification material and signature content; Rekor inclusion is one layer."
  - source_id: "software_signing_industry_study_2025"
    supports: "Signing value depends on correct verification policy and usable trust-root handling."
implementation_refs:
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - "forge-core host-adapter-verify-rekor-entry --json returns status=passed for a Rekor log entry with expected log id, trusted public key, signed checkpoint, and valid Merkle inclusion proof."
  - "The verifier fails when the expected log id does not match the observed log id."
  - "The verifier fails when the Rekor checkpoint signature is validated with the wrong public key."
  - "The host adapter manifest exposes host-adapter-verify-rekor-entry as read-only validation with no workflow authority."
  - "The verifier output states that Fulcio identity, full Sigstore bundle semantics, timestamp authority, revocation, and install authority are outside this boundary."
inference_boundary: "This boundary verifies Rekor log entry inclusion proof and signed checkpoint authenticity under an expected Rekor public key and log id. It does not verify Fulcio certificate chains, OIDC identity policy, complete Sigstore bundle subject semantics, TSA, revocation, trusted-root distribution, or release install authority."
failure_modes_prevented:
  - "Agent treats a raw Rekor entry as verified transparency evidence."
  - "Agent accepts inclusion proof metadata without a signed checkpoint."
  - "Agent accepts a Rekor entry from an unexpected log."
  - "Agent treats Rekor inclusion as full Fulcio or Sigstore bundle verification."
next_boundary:
  id: "sigstore_fulcio_certificate_identity_boundary"
  question: "How should Forge verify Fulcio certificate chain, certificate identity extensions, expected OIDC issuer, and workflow identity selectors against the trusted-root policy without treating policy validation as cryptographic proof?"

schema_version: "0.1"
policy: "sigstore_trusted_root_policy_boundary"
status: "active"
summary: "Forge Core validates a typed Sigstore trusted-root policy before any adapter or later verifier may claim Fulcio, Rekor, CT, TSA, or identity verification readiness."
canonical_terms:
  sigstore_trusted_root_policy: "Forge-owned policy that names trusted-root source, Fulcio CA references, Rekor trust material, optional certificate transparency material, timestamp source policy, and expected identity semantics."
  trusted_root_source: "Declared origin of trust material: tuf, pinned, or manual."
  identity_policy: "Expected OIDC issuer plus certificate or workflow identity selectors that later Fulcio verification must enforce."
  timestamp_policy: "Allowed temporal validity source: Rekor integrated time, RFC3161 timestamp authority, or either with at least one concrete source."
decision:
  selected_option: "typed_trusted_root_policy_before_full_bundle_verification"
  rejected_options:
    - id: "single_full_sigstore_boundary_now"
      reason: "Would overclaim because trusted-root distribution, Fulcio certificate identity, bundle subject binding, TSA, and revocation each need separate cryptographic checks and fixtures."
    - id: "host_adapter_interprets_sigstore_policy"
      reason: "Would make Codex, Cursor, Claude, OpenCode, VS Code, pi.dev, and Forge standalone drift on supply-chain authority."
    - id: "raw_trusted_root_json_as_contract"
      reason: "Sigstore trusted_root data is necessary verification material, but Forge also needs product policy for identity, timestamp source, and adapter authority."
rules:
  - id: "read_only_policy_verifier"
    rule: "The trust-policy verifier is read-only and must not install, update, rollback, delete, or mutate Forge project state."
  - id: "schema_version_required"
    rule: "Policy documents must declare schema_version 0.1 until a future schema migration is closed."
  - id: "root_source_required"
    rule: "root_source must be one of tuf, pinned, or manual."
  - id: "trusted_root_ref_required"
    rule: "trusted_root_ref must be non-empty so later verification can report which trust material was used."
  - id: "fulcio_required_for_sigstore_identity"
    rule: "Fulcio must be required and must have at least one certificate authority reference before Forge can proceed toward Fulcio identity verification."
  - id: "rekor_material_if_required"
    rule: "When Rekor is required, both log_ids and public_key_refs must be non-empty."
  - id: "ct_material_if_required"
    rule: "When certificate transparency is required, both log_ids and public_key_refs must be non-empty."
  - id: "timestamp_source_consistent"
    rule: "rekor_integrated_time requires Rekor material, rfc3161_tsa requires TSA certificate refs, and either requires at least one of those sources."
  - id: "identity_policy_required"
    rule: "An expected OIDC issuer plus at least one identity selector must be present."
  - id: "git_sha_must_be_immutable"
    rule: "If expected_github_sha is present, it must be a 40-character hexadecimal git commit id."
  - id: "verification_not_implied"
    rule: "Passing this policy does not verify certificate chains, bundle signatures, Rekor inclusion, TSA signatures, revocation, or install authority."
evidence_basis:
  - source_id: "sigstore_security_model"
    supports: "Fulcio and trusted-root material are central to Sigstore verification."
  - source_id: "sigstore_trusted_root_proto"
    supports: "Sigstore trusted root covers Fulcio CAs, transparency logs, and timestamp authorities as distinct trust material."
  - source_id: "sigstore_timestamps_docs"
    supports: "Timestamp verification requires an explicit source and validity-window reasoning."
  - source_id: "fulcio_oid_info"
    supports: "Fulcio certificate identity semantics depend on issuer/workflow-specific OIDC claims."
  - source_id: "sigstore_go_verify_policy"
    supports: "Mature Sigstore verification separates trust material, artifact digest, and identity policy."
  - source_id: "sigstore_usability_case_study_2025"
    supports: "Practitioners struggle when Sigstore component responsibilities and deployment choices are unclear."
implementation_refs:
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - "forge-core host-adapter-verify-sigstore-trust-policy --json returns status=passed for a complete trusted-root policy."
  - "The verifier fails when Fulcio is required but certificate_authority_refs is empty."
  - "The verifier fails when rfc3161_tsa is selected without timestamp authority certificate refs."
  - "The host adapter manifest exposes host-adapter-verify-sigstore-trust-policy as read-only validation with no workflow authority."
  - "The verifier output states that Fulcio certificate chain, OIDC certificate extensions, bundle subject binding, Rekor inclusion, TSA signatures, revocation, TUF freshness, and release install authority are outside this boundary."
geographic_coverage:
  searched_non_western_sources: true
  result: "No directly stronger China-origin source was found for this narrow Sigstore trusted-root/Fulcio/Rekor policy boundary during this pass."
  implication: "Do not pad the source list with unrelated Chinese agent papers; use China-origin agent/runtime papers where the boundary is agent orchestration, multi-agent coordination, or runtime state."
inference_boundary: "This boundary validates Forge's typed Sigstore trust-policy readiness. It does not verify actual Sigstore bundles, Fulcio certificate chains, OIDC certificate extensions, Rekor inclusion proofs, RFC3161 timestamp signatures, revocation status, TUF metadata freshness, or install/update mutation authority."
failure_modes_prevented:
  - "Agent claims full Sigstore verification after only Rekor or checksum evidence."
  - "Adapter performs Sigstore policy interpretation differently across host surfaces."
  - "Bundle/Fulcio verifier is implemented without an explicit trusted-root and identity policy."
  - "Timestamp validity is implied without declared Rekor or TSA trust material."
next_boundary:
  id: "sigstore_fulcio_certificate_identity_boundary"
  question: "How should Forge verify Fulcio certificate chain, certificate identity extensions, expected OIDC issuer, and workflow identity selectors against the trusted-root policy without treating policy validation as cryptographic proof?"

schema_version: "0.1"
policy: "schema_generation_authority"
status: "accepted"
purpose: "Define how Forge Core turns locked YAML contract families into Rust/Serde types, generated schemas, and compact agent-facing views without reintroducing Markdown or Python authority."
decision:
  source_of_truth_sequence:
    - stage: "bootstrap"
      authority: "locked_yaml_contract_inventory"
      rule: "The locked v0 contract-family inventory defines which contract families must be translated into Rust types."
    - stage: "rust_core"
      authority: "rust_serde_domain_types"
      rule: "After Rust structs/enums exist, they become the executable source of contract shape and validation behavior."
    - stage: "interop"
      authority: "generated_json_schema"
      rule: "JSON Schema is generated from Rust types for tooling, IDEs, external integrations, and optional schema conformance checks."
    - stage: "agent_context"
      authority: "generated_compact_agent_views"
      rule: "Agents receive compact views derived from Rust/YAML contracts instead of full schema dumps by default."
  selected_strategy: "rust_types_from_locked_inventory_then_generated_schema_and_compact_views"
  rejected_strategies:
    - id: "json_schema_primary_source"
      reason: "JSON Schema is strong for validation but weaker as an affirmative Rust domain-type construction source; broad schema features can create impedance mismatch."
    - id: "markdown_contract_source"
      reason: "Markdown runtime authority conflicts with the human-agent interface policy and increases drift."
    - id: "python_codegen_or_validation"
      reason: "Python is not an acceptance authority for the Rust core."
    - id: "full_schema_context_dump"
      reason: "Large schema surfaces waste agent context and can degrade tool selection and RAG performance."
generation_pipeline:
  - step: "load_inventory"
    input_refs:
      - "contracts/inventory/v0-contract-family-lock.yaml"
    output: "ordered contract family worklist"
    acceptance: "inventory validates with Rust."
  - step: "author_rust_domain_types"
    input_refs:
      - "contracts/*/*-contract-v0.yaml"
      - "docs/fixtures/operation-contract-v0/*.yaml"
    output: "Rust structs/enums with serde derives and deny_unknown_fields where compatible."
    acceptance: "cargo test and fixture deserialization pass."
  - step: "generate_json_schema"
    input: "Rust domain types"
    output: "generated JSON Schema artifacts."
    acceptance: "generated schemas are produced by Rust tooling and can validate known fixtures."
  - step: "generate_compact_agent_views"
    input: "Rust domain types plus field descriptions/evidence refs"
    output: "small YAML/JSON summaries for agent guidance."
    acceptance: "agent views preserve ids, enums, authority fields, required refs, and evidence boundaries without dumping full schemas."
  - step: "compare_with_locked_yaml"
    input: "locked contract definitions and generated artifacts"
    output: "schema drift report"
    acceptance: "no missing family, enum, required authority field, or side-reference path."
rules:
  - id: "rust_validates_every_contract_instance"
    rule: "Every contract instance in the inventory must deserialize into a Rust type or a typed transitional enum before it can be considered accepted."
  - id: "serde_unknown_fields_policy"
    rule: "Use deny_unknown_fields for authority-bearing structs unless a field is explicitly modeled as forward-compatible extension data."
  - id: "json_schema_is_generated"
    rule: "Do not hand-maintain JSON Schema as primary source for Forge Core contracts."
  - id: "compact_views_are_not_authority"
    rule: "Compact agent views are derived read models; they can guide agents but cannot override Rust validation or contract instances."
  - id: "schema_features_are_conservative"
    rule: "Generated JSON Schema should avoid relying on obscure features for core correctness until validator conformance is tested."
  - id: "no_python_in_pipeline"
    rule: "Schema generation, validation, and fixture conformance must run through Rust tooling."
  - id: "no_markdown_runtime_output"
    rule: "Generated Markdown is allowed only for final README/install/release-note surfaces, not contract authority."
pros:
  - "Rust owns domain semantics, enums, ownership, and lifecycle invariants."
  - "Serde gives one implementation path for YAML and JSON contract instances."
  - "Schemars/jsonschema can provide interoperability without duplicating contract truth."
  - "Compact views address agent context pressure without sacrificing full validation."
cons:
  - "Initial Rust type authoring is more work than loose YAML validation."
  - "Some YAML contract descriptions must become structured metadata before useful schemas can be generated."
  - "Generated JSON Schema may not represent every Rust semantic invariant; Rust validators still need custom checks."
mitigations:
  - "Keep custom Rust validators for cross-file refs, authority policy, destructive effects, and inventory locks."
  - "Add schema drift reports before deleting transitional YAML contract definitions."
  - "Treat compact agent views as generated artifacts with regression tests, not handwritten summaries."
implementation_evidence:
  crate_refs:
    - "crates/forge-core-schema/src/lib.rs"
    - "crates/forge-core-schema/src/main.rs"
    - "crates/forge-core-schema/tests/generated_views.rs"
  generated_outputs:
    - "cargo run -p forge-core-schema --quiet -- schemas"
    - "cargo run -p forge-core-schema --quiet -- views"
  validation:
    - "cargo test -p forge-core-schema"
evidence_basis:
  direct_patterns:
    - source_id: "schema_first_tool_apis_2603_13404"
      supports: "Schema-backed contracts and structured diagnostics improve interface governance but do not replace semantic evaluation."
    - source_id: "serde_official"
      supports: "Serde maps Rust data structures to multiple formats through derive/trait-based serialization."
    - source_id: "schemars_official"
      supports: "JSON Schema can be generated from Rust types in a Serde-compatible way."
    - source_id: "jsonschema_rust_official"
      supports: "Rust tooling can validate JSON Schema artifacts and instances without Python."
    - source_id: "jsonschemabench_2501_10868"
      supports: "JSON Schema feature coverage and validator behavior require careful testing."
    - source_id: "tool_schema_compression_2605_26165"
      supports: "Large schema surfaces can exhaust agent context; compact schema views are an infrastructure concern."
    - source_id: "rust_json_schema_field_report_2024"
      supports: "JSON Schema is better as validation/interoperability output than as the sole source for constructing Rust domain types."
  non_western_coverage_note: "No China-origin source specific to Rust/Serde schema generation was found in the current focused pass; China-origin sources already in the registry support protocol boundaries, communication contracts, concurrency, and runtime coordination."
  inference_boundary: "The sources support schema-backed harness boundaries, Rust/Serde executable types, generated schemas, and compact views. Forge's product-specific decision is the exact pipeline and authority order."
failure_modes_prevented:
  - "agent treats YAML prose as schema authority after Rust types exist"
  - "JSON Schema and Rust structs diverge silently"
  - "full contract schemas consume agent context and degrade guidance"
  - "Python script becomes hidden acceptance gate"
  - "Markdown resurrects as runtime documentation"

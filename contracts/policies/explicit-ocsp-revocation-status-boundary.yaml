schema_version: "0.1"
policy: "explicit_ocsp_revocation_status_boundary"
status: "active"
runtime_status: "implemented_partial_direct_issuer_only"
summary: "Forge Core verifies explicit supplied/offline OCSP revocation status from a supplied OCSP response and certificate evidence when the BasicOCSPResponse is signed directly by the supplied issuer certificate, reporting good, revoked, unknown, or failed-verification status explicitly while keeping delegated responder authority, network OCSP fetch, CRL inference, CT/Rekor/TUF inference, and install/update authority out of scope."
canonical_terms:
  explicit_ocsp_status: "Revocation status derived from a supplied RFC 6960 OCSP response, not from certificate validity, CRL status, CT, Rekor, timestamp, TUF freshness, or short-lived policy evidence."
  supplied_ocsp_response: "OCSP response bytes supplied as evidence by the caller or host adapter; Forge does not fetch this response from an OCSP responder in this boundary."
  good_by_supplied_ocsp: "The supplied direct-issuer OCSP response verifies successfully and its matching SingleResponse certStatus is good for the supplied certificate at the verification time."
  revoked_by_supplied_ocsp: "The supplied direct-issuer OCSP response verifies successfully and its matching SingleResponse certStatus is revoked for the supplied certificate."
  unknown_by_supplied_ocsp: "The supplied direct-issuer OCSP response verifies successfully and its matching SingleResponse certStatus is unknown for the supplied certificate."
  unknown_due_to_failed_ocsp_verification: "Forge cannot safely report good, revoked, or unknown because OCSP parsing, responder authority, signature, freshness, CertID binding, nonce, or policy checks failed."
decision:
  selected_option: "supplied_ocsp_response_verifier"
  rejected_options:
    - id: "infer_ocsp_from_crl_or_short_lived_policy"
      reason: "CRL membership and short-lived certificate policy are useful boundaries, but neither is an RFC 6960 OCSP response."
    - id: "fetch_ocsp_from_aia_now"
      reason: "Network retrieval, retry policy, responder availability, cache behavior, and privacy leakage belong to a later host/network adapter boundary."
    - id: "accept_ocsp_presence_only"
      reason: "A supplied OCSP response path or blob is not status evidence unless CertID binding, responder authority, signature, freshness, and status are verified."
rules:
  - id: "read_only_verifier"
    rule: "The OCSP status verifier is read-only and must not fetch OCSP, fetch CRLs, install, update, rollback, delete, write project state, or mutate artifacts."
  - id: "explicit_policy_required"
    rule: "Forge must require sigstore_trusted_root_policy.revocation.mode=explicit_status_required for this verifier to pass."
  - id: "supplied_response_required"
    rule: "Forge must require a supplied OCSP response evidence item with a stable content hash; absence of supplied OCSP evidence fails this boundary."
  - id: "response_success_required"
    rule: "Forge must require OCSPResponseStatus=successful before reading BasicOCSPResponse certificate status; non-successful response status fails closed."
  - id: "single_response_binding_required"
    rule: "Forge must bind the OCSP SingleResponse CertID issuerNameHash, issuerKeyHash, serialNumber, and supported hash algorithm to the supplied issuer certificate and target certificate."
  - id: "certificate_signature_required"
    rule: "Forge must verify the supplied target certificate signature with the supplied issuer certificate public key."
  - id: "response_signature_required"
    rule: "Forge must verify the BasicOCSPResponse signature over tbsResponseData with the authorized responder public key."
  - id: "responder_authority_required"
    rule: "The implemented runtime slice accepts the issuing CA itself as the OCSP responder. Delegated OCSP responder certificates remain a pending extension and must fail closed until certificate path, validity, OCSP Signing EKU, and responderID binding are implemented."
  - id: "responder_id_binding_required"
    rule: "Forge must bind responderID byName or byKey to the authorized responder certificate used for signature verification."
  - id: "freshness_required"
    rule: "Forge must require thisUpdate <= verification_time_unix <= nextUpdate for the matching SingleResponse; absent nextUpdate, future thisUpdate, expired nextUpdate, or stale policy evidence fails closed in this boundary."
  - id: "produced_at_not_future"
    rule: "Forge must reject responses with producedAt later than verification_time_unix."
  - id: "nonce_evidence_explicit"
    rule: "Forge must report nonce status explicitly: if request nonce evidence is supplied, the response nonce must match; if no request nonce evidence is supplied, output must say nonce_not_supplied rather than implying freshness from nonce."
  - id: "nonce_mismatch_fails"
    rule: "Forge must fail closed for nonce mismatch, malformed nonce extension, or unsupported critical nonce evidence."
  - id: "revoked_status_fails"
    rule: "If the verified matching OCSP status is revoked, Forge reports revoked_by_supplied_ocsp and returns failed status."
  - id: "unknown_status_fails"
    rule: "If the verified matching OCSP status is unknown, Forge reports unknown_by_supplied_ocsp and returns failed/inconclusive status, not good."
  - id: "good_status_is_scoped"
    rule: "If the verified matching OCSP status is good, Forge reports good_by_supplied_ocsp, not globally not_revoked and not install/update authority."
  - id: "crl_not_implied"
    rule: "Passing OCSP status verification must not be reported as CRL status, CT/Rekor proof, TUF freshness, or install/update authority."
evidence_basis:
  - source_id: "rfc6960_ocsp_certificate_status"
    supports: "RFC 6960 defines OCSP responses, successful response status, BasicOCSPResponse signatures, responder identity, SingleResponse CertID binding, good/revoked/unknown certificate status, and thisUpdate/nextUpdate freshness semantics."
  - source_id: "rfc5280_x509_crl_profile"
    supports: "RFC 5280 defines certificate issuer, certificate signature, key usage, extended key usage, and revocation concepts that must remain distinct from OCSP response evidence."
contract_refs:
  - "contracts/policies/explicit-ocsp-revocation-status-boundary.yaml"
  - "contracts/migration/explicit-ocsp-revocation-status-boundary-grill-audit.yaml"
  - "contracts/backlog/rust-only-core-backlog.yaml"
implemented_runtime_integration:
  - "crates/forge-core-cli/src/lib.rs implements host-adapter-verify-certificate-ocsp-status for supplied/offline direct-issuer OCSP responses."
  - "crates/forge-core-cli/src/main.rs exposes the read-only host-adapter command."
  - "crates/forge-core-cli/tests/validate.rs covers good, revoked, unknown, expired, future thisUpdate, future producedAt, absent nextUpdate, responder mismatch, bad response signature, bad target certificate signature, CertID serial mismatch, unsupported CertID hash, nonce absent, nonce match, nonce mismatch, and JSON CLI output."
pending_runtime_extensions:
  - "Delegated OCSP responder certificate authority with issuer path validation, OCSP Signing EKU, responder certificate validity, responderID binding, and response signature verification with the delegated responder public key."
acceptance:
  - "The read-only verifier accepts supplied direct-issuer OCSP response evidence and reports revocation_status=good_by_supplied_ocsp only when response status, CertID binding, responder authority, signature, freshness, and policy checks all pass."
  - "The verifier fails and reports revocation_status=revoked_by_supplied_ocsp when the verified matching SingleResponse status is revoked."
  - "The verifier fails and reports revocation_status=unknown_by_supplied_ocsp when the verified matching SingleResponse status is unknown."
  - "The verifier fails stale, expired, future-dated, absent-nextUpdate, or otherwise freshness-ambiguous responses for this boundary."
  - "The verifier fails issuer/responder mismatch, unsupported responder authority, bad response signature, bad target certificate signature, and unsupported CertID hash algorithm."
  - "The verifier reports nonce_not_supplied when no request nonce evidence is supplied, passes matching nonce evidence, and fails nonce mismatch or malformed critical nonce evidence."
  - "The host adapter manifest exposes the OCSP verifier as read-only validation with no workflow, install, update, or network authority."
  - "Verifier output lists CRL status, CT/Rekor evidence, TUF freshness, OCSP network fetch, and install/update authority as deferred or out of scope."
inference_boundary: "This boundary verifies explicit supplied/offline direct-issuer OCSP response status only. It does not accept delegated OCSP responder certificates yet, fetch OCSP from Authority Information Access, fetch CRLs, infer OCSP from CRL/CT/Rekor/TUF/short-lived policy evidence, cache responder data, refresh trusted roots, mutate installations, or decide release update authority."
failure_modes_prevented:
  - "An OCSP response path is accepted without response signature verification."
  - "A response for the wrong certificate serial or issuer is accepted."
  - "A response signed by an unauthorized responder is accepted."
  - "An expired or freshness-ambiguous OCSP response is treated as current status."
  - "A revoked or unknown OCSP status is allowed as good."
  - "Nonce absence, mismatch, or unsupported nonce handling is hidden from the caller."
  - "OCSP status is mislabeled as CRL status, CT/Rekor proof, TUF freshness, or global not_revoked."
next_boundary:
  id: "delegated_ocsp_responder_certificate_authority"
  question: "How should Forge accept delegated OCSP responder certificates with issuer path validation, OCSP Signing EKU, responder validity, responderID binding, and response signature verification without adding network fetch or install/update authority?"

schema_version: "0.1"
policy: "explicit_crl_revocation_status_boundary"
status: "active"
summary: "Forge Core verifies explicit local CRL revocation status by checking supplied certificate and issuer binding, CRL issuer binding, CRL signature, CRL freshness, and certificate serial membership, while keeping OCSP, CRL fetching, delta CRLs, indirect CRLs, and install/update authority out of scope."
canonical_terms:
  explicit_crl_status: "Revocation status derived from a supplied X.509 Certificate Revocation List, not from certificate validity, CT, Rekor, timestamp, or short-lived policy evidence."
  good_by_supplied_crl: "The certificate serial is absent from a fresh, issuer-matched, signature-verified supplied CRL."
  revoked_by_supplied_crl: "The certificate serial is present in a fresh, issuer-matched, signature-verified supplied CRL."
  unknown_due_to_failed_crl_verification: "Forge cannot safely report good or revoked because CRL parsing, issuer binding, signature, freshness, or policy checks failed."
decision:
  selected_option: "local_crl_status_verifier"
  rejected_options:
    - id: "treat_short_lived_policy_as_explicit_status"
      reason: "Short-lived certificate policy is useful, but it is not CRL or OCSP evidence."
    - id: "fetch_crl_distribution_points_now"
      reason: "Network retrieval, cache freshness, distribution-point scope, and retry policy belong to a later host/network boundary."
    - id: "ocsp_parser_now"
      reason: "OCSP has separate request/response, responder identity, nonce, freshness, and signed-status semantics."
rules:
  - id: "read_only_verifier"
    rule: "The CRL status verifier is read-only and must not fetch CRLs, query OCSP, install, update, rollback, delete, write project state, or mutate artifacts."
  - id: "explicit_policy_required"
    rule: "Forge must require sigstore_trusted_root_policy.revocation.mode=explicit_status_required for this verifier to pass."
  - id: "issuer_binding_required"
    rule: "Forge must verify the certificate issuer matches the supplied issuer certificate subject."
  - id: "certificate_signature_required"
    rule: "Forge must verify the supplied certificate signature with the supplied issuer certificate public key."
  - id: "crl_issuer_binding_required"
    rule: "Forge must verify the CRL issuer matches the supplied issuer certificate subject."
  - id: "crl_signature_required"
    rule: "Forge must verify the supplied CRL signature with the supplied issuer certificate public key."
  - id: "crl_freshness_required"
    rule: "Forge must require thisUpdate <= verification_time_unix <= nextUpdate."
  - id: "revoked_status_fails"
    rule: "If the certificate serial is present in the verified CRL, Forge reports revoked_by_supplied_crl and returns failed status."
  - id: "good_status_is_scoped"
    rule: "If the certificate serial is absent from the verified CRL, Forge reports good_by_supplied_crl, not globally not_revoked."
  - id: "ocsp_not_implied"
    rule: "Passing CRL status verification must not be reported as OCSP status, TUF freshness, or install/update authority."
evidence_basis:
  - source_id: "rfc5280_x509_crl_profile"
    supports: "RFC 5280 defines CRLs, revoked certificate serial membership, thisUpdate/nextUpdate, and issuer signature semantics."
  - source_id: "rfc6960_ocsp_certificate_status"
    supports: "OCSP is a distinct certificate-status protocol and must not be implied by CRL verification."
implementation_refs:
  - "contracts/policies/explicit-crl-revocation-status-boundary.yaml"
  - "contracts/migration/explicit-crl-revocation-status-boundary-grill-audit.yaml"
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - "forge-core host-adapter-verify-certificate-crl-status --json returns status=passed and revocation_status=good_by_supplied_crl when a fresh signed CRL omits the certificate serial."
  - "The verifier fails and reports revocation_status=revoked_by_supplied_crl when a fresh signed CRL contains the certificate serial."
  - "The verifier fails expired CRLs."
  - "The verifier fails when revocation policy is not explicit_status_required."
  - "The host adapter manifest exposes the verifier as read-only validation with no workflow authority."
  - "Verifier output lists OCSP status, CRL distribution point fetch, delta/indirect CRLs, TUF freshness, and install/update authority as deferred."
inference_boundary: "This boundary verifies explicit local CRL status only. It does not fetch CRL distribution points, process delta or indirect CRLs, verify OCSP responses, refresh TUF trusted roots, mutate installations, or decide release update authority."
failure_modes_prevented:
  - "A CRL path is accepted without signature verification."
  - "An expired CRL is treated as current status."
  - "A CRL from the wrong issuer is accepted."
  - "A revoked certificate is allowed as good."
  - "CRL status is mislabeled as OCSP status or global not_revoked."
next_boundary:
  id: "explicit_ocsp_revocation_status_boundary"
  question: "How should Forge verify signed OCSP response status, responder authority, nonce/freshness, and offline failure policy without confusing OCSP with CRL evidence?"

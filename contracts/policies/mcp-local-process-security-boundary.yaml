schema_version: "0.1"
policy: "mcp_local_process_security_boundary"
status: "active"
summary: "MCP and borrowed-shell exposure must pass through a local-process security boundary that preserves Forge manifest authority, constrains argv/cwd/env/stdio, and blocks MCP stdio mutation until installer trust is validated."
canonical_terms:
  mcp_stdio_adapter: "A local MCP transport adapter that exposes Forge Core capabilities through stdio and must not gain independent mutation authority."
  borrowed_shell_process: "A host-owned local process invocation of forge-core using argv metadata rather than shell strings."
  invocation_admission: "A Rust decision that allows or blocks a host adapter invocation before any local process execution."
  process_security_policy: "Machine-readable policy that tells host adapters the allowed argv, cwd, env, stdio, and command admission constraints."
decision:
  selected_option: "deny_by_default_process_admission"
  rejected_options:
    - id: "mcp_server_as_runtime_authority"
      reason: "Would let the transport layer decide mutations outside Forge OperationContract and runtime admission."
    - id: "shell_string_bridge"
      reason: "Would reintroduce quoting, injection, and platform-specific process-control risk."
    - id: "inherit_host_environment"
      reason: "Would expose provider keys, tokens, and credentials to host adapter subprocesses by default."
    - id: "mcp_stdio_mutation_now"
      reason: "MCP stdio can expose local process execution risk; mutating operation exposure waits for installer trust and server hardening."
rules:
  - id: "deny_by_default"
    rule: "Unknown commands and unadmitted invocations are blocked."
  - id: "manifest_preserved"
    rule: "Admission must derive command identity, mutation_class, and authority_class from HostAdapterManifest."
  - id: "no_shell_strings"
    rule: "Adapters pass argv arrays; shell control tokens are rejected."
  - id: "minimal_env"
    rule: "Adapters do not inherit full environment and must not pass keys containing TOKEN, SECRET, KEY, or PASSWORD."
  - id: "repo_scoped_cwd"
    rule: "Adapters use repo-root scoped cwd; cwd escape markers are rejected."
  - id: "json_stdio_only"
    rule: "Stdio uses JSON arguments/results and must not carry raw payload bytes."
  - id: "mcp_mutation_deferred"
    rule: "MCP stdio exposure blocks mutating operations until installer trust and server hardening are separately validated."
  - id: "explicit_mutation_for_borrowed_shell"
    rule: "Borrowed-shell mutating operations require explicit invocation and still require normal Forge runtime validation."
evidence_basis:
  - source_id: "mcp_tools_spec"
    supports: "MCP tools should be schema-backed capabilities rather than arbitrary command strings."
  - source_id: "mcp_tool_annotations_2603"
    supports: "Tool annotations are advisory and cannot replace authorization or admission."
  - source_id: "mcp_security_best_practices_2026"
    supports: "MCP implementations need explicit security considerations around authorization, tool behavior, and malicious/confused-deputy interactions."
  - source_id: "mcp_authorization_spec_2025_11_25"
    supports: "MCP authorization is a transport-level concern and must not be confused with Forge workflow authority."
  - source_id: "local_llm_agents_vulnerable_runtimes_2606_21071"
    supports: "Local agent runtime layers mediate prompt building, tool dispatch, permissions, memory, and process execution and are a security boundary."
  - source_id: "owasp_llm06_excessive_agency"
    supports: "Agents should not receive excessive functionality, permissions, or autonomy for high-impact actions."
  - source_id: "rust_std_child_process_official"
    supports: "When process execution is later enabled, child lifecycle cleanup must be explicit."
  - source_id: "code_as_agent_harness_2605_18747"
    supports: "Harness behavior should be executable, inspectable, and verifiable."
implementation_refs:
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - "forge-core host-adapter-process-policy --target mcp_stdio --json emits default_admission=blocked."
  - "Process policy sets shell_strings_allowed=false and inherit_full_environment=false."
  - "MCP stdio command admission disables execute-operation."
  - "forge-core host-adapter-admit-invocation blocks execute-operation for mcp_stdio even when --explicit is present."
  - "Borrowed-shell execute-operation is blocked without --explicit and admitted with --explicit before normal Forge runtime validation."
  - "Admission rejects shell control tokens, forbidden env keys, and cwd escape markers."
inference_boundary: "The evidence supports a deny-by-default local process admission layer. It does not yet prove a complete MCP server, package installer trust model, signed binary distribution, or long-running daemon lifecycle."
failure_modes_prevented:
  - "MCP stdio exposes execute-operation as a mutating local process tool too early."
  - "A host adapter turns a projected command into a raw shell string."
  - "Provider keys leak into adapter subprocess environment."
  - "A host agent bypasses manifest authority by calling an unknown command."
next_boundary:
  id: "sigstore_fulcio_certificate_identity_boundary"
  question: "How should Forge verify Fulcio certificate chain, certificate identity extensions, expected OIDC issuer, and workflow identity selectors against the trusted-root policy without treating policy validation as cryptographic proof?"

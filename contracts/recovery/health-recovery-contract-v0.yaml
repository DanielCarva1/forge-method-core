schema_version: "0.1"
contract: "health_recovery_contract"
status: "draft"
purpose: "Classify runtime/agent health and choose a typed recovery action beyond claim TTL so Forge can recover from degraded, stalled, or crashed agents without chat improvisation."
design_rules:
  - id: "health_is_not_ownership"
    rule: "Claim TTL identifies ownership expiry; HealthRecoveryContract classifies runtime health and recovery action."
  - id: "recovery_is_typed"
    rule: "Recovery action, review requirement, request refs, and claim refs are closed fields."
  - id: "no_silent_reassignment"
    rule: "Stalled or crashed agents must produce a recovery request or reviewed handoff before reassignment."
rust_compatibility:
  serialization: "serde"
  id_policy: "stable_ascii_ids"
  timestamp_policy: "rfc3339_utc"
  enum_policy: "closed_for_v0_with_unknown_rejected"
enums:
  status:
    - "healthy"
    - "degraded"
    - "stalled"
    - "crashed"
    - "unknown"
  anomaly_kind:
    - "heartbeat_missed"
    - "tool_failure"
    - "context_degraded"
    - "stale_state"
    - "unresponsive"
    - "crash"
  recovery_action:
    - "none"
    - "record_request"
    - "handoff_to_driver"
    - "reclaim_after_review"
    - "restart_runtime"
    - "open_new_thread"
    - "quarantine_runtime"
  role:
    - "driver"
    - "worker"
    - "runtime"
    - "external_runtime"
required_fields:
  - "id"
  - "contract_ref"
  - "status"
  - "runtime.agent_id"
  - "runtime.role"
  - "heartbeat.last_seen_at"
  - "heartbeat.ttl_seconds"
  - "anomaly.kind"
  - "recovery.action"
  - "recovery.automatic_allowed"
  - "recovery.requires_review"
field_contract:
  id: "Stable health/recovery id."
  status: "Closed health status enum."
  runtime:
    agent_id: "Stable agent/runtime id."
    role: "Closed role enum."
    host: "Host surface, such as codex/cursor/opencode."
  heartbeat:
    last_seen_at: "RFC3339 timestamp or null when unknown."
    ttl_seconds: "Lease/heartbeat TTL."
    missed_heartbeats: "Count of missed heartbeats."
  anomaly:
    kind: "Closed anomaly_kind enum."
    scope: "Project/lane/product-area/story/runtime scope."
    evidence_refs: "Typed refs proving the anomaly."
  recovery:
    action: "Closed recovery_action enum."
    automatic_allowed: "Boolean."
    requires_review: "Boolean."
    request_ref: "Optional RequestContract ref."
    claim_ref: "Optional ClaimContract ref."
    handoff_context_refs: "Compact refs needed to resume safely."
evidence_basis:
  direct_patterns:
    - source_id: "agentops_survey_2508_02121"
      supports: "Agent systems need monitoring, anomaly detection, root-cause analysis, and resolution."
    - source_id: "agentops_observability_2411_05285"
      supports: "AgentOps observability should trace goals, plans, tools, artifacts, and associated runtime data."
    - source_id: "agentscope_2402_14034"
      supports: "Robust multi-agent frameworks include fault-tolerance, retries, monitoring/status, and logs."
    - source_id: "multi_agent_distributed_systems_2026"
      supports: "Multi-agent coding work has distributed-systems failure modes such as stale state, lost updates, and missing recovery path."
  inference_boundary: "The sources support observability, anomaly taxonomy, fault tolerance, and recovery concerns; Forge's v0 decision is a minimal health/recovery contract tied to claims and requests rather than a full daemon."
failure_modes_prevented:
  - "expired claim is treated as healthy runtime"
  - "stalled agent silently loses context"
  - "crashed agent work is reassigned without handoff evidence"
  - "recovery action is invented by host chat instead of selected from policy"

meta:
  scope: "local codebase audit of new Wave 3-4 autonomy contracts, dual-lane router, and CLI command only"
  files_audited:
    - "crates/forge-core-contracts/src/autonomy_policy.rs"
    - "crates/forge-core-contracts/src/verification_goal.rs"
    - "crates/forge-core-contracts/src/agent_run.rs"
    - "crates/forge-core-contracts/src/memory.rs"
    - "crates/forge-core-contracts/src/checkpoint.rs"
    - "crates/forge-core-contracts/src/eval_run.rs"
    - "crates/forge-core-contracts/src/telemetry.rs"
    - "crates/forge-core-decisions/src/autonomy_router.rs"
    - "crates/forge-core-cli/src/autonomy_cmd.rs"
  date: "2026-06-27"
summary:
  total_candidates: 15
  critical: 0
  high: 3
candidates:
  - id: "W4-001"
    kind: "logic-error"
    severity: "high"
    file: "crates/forge-core-decisions/src/autonomy_router.rs"
    line: "76-84"
    problem: "Router can choose Fast for a verification goal whose overall verdict is not all_satisfied if no individual goal has status failed; pending/running/flaky/skipped/not_evaluated are not fail-closed."
    suggested_fix: "Route Rigorous whenever !goal.is_satisfied(), with a specific reason for incomplete/uncertain evidence; only Fast on AllSatisfied."
    effort: "S"
    value: "high"
  - id: "W4-002"
    kind: "logic-error"
    severity: "high"
    file: "crates/forge-core-contracts/src/verification_goal.rs"
    line: "24-26"
    problem: "is_satisfied trusts only overall.value, so inconsistent contracts can claim all_satisfied while containing failed, pending, flaky, or mismatched goal counts; inference: router may then unlock Fast incorrectly."
    suggested_fix: "Make is_satisfied cross-check overall.value, total/satisfied counts, non-empty goals if required, and every goal.status == Passed, or add a separate strict_is_satisfied helper for routing."
    effort: "M"
    value: "high"
  - id: "W4-003"
    kind: "policy-precedence"
    severity: "high"
    file: "crates/forge-core-decisions/src/autonomy_router.rs"
    line: "64-66"
    problem: "Manual per-tool policy overrides are ignored; only default_mode == Manual forces Rigorous, so a policy with SecretAccess/FileEdit Manual override and non-manual default can still route Fast."
    suggested_fix: "Add the proposed ToolClass to route_lane and use policy.effective_mode_for(class), or conservatively route Rigorous when any in-scope tool override is Manual."
    effort: "M"
    value: "high"
  - id: "W4-004"
    kind: "cli-arg-parsing"
    severity: "medium"
    file: "crates/forge-core-cli/src/autonomy_cmd.rs"
    line: "145-153"
    problem: "require_value accepts another flag as the value, so '--policy-file --goal-file x' tries to read a file literally named '--goal-file' instead of reporting a missing value."
    suggested_fix: "Reject missing values and values beginning with '-' for flags that require paths/numbers, matching strict claim/guide-style parsing."
    effort: "S"
    value: "high"
  - id: "W4-005"
    kind: "cli-error-shape"
    severity: "medium"
    file: "crates/forge-core-cli/src/autonomy_cmd.rs"
    line: "82-84"
    problem: "Unknown route arguments bypass CliEnvelope JSON and emit raw stderr even though JSON is the default command output."
    suggested_fix: "Use emit_err for unknown arguments so all route parse failures return the standard envelope unless --no-json was already parsed."
    effort: "S"
    value: "high"
  - id: "W4-006"
    kind: "cli-error-shape"
    severity: "medium"
    file: "crates/forge-core-cli/src/autonomy_cmd.rs"
    line: "25-30"
    problem: "Unknown autonomy subcommands bypass CliEnvelope and exit with raw stderr, unlike the structured command style used by the route handler."
    suggested_fix: "Emit a CliEnvelope error for unknown subcommands or document that only subcommand dispatch errors are unstructured."
    effort: "S"
    value: "medium"
  - id: "W4-007"
    kind: "serde-robustness"
    severity: "medium"
    file: "crates/forge-core-decisions/src/autonomy_router.rs"
    line: "45-48"
    problem: "LaneDecision is a deserializable struct without #[serde(deny_unknown_fields)], despite scoped contract structs consistently denying unknown fields."
    suggested_fix: "Add #[serde(deny_unknown_fields)] to LaneDecision, and consider the same for any persisted engine output structs."
    effort: "S"
    value: "medium"
  - id: "W4-008"
    kind: "policy-robustness"
    severity: "medium"
    file: "crates/forge-core-decisions/src/autonomy_router.rs"
    line: "76-79"
    problem: "High-risk escalation is gated on failed goals only; inference: a high-risk policy with pending/noisy verification can route Fast unless W4-001 is fixed."
    suggested_fix: "Evaluate high-risk escalation for any non-satisfied goal state, not only explicit failed_goals()."
    effort: "S"
    value: "medium"
  - id: "W4-009"
    kind: "policy-configuration"
    severity: "medium"
    file: "crates/forge-core-decisions/src/autonomy_router.rs"
    line: "76-79,104-111"
    problem: "Router ignores policy.escalation.on_high_risk_path and ToolClassPolicy.requires_approval_above, using only a hard-coded HIGH_RISK_THRESHOLD of 70."
    suggested_fix: "Honor on_high_risk_path and compare each class risk_score against its requires_approval_above threshold or a documented default."
    effort: "M"
    value: "medium"
  - id: "W4-010"
    kind: "data-integrity"
    severity: "medium"
    file: "crates/forge-core-contracts/src/memory.rs"
    line: "38-47"
    problem: "mark_stale clears stale to false when last_confirmed_at fails to parse or ttl overflows; invalid freshness data should not silently make stale memories fresh."
    suggested_fix: "Preserve the previous stale value or mark stale=true on parse/overflow errors, and add a diagnostic-returning variant if callers need to surface malformed timestamps."
    effort: "S"
    value: "medium"
  - id: "W4-011"
    kind: "type-safety"
    severity: "medium"
    file: "crates/forge-core-contracts/src/autonomy_policy.rs"
    line: "48-49"
    problem: "risk_score and requires_approval_above are raw u8 values, allowing invalid domain values above 100 for apparent percentage/risk-scale fields."
    suggested_fix: "Introduce a bounded Percent/RiskScore newtype or serde validation that rejects values > 100."
    effort: "M"
    value: "medium"
  - id: "W4-012"
    kind: "type-safety"
    severity: "medium"
    file: "crates/forge-core-contracts/src/memory.rs"
    line: "70"
    problem: "MemoryEntry.confidence is raw u8 and can deserialize values above 100."
    suggested_fix: "Use a bounded Confidence newtype shared with eval quality signals, or validate 0..=100 during deserialization/contract validation."
    effort: "M"
    value: "medium"
  - id: "W4-013"
    kind: "type-safety"
    severity: "medium"
    file: "crates/forge-core-contracts/src/eval_run.rs"
    line: "101"
    problem: "QualitySignals.confidence is raw Option<u8> and can deserialize impossible confidence values above 100."
    suggested_fix: "Reuse a bounded Confidence newtype or add serde validation for 0..=100."
    effort: "M"
    value: "medium"
  - id: "W4-014"
    kind: "type-safety"
    severity: "medium"
    file: "crates/forge-core-contracts/src/telemetry.rs"
    line: "68"
    problem: "SamplingPolicy.rate is documented as per-myriad but is an unconstrained u32, so values above 10_000 deserialize and act like always-on sampling."
    suggested_fix: "Use a PerMyriad newtype or validation rejecting rate > 10_000."
    effort: "M"
    value: "medium"
  - id: "W4-015"
    kind: "test-gap"
    severity: "low"
    file: "crates/forge-core-cli/src/autonomy_cmd.rs"
    line: "36-143"
    problem: "run_route parsing and file-load paths are mostly untested because the handler exits the process; current tests cover only route_lane and require_value."
    suggested_fix: "Refactor parsing/loading into pure functions returning Result/CliEnvelope, then test success, missing values, unknown args, bad u8, unreadable files, and invalid YAML."
    effort: "M"
    value: "medium"
top_5_quick_wins:
  - "W4-001"
  - "W4-004"
  - "W4-005"
  - "W4-007"
  - "W4-010"


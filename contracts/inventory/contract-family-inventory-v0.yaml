schema_version: "0.1"
contract: "contract_family_inventory"
status: "draft"
purpose: "Lock the v0 Forge Core contract-family surface before Rust schema/code generation so new authority surfaces cannot appear by accident."
design_rules:
  - id: "inventory_before_codegen"
    rule: "Schema generation starts only after the v0 contract families are explicitly listed with schema refs, instance globs, validator owner, and status."
  - id: "support_is_not_runtime_authority"
    rule: "Research, migration notes, and policies may support the inventory but do not become runtime authority unless represented as a contract family with schema validation."
  - id: "new_family_requires_review"
    rule: "Adding a new v0 contract family after this lock requires evidence, grill review, and Rust validator coverage."
rust_compatibility:
  serialization: "serde"
  id_policy: "stable_ascii_ids"
  path_policy: "repo_relative_forward_slash_paths"
  enum_policy: "closed_for_v0_with_unknown_rejected"
enums:
  inventory_status:
    - "draft"
    - "locked_for_schema_generation"
    - "superseded"
  family_status:
    - "active"
    - "locked_for_schema_generation"
    - "reserved"
    - "support_only"
  family_kind:
    - "authority_response"
    - "assurance_case"
    - "reference_policy"
    - "command_surface"
    - "coordination_claim"
    - "completion_state"
    - "decision_close"
    - "quality_gate"
    - "tool_effect"
    - "coordination_request"
    - "runtime_handoff"
    - "coordination_eval"
    - "health_recovery"
    - "migration_manifest"
    - "workflow_governance_policy"
  validation_surface:
    - "rust_contract_validator"
    - "reserved"
required_fields:
  - "id"
  - "contract_ref"
  - "created_at"
  - "status"
  - "family_discovery_policy.before_schema_generation"
  - "families"
  - "families[].id"
  - "families[].family_kind"
  - "families[].schema_ref"
  - "families[].instance_globs"
  - "families[].validator_function"
  - "families[].status"
field_contract:
  id: "Stable inventory id."
  contract_ref: "Repo-relative ref to this inventory schema."
  status: "Closed inventory_status enum."
  lock_scope: "Human-readable but agent-facing include/exclude boundary."
  family_discovery_policy:
    before_schema_generation: "Rule for adding contract families before schema/code generation."
    after_schema_generation: "Rule for adding contract families after schemas are generated."
  supporting_policy_refs: "Policy files that constrain the inventory without being runtime contract families yet."
  supporting_research_refs: "Evidence registry refs used by the inventory decision."
  families:
    id: "Stable family id."
    family_kind: "Closed family_kind enum."
    schema_ref: "Repo-relative schema or contract definition file."
    instance_globs: "Repo-relative glob prefixes/paths covered by the family."
    validator_function: "Rust validator function expected to cover the family."
    validation_surface: "Closed validation_surface enum."
    status: "Closed family_status enum."
    evidence_refs: "Source ids from contracts/research/field-evidence-20260625.yaml."
evidence_basis:
  direct_patterns:
    - source_id: "llm_as_code_2606_15874"
      supports: "Agent control flow and dependency surfaces should become executable harness logic instead of prompt-side convention."
    - source_id: "code_as_agent_harness_2605_18747"
      supports: "Agent harness infrastructure should be inspectable, stateful, and verification-oriented."
    - source_id: "mcp_tools_spec"
      supports: "Schema-backed capabilities need explicit boundaries and metadata."
    - source_id: "agent_protocol_taxonomy_2606_19135"
      supports: "Layered protocol boundaries reduce ambiguity and fragmentation."
  inference_boundary: "The sources support explicit schema-backed harness boundaries; Forge's product-specific decision is to freeze the v0 contract-family inventory before generating Rust schema/types."
failure_modes_prevented:
  - "new side contract appears because an agent needed a field during a session"
  - "schema generation misses a runtime authority surface"
  - "migration/support YAML is mistaken for runtime authority"
  - "contract family grows without Rust validation owner"

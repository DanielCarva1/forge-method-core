schema_version: "0.1"
audit: "operation_executor_metadata_index_boundary_grill"
status: "closed"
created_at: "2026-06-25"
grill_question:
  id: "operation_executor_metadata_index_boundary"
  question: "After logical targets project to repo-local files, what minimal metadata index should Forge write so artifacts/evidence remain discoverable without creating a full provenance database?"
  answered_by: "agent_research_and_local_code_inspection"
input_refs:
  - "contracts/policies/operation-executor-artifact-storage-projection-boundary.yaml"
  - "contracts/policies/runtime-effect-wal-recovery-boundary.yaml"
  - "contracts/policies/runtime-store-adapter-integration-boundary.yaml"
  - "contracts/research/field-evidence-20260625.yaml"
decision:
  selected_option: "compact_append_only_metadata_index"
  recommendation_basis:
    - "PROV-style identity maps cleanly to operation/effect/actor/generated target without forcing a full provenance graph."
    - "RO-Crate and OpenLineage show that compact file/run metadata can later be exported into richer interoperability models."
    - "HarnessFix-style trace repair needs scoped references and layer attribution; scanning files or reading WAL internals is too indirect."
    - "AgentLeak-style data minimization argues against writing raw artifact content into a shared metadata channel."
  record_shape:
    required_fields:
      - "schema_version"
      - "record_kind"
      - "recorded_at"
      - "operation_id"
      - "effect_id"
      - "logical_ref"
      - "physical_ref"
      - "target_kind"
      - "access_mode"
      - "content_hash"
      - "byte_len"
      - "actor_agent_id"
      - "actor_role"
      - "destructive"
      - "redaction_hint"
  storage:
    path: ".forge-method/index/effect-targets.ndjson"
    mode: "append_only"
    authority: "discovery_projection_not_transaction_authority"
tradeoffs:
  pros:
    - "Makes committed artifacts/evidence discoverable by logical or physical identity."
    - "Keeps WAL focused on transaction recovery."
    - "Creates a future export bridge to PROV, RO-Crate, or OpenLineage."
    - "Avoids indexing raw content."
  cons:
    - "Introduces another append path that can fail after a successful effect."
    - "Does not yet provide query indexes, compaction, or rebuild semantics."
    - "Is a projection, so future consumers must not treat it as stronger than the WAL."
evidence_basis:
  - source_id: "w3c_prov_dm"
    supports: "Generated entities, activities, and agents should be identifiable."
  - source_id: "ro_crate_spec_1_1"
    supports: "Files can be packaged with identifiers, metadata, and provenance."
  - source_id: "workflow_run_ro_crate_2024"
    supports: "Workflow run provenance can capture execution outputs and context."
  - source_id: "openlineage_object_model"
    supports: "Lineage observations can be recorded incrementally as events."
  - source_id: "harnessfix_trace_guided_2606_06324"
    supports: "Harness repair benefits from normalized trace provenance and scoped evidence."
  - source_id: "agentic_harness_engineering_2604_25850"
    supports: "Runtime improvements should be traceable through policies and tests."
  - source_id: "agentleak_privacy_leakage_2602_11510"
    supports: "Shared internal channels need data minimization."
policy_ref: "contracts/policies/operation-executor-metadata-index-boundary.yaml"
implementation_refs:
  - "crates/forge-core-store/src/lib.rs"
  - "crates/forge-core-kernel/src/lib.rs"
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-store/tests/reference_index.rs"
  - "crates/forge-core-kernel/tests/operation_plan.rs"
acceptance:
  - "Store returns EffectTargetMetadataRecord values for applied file-backed effects."
  - "Runtime appends timestamped records to `.forge-method/index/effect-targets.ndjson`."
  - "Runtime reports effect_metadata_append_failed when metadata cannot be appended."
  - "Tests prove the index contains refs/hash/timestamp and not raw content."
closed_decision: "Implement compact append-only metadata index now; defer full provenance export and rebuild semantics to later boundaries."
next_grill_question:
  id: "sigstore_fulcio_certificate_identity_boundary"
  question: "How should Forge verify Fulcio certificate chain, certificate identity extensions, expected OIDC issuer, and workflow identity selectors against the trusted-root policy without treating policy validation as cryptographic proof?"
  recommended_answer: "Add a Forge-owned Sigstore bundle/Fulcio verifier backend that consumes trusted-root policy and returns typed identity, subject, timestamp, and revocation evidence while preserving adapter-neutral authority."

schema_version: "0.1"
audit: "runtime_command_runner_boundary_grill"
created_at: "2026-06-25"
status: "closed"
grill_state_machine:
  state: "S6"
  closed_question:
    id: "runtime_command_runner_boundary"
    question: "After command/effect refs can be staged without commit, how should Forge execute safe read-only commands with timeout, platform, env, output, and audit semantics?"
    selected_answer: "Execute only staged read-only CommandContract commands through a Rust runtime runner that validates command policy, blocks shell/mutation/network, enforces timeout/output bounds, and returns RuntimeCommandExecution."
inputs:
  - "contracts/policies/runtime-effect-staging-boundary.yaml"
  - "contracts/research/field-evidence-20260625.yaml"
  - "crates/forge-core-contracts/src/command.rs"
  - "crates/forge-core-kernel/src/lib.rs"
decision:
  canonical_term: "Runtime Command Runner"
  policy_ref: "contracts/policies/runtime-command-runner-boundary.yaml"
  selected_strategy: "staged_read_only_command_runner_with_typed_result"
  scope:
    includes:
      - "staged command ref admission"
      - "CommandContract validation"
      - "read-only side-effect check"
      - "network-disabled check"
      - "safe flag check"
      - "shell executor block"
      - "platform check"
      - "env required/forbidden check"
      - "direct argv process spawn"
      - "bounded stdout/stderr capture"
      - "timeout kill and wait"
      - "typed execution result"
    excludes:
      - "mutating commands"
      - "shell scripts"
      - "network commands"
      - "ToolEffectContract write application"
      - "effect commit or rollback"
      - "persisted evidence recording"
      - "command registry resolution"
tradeoffs:
  selected:
    advantages:
      - "Gives Forge a useful execution boundary without jumping to mutation."
      - "Reduces host-agent drift by refusing commands not staged by runtime plan."
      - "Keeps the host LLM as communicator/reasoner and Rust as executor/admission controller."
      - "Produces a typed output object that later store/evidence layers can record."
    disadvantages:
      - "Some real project commands that use shell wrappers are intentionally blocked."
      - "Read-only cannot be perfectly guaranteed for arbitrary binaries without deeper sandboxing."
      - "Output exists only as return data until the evidence recording boundary is implemented."
  rejected:
    - id: "execute_via_shell"
      reason: "Too much injection and quoting risk for the first runtime-owned command boundary."
    - id: "execute_mutating_commands_now"
      reason: "Would bypass effect transaction and compensation design."
    - id: "planner_only_no_execution"
      reason: "Would leave validation command execution in host-agent hands despite enough evidence for a narrow read-only runner."
scenario_tests:
  - id: "host_agent_invents_command"
    scenario: "The host agent wants to run a command that is not present in RuntimeEffectStagingPlan.command_refs."
    expected_result: "RuntimeCommandExecutionStatus::NotRun with CommandNotStaged."
  - id: "shell_command_staged"
    scenario: "A command ref points to a sh or PowerShell executor."
    expected_result: "RuntimeCommandExecutionStatus::Blocked with ShellExecutorBlocked."
  - id: "mutating_validation_command"
    scenario: "A staged command declares write_project_files or writes_files."
    expected_result: "RuntimeCommandExecutionStatus::Blocked before spawn."
  - id: "long_running_command"
    scenario: "A staged command exceeds timeout_ms."
    expected_result: "RuntimeCommandExecutionStatus::TimedOut after explicit kill and wait."
  - id: "large_output"
    scenario: "A staged command prints more bytes than output_policy.max_bytes."
    expected_result: "Output is capped and truncation flag is true."
evidence_basis:
  direct_patterns:
    - source_id: "local_llm_agents_vulnerable_runtimes_2606_21071"
      supports: "Treat local shell/process execution as a privileged runtime boundary."
    - source_id: "parallax_cognitive_executive_separation_2604_12986"
      supports: "Separate model reasoning from validated execution."
    - source_id: "cordon_semantic_transactions_2606_17573"
      supports: "Stage execution before commit and keep rollback/commit later."
    - source_id: "runtime_enforcement_2503_18666"
      supports: "Runtime enforcement can block unsafe tool calls before they execute."
    - source_id: "rust_std_child_process_official"
      supports: "Timeout handling must explicitly kill/wait on child processes."
  inference_boundary: "Papers justify the boundary and safety properties; Forge's first runner stays narrower than full sandboxing and does not claim arbitrary binary read-only proof."
implementation_plan:
  - "Add RuntimeCommandExecution result types."
  - "Add CommandExecutionContext path policy input."
  - "Add run_staged_read_only_command admission checks."
  - "Spawn direct argv without shell for allowed executors."
  - "Capture bounded stdout/stderr and enforce timeout."
  - "Add Rust tests for success and blocked cases."
next_grill_question:
  id: "runtime_command_evidence_recording_boundary"
  question: "After a read-only command returns typed execution output, how should Forge persist command results as evidence without letting the host agent rewrite or reinterpret them?"

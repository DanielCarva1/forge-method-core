    role: "distribution_only"
    provenance: "hand_authored"
    runtime_load: "deny"
    agent_load: "allow_non_authoritative"
    typed_authority_refs: []
    non_authority_reason: "Human release history; release authority remains signed and typed release metadata."
  - path: "CONTEXT.md"
    role: "agent_guidance"
    provenance: "hand_authored"
    runtime_load: "deny"

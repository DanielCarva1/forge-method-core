schema_version: "0.2"
note: |
  SUPERSEDED. This file originally inventoried staged Markdown files
  (CONTEXT.md plus docs/02..13 and docs/adr/0016-0021) and tracked a plan to
  replace them with typed contracts under contracts/**/*.yaml. That remediation
  plan was abandoned: a prior audit found that 11 of the 12 staged .md files
  referenced here were already deleted (only CONTEXT.md survives) and 0 of the
  18 target typed contracts ever materialized.

  The migration pivoted. Canonical decisions now live in the ADR registries:
    - docs/adr/                       (0022-0024: sidecar, memory trust model)
    - docs/dev-docs/forge-method-core-dev-docs-v2/adrs/  (0001-0014: core architecture)
  Runtime authority is contracts/**/*.yaml (the running forge-core binary plus
  the contracts/ tree). This file is kept only as a pointer; it no longer drives
  any remediation work.

adr_numbering:
  reserved_block_0016_0021: |
    The 0015-0021 block remains reserved (see docs/adr/README.md numbering
    rules). The ADRs the original inventory planned to stage here (agent-facing
    typed contracts, Rust-only core, CLI/JSON+MCP surfaces, funnel autonomy,
    guide orchestrator, no-generic-advance-operation) were never written;
    those decisions are instead captured by the ADR registries above and by
    the runtime contracts in contracts/. Do not reuse these numbers.

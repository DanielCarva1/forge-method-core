schema_version: "0.3"
policy: "markdown_retirement_authority"
authority:
  markdown_is_authority: false
  allowlist_is_exhaustive: true
  unknown_path: "deny"
  runtime_default: "deny"
  agent_default: "deny"
scan_roots:
  - "."
allowlist:

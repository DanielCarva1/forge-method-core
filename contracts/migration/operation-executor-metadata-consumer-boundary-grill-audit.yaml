schema_version: "0.1"
audit: "operation_executor_metadata_consumer_boundary_grill"
status: "closed"
created_at: "2026-06-25"
grill_question:
  id: "operation_executor_metadata_consumer_boundary"
  question: "Which runtime and adapter surfaces may consume effect metadata queries, and how should Forge prevent evidence lookup from becoming workflow authority?"
  answered_by: "agent_research_and_local_code_inspection"
input_refs:
  - "contracts/policies/operation-executor-metadata-reader-boundary.yaml"
  - "contracts/policies/rust-runtime-execution-boundary.yaml"
  - "contracts/policies/runtime-store-state-read-boundary.yaml"
  - "contracts/operations/operation-contract-v0.yaml"
  - "contracts/research/field-evidence-20260625.yaml"
decision:
  selected_option: "closed_consumer_use_with_authority_boundary"
  recommendation_basis:
    - "The reader boundary made metadata queryable but already declared it is evidence lookup, not authority."
    - "Existing Forge contracts centralize authority in OperationContract, GateContract, DecisionCloseContract, ClaimContract, CompletionContract, RequestContract, and ToolEffectContract."
    - "Allowing arbitrary consumer intent would let adapters upgrade metadata lookup into process control."
    - "A closed consumer_use plus structured authority_boundary is enough to block the known drift class without adding a new task database."
tradeoffs:
  pros:
    - "Keeps agent autonomy for discovery, diagnostics, and handoff context."
    - "Makes the non-authority rule machine-readable in every query result."
    - "Rejects workflow_authority at the CLI boundary instead of relying on prompt reminders."
    - "Works across Codex, Cursor, Claude, opencode, VS Code, pi.dev, MCP, daemon, and app adapters."
  cons:
    - "Adds fields to the new query result surface."
    - "Does not yet generate a richer compact diagnostic or handoff report."
    - "Does not prevent a non-cooperating host from ignoring the JSON; adapter integration must still obey the contract."
evidence_basis:
  - source_id: "runtime_governance_paths_2603_16586"
    supports: "Deterministic runtime policy should govern agent execution paths."
  - source_id: "natural_language_agent_harnesses_2603_25723"
    supports: "Harness semantics should be portable contracts with lightweight adapters."
  - source_id: "policy_first_control_2603_18059"
    supports: "Policy should be enforced at runtime boundaries before actions are accepted."
  - source_id: "schema_first_tool_apis_2603_13404"
    supports: "Closed structured APIs reduce interface misuse."
  - source_id: "code_as_agent_harness_2605_18747"
    supports: "Harness behavior should be executable and inspectable."
  - source_id: "storm_state_management_2605_20563"
    supports: "Write-time/runtime state mediation is preferable to host-agent improvisation."
  - source_id: "agentic_harness_engineering_2604_25850"
    supports: "Harness decisions should be tied to observable evidence and editable components."
policy_ref: "contracts/policies/operation-executor-metadata-consumer-boundary.yaml"
implementation_refs:
  - "crates/forge-core-store/src/lib.rs"
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-store/tests/reference_index.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - "Metadata queries declare consumer_use."
  - "Query results declare authority_boundary.is_workflow_authority=false."
  - "Allowed consumer uses are discovery, diagnostics, and handoff_context."
  - "workflow_authority is rejected by the CLI parser."
  - "Tests assert the forbidden authority list appears in query output."
closed_decision: "Metadata query consumers are allowed only for discovery, diagnostics, and handoff context; workflow authority remains with normal Forge authority contracts."
next_grill_question:
  id: "sigstore_fulcio_certificate_identity_boundary"
  question: "How should Forge verify Fulcio certificate chain, certificate identity extensions, expected OIDC issuer, and workflow identity selectors against the trusted-root policy without treating policy validation as cryptographic proof?"
  recommended_answer: "Add a Forge-owned Sigstore bundle/Fulcio verifier backend that consumes trusted-root policy and returns typed identity, subject, timestamp, and revocation evidence while preserving adapter-neutral authority."

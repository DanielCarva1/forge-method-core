    capability_requirements:
    - id: capability.workflow.universal-assurance.independent-review
      kind: evaluator
      probe_kind: static_registry
      description: Independent review can challenge system, risk, and representative-slice definition claims.
      affected_claim_refs:
      - claim.workflow.universal-assurance.system-integrity
      - claim.workflow.universal-assurance.risk-and-failure
      - claim.workflow.universal-assurance.representative-slice-defined
      resolution_options:
      - Acquire an independent reviewer with the required scope.
      - Narrow or defer the affected commitment.
      blocks_before: execute
    - id: capability.workflow.universal-assurance.representative-runtime
      kind: environment
      probe_kind: local_command
      description: A representative environment can execute the defined slice and preserve governed evidence.
      affected_claim_refs:
      - claim.workflow.universal-assurance.operability
      - claim.workflow.universal-assurance.evidence-representativeness
      - claim.workflow.universal-assurance.representative-slice-executed
      resolution_options:
      - Acquire or configure a representative runtime and evidence adapter.
      - Narrow or defer the affected release boundary.
      blocks_before: release
    decision_rules:
    - id: decision.workflow.universal-assurance.material-gap
      activation: claim_unresolved
      claim_ref: claim.workflow.universal-assurance.representative-slice-defined
      question: How should an unresolved material Assurance Case gap constrain governed progress?
      reason: irreversible_risk
      alternatives:
      - id: alternative.universal-assurance.research
        description: Acquire bounded knowledge or evidence before choosing.
        consequences:
        - Defers commitment while reducing uncertainty without verifying the claim.
      - id: alternative.universal-assurance.reduce-scope
        description: Remove or defer the unsupported scope.
        consequences:
        - Preserves the governance boundary with a smaller outcome.
      - id: alternative.universal-assurance.seek-authority
        description: Seek the required human or independent authority without weakening evidence requirements.
        consequences:
        - Preserves accountable ownership of the unresolved risk.
      recommended_alternative_ref: alternative.universal-assurance.research
      blocking: true
      blocks_before: execute
    advisory_playbook:
      id: playbook.workflow.universal-assurance
      steps:
      - Reconstruct accepted intent and make every universal lens explicit; omission remains unknown.
      - Define and independently review the smallest slice that can falsify the intended outcome on a material journey.
      - Execute that slice in a representative runtime and preserve current governed evidence and disproof.
      - Use research only to support bounded understanding; never treat it as exclusive verification authority.

schema_version: "0.1"
audit: "sigstore_trusted_root_policy_boundary_grill"
status: "closed"
boundary:
  id: "sigstore_trusted_root_policy_boundary"
  parent_question: "decompose_broad_sigstore_bundle_fulcio_identity_request"
  question: "How should Forge split Sigstore bundle/Fulcio verification so trusted-root distribution and identity policy are explicit before cryptographic certificate and bundle checks?"
  selected_answer: "Decompose the broad Fulcio/bundle boundary. First add a Forge-owned trusted-root policy verifier that validates root source, Fulcio, Rekor, certificate transparency, timestamp, and identity policy readiness. Leave Fulcio certificate chain verification, bundle subject binding, TSA signature validation, revocation, and TUF freshness as later boundaries."
decision_quality:
  evidence_based: true
  asks_human_to_read_docs: false
  primary_sources_consulted:
    - "https://docs.sigstore.dev/about/security/"
    - "https://docs.sigstore.dev/cosign/verifying/timestamps/"
    - "https://github.com/sigstore/fulcio/blob/main/docs/oid-info.md"
    - "https://github.com/sigstore/protobuf-specs/blob/main/protos/sigstore_trustroot.proto"
    - "https://pkg.go.dev/github.com/sigstore/sigstore-go/pkg/verify"
    - "https://www.usenix.org/system/files/usenixsecurity25-kalu.pdf"
    - "https://arxiv.org/html/2503.00271v6"
  confidence: "medium_high"
  confidence_reason: "Trust-root policy validation is a deterministic shape/consistency boundary backed by Sigstore specs and field studies. Confidence is not high for complete Sigstore verification because certificate-chain, bundle, TSA, revocation, and TUF freshness checks remain deliberately open."
options_considered:
  - id: "implement_full_sigstore_bundle_verifier_now"
    decision: "rejected"
    reason: "Would collapse multiple trust decisions into one command and risk false claims of full verification."
  - id: "delegate_trusted_root_policy_to_host_adapters"
    decision: "rejected"
    reason: "Would make host surfaces own Sigstore policy and drift across borrowed shells, IDEs, apps, and MCP."
  - id: "typed_trust_policy_first"
    decision: "selected"
    reason: "It gives later cryptographic verifiers a stable input contract and prevents adapter prose from becoming authority."
  - id: "require_china_origin_source_for_every_boundary"
    decision: "rejected"
    reason: "Geographic coverage is required where relevant, but no stronger direct China-origin source was found for this narrow Sigstore trust-root boundary."
research_synthesis:
  - source_id: "sigstore_security_model"
    claim_used: "Sigstore verification relies on Fulcio trusted-root material and short-lived signing certificates."
    forge_application: "Forge validates that Fulcio CA references are present before the Fulcio certificate verifier exists."
  - source_id: "sigstore_trusted_root_proto"
    claim_used: "Trusted root data separates certificate authorities, transparency logs, and timestamp authorities."
    forge_application: "Forge's policy has distinct Fulcio, Rekor, CT, and TSA sections."
  - source_id: "sigstore_timestamps_docs"
    claim_used: "Timestamp checks need Rekor integrated time or RFC3161 TSA material and validity-window reasoning."
    forge_application: "Forge validates timestamp source consistency but does not claim timestamp signature verification."
  - source_id: "fulcio_oid_info"
    claim_used: "Fulcio identity semantics are represented through OIDC/workflow-specific certificate claims."
    forge_application: "Forge requires explicit OIDC issuer and identity selectors before interpreting certificate identity."
  - source_id: "sigstore_go_verify_policy"
    claim_used: "Mature Sigstore verification uses explicit artifact and certificate identity policies."
    forge_application: "Forge keeps policy validation typed and adapter-neutral."
  - source_id: "sigstore_usability_case_study_2025"
    claim_used: "Practitioners report confusion around transparency logs, private/air-gapped setups, and documentation clarity."
    forge_application: "Forge reports precise evidence and open gaps rather than a single opaque Sigstore pass."
implementation_refs:
  - "contracts/policies/sigstore-trusted-root-policy-boundary.yaml"
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - id: "library_passes_complete_policy"
    evidence: "host_adapter_sigstore_trust_policy_verification_passes_complete_policy"
  - id: "library_fails_missing_fulcio_refs"
    evidence: "host_adapter_sigstore_trust_policy_verification_fails_missing_fulcio_refs"
  - id: "cli_passes_complete_policy"
    evidence: "host_adapter_verify_sigstore_trust_policy_binary_outputs_json_and_exit_status"
  - id: "cli_blocks_missing_tsa_source"
    evidence: "host_adapter_verify_sigstore_trust_policy_binary_blocks_missing_tsa_source"
open_risks:
  - id: "fulcio_certificate_chain_not_verified"
    mitigation: "Open sigstore_fulcio_certificate_identity_boundary."
  - id: "bundle_subject_binding_not_verified"
    mitigation: "Future bundle boundary must bind signature, artifact digest, bundle subject, and trusted verification material."
  - id: "tuf_freshness_not_verified"
    mitigation: "Future trusted-root distribution boundary must verify or pin freshness instead of only validating policy shape."
  - id: "revocation_status_not_verified"
    mitigation: "Future certificate identity boundary must define revocation and short-lived certificate validity behavior."
next_boundary:
  id: "sigstore_fulcio_certificate_identity_boundary"
  question: "How should Forge verify Fulcio certificate chain, certificate identity extensions, expected OIDC issuer, and workflow identity selectors against the trusted-root policy without treating policy validation as cryptographic proof?"

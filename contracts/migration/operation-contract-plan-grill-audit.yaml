schema_version: "0.1"
audit: operation_contract_plan_grill_with_field_evidence
created_at: "2026-06-25"
status: active
inputs:
  - "contracts/migration/v2-design-coverage-audit.yaml"
  - "contracts/research/field-evidence-20260625.yaml"
  - "docs/13-operation-contract-v0.md"
  - "docs/fixtures/operation-contract-v0/*.yaml"
review_rule: "Each contract area is accepted, revise, or reject based on v2 audit, field evidence, and typed-first Rust fit."
validation_authority:
  policy_ref: "contracts/policies/rust-validation-authority.yaml"
  rule: "Rust/Serde validation is the acceptance authority for new core contracts; Python checks are auxiliary only."
contract_areas:
  - id: guide_as_orchestrator
    status: accepted_with_tests_required
    evidence:
      - openai_agents_sdk
      - langgraph_hitl
      - mcp_tools_spec
    rationale: "Modern agent systems separate orchestration/state/approval from raw model prompting."
    required_tests:
      - "fresh human correction overrides stale next action"
      - "guide recommends specialized operation without mutating"
  - id: no_advance_no_generic_write
    status: accepted
    evidence:
      - mcp_tools_spec
      - openai_agents_sdk
    rationale: "Named schema-backed operations reduce ambiguity and host-agent drift."
    required_tests:
      - "no operation enum contains advance or generic write"
  - id: command_contract
    status: accepted
    evidence:
      - mcp_tools_spec
    rationale: "Commands are tool-like side-effect surfaces and need typed executor/args/policy."
    required_tests:
      - "operation fixtures contain command_refs only"
      - "command contracts reject shell string authority"
  - id: coordination_scope
    status: accepted
    evidence:
      - grite_2606_19616
      - cooperbench_2601_13295
      - claude_worktrees
    rationale: "Safe mutation requires target, version, agent identity, lane/driver claim, and completion state."
    required_tests:
      - "mutating operations require coordination_scope"
      - "fleet mode requires agent_id and registry_ref"
      - "driver state writes require driver claim evidence"
  - id: record_request_for_workers
    status: accepted
    evidence:
      - grite_2606_19616
      - v2_design_coverage_audit
    rationale: "Workers should emit append-only requests; driver applies integration FSM mutations."
    required_changes:
      - "Add record_request to operation enum."
      - "Add caller_role to coordination_scope.concurrency."
      - "Add fixture where worker wants transition and is routed to record_request."
      - "Add minimal RequestContract."
  - id: completion_state
    status: accepted
    evidence:
      - grite_2606_19616
      - v2_design_coverage_audit
    rationale: "Locks alone do not stop duplicate work; a typed CompletionContract must be checked before claim/build."
    required_changes:
      - "Define minimal CompletionContract with task_id, status, proof policy, invalidation, and storage identity."
      - "Use completion_contract_ref instead of untyped legacy completion references."
      - "Keep file projection as current backend while preserving DB/daemon-compatible stable IDs and enums."
    required_tests:
      - "Already-done story routes to read/status instead of claim/build."
  - id: read_set_write_set_notify
    status: accepted_via_tool_effect_contract
    evidence:
      - coagent_2606_15376
    rationale: "Read/write conflict tracking belongs in ToolEffectContract, not as loose OperationContract fields; v0 covers fine-grained conflict notification while keeping repair policy typed."
    required_changes:
      - "Define ToolEffectContract v0 with read_set, write_set, conflict_detection, notification, and repair policy."
      - "Reference effects from OperationContract through effect_contract_refs."
      - "Add fixture where stale read/write conflict records a notification instead of overwriting or blind-aborting."
  - id: markdown_removal
    status: accepted
    evidence:
      - mcp_tools_spec
      - openai_agents_sdk
    rationale: "Agent-facing runtime authority should be schema-backed contracts; Markdown is distribution/render only."
    required_tests:
      - "runtime loader rejects Markdown authority outside allowlist"
  - id: host_surfaces_cli_json_mcp
    status: accepted_with_security_review
    evidence:
      - mcp_tools_spec
      - a2a_protocol
      - openai_agents_sdk
    rationale: "CLI JSON is universal debug/integration surface; MCP is agent-native tool surface; A2A remains optional interop layer."
    required_changes:
      - "Run MCP/local-process security review before implementation."
  - id: claim_ttl_and_handoff_on_expiry
    status: accepted_minimal_claim_contract
    evidence:
      - grite_2606_19616
      - agentscope_2402_14034
      - v2_design_coverage_audit
    rationale: "Fleet claims need typed ownership, TTL, heartbeat, and mandatory handoff-on-expiry so stale agents do not freeze lanes or lose context."
    required_changes:
      - "Define ClaimContract v0 with owner, scope, lease, heartbeat, status, expiry policy, and reclaim policy."
      - "Use claim_contract_ref instead of untyped legacy lock authority."
      - "Add fixture where expired claim records handoff request instead of silently releasing or reassigning work."
  - id: execution_policy_stop_policy
    status: accepted
    evidence:
      - llm_as_code_2606_15874
      - parasuraman_levels_automation
      - mixed_initiative_aaai_2025
      - langgraph_hitl
      - trustworthy_lma_raci
    rationale: "Loops, retries, branch selection, and stop behavior are deterministic control-flow concerns. They must be runtime policy, not host-agent improvisation."
    required_changes:
      - "Add execution_policy to OperationContract."
      - "Add stop_policy to OperationContract."
      - "Add fixtures for human-stop, mechanical-autonomy, gate-stop, and worker-request paths."
  - id: integration_gate_scope
    status: accepted_minimal_gate_scope
    evidence:
      - cooperbench_2601_13295
      - v2_design_coverage_audit
    rationale: "Lane-local validation cannot prove product-area, integration, or release safety. Gate scope must be explicit before broader automation."
    required_changes:
      - "Define GateContract v0 with lane, product_area, integration, and release scopes."
      - "Use gate_contract_refs and scoped required_before_mutation entries."
      - "Add fixture where lane/product-area pass still routes to integration gate before merge/readiness."
  - id: decision_close_requires_grill
    status: accepted_minimal_decision_close_contract
    evidence:
      - v2_design_coverage_audit
      - llm_as_code_2606_15874
      - code_as_agent_harness_2605_18747
      - langgraph_hitl
      - mixed_initiative_aaai_2025
      - trustworthy_lma_raci
      - agentscope_2402_14034
      - fudan_agent4se_survey
    rationale: "Closing direction, phase, handoff, spec-lock, route-change, or release-readiness decisions changes project authority and must not be inferred from chat momentum."
    evidence_boundary: "The papers support runtime-owned control, human checkpoints, accountability, and multi-agent coordination risks; Forge maps that into grill evidence as its product-specific review artifact."
    required_changes:
      - "Define DecisionCloseContract v0 with decision_kind, status, grill evidence, authority evidence, closer, timestamp, and reopen policy."
      - "Add fixture where phase transition without grill evidence is blocked."
      - "Extend Rust contract validator to validate decision close enums and refs."
  - id: runtime_handoff_double_gate
    status: accepted_minimal_runtime_handoff_contract
    evidence:
      - a2a_protocol
      - mcp_tools_spec
      - openai_agents_handoffs
      - langgraph_multi_agent_handoffs
      - agentscope_2402_14034
      - fudan_agent4se_survey
    rationale: "Cross-runtime handoff is an interoperability and coordination boundary; suggesting it requires target runtime identity plus capability evidence and compact context."
    evidence_boundary: "A2A/MCP/OpenAI/LangGraph support interop, schema-backed capability surfaces, handoff, and context-engineering patterns; Forge maps that into a product-specific double gate before suggestion."
    required_changes:
      - "Define RuntimeHandoffContract v0 with runtime identity, task boundary, double gate, typed payload, and authority refs."
      - "Add blocked and suggestible fixtures so missing capability evidence cannot become a handoff recommendation."
      - "Extend Rust contract validator to validate runtime handoff enums, refs, payload context, and operation fixture refs."
  - id: tool_inverse_and_repair_contract
    status: accepted_minimal_destructive_effect_policy
    evidence:
      - coagent_2606_15376
      - rac_2605_03409
      - runtime_enforcement_2503_18666
      - solver_policy_tool_agents_2603_20449
      - verifiable_safe_tool_use_2601_08012
      - owasp_llm06_excessive_agency
      - microservices_saga_pattern
      - tool_use_orchestration_survey_2603_22862
    rationale: "Destructive or delete-like effects are high-impact tool actions; they need an explicit inverse/compensation path or must stop before execution."
    evidence_boundary: "CoAgent and RAC directly support registered inverse/compensation for agent recovery; runtime enforcement, solver-aided policy, safe tool-use work, OWASP, and saga literature support pre-execution governance. Forge maps that into a minimal destructive-effect rule."
    required_changes:
      - "Extend ToolEffectContract v0 with inverse kind/source/ref metadata."
      - "Require all effect fixtures to state inverse metadata, including none/unavailable for non-destructive effects."
      - "Add destructive fixtures for with-inverse review and missing-inverse block."
      - "Extend Rust contract validator to reject destructive effects without inverse metadata unless they stop for human/driver review."
  - id: message_protocol_for_agent_coordination
    status: accepted_strengthen_request_contract
    evidence:
      - agent_protocol_taxonomy_2606_19135
      - communication_centric_llm_mas_2502_14321
      - agentscope_2402_14034
      - a2a_protocol
      - agent_protocol_survey_2504_16736
    rationale: "Forge already uses append-only requests as the durable coordination unit; v0 should strengthen RequestContract before introducing a separate MessageContract."
    evidence_boundary: "The research supports structured communication, lifecycle state, payloads, and protocol layering; Forge's product-specific decision is to use RequestContract as the v0 message unit to avoid duplicated authority surfaces."
    required_changes:
      - "Define RequestContract v0 schema with communication, payload, response, dependencies, append-only storage, and status."
      - "Update all request fixtures to include the canonical communication/payload/response blocks."
      - "Extend Rust validator to validate request enums, refs, lifecycle fields, and effect notification refs."
  - id: coordination_eval_dimensions
    status: accepted_minimal_coordination_eval_contract
    evidence:

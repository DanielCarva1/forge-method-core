research_found_gaps:
  - id: missing_tool_inverse_and_repair_contract
    severity: critical
    status: "resolved_by_destructive_effect_policy"
    evidence:
      - coagent_2606_15376
    problem: "OperationContract/CommandContract can authorize tools, but does not require undo/inverse or targeted repair metadata for mutating tools."
    implication: "Without inverse/repair contracts, Forge falls back to lock/abort/retry and loses the CoAgent advantage for long-running agent work."
    candidate_fix: "Use ToolEffectContract v0 for read/write sets, conflict notification, and repair policy; require inverse/compensation metadata before destructive tool writes."
  - id: missing_message_protocol_for_agent_coordination
    severity: high
    status: "resolved_by_request_contract_v0"
    evidence:
      - agentscope_2402_14034
      - chatdev_2307_07924
    problem: "Forge models state, claims, requests, and handoffs, but not enough typed message semantics for agent-to-agent/workflow communication."
    implication: "Requests and handoffs may become opaque notes instead of structured coordination messages."
    candidate_fix: "Define MessageContract or RequestContract with sender, receiver/driver, intent, required_response, dependency, deadline, evidence_refs, and status."
  - id: llm_still_too_close_to_control_flow
    severity: critical
    evidence:
      - llm_as_code_2606_15874
    problem: "Guide is read-only, but if host agents decide loops, retries, branching, and stop conditions from prose, deterministic control is still delegated to the model."
    implication: "The Rust core must own loop/branch/stop execution policy, not just recommend it."
    candidate_fix: "Make OperationContract include explicit execution_policy and stop_policy enums; host agents may explain and act, not invent control flow."
  - id: missing_fault_tolerance_monitoring_contract
    severity: medium
    status: "resolved_by_health_recovery_contract_v0"
    evidence:
      - agentscope_2402_14034
    problem: "Lane heartbeat exists, but v0 contracts do not model monitorability, failure classification, or recovery action selection."
    implication: "A crashed/stale agent may be detected by TTL, but recovery quality depends on untyped behavior."
    candidate_fix: "Use ClaimContract v0 for TTL, heartbeat, stale reason, and handoff-on-expiry; add broader RecoveryContract/HealthContract later for crashed runtime monitoring."
  - id: insufficient_evaluation_beyond_task_success
    severity: high
    status: "resolved_by_coordination_eval_contract_v0"
    evidence:
      - cooperbench_2601_13295
      - code_as_agent_harness_2605_18747
    problem: "Existing fixtures prove shape, but not duplicate work, conflict resolution, coordination cost, human interruption quality, or regression-free harness improvement."
    implication: "Forge can pass contract fixtures while still being bad for teams."
    candidate_fix: "Add eval dimensions for duplicate work, lane collision, stale-state recovery, request latency, integration gate catches, and human guidance quality."
  - id: typed_communication_does_not_replace_governance
    severity: medium
    evidence:
      - chatdev_2307_07924
      - a2a_protocol
    problem: "Multi-agent communication frameworks prove role/chat value, but not state authority or commit safety."
    implication: "Forge should use communication patterns for facilitation while keeping governance in typed state/claims/gates."
    candidate_fix: "Keep ChatDev-like role communication as behavior contracts, never as authority."

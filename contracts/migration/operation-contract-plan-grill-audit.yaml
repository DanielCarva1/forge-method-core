      - multiagentbench_2503_01935
      - code_as_agent_harness_2605_18747
      - utboost_2025_acl
      - agentless_fse_2025
    rationale: "Forge cannot claim team/multi-agent readiness from final task success or schema shape alone; coordination quality needs its own minimum eval dimensions."
    evidence_boundary: "The sources support coordination-specific benchmarks, milestone KPIs, evaluation beyond task success, and stronger test evidence; Forge maps that into a local CoordinationEvalContract before external benchmark runners exist."
    required_changes:
      - "Define CoordinationEvalContract v0 with closed dimensions, metric kind, required level, fixtures, failure signal, and evidence refs."
      - "Add a minimal coordination eval suite covering duplicate work, lane collision, stale claim recovery, read/write repair, request lifecycle, integration gate, runtime handoff, destructive effect safety, and human guidance recovery."
      - "Extend Rust validator to validate eval dimension enums and fixture/evidence refs."
  - id: runtime_health_recovery_contract
    status: accepted_minimal_health_recovery_contract
    evidence:

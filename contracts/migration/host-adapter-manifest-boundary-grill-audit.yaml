schema_version: "0.1"
audit: "host_adapter_manifest_boundary_grill"
status: "closed"
created_at: "2026-06-25"
grill_question:
  id: "host_adapter_manifest_boundary"
  question: "What minimal adapter manifest should Forge generate or expose so Codex, Cursor, Claude, opencode, VS Code, pi.dev, MCP, daemon, and app surfaces can discover read-only, advisory, and mutating commands without duplicating authority rules?"
  answered_by: "agent_research_local_code_inspection_and_rust_tests"
input_refs:
  - "contracts/policies/operation-executor-metadata-adapter-integration-boundary.yaml"
  - "contracts/policies/runtime-store-adapter-integration-boundary.yaml"
  - "contracts/policies/thin-cli-validation-surface-boundary.yaml"
  - "contracts/policies/rust-validation-authority.yaml"
  - "contracts/research/field-evidence-20260625.yaml"
decision:
  selected_option: "rust_generated_host_adapter_manifest"
  recommendation_basis:
    - "Forge already has multiple borrowed-shell targets through RuntimeKind, so command discovery must be adapter-neutral."
    - "MCP and A2A evidence supports capability discovery and interoperability, but not replacing local governance."
    - "Recent agent-runtime research supports executable harness/runtime boundaries instead of prompt-only or Markdown authority."
    - "The current CLI command set is small enough for a compact Rust-generated manifest."
tradeoffs:
  pros:
    - "Avoids duplicated authority rules across Codex, Cursor, Claude, opencode, VS Code, pi.dev, MCP, daemon, and app."
    - "Makes read-only, advisory, operational repair, and mutating command behavior testable."
    - "Creates a clean source for later MCP/tool schema projection."
    - "Keeps Markdown out of runtime authority."
  cons:
    - "Does not force non-cooperating hosts to obey the manifest."
    - "Does not yet implement MCP server, daemon, installer projection, or app UI."
    - "Requires maintaining command metadata when adding CLI commands."
evidence_basis:
  - source_id: "mcp_tools_spec"
    supports: "Schema-backed tool capability discovery."
  - source_id: "mcp_tool_annotations_2603"
    supports: "Tool hints help host UI/safety but are advisory."
  - source_id: "a2a_protocol"
    supports: "Interoperability between agentic applications."
  - source_id: "agent_protocol_taxonomy_2606_19135"
    supports: "Discovery and schema are explicit protocol dimensions."
  - source_id: "natural_language_agent_harnesses_2603_25723"
    supports: "Portable harness behavior with lightweight adapters."
  - source_id: "code_as_agent_harness_2605_18747"
    supports: "Executable, inspectable, stateful harnesses."
  - source_id: "cordon_semantic_transactions_2606_17573"
    supports: "Runtime containment for mutating tool workflows."
  - source_id: "local_llm_agents_vulnerable_runtimes_2606_21071"
    supports: "Tool dispatch and local process execution are runtime-layer security concerns."
policy_ref: "contracts/policies/host-adapter-manifest-boundary.yaml"
implementation_refs:
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - "HostAdapterManifest is emitted by run_host_adapter_manifest."
  - "forge-core host-adapter-manifest --json emits command metadata."
  - "execute-operation has mutation_class=mutating_operation and no safe_auto_invocation_triggers."
  - "query-effect-index has authority_class=no_workflow_authority and advisory safe triggers."
  - "Rust tests cover library and binary manifest output."
closed_decision: "Forge Core now exposes a Rust-generated host-adapter manifest as the command discovery source for borrowed-shell adapters; host projections remain downstream and non-authoritative."
next_grill_question:
  id: "sigstore_fulcio_certificate_identity_boundary"
  question: "How should Forge verify Fulcio certificate chain, certificate identity extensions, expected OIDC issuer, and workflow identity selectors against the trusted-root policy without treating policy validation as cryptographic proof?"
  recommended_answer: "Add a Forge-owned Sigstore bundle/Fulcio verifier backend that consumes trusted-root policy and returns typed identity, subject, timestamp, and revocation evidence while preserving adapter-neutral authority."

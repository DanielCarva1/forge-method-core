schema_version: "0.1"
audit: "sigstore_rekor_backend_boundary_grill"
status: "closed"
boundary:
  id: "sigstore_rekor_backend_boundary"
  question: "How should Forge add canonical Sigstore bundle, Fulcio identity, and public Rekor checkpoint verification as a Rust-owned backend without making host adapters depend on Sigstore internals?"
  selected_answer: "Split the backend into explicit verification layers: implement a Forge-owned Rust Rekor log entry verifier now for expected log id, trusted Rekor public key, signed checkpoint, and Merkle inclusion proof; keep Fulcio certificate identity and complete Sigstore bundle semantics as the next boundary because current Rust Sigstore tooling is useful field evidence but not the right runtime authority for this narrow offline core check."
decision_quality:
  evidence_based: true
  asks_human_to_read_docs: false
  primary_sources_consulted:
    - "https://docs.sigstore.dev/about/bundle/"
    - "https://docs.sigstore.dev/logging/overview/"
    - "https://github.com/transparency-dev/formats/blob/main/log/README.md"
    - "https://docs.sigstore.dev/about/threat-model/"
    - "https://github.com/sigstore/sigstore-go"
    - "https://github.com/sigstore/sigstore-rs"
    - "https://datatracker.ietf.org/doc/html/rfc6962"
    - "https://www.usenix.org/system/files/usenixsecurity25-kalu.pdf"
  confidence: "medium_high"
  confidence_reason: "Rekor checkpoint and inclusion verification is a narrow cryptographic property with a Forge-owned Rust implementation and deterministic tests. Confidence is not high for full Sigstore because Fulcio identity, trusted-root distribution, TSA/revocation, and full bundle policy remain open."
options_considered:
  - id: "delegate_rekor_to_host_adapter"
    decision: "rejected"
    reason: "It would fragment trust-root handling and make adapters drift."
  - id: "declare_full_sigstore_verification_done"
    decision: "rejected"
    reason: "Would overclaim because Rekor inclusion is not Fulcio identity or full bundle verification."
  - id: "implement_forge_owned_rekor_layer_matching_sigstore_semantics"
    decision: "selected"
    reason: "It preserves Rekor/Sigstore semantics while avoiding pre-1.0 network/TLS-heavy dependency surface in the core verifier."
  - id: "wait_for_sigstore_rs_1_0_before_any_rekor_work"
    decision: "rejected"
    reason: "Would leave a known supply-chain trust gap even though a narrow, deterministic Rekor proof boundary can be implemented now."
research_synthesis:
  - source_id: "sigstore_bundle_format_docs"
    claim_used: "A bundle contains verification material plus signature content."
    forge_application: "Forge separates Rekor proof from full bundle/Fulcio identity verification."
  - source_id: "sigstore_rekor_docs"
    claim_used: "Rekor provides a transparency log and tooling for inclusion/log integrity verification."
    forge_application: "Forge adds read-only Rekor inclusion verification before install/update decisions."
  - source_id: "transparency_dev_checkpoint_format"
    claim_used: "Signed checkpoints are reusable transparent log artifacts and may carry multiple signatures."
    forge_application: "Forge treats signed checkpoint validation as a first-class evidence requirement."
  - source_id: "sigstore_rs_014_rekor_backend"
    claim_used: "The Rust Rekor model validates signed checkpoint and inclusion proof semantics, while the bundle verifier still leaves important checks incomplete."
    forge_application: "Forge implements the narrow Rekor semantics directly and opens Fulcio/bundle identity as the next boundary."
  - source_id: "software_signing_industry_study_2025"
    claim_used: "Signing is often misapplied unless verification policy and tooling are explicit."
    forge_application: "Forge exposes explicit reasons/evidence rather than letting host adapters infer trust."
implementation_refs:
  - "contracts/policies/sigstore-rekor-backend-boundary.yaml"
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - id: "library_passes_signed_checkpoint_and_inclusion"
    evidence: "host_adapter_rekor_verification_passes_signed_checkpoint_and_inclusion"
  - id: "library_fails_log_id_mismatch"
    evidence: "host_adapter_rekor_verification_fails_when_log_id_mismatches"
  - id: "cli_passes_signed_checkpoint_and_inclusion"
    evidence: "host_adapter_verify_rekor_entry_binary_outputs_json_and_exit_status"
  - id: "cli_blocks_wrong_rekor_key"
    evidence: "host_adapter_verify_rekor_entry_binary_blocks_wrong_key"
open_risks:
  - id: "fulcio_identity_not_verified"
    mitigation: "Open sigstore_fulcio_certificate_identity_boundary."
  - id: "trusted_root_distribution_not_complete"
    mitigation: "Future boundary must decide TUF/trusted-root source, caching, pinning, and offline policy."
  - id: "rekor_v2_timestamp_model_changes"
    mitigation: "Future bundle/Fulcio boundary must handle TSA or Rekor v2 timestamp strategy explicitly."
next_boundary:
  id: "sigstore_fulcio_certificate_identity_boundary"
  question: "How should Forge verify Fulcio certificate chain, certificate identity extensions, expected OIDC issuer, and workflow identity selectors against the trusted-root policy without treating policy validation as cryptographic proof?"

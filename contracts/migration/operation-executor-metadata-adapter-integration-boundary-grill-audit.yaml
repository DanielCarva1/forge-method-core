schema_version: "0.1"
audit: "operation_executor_metadata_adapter_integration_boundary_grill"
status: "closed"
created_at: "2026-06-25"
grill_question:
  id: "operation_executor_metadata_adapter_integration_boundary"
  question: "Which host adapters should call metadata context automatically, and how should they present it without creating adapter-specific authority?"
  answered_by: "agent_research_and_local_code_inspection"
input_refs:
  - "contracts/policies/runtime-store-adapter-integration-boundary.yaml"
  - "contracts/policies/filesystem-reference-index-adapter-boundary.yaml"
  - "contracts/policies/operation-executor-metadata-context-builder-boundary.yaml"
  - "contracts/runtimes/runtime-handoff-contract-v0.yaml"
  - "contracts/research/field-evidence-20260625.yaml"
decision:
  selected_option: "adapter_agnostic_advisory_context"
  recommendation_basis:
    - "Existing runtime/store policies require thin adapters and a single authority path."
    - "RuntimeHandoffContract already models Codex, Cursor, Claude, opencode, VS Code, pi.dev, Forge standalone, and custom runtimes with RuntimeKind."
    - "Metadata context is useful for evidence discovery, diagnostics, and handoff preparation, but not as routine context noise."
    - "A closed trigger plus adapter presentation keeps host-specific rendering from becoming host-specific authority."
tradeoffs:
  pros:
    - "Works across current and future hosts without adapter-specific control flow."
    - "Allows useful automatic context only when it answers an explicit need."
    - "Keeps presentation machine-readable for CLI, MCP, daemon, app, and borrowed-shell adapters."
    - "Makes authority preservation testable in Rust."
  cons:
    - "Does not yet generate host package manifests."
    - "Does not force non-cooperating hosts to obey the output."
    - "Adapters still need host-specific installation/rendering outside this boundary."
evidence_basis:
  - source_id: "natural_language_agent_harnesses_2603_25723"
    supports: "Portable harness contracts and lightweight adapters."
  - source_id: "mcp_tools_spec"
    supports: "Schema-backed tools and metadata for host discovery."
  - source_id: "mcp_tool_annotations_2603"
    supports: "Annotations inform clients but do not replace authorization."
  - source_id: "a2a_protocol"
    supports: "Interoperability layer should not replace local governance."
  - source_id: "agent_protocol_taxonomy_2606_19135"
    supports: "Agent protocol boundaries should make payload and interaction state explicit."
  - source_id: "runtime_governance_paths_2603_16586"
    supports: "Runtime governance should be deterministic over execution paths."
  - source_id: "opendev_terminal_agents_2603_05344"
    supports: "Terminal agents need explicit safety controls and context engineering."
  - source_id: "code_as_agent_harness_2605_18747"
    supports: "Harness behavior should be executable and inspectable."
policy_ref: "contracts/policies/operation-executor-metadata-adapter-integration-boundary.yaml"
implementation_refs:
  - "crates/forge-core-store/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-store/tests/reference_index.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - "Context build options carry adapter_kind and adapter_trigger."
  - "Context output carries adapter_presentation."
  - "Adapter presentation is advisory_context and cannot create workflow authority."
  - "CLI accepts --adapter-kind and --adapter-trigger for --context output."
  - "Tests assert Codex diagnostics context is advisory and automatic-invocation allowed."
closed_decision: "All cooperating host adapters may use the same metadata context contract; automatic invocation is limited to evidence discovery, diagnostics, and handoff preparation, and presentation remains advisory."
next_grill_question:
  id: "sigstore_fulcio_certificate_identity_boundary"
  question: "How should Forge verify Fulcio certificate chain, certificate identity extensions, expected OIDC issuer, and workflow identity selectors against the trusted-root policy without treating policy validation as cryptographic proof?"
  recommended_answer: "Add a Forge-owned Sigstore bundle/Fulcio verifier backend that consumes trusted-root policy and returns typed identity, subject, timestamp, and revocation evidence while preserving adapter-neutral authority."

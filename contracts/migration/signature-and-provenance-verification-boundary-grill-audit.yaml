schema_version: "0.1"
audit: "signature_and_provenance_verification_boundary_grill"
status: "closed"
boundary:
  id: "signature_and_provenance_verification_boundary"
  question: "How should Forge verify signatures, provenance predicates, expected source/build identity, and transparency-log inclusion without making every host adapter implement supply-chain logic differently?"
  selected_answer: "Add a Rust-owned offline signed provenance verifier: verify detached Ed25519 signature over provenance bytes, inspect in-toto/SLSA predicate semantics against explicit artifact/builder/source expectations, verify a Forge transparency Merkle inclusion proof, and expose only typed pass/fail evidence to adapters."
decision_quality:
  evidence_based: true
  asks_human_to_read_docs: false
  primary_sources_consulted:
    - "https://slsa.dev/spec/v1.1/provenance"
    - "https://slsa.dev/spec/v1.1/verifying-artifacts"
    - "https://github.com/slsa-framework/slsa-verifier"
    - "https://github.com/in-toto/attestation/blob/main/spec/v1/statement.md"
    - "https://github.com/sigstore/architecture-docs/blob/main/client-spec.md"
    - "https://datatracker.ietf.org/doc/html/rfc6962"
  confidence: "medium_high"
  confidence_reason: "The implemented checks match the stable SLSA/in-toto consumer-verification model and use a small Rust crypto dependency. Confidence is not high because canonical Sigstore Fulcio/Rekor public bundle verification remains a separate backend boundary."
options_considered:
  - id: "delegate_to_each_host_adapter"
    decision: "rejected"
    reason: "It would fragment trust decisions and make Codex/Cursor/Claude/OpenCode adapters drift."
  - id: "adopt_sigstore_verification_crate_as_core_authority_now"
    decision: "rejected_for_now"
    reason: "The reviewed crate surface is useful but still contains simplified verification paths and broad network/TLS coupling."
  - id: "forge_owned_offline_verifier"
    decision: "selected"
    reason: "It gives Forge a deterministic no-network verification path for release provenance while preserving a later Sigstore/Rekor backend."
research_synthesis:
  - source_id: "slsa_provenance_v1"
    claim_used: "Provenance describes how artifacts were produced so consumers can verify against expectations."
    forge_application: "The verifier checks builder/source/ref expectations, not merely signature validity."
  - source_id: "slsa_verifier_project"
    claim_used: "Practical SLSA verification checks signatures, builder id, source repo/ref, and artifact digest."
    forge_application: "Forge mirrors those checks in adapter-neutral Rust."
  - source_id: "in_toto_statement_v1"
    claim_used: "Statements bind predicate types to artifact subjects."
    forge_application: "Forge requires in-toto statement type, SLSA predicate type, and subject sha256 match."
  - source_id: "sigstore_client_spec"
    claim_used: "Verification policies are application-specific and failure should abort verification."
    forge_application: "Forge owns the policy and returns typed failure reasons before install/update mutation."
  - source_id: "rfc6962_merkle_audit_paths"
    claim_used: "Merkle audit paths prove inclusion in a committed tree root."
    forge_application: "Forge verifies a transparency proof binding provenance and signature digests."
implementation_refs:
  - "contracts/policies/signature-and-provenance-verification-boundary.yaml"
  - "crates/forge-core-cli/src/lib.rs"
  - "crates/forge-core-cli/src/main.rs"
  - "crates/forge-core-cli/tests/validate.rs"
acceptance:
  - id: "library_passes_signed_slsa_statement"
    evidence: "host_adapter_provenance_verification_passes_signed_slsa_statement"
  - id: "library_fails_source_ref_mismatch"
    evidence: "host_adapter_provenance_verification_fails_when_source_ref_mismatches"
  - id: "cli_passes_signed_slsa_statement"
    evidence: "host_adapter_verify_provenance_binary_outputs_json_and_exit_status"
  - id: "cli_blocks_bad_signature"
    evidence: "host_adapter_verify_provenance_binary_blocks_bad_signature"
open_risks:
  - id: "canonical_sigstore_bundle_not_yet_verified"
    mitigation: "Rekor checkpoint verification is covered by sigstore_rekor_backend_boundary; open sigstore_fulcio_certificate_identity_boundary for Fulcio identity before full bundle semantics."
  - id: "transparency_root_trust_distribution_not_complete"
    mitigation: "Current proof verifies inclusion against provided root; root distribution/signing policy belongs in the Sigstore/Rekor backend boundary."
next_boundary:
  id: "sigstore_fulcio_certificate_identity_boundary"
  question: "How should Forge verify Fulcio certificate chain, certificate identity extensions, expected OIDC issuer, and workflow identity selectors against the trusted-root policy without treating policy validation as cryptographic proof?"

decisions:
  DD40: "Coordination-eval engine is PURE machinery (DC9 mirror). Engine validates contract structure + checks refs resolve + scores HOST-PROVIDED outcomes. No built-in scorer wires slice-4 engines to dimensions (that coupling is rejected; the gate is the value, the host/LLM provides the verdict evidence)."
  DD41: "Outcomes are file-backed (DC10): a different LLM/operator writes an outcomes payload; the engine scores it deterministically. This is the multi-LLM interop wedge applied to the eval gate."
  DD42: "Verdict taxonomy: Passed (all required dims pass) | Failed (any must_pass dim fails) | ManualReviewRequired (any manual-review dim open AND manual_review_blocks_release). ShouldPass dims that fail downgrade to a warning, not a hard fail."

next_workflow: "build-story S4.7 -> slice-4-completion -> controlled multi-agent demo (slice 5)"

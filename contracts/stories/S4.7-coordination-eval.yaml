acceptance:
  - "Engine module compiles with 0 warnings; all 9 dims covered by validate + score"
  - "Real suite deserializes, validates structurally, has 0 dangling fixture/evidence refs"
  - "score_coordination with all-pass outcome -> CoordinationVerdict::Passed"
  - "One failed must_pass dim -> CoordinationVerdict::Failed"
  - "manual_review dim + manual_review_blocks_release -> blocks release"

constraints:
  - "The only accepted source is contracts/policies/funnel-autonomy.yaml, loaded and validated centrally; callers cannot substitute an alternative runtime policy."
  - "Guide, OperationContract planning, and the execution-boundary gate consume the same typed policy and closed phase profiles."
  - "Mechanical plan, execute, and repair loops require an eligible phase, exact lane-claim declaration and reference, passing aggregate gate status, nonempty authority evidence, and nonempty effect-contract references."
  - "Actual destructive effects omitted from risk_boundaries block at the execution boundary even when an inverse exists."
  - "Publish behavior restores the release boundary, and explicit authority-transition candidates restore the authority boundary."
  - "Destructive, release, and authority declarations are descriptive only and require matching typed gate scopes; no protected scope substitutes for another."
  - "A passing matching protected gate represents the completed human checkpoint, while a missing or non-passing checkpoint fails closed."
  - "The policy grants no mutation, phase, release, signing, private-key, trust, admission, install, activation, lifecycle, protected-anchor, or host-selection authority."
  - "Only RuntimePlanStatus::ReadyToCallOperation may enter durable layout validation, retained producer admission, mutation gates, staging, command execution, evidence append, or effect application."
  - "External broker private keys remain in their owner-specific backup procedure and never enter Forge state or Forge backups."
  - "selected_host remains none."

acceptance_criteria:
  - "Every phase has one closed typed contact-density, lane, ambiguity-pressure, procedural-confirmation, claim, and automatic-gate profile."
  - "Discovery and specification project high contact density with human-guidance-and-research pressure."
  - "A settled mechanical fixture proceeds only with claim, passing gate, authority evidence, and effect references; removing the claim requires review."
  - "Guide projects typed policy values and rejects unsupported project phases instead of inventing a fallback phase."
  - "Planner output carries the funnel disposition, phase profile, reasons, and protected boundaries before host-call readiness."
  - "The CLI unconditionally attaches the accepted funnel gate after loading exact effect documents and before audited WAL execution."
  - "Source tests cover ambiguity escalation, mechanical admission, undeclared destructive blocking, release-gate restoration, authority-gate restoration, host-neutral policy limits, and non-passing mechanical gates."


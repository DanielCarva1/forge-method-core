title: "Load one typed funnel-autonomy policy across guide and runtime boundaries"
intent: >-
  Replace scattered funnel heuristics with one accepted typed policy that raises
  human guidance and research pressure for ambiguous early work, admits settled
  mechanical loops only under claims, passing gates, authority evidence, and
  effect contracts, and restores exact destructive, release, and authority gates.


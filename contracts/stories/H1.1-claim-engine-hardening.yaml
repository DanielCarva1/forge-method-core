  - "contracts/backlog/v1.1-selfhealing-backlog.yaml#P1.2 (rfc3339 accepts invalid dates)"
  - "contracts/backlog/v1.1-selfhealing-backlog.yaml#P1.3 (acquire creates validator-invalid claim)"

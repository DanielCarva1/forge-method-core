constraints:
  - "The existing DomainPackSupplyChainRegistryDocument is the sole signed catalog authority; do not introduce a rival catalog."
  - "Publisher signatures bind complete package/artifact descriptors; registry signatures separately bind mirrors and snapshot state."
  - "Reuse DomainPackArtifactBinding raw/canonical pins and logical RepoPath; keep transport bases separate from immutable object paths."
  - "Allow only HTTPS and operator-provisioned-local mirror transports, stable mirror IDs, signed priority ordering, normalized content-addressed paths, exact lengths, closed media types, and closed artifact kinds."
  - "Every serializable remote request/plan/evidence/receipt/cache/rollback contract is candidate_only and deny_unknown_fields."
  - "Use the repository sha256:<64 lowercase hex> grammar and canonical JSON digest idiom; do not create another digest grammar."
  - "Network mode and cache policy are required closed fields with no permissive serde default."
  - "Cache keys are raw SHA-256 and cache presence is non-authoritative; bounded reject_on_full is deterministic and has no eviction fallback."
  - "OfflineOnly requires a still-valid matching operator-anchored local head, a local signed mirror, exact bytes, and current revocation; it cannot extend freshness."
  - "Rollback retains exact historical receipt/lock/generation/objects and separately consumes a fresh current anchored catalog for revocation/policy; it never downloads or depends on cache."
  - "Removal of a revoked active package remains allowed; mutation, new resolution, upgrade, activation, and rollback of that revoked package remain blocked."
  - "Keep the authority ladder explicit: discovery -> operator selection -> catalog verify/anchor -> download/cache byte verify -> trust policy -> reviewed registry -> preflight -> private commit authority -> explicit commit/activation."
  - "The CLI imports exact operator-provisioned local object bytes only; it performs no DNS, TLS, redirects, subprocess download, general network transport, trust, lifecycle commit, installation, or activation."
  - "The protected live registry anchor uses schema v2 with cumulative revocation material; backup observations may recognize historical v1 without granting migration authority."

acceptance_criteria:
  - "The signed registry type carries closed mirror metadata and every package record carries a non-defaulted complete descriptor set."
  - "All descriptor raw pins correspond exactly to the existing record digest fields, object paths are raw-digest addressed, and malformed/mismatched descriptor data rejects."
  - "Publisher and registry verification covers their complete package/artifact and mirror/snapshot subjects, and protected anchor progression is monotonic."
  - "A typed request and plan bind exact discovery, catalog snapshot, registry record, package, network/cache policy, and artifact locations without a trusted/installed/active state."
  - "Typed observations/evidence/receipt bind source, raw/canonical hashes, lengths, media types, catalog/record/package identities, and canonical integrity digests."
  - "Cache entry/projection contracts enforce raw-key correspondence and reject_on_full limits; every cache read is rehashed, reparsed, and rejoined as non-authoritative evidence."
  - "Offline and rollback inputs make stale/revoked/cache-miss/redownload failure modes explicit and unrepresentable as success."
  - "Cumulative revocations cannot be silently removed or changed, and exact rollback provenance remains distinct from current revocation evaluation."
  - "The CLI rejects missing, extra, symlinked, special, over-deep, over-count, wrong-length, wrong-media, raw-digest, canonical-digest, package, and catalog joins beneath the local artifact root."
  - "Focused source cases cover serde unknown fields, closed enums, required policy/default denial, canonical digest mutation, signature subjects, transport/descriptor rejection, cache poisoning/full behavior, offline/revocation/rollback blocks, and absence of lifecycle shortcuts."


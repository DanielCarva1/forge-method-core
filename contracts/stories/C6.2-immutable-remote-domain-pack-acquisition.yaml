title: "Implement immutable remote Domain Pack acquisition semantics"
intent: >-
  Implement the bounded typed source path for acquiring immutable Domain Pack
  candidate bytes through the existing signed supply-chain catalog without
  granting discovery, download, cache, receipt, trust, installation, lifecycle,
  or activation authority implicitly.


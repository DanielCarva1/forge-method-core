constraints:
  - "Compose the existing GuideDecision and OperationContractDocument types; do not create parallel phase, workflow, action, gate, execution, or mutation authority."
  - "GuideDecision validation, structural OperationContract validation, schema provenance, workflow, phase, allowed actions, state version, diagnostics, and route policy all fail closed before acceptance."
  - "The CLI returns the exact validated OperationContractDocument without host reconstruction or substitution."
  - "The canonical input is --protocol-file; --decision-file is only a parser alias and cannot admit a standalone GuideDecisionDocument."
  - "Facilitation, research, visual alignment, correct-course, already-done, and mechanical execution are closed typed routes."
  - "Protocol acceptance grants no mutation authority; existing reference validation, planner, executor, producer admission, gates, and effect application remain independent downstream owners."
  - "Only RuntimePlanStatus::ReadyToCallOperation may enter durable mutation authority."
  - "Ordinary automatic phase planning remains stopped at BuildVerify, and C5.2 still guards ReadyOperate and Evolve admission."
  - "Candidate documents gain no signing, trust, admission, install, activation, lifecycle, protected-anchor, private-key, or phase-mutation authority."
  - "selected_host remains none."

acceptance_criteria:
  - "Guide accepts only a complete GuideProtocolDocument carrying an exact next OperationContractDocument."
  - "Accepted output includes the closed route and exact next operation before any oracle, gate, doctor, or host action proceeds."
  - "Closed route policy covers facilitation, research, visual alignment, correct-course, already-done, and mechanical execution."
  - "Source tests reject host-invented phase, workflow, operation provenance, actor policy, and allowed-action drift."
  - "The public command surface names --protocol-file and decision-only input fails the protocol shape."


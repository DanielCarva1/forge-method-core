schema_version: "0.1"
artifact_kind: "implementation-story"
story_id: "FRUST-030"
status: "implemented"
slice: "guide-operation-protocol"
title: "Return the exact next validated OperationContract from Guide"
intent: >-
  Make the default guide path consume one closed typed protocol that composes the
  existing GuideDecision with the exact next OperationContractDocument, validates
  both views as one route, and returns that operation without allowing a host to
  invent phase state or control flow.


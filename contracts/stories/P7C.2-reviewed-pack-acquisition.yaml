  Convert one explicit operator-approved discovery candidate into exact
  coordinate-based resolution and the existing P6 lifecycle without requiring
  callers to author resolution, composition, trust-input, or preflight internals.

decision_sources:
  - "contracts/plan/agent-native-guidance-plan.yaml#P7c-domain-demand-and-pack-acquisition"

constraints:
  - "Recommendation never implies trust; initial trust remains an explicit operator ceremony."
  - "Reuse the P6 resolver, supply-chain verification, reviewed-registry join, compatibility evaluator, and lifecycle TCB."
  - "No private fixture keys or registry mutation in the public consumer proof."

acceptance_criteria:
  - "The reference pack is a versioned package reachable from a clean release artifact."
  - "The agent selects only an exact candidate id returned by current discovery state."
  - "Forge derives all lifecycle request documents and exact CAS bindings."
  - "Install, upgrade, rollback, and remove remain intent-specific and crash recoverable."
  - "Tampered, revoked, superseded, stale, or unreviewed candidates fail before lifecycle mutation."
  - "A public CLI E2E starts with domain demand and reaches an active effective epoch without hand-authored lifecycle internals."

checks:

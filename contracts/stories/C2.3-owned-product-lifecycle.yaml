title: "Implement the owned product lifecycle"
intent: >-
  Provide one explicit idempotent setup, status, doctor, verified immutable
  install/update, rollback, and product-owned uninstall surface that ordinary
  users can operate without editing project YAML and without moving project or
  external-key authority into installation state.


constraints:
  - "Every lifecycle command receives an explicit install root; consumer repositories, Project Links, and Forge sidecars are never used as an inferred lifecycle root."
  - "Setup may create a fresh root or reuse the exact ownership marker, but it rejects a nonempty unmarked root rather than claiming unrelated files."
  - "Release documents are closed candidate data with bounded typed change and asset records, safe relative paths, one exact lowercase SHA-256 grammar, and exactly one core binary."
  - "Stable distribution is allowed, canary requires explicit opt-in, and dev is rejected for general installation through the existing distribution-admission policy."
  - "The existing local artifact verifier is reused, then the exact no-follow bytes to be installed are independently rehashed before publication."
  - "Installation generations are content addressed by canonical release digest and published from a fresh staging directory before active state changes."
  - "Install retry is idempotent, same-version content drift conflicts, update downgrade is rejected, and the prior working generation remains available for verified rollback."
  - "Status and doctor report exact host-configuration state without selecting, supporting, releasing, or field-verifying a host."
  - "Uninstall deletes only exact product-owned regular files whose digest remains unchanged and removes directories only when empty; modified and unknown files are preserved."
  - "Consumer projects, sidecars, operator anchors, backups, restore receipts, external registries, signing keys, trust roots, and private keys remain outside lifecycle custody."
  - "Private external broker keys must remain in their owner-specific backup procedure and must never be copied into Forge state or Forge backups."
  - "Lifecycle release, state, and receipt deserialization grants no claim, mutation, phase, release, signing, trust, private-key, distribution, install, activation, protected-anchor, or host-selection authority."
  - "selected_host remains none"

acceptance_criteria:
  - "The public command surface exposes setup, status, doctor, install, update, rollback, and uninstall with shared envelope output."
  - "An ordinary user can initialize and diagnose the explicit product root without editing YAML or consumer project state."
  - "A verified release bundle installs into an immutable generation and returns typed release notes and exact host-configuration observations."
  - "Exact retries append no generation, updates reject downgrade and same-version drift, and rollback verifies the complete prior inventory before activation."
  - "Uninstall preserves unknown and operator-modified files plus all consumer project, sidecar, anchor, backup, and external-key authority state."
  - "Focused source tests cover setup idempotence and unmanaged-root refusal, lifecycle transitions, exact retry, rollback, uninstall preservation, and unknown-field authority injection."


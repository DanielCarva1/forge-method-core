schema_version: "0.1"
contract: "runtime_handoff_contract"
status: "draft"
purpose: "Control cross-runtime handoff suggestions with explicit capability and registry evidence so Forge does not route work to another host from chat intuition."
design_rules:
  - id: "handoff_is_not_preference"
    rule: "A runtime handoff cannot be suggested merely because another tool might be better; it requires a scoped capability gap and a registered target runtime."
  - id: "double_gate_required"
    rule: "Cross-runtime handoff requires both capability evidence and registry evidence."
  - id: "handoff_preserves_authority"
    rule: "A handoff suggestion does not transfer Forge state authority; the receiving runtime must obey the same claims, gates, effects, requests, and decision-close contracts."
  - id: "context_is_explicit"
    rule: "The handoff payload must name exactly what context, evidence, and constraints are passed to the target runtime."
rust_compatibility:
  serialization: "serde"
  id_policy: "stable_ascii_ids"
  timestamp_policy: "rfc3339_utc"
  enum_policy: "closed_for_v0_with_unknown_rejected"
  nullable_policy: "explicit_null_for_optional_references"
evidence_basis:
  direct_patterns:
    - source_id: "a2a_protocol"
      supports: "Interoperability between opaque agentic applications and cross-framework communication."
    - source_id: "mcp_tools_spec"
      supports: "Named capabilities with schemas and metadata instead of prose-only tool selection."
    - source_id: "openai_agents_handoffs"
      supports: "Delegating to specialized agents is a real orchestration pattern, represented as tools."
    - source_id: "langgraph_multi_agent_handoffs"
      supports: "Handoffs require explicit context engineering between agent nodes/subgraphs."
  coordination_context:
    - source_id: "agentscope_2402_14034"
      supports: "Robust multi-agent systems need explicit communication and coordination mechanisms."
    - source_id: "fudan_agent4se_survey"
      supports: "Human interaction and multi-agent synergy are key SE-agent concerns."
  anti_patterns:
    - "host agent suggests a different runtime because it is frustrated"
    - "target runtime is unavailable or unregistered"
    - "target runtime lacks the needed capability"
    - "handoff payload omits state version, scope, claims, gates, or evidence"
  inference_boundary: "A2A/MCP/OpenAI/LangGraph support handoff and capability/schema patterns; Forge's product-specific rule is the double gate before suggesting cross-runtime handoff."
enums:
  status:
    - "blocked"
    - "suggestible"
    - "requested"
    - "accepted"
    - "rejected"
  runtime_kind:
    - "codex"
    - "cursor"
    - "claude"
    - "opencode"
    - "vscode"
    - "pidev"
    - "forge_standalone"
    - "custom"
  capability_kind:
    - "code_edit"
    - "browser_validation"
    - "design_surface"
    - "long_running_daemon"
    - "repo_split"
    - "human_review"
    - "external_connector"
  evidence_kind:
    - "registry_entry"
    - "capability_manifest"
    - "agent_card"
    - "mcp_tool_schema"
    - "human_approval"
    - "state_rule"
  blocked_reason:
    - "missing_registry_evidence"
    - "missing_capability_evidence"
    - "scope_not_outside_current_runtime"
    - "handoff_payload_incomplete"
    - "human_or_driver_review_required"
required_fields:
  - "id"
  - "status"
  - "source_runtime.kind"
  - "target_runtime.kind"
  - "task_boundary.required_capability"
  - "double_gate.requires_registry_evidence"
  - "double_gate.requires_capability_evidence"
  - "handoff_payload.state_version"
field_contract:
  id: "Stable runtime handoff contract id."
  status: "Closed status enum."
  source_runtime:
    kind: "Closed runtime_kind enum."
    id: "Stable runtime id."
  target_runtime:
    kind: "Closed runtime_kind enum."
    id: "Stable runtime id."
    registry_ref: "Required when status is suggestible/requested/accepted."
  task_boundary:
    reason_code: "Stable reason for considering handoff."
    current_runtime_gap: "Capability or environment gap in source runtime."
    required_capability: "Closed capability_kind enum."
    product_area: "Optional Product Area."
    paths: "Optional scoped paths."
  double_gate:
    requires_registry_evidence: "Boolean; true for v0."
    registry_evidence_ref: "Registry entry proving target runtime identity/availability."
    requires_capability_evidence: "Boolean; true for v0."
    capability_evidence_ref: "Capability manifest, A2A AgentCard, MCP schema, or equivalent evidence."
  handoff_payload:
    state_version: "State version used to create the handoff."
    context_refs: "Small typed context/evidence refs passed to the target runtime."
    forbidden_context_refs: "Large or unsafe refs that must not be forwarded."
    authority_refs: "Claims/gates/effects/decision contracts the target runtime must obey."
  blocked_reason: "Optional closed blocked_reason when status is blocked."
failure_modes_prevented:
  - "agent routes work to a runtime that is not registered"
  - "agent routes work to a runtime without the required capability"
  - "handoff drops Forge authority constraints"
  - "handoff forwards broad chat history instead of compact typed context"

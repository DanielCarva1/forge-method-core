schema_version: "0.1"
request_contract:
  id: "req.fixture.runtime_handoff"
  contract_ref: "contracts/requests/request-contract-v0.yaml"
  kind: "runtime_handoff"
  communication:
    performative: "handoff"
    sender:
      agent_id: "codex-main"
      role: "driver"
    receiver:
      agent_id: "cursor-browser-agent"
      role: "external_runtime"
    thread_id: "thread.fixture.runtime-handoff"
    correlation_id: "corr.fixture.runtime-handoff"
    reply_to: null
  sender_agent_id: "codex-main"
  sender_role: "driver"
  target_driver: "cursor-browser-agent"
  requested_operation: "accept_runtime_handoff"
  target:
    kind: "runtime"
    id: "cursor-browser-agent"
    product_area: "runtime-core"
  reason_code: "browser_validation_needed"
  evidence_refs:
    - "contracts/runtimes/cursor-browser-validation-runtime.yaml"
  payload:
    kind: "handoff_payload"
    evidence_refs:
      - "contracts/runtimes/cursor-browser-validation-runtime.yaml"
    dependency_refs:
      - kind: "runtime_handoff"
        ref: "contracts/runtimes/cursor-browser-validation-runtime.yaml"
    summary_digest: "sha256:fixture-runtime-handoff"
  response:
    required: true
    expected_kind: "accept_reject"
    deadline: null
    allowed_statuses:
      - "accepted"
      - "rejected"
    required_evidence_refs:
      - "contracts/runtimes/cursor-browser-validation-runtime.yaml"
  response_required: true
  deadline: null
  status: "pending"
  append_only:
    path: ".forge-method/requests.ndjson"
    mutation_allowed: "append_only"
  safety:
    may_mutate_integration_state: false
    driver_must_apply: true
    target_runtime_must_follow_authority_refs: true

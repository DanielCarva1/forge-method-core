schema_version: "0.1"
contract: "request_contract"
status: "draft"
purpose: "Represent typed agent-to-agent, runtime-to-driver, and human-review coordination requests without introducing a separate message protocol in v0."
design_rules:
  - id: "request_is_the_v0_message_unit"
    rule: "Forge v0 uses RequestContract as the durable communication unit for coordination; MessageContract is deferred until a separate non-request message need is proven."
  - id: "communication_is_typed"
    rule: "A request must declare sender, receiver, performative, thread/correlation identity, payload refs, response policy, dependencies, and status."
  - id: "append_only_not_authority"
    rule: "Appending a request does not mutate integration state; a driver/runtime with authority must apply later mutations through normal contracts."
  - id: "no_freeform_chat_authority"
    rule: "Request payloads may include human-readable summaries, but authority comes from refs and closed fields."
rust_compatibility:
  serialization: "serde"
  id_policy: "stable_ascii_ids"
  timestamp_policy: "rfc3339_utc"
  enum_policy: "closed_for_v0_with_unknown_rejected"
  nullable_policy: "explicit_null_for_optional_references"
enums:
  kind:
    - "state_transition"
    - "conflict_notification"
    - "claim_expiry_handoff"
    - "runtime_handoff"
    - "destructive_effect_review"
  role:
    - "driver"
    - "worker"
    - "runtime"
    - "human"
    - "external_runtime"
  performative:
    - "request"
    - "notify"
    - "handoff"
    - "review_request"
  target_kind:
    - "integration_state"
    - "file_path"
    - "story"
    - "runtime"
    - "tool_effect"
  payload_kind:
    - "typed_refs"
    - "status_only"
    - "handoff_payload"
    - "review_payload"
  response_kind:
    - "ack"
    - "approve_reject"
    - "apply_or_reject"
    - "accept_reject"
    - "review_decision"
  status:
    - "pending"
    - "accepted"
    - "rejected"
    - "applied"
    - "superseded"
    - "expired"
  mutation_allowed:
    - "append_only"
  dependency_kind:
    - "request"
    - "claim"
    - "gate"
    - "effect"
    - "runtime_handoff"
    - "decision"
required_fields:
  - "id"
  - "contract_ref"
  - "kind"
  - "communication.performative"
  - "communication.sender.agent_id"
  - "communication.sender.role"
  - "communication.receiver.agent_id"
  - "communication.receiver.role"
  - "communication.thread_id"
  - "communication.correlation_id"
  - "payload.kind"
  - "payload.evidence_refs"
  - "response.required"
  - "response.expected_kind"
  - "status"
  - "append_only.path"
field_contract:
  id: "Stable request id."
  kind: "Closed request kind enum."
  communication:
    performative: "Closed performative enum; intent of the communication act."
    sender:
      agent_id: "Stable agent/runtime/human id."
      role: "Closed role enum."
    receiver:
      agent_id: "Stable recipient id."
      role: "Closed role enum."
    thread_id: "Stable thread/conversation/work item id for grouping request lifecycle."
    correlation_id: "Stable id linking request, response, and follow-up effects."
    reply_to: "Optional request id being answered."
  requested_operation: "Stable operation name requested from the receiver."
  target:
    kind: "Closed target_kind enum."
    id: "Target id/path/key."
    product_area: "Optional Product Area."
  payload:
    kind: "Closed payload_kind enum."
    evidence_refs: "Typed refs that carry authority/evidence."
    dependency_refs: "Typed dependencies required before handling."
    summary_digest: "Short stable summary, not authority."
  response:
    required: "Boolean."
    expected_kind: "Closed response_kind enum."
    deadline: "Optional RFC3339 timestamp."
    allowed_statuses: "Closed status enum values the response may move to."
    required_evidence_refs: "Evidence refs required in the response."
  append_only:
    path: "Append-only request stream."
    mutation_allowed: "Closed mutation_allowed enum."
evidence_basis:
  direct_patterns:
    - source_id: "agent_protocol_taxonomy_2606_19135"
      supports: "Agent communication protocols are usefully classified by counterparty, payload, interaction state, discovery, and schema flexibility."
    - source_id: "communication_centric_llm_mas_2502_14321"
      supports: "LLM multi-agent systems can be analyzed as communication protocol-constrained systems with communication goals and architectures."
    - source_id: "agentscope_2402_14034"
      supports: "Message exchange can be the core mechanism for robust multi-agent applications."
    - source_id: "a2a_protocol"
      supports: "Agent collaboration uses task lifecycle, messages, artifacts, context exchange, and capability discovery."
    - source_id: "agent_protocol_survey_2504_16736"
      supports: "The lack of standard protocols hinders agent collaboration and scaling."
  inference_boundary: "The sources support structured agent communication and lifecycle-aware protocols; Forge's v0 decision is to use RequestContract as the durable message unit until non-request communication needs are proven."
failure_modes_prevented:
  - "worker emits opaque note that driver cannot safely apply"
  - "request loses sender, receiver, dependency, or response lifecycle"
  - "chat message becomes state authority without typed evidence"
  - "agent-to-agent coordination forks into separate message and request protocols too early"

schema_version: "0.1"
request_contract:
  id: "req.fixture.read_write_conflict_notification"
  contract_ref: "contracts/requests/request-contract-v0.yaml"
  kind: "conflict_notification"
  communication:
    performative: "notify"
    sender:
      agent_id: "cursor-worker-1"
      role: "worker"
    receiver:
      agent_id: "codex-main"
      role: "driver"
    thread_id: "thread.fixture.read-write-conflict"
    correlation_id: "corr.fixture.read-write-conflict"
    reply_to: null
  sender_agent_id: "cursor-worker-1"
  sender_role: "worker"
  target_driver: "codex-main"
  requested_operation: "review_conflict"
  target:
    kind: "file_path"
    id: "crates/forge-contracts/src/story.rs"
    product_area: "runtime-core"
  reason_code: "read_target_changed_before_write"
  evidence_refs:
    - "contracts/effects/story-file-conflict-effect.yaml"
  payload:
    kind: "typed_refs"
    evidence_refs:
      - "contracts/effects/story-file-conflict-effect.yaml"
    dependency_refs:
      - kind: "effect"
        ref: "contracts/effects/story-file-conflict-effect.yaml"
    summary_digest: "sha256:fixture-read-write-conflict"
  response:
    required: true
    expected_kind: "review_decision"
    deadline: null
    allowed_statuses:
      - "accepted"
      - "rejected"
      - "superseded"
    required_evidence_refs:
      - "contracts/effects/story-file-conflict-effect.yaml"
  response_required: true
  deadline: null
  status: "pending"
  append_only:
    path: ".forge-method/requests.ndjson"
    mutation_allowed: "append_only"
  safety:
    may_mutate_integration_state: false
    driver_must_apply: true
    overwrite_conflicting_target_allowed: false

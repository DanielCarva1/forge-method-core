schema_version: "0.1.0"
artifact:
  id: v1.1-selfhealing-backlog
  kind: backlog
  status: partially_verified_current_core
  created: 2026-06-27
  reconciled: 2026-06-29
  target_version: "1.1"
  deferred_from: "v1 (self-healing é endurecimento pós-lançamento, NÃO pré-requisito da promessa central)"

  rationale: |
    Self-healing (WAL + prefix-recovery + fail-loud) NÃO bloqueia a promessa central
    do produto (multi-agent sem conflito no happy path, já provado). Os 3 workers de
    preparação gpt-5.5 confirmaram o gap é real e mapearam tudo. Trabalho preservado
    como backlog priorizado da v1.1 para não desperdiçar.

    Decisão: o v1 lança SEM self-healing. A v1.1 endurece com os itens abaixo.

  source_research:
    - contracts/research/selfhealing-writepath-audit-v1.yaml  # W1: mapa E/S, corruption/concurrency risk por operação
    - contracts/research/selfhealing-wal-crc-design-v1.yaml   # W2: design WAL completo (18 sources, CRC-32C, format layout)
    - contracts/research/selfhealing-failpoint-audit-v1.yaml  # W3: 15 fail-points (6 HIGH), tiered invariants

  cross_validation: |
    3 fontes independentes convergem (não achismo):
    - 2 reviews adversariais (claim_engine.rs, conflict_detection.rs) — 10 bugs
    - W1 write-path audit — confirma: sem WAL, lockfile órfão sem detectar dono, sem fsync, TOCTOU
    - W3 failpoint audit — 6 HIGH no claim_engine (TTL overflow, rfc3339 inválido), panics no store commit path

priority_1_high:
  - id: P1.1
    title: "fix: TTL lease overflow (debug panic / release wrap)"
    files: [crates/forge-core-engine/src/claim_engine.rs]
    lines: ["285", "356"]
    problem: "now_unix + ttl com i64::try_from(ttl).unwrap_or(i64::MAX) pode overflow. Debug = panic, release = wrap (corrompe expires_at)."
    fix: "checked_add / saturating_add com rejection path (InvalidRequest) para TTL irrepresentável."
    source: [W3 F-line 285/356, review-claim-engine F3]
    effort: S
    status: verified_current_core
    verified_by:
      files:
        - crates/forge-core-engine/src/claim_engine.rs
      tests:
        - cargo test -p forge-core-engine claim_engine
      evidence:
        - checked_lease_expiry uses checked conversion and checked_add.
        - acquire_rejects_ttl_overflow
        - acquire_rejects_expires_at_overflow
        - heartbeat_rejects_ttl_overflow
        - heartbeat_rejects_expires_at_overflow

  - id: P1.2
    title: "fix: rfc3339_to_unix aceita datas inválidas (viola fail-closed + DD21)"
    files: [crates/forge-core-engine/src/claim_engine.rs]
    lines: ["53-62"]
    problem: "Aceita 2026-02-31, hora 99:99:99. Lease corrompido tratado como vivo."
    fix: "Validar day vs mês/leap-year + h(0..23) m(0..59) s(0..59) antes de days_from_civil. Retornar None → fail-closed."
    source: [W3 lines 54-57, review-claim-engine F2]
    effort: S
    status: verified_current_core
    verified_by:
      files:
        - crates/forge-core-engine/src/claim_engine.rs
      tests:
        - cargo test -p forge-core-engine claim_engine
      evidence:
        - rfc3339_to_unix validates leap years, month length, hour, minute, and second before conversion.
        - timestamp_rejects_invalid_calendar_values

  - id: P1.3
    title: "fix: acquire() gera claim inválida pelo próprio validador"
    files: [crates/forge-core-engine/src/claim_engine.rs]
    lines: ["319", "457-463"]
    problem: "default_expiry_policy() = handoff_required=true + handoff_request_ref=None → validador rejeita. Toda claim nova é inválida."
    fix: "Tornar default_expiry_policy() internamente válido, ou mudar policy/default contract juntos. Teste: acquire() result passa validate_claim."
    source: [review-claim-engine F1]
    effort: M
    note: "Investigar se o validador roda em runtime ou só em build-time — pode ser que afete apenas validação estática, não runtime. Confirmar antes de priorizar."
    status: verified_current_core
    verified_by:
      files:
        - crates/forge-core-engine/src/claim_engine.rs
      tests:
        - cargo test -p forge-core-engine claim_engine
      evidence:
        - default_expiry_policy sets handoff_request_ref to contracts/requests/claim-expiry-handoff-request.yaml.
        - acquire_default_expiry_policy_is_validator_consistent

  - id: P1.4
    title: "fix: root paths (./) viram escopo vazio → false negative em conflito"
    files: [crates/forge-core-engine/src/conflict_detection.rs]
    lines: ["242-243", "264-268"]
    problem: "normalize('.')/''/'' → segmentos vazios → path_covers retorna false → claim root não bloqueia nada."
    fix: "Rejeitar '.','/','' na acquisition COM erro tipado, OU representar root explicitamente. Testes: '.','/', '', child 'src/lib.rs'."
    source: [review-conflict-detection F1]
    effort: M
    status: verified_current_core
    accepted_semantics: "Represent explicit repo-root claims instead of rejecting them; root claims cover descendants and overlap detection blocks conflicting acquisitions."
    verified_by:
      files:
        - crates/forge-core-engine/src/conflict_detection.rs
      tests:
        - cargo test -p forge-core-engine conflict_detection
      evidence:
        - is_explicit_repo_root_path recognizes '.', '/', empty, and separator-only paths.
        - explicit_repo_root_claim_blocks_descendant_paths
        - repo_paths_overlap_uses_same_segment_containment_rules_as_write_checks

  - id: P1.5
    title: "fix: expired handoff-required claims need an actionable official recovery path"
    files: [crates/forge-core-cli/src/claim.rs, crates/forge-core-cli/tests/claim_handoff_e2e.rs]
    problem: "Agents that hit expired_requires_handoff can get stuck retrying heartbeat/release/acquire even though the product requires handoff evidence before reuse."
    fix: "Keep claim handoff as the official recovery edge, persist handoff artifact, mark old claim handoff_recorded, unblock reacquire, and include the exact recovery command in rejected claim errors."
    source: [real_project_feedback_2026_06_29]
    effort: S
    status: verified_current_core
    verified_by:
      files:
        - crates/forge-core-cli/src/claim.rs
        - crates/forge-core-cli/tests/claim_handoff_e2e.rs
        - C:\Users\User\.agents\skills\forge-method\SKILL.md
      tests:
        - cargo test -p forge-core-cli claim::tests::expired_handoff_rejection_points_to_official_recovery_command
        - cargo test -p forge-core-cli --test claim_handoff_e2e
      acceptance:
        - heartbeat/release/acquire remain fail-closed after expiry when handoff is required.
        - rejected errors point to forge-core claim handoff.
        - handoff writes state_root/handoffs/expired-claims artifact.
        - handoff_recorded claim no longer blocks reacquire.
        - global forge-method skill tells agents not to delete claim files and to run the recovery command.

priority_2_medium:
  - id: P2.1
    title: "feat: WAL append-only hand-rolled (CRC-32C + prefix-recovery)"
    design: contracts/research/selfhealing-wal-crc-design-v1.yaml
    summary: "Formato FMW1 + header(24B) + payload + CRC-32C duplo. 6 record types. Prefix recovery estrito (para no 1º inválido, trunca sob lock exclusivo). Append durável via fs4 lock + O_APPEND + write_all + sync_data."
    crates_new: ["fs4", "crc32c"]
    effort: L
    status: verified_current_core
    depends_on: [P1.1, P1.2]  # não buildar WAL sobre aritmética buggy
    scope_note: "This slice implements the append/recovery spine and appends acquire/heartbeat/release/handoff lifecycle events. P2.2 remains required before WAL replay is the sole authoritative claim-state constructor."
    verified_by:
      files:
        - Cargo.toml
        - Cargo.lock
        - crates/forge-core-store/Cargo.toml
        - crates/forge-core-store/src/lib.rs
        - crates/forge-core-store/src/claim_wal.rs
        - crates/forge-core-store/tests/claim_wal.rs
        - crates/forge-core-cli/src/claim.rs
        - crates/forge-core-cli/tests/claim_wal_e2e.rs
      tests:
        - cargo test -p forge-core-store --test claim_wal
        - cargo test -p forge-core-cli --test claim_wal_e2e
        - cargo test -p forge-core-cli claim::tests::acquire_writes_claim_and_returns_ok
      acceptance:
        - FMW1 records use a 24-byte header, JSON payload flag, monotonic seq, header CRC32C, and payload CRC32C.
        - Recovery stops at the first invalid/truncated/corrupt record and optional repair truncates only to the verified prefix under WAL lock.
        - Unknown skippable records are skipped while unskippable unknown record types stop recovery.
        - Acquire, heartbeat, release, and expired-claim handoff append lifecycle WAL records.
        - Installed forge-core.exe smoke creates wal/claims.fmw1 with FMW1 magic for acquire -> heartbeat -> release.

  - id: P2.2
    title: "feat: derive_state como ÚNICO construtor do estado de claims"
    summary: "Hoje cada comando re-read todos YAMLs. Mudar: derive_state(WAL replay) vira a única fonte. load_claims legado vira fallback/debug."
    source: [W1 q2]
    effort: M
    status: verified_current_core
    depends_on: [P2.1]
    scope_note: "Default claim authority is now WAL replay. YAML claims-active files remain a materialized compatibility/debug cache; cache-only non-empty state without WAL fails closed instead of being trusted. Graph mutation preflight consumes the same load_claims authority path."
    verified_by:
      files:
        - crates/forge-core-store/src/claim_wal.rs
        - crates/forge-core-store/tests/claim_wal.rs
        - crates/forge-core-cli/src/claim.rs
        - crates/forge-core-cli/tests/claims.rs
        - crates/forge-core-cli/tests/graph_cli_e2e.rs
      tests:
        - cargo test -p forge-core-store --test claim_wal
        - cargo test -p forge-core-cli claim::tests
        - cargo test -p forge-core-cli --test claims
        - cargo test -p forge-core-cli --test claim_e2e
        - cargo test -p forge-core-cli --test claim_wal_e2e
        - cargo test -p forge-core-cli --test claim_handoff_e2e
        - cargo test -p forge-core-cli --test claim_cli_sidecar_e2e
        - cargo test -p forge-core-cli --test graph_cli_e2e
      acceptance:
        - load_claims replays wal/claims.fmw1 when present and refuses YAML fallback on non-clean/corrupt WAL recovery.
        - Missing YAML cache after acquire does not change status/check-write authority.
        - Stale active YAML cache after release does not resurrect blockers; reacquire follows WAL state.
        - Non-empty cache-only state without WAL fails closed with EnvConfig guidance.
        - Graph dry-run claim preflight uses the same WAL-derived claim state.

  - id: P2.3
    title: "feat: reconcile loop via tokio interval (NÃO notify — UNSOUND no WSL)"
    summary: "Reconcilia estado (detecta claims expirados, heartbeat stale) num interval, não via fs-watch. notify tem issue #254 no WSL."
    effort: M
    status: verified_current_core
    depends_on: [P2.2]
    scope_note: "Implemented as a deterministic one-shot reconciler plus opt-in foreground Tokio interval loop. Reconcile materializes Active->Stale and Active/Stale->HandoffRequired|Expired transitions into the claim WAL with record type 7, keeps Stale as live write authority until lease expiry, and uses MissedTickBehavior::Skip for the loop. No notify/fs-watch dependency."
    verified_by:
      files:
        - Cargo.toml
        - Cargo.lock
        - crates/forge-core-cli/Cargo.toml
        - crates/forge-core-engine/src/claim_engine.rs
        - crates/forge-core-engine/src/lib.rs
        - crates/forge-core-store/src/claim_wal.rs
        - crates/forge-core-store/tests/claim_wal.rs
        - crates/forge-core-cli/src/claim.rs
        - crates/forge-core-cli/src/main.rs
        - crates/forge-core-cli/tests/claims.rs
        - crates/forge-core-cli/tests/claim_reconcile_e2e.rs
        - crates/forge-core-cli/tests/claim_cli_sidecar_e2e.rs
      tests:
        - cargo test -p forge-core-engine claim_engine
        - cargo test -p forge-core-store --test claim_wal
        - cargo test -p forge-core-cli --test claims
        - cargo test -p forge-core-cli --test claim_reconcile_e2e
        - cargo test -p forge-core-cli --test claim_cli_sidecar_e2e
        - cargo test -p forge-core-cli claim::tests
        - cargo test -p forge-core-cli --test claim_handoff_e2e
        - cargo check --workspace
        - cargo test --workspace
        - cargo clippy --workspace --all-targets -- -W clippy::pedantic
        - cargo fmt --all -- --check
      acceptance:
        - Reconcile before heartbeat deadline is a no-op.
        - Missed heartbeat before lease expiry materializes stale and remains live write authority for the claimant while blocking peers.
        - Lease expiry materializes handoff_required for handoff-required claims and preserves the official forge-core claim handoff recovery path.
        - Repeated reconcile ticks are idempotent and do not spam duplicate WAL transitions.
        - Reconcile uses WAL-derived state authority and cache-only state without WAL fails closed.
        - Sidecar project resolution writes reconcile state to the Forge sidecar, not the consumer repo.
        - Foreground loop is bounded with --max-ticks for tests/smoke, emits NDJSON per tick, uses Tokio interval, and does not use notify/fs-watch.
      full_gate_log_dir: <repo-root>\target\codex-gates\20260629-070726-p2-reconcile-loop
      installed_binary_smoke:
        binary: C:\Users\User\.cargo\bin\forge-core.exe
        result: "acquire -> reconcile stale -> idempotent no-op -> reconcile handoff_required -> status handoff blocker -> heartbeat recovery error -> bounded loop no-op; WAL magic FMW1 verified."

  - id: P2.4
    title: "feat: fail-loud tiered invariants"
    summary: "Resultado do W3: 7 Result/Diagnostic, 5 debug_assert, 1 abort_at_commit. Converter panics do store commit-path em tiered failures."
    source: [W3 tiered_invariant_recommendations]
    effort: M
    status: pending
    depends_on: [P2.1]

priority_3_low:
  - id: P3.1
    title: "feat: lockfile com stale-owner detection (pid/timestamp + timeout)"
    files: [crates/forge-core-cli/src/io_util.rs]
    lines: ["41-66", "73"]
    problem: "Lockfile órfão (crash antes do Drop) bloqueia mutators sem remediação. Drop remove por path sem validar ownership."
    fix: "lockfile com pid+timestamp; acquire detecta idade/dono; timeout retorna EnvConfig com remediação."
    source: [W1 io_util.rs entries, W3 recommendation]
    effort: M
    status: verified_current_core
    verified_by:
      files:
        - crates/forge-core-cli/src/io_util.rs
      tests:
        - cargo test -p forge-core-cli io_util
      evidence:
        - DirLockFileState records pid, acquired_unix, and token.
        - process_may_be_alive_platform distinguishes reclaimable dead owners.
        - dir_lock_drop_only_removes_matching_owner_token

  - id: P3.2
    title: "fix: case-fold ASCII-only em conflito (Unicode quebra WSL/Windows)"
    files: [crates/forge-core-engine/src/conflict_detection.rs]
    lines: ["276-285"]
    fix: "Unicode case folding ou canonical path identity no IO boundary."
    source: [review-conflict-detection F3]
    effort: S
    status: pending

  - id: P3.3
    title: "feat: WAL rotation (snapshot + checkpoint_ref)"
    summary: "WAL cresce sem bound. Trigger: >64MiB, >100k records, replay >250ms. Protocol do W2 step-by-step."
    source: [W2 rotation_strategy]
    effort: L
    status: pending
    depends_on: [P2.1]

  - id: P3.4
    title: "feat: proptest de WAL (truncation, bitflip, 50-process stress, recovery idempotence)"
    source: [W2 open_questions]
    effort: M
    status: pending
    depends_on: [P2.1]

explicit_non_goals_for_v1:
  - "TOCTOU do check-write: é ADVISORY por design (documentado em claim.rs:347-354). Não fechar no v1."
  - "Durabilidade fsync no WSL/DrvFS: best-effort, documentado."


  - id: P3.3
    title: "feat: WAL rotation (snapshot + checkpoint_ref)"
    summary: "WAL grows without bound. Trigger: >64MiB, >100k records, replay >250ms. W2's protocol step-by-step."
    source: [W2 rotation_strategy]
    effort: L
    status: verified_current_core
    depends_on: [P2.1]
    scope_note: "Implemented as compatibility-preserving active WAL replacement: `wal/claims.fmw1` remains the public active WAL, rotation archives the old WAL under `wal/archive/`, writes a CRC32C-protected snapshot under `wal/snapshots/`, installs a checkpoint_ref record type 4 as the first active record, and writes `wal/claims.wal.manifest.json` for audit/next-evolution manifest semantics. Full segmented `claims.wal.N` active-pointer mode remains unnecessary for current callers and can be an additive follow-up."
    verified_by:
      files:
        - crates/forge-core-store/src/claim_wal.rs
        - crates/forge-core-store/tests/claim_wal.rs
      commands:
        - cargo test -p forge-core-store claim_wal
        - cargo test -p forge-core-store --test claim_wal
        - cargo clippy -p forge-core-store --all-targets -- -W clippy::pedantic
        - cargo fmt --all -- --check
        - cargo check --workspace
      reviewer:
        - qa_validator 019f130e-3c1c-7c20-b5fb-b8215215658f
    acceptance:
      - Default rotation thresholds are 64MiB WAL bytes, 100000 valid records, and 250ms replay time.
      - Rotation writes an external snapshot, validates it by CRC32C through checkpoint_ref, and fails closed when the snapshot is missing or corrupted.
      - Active WAL starts with record type 4 checkpoint_ref after rotation, and later lifecycle appends continue with global monotonic seq.
      - Old WAL bytes are preserved in an archive file before active WAL replacement.
      - Rotation manifest records active WAL, archive, snapshot, checkpoint seq, last snapshot seq, and snapshot CRC.
    evidence:
      - claim_wal_rotation_writes_snapshot_checkpoint_and_replays_from_snapshot
      - claim_wal_rotation_triggers_by_size_threshold
      - claim_wal_checkpoint_missing_snapshot_fails_closed_and_blocks_append
      - claim_wal_checkpoint_snapshot_crc_mismatch_fails_closed
      - rotation_defaults_match_backlog_thresholds
      - rotation_reason_prefers_size_then_records_then_replay_time

  - id: P3.4
    title: "feat: proptest for WAL (truncation, bitflip, 50-process stress, recovery idempotence)"
    source: [W2 open_questions]
    effort: M
    status: verified_current_core
    depends_on: [P2.1]
    scope_note: "Adds bounded default CI coverage for WAL projection properties, exhaustive truncation prefix recovery, repair idempotence, second rotation checkpoint state, and practical multi-process CLI contention. The full 50-process stress is present as an ignored/manual test and was executed successfully once for this closure so default CI stays stable. This validates accidental corruption/concurrency robustness; CRC32C is not a malicious tamper-proofing claim."
    verified_by:
      files:
        - Cargo.lock
        - crates/forge-core-store/Cargo.toml
        - crates/forge-core-store/tests/claim_wal_properties.rs
        - crates/forge-core-cli/tests/claim_wal_stress.rs
      commands:
        - cargo test -p forge-core-store --test claim_wal_properties
        - cargo test -p forge-core-store --test claim_wal
        - cargo test -p forge-core-cli --test claim_wal_stress
        - cargo test -p forge-core-cli --test claim_wal_stress -- --ignored --test-threads=1 --nocapture
        - cargo test -p forge-core-cli --test claim_wal_e2e
        - cargo clippy -p forge-core-store --all-targets -- -W clippy::pedantic
        - cargo clippy -p forge-core-cli --test claim_wal_stress -- -W clippy::pedantic
        - cargo fmt --all -- --check
      implementers:
        - worker 019f1325-c5a1-7e53-9d55-88bc7e5b7c41
        - worker 019f1326-1a47-7532-a9a3-a219aae180f6
      reviewer:
        - qa_validator 019f1320-eb56-7ee0-8a9a-757c20878494
    acceptance:
      - Bounded proptest projection scripts match a small reference model for active, released, handoff-recorded, and historical-only claim partitions.
      - Exhaustive truncation over a small real WAL recovers exactly the verified prefix, never mutates read-only recovery, and never resynchronizes past a torn record.
      - Torn tail and checksum-corrupt tail repair are idempotent, and later appends resume at the next prefix sequence.
      - Second rotation after a checkpoint snapshots checkpoint-seeded state plus suffix records and preserves logical projection.
      - Default CLI stress runs parallel acquire processes against one claims dir and verifies CleanEof, gapless monotonic WAL sequence, unique claim ids, active projection, and status agreement.
      - Manual 50-process stress passes via ignored test without forcing default CI flakiness.
    evidence:
      - projection_valid_lifecycle_scripts_match_reference_model
      - claim_wal_exhaustive_truncation_sweep_recovers_only_valid_prefix
      - claim_wal_append_repairs_torn_tail_then_repair_is_idempotent
      - claim_wal_checksum_tail_repair_is_idempotent_and_append_resumes_sequence
      - claim_wal_second_rotation_snapshots_checkpoint_state_plus_suffix
      - claim_wal_cli_parallel_acquire_preserves_clean_monotonic_wal
      - claim_wal_cli_50_process_parallel_acquire_preserves_clean_monotonic_wal


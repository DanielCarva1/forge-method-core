schema_version: "0.1"
backlog: "rust_only_forge_core"
status: "active"
created_at: "2026-06-25"
purpose: "Canonical Rust-only implementation backlog for Forge Core as a borrowed-shell runtime."
authority:
  current_backlog: "this file"
  legacy_backlog_refs:
    - "forensic-reference/legacy-forge-state/artifacts/prd-forge-v2.md"
    - "forensic-reference/legacy-forge-state/stories/v2-*.yaml"
  legacy_backlog_status: "forensic_reference_only"
  legacy_use:
    - "mine failure modes"
    - "mine user-experience regressions"
    - "mine coordination scenarios"
  legacy_must_not:
    - "define implementation language"
    - "define done status"
    - "define acceptance commands"
    - "authorize Python work"
non_negotiables:
  - "New Forge Core implementation is Rust-first and Rust-only."
  - "Python is not an implementation target, compatibility layer, adapter, installer glue, or acceptance path for the new core."
  - "Markdown is not runtime or agent-facing authority."
  - "Typed YAML/JSON/Rust contracts are the source of truth."
  - "Human guidance is mediated by agents reading typed contracts and speaking to humans."
  - "Host shells are clients; Forge Core owns protocol authority."
  - "Architecture stories cite evidence before being ready."
evidence_policy:
  required_for:
    - "architecture boundary"
    - "human guidance behavior"
    - "multi-agent coordination"
    - "host compatibility"
    - "install/update"
    - "security/trust"
    - "autonomy policy"
  accepted_tiers:
    - "tier_1_primary_research_or_official"
    - "tier_2_product_field_report"
  minimum_behavior:
    - "Include strengths, weaknesses, and anti-patterns from evidence."
    - "Search non-Western and Chinese-origin work when the domain is active there."
    - "State inference boundaries instead of pretending papers directly prove product choices."

open_questions:
  - id: "first_acceptance_host"
    question: "Which borrowed shell is the first release-blocking acceptance host?"
    recommended_answer: "Codex first, then Cursor/OpenCode/Claude as conformance targets, because current user feedback and failures are Codex-heavy."
  - id: "host_specific_instruction_budget"
    question: "How much host-specific instruction is allowed before it becomes prompt debt?"
    recommended_answer: "Only thin adapter instructions: install, invoke, reload, update, diagnostics, and how to preserve Forge operation fields. Product routing belongs in contracts."
  - id: "minimum_non_developer_install_update_story"
    question: "What counts as usable install/update for non-developers?"
    recommended_answer: "One copy-paste install command, one copy-paste update command, local version diagnosis, and human-readable patch summary generated from typed release metadata."
next_ready_story:
  id: "FRUST-011"
  reason: "FRUST-052 and FRUST-060 source are implemented. The host-neutral conformance vectors, typed capability-result integration, candidate-only support matrix, and CLI validation/reporting exist without selecting, supporting, releasing, or field-verifying a host. The next true blocker is exact-version host execution and field evidence after a release acceptance host is selected."

readiness_definition:
  story_ready:
    - "problem and failure mode are explicit"
    - "evidence_refs are present when required by evidence_policy"
    - "affected crates/contracts are named"
    - "acceptance uses Cargo/Rust validation"
    - "no Python path appears in implementation or acceptance"
    - "no Markdown authority is introduced"
  story_done:
    - "Rust implementation exists where applicable"
    - "typed contract or policy exists where applicable"
    - "Rust tests or validator checks pass"
    - "evidence artifact records validation commands"
    - "public inference boundary is updated"

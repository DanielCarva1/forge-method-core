schema_version: "0.1"
contract: "claim_contract"
status: "draft"
purpose: "Represent lane, story, product-area, and driver claims with TTL, heartbeat, ownership, and mandatory handoff-on-expiry semantics."
design_rules:
  - id: "claim_is_not_lock_file"
    rule: "Claim authority must come from ClaimContract fields, not from the mere existence of a lock file."
  - id: "expiry_requires_handoff"
    rule: "Expired claims must route to handoff/recovery; they must not silently release work."
  - id: "heartbeat_is_evidence"
    rule: "Heartbeat freshness is evidence used by Forge Core before allowing claim reuse, release, or recovery."
  - id: "reclaim_is_typed"
    rule: "Reclaim behavior must be closed enum policy; host agents may not steal or release a claim by improvising."
rust_compatibility:
  serialization: "serde"
  id_policy: "stable_ascii_ids"
  timestamp_policy: "rfc3339_utc"
  enum_policy: "closed_for_v0_with_unknown_rejected"
  nullable_policy: "explicit_null_for_optional_references"
enums:
  claim_kind:
    - "driver"
    - "lane"
    - "story"
    - "product_area"
    - "integration"
  status:
    - "active"
    - "stale"
    - "expired"
    - "handoff_required"
    - "handoff_recorded"
    - "released"
  actor_role:
    - "driver"
    - "worker"
    - "human"
    - "runtime"
    - "unknown"
  expiry_action:
    - "record_handoff_request"
    - "driver_review"
    - "human_review"
    - "block_until_recovered"
  reclaim_policy:
    - "same_agent_only"
    - "driver_review"
    - "owner_review"
    - "human_review"
    - "forbidden"
required_fields:
  - "id"
  - "claim.kind"
  - "claim.claimant_agent_id"
  - "claim.claimant_role"
  - "scope.kind"
  - "lease.acquired_at"
  - "lease.last_heartbeat_at"
  - "lease.expires_at"
  - "lease.ttl_seconds"
  - "status.value"
  - "expiry_policy.on_expiry"
  - "expiry_policy.handoff_required"
  - "expiry_policy.release_without_handoff_allowed"
field_contract:
  id: "Stable claim contract id."
  claim:
    kind: "Closed claim_kind enum."
    claimant_agent_id: "Agent/runtime id holding the claim."
    claimant_role: "Closed actor_role enum."
    registry_ref: "Optional fleet registry used to verify the claimant."
  scope:
    kind: "project|product_area|story|lane|integration_state."
    id: "Stable scoped target id."
    product_area: "Optional Product Area."
    paths: "Paths covered by the claim."
  lease:
    acquired_at: "RFC3339 UTC timestamp."
    last_heartbeat_at: "RFC3339 UTC timestamp."
    expires_at: "RFC3339 UTC timestamp."
    ttl_seconds: "Positive integer TTL."
    heartbeat_interval_seconds: "Positive integer expected heartbeat interval."
    expected_state_version: "State version observed when claim was evaluated."
  status:
    value: "Closed status enum."
    evaluated_at: "RFC3339 UTC timestamp used by runtime to classify status."
    reason_code: "Optional stable reason code."
  expiry_policy:
    on_expiry: "Closed expiry_action enum."
    handoff_required: "Boolean; true for fleet claims."
    release_without_handoff_allowed: "Boolean; false unless single-agent safe exception is explicit."
    reclaim_policy: "Closed reclaim_policy enum."
    handoff_request_ref: "Optional RequestContract ref generated or required on expiry."
  evidence_refs: "List of state, ledger, heartbeat, or request refs proving current claim status."
failure_modes_prevented:
  - "agent treats stale lock file as active authority"
  - "expired claim silently releases work without context"
  - "another agent steals a lane without driver/human review"
  - "heartbeat exists but recovery behavior remains prompt-dependent"

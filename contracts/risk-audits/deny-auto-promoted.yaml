# F06 Risk Audit Gate — deny_auto_promoted anti-pattern.
#
# Detects the deprecated `approval: auto_promoted` token in Memory Contract
# YAML. The F06 NFR states: "no memory becomes an authority automatically;
# promote requires policy and raw evidence." `AutoPromoted` is the exact surface
# memory/retrieval poisoning attacks exploit (AgentPoison, MINJA, PoisonedRAG):
# a record reaches the top of trust with no policy and no evidence.
#
# The variant is retained in `ApprovalState` for zero-migration-cost backwards
# compatibility (ADR 0023, Option A), but its use is forbidden. This detector
# fails closed on the YAML token — a stronger gate than a `#[deprecated]`
# compile warning (which is avoided to keep the six derives clippy-clean; see
# rust-lang/rust#92313).
#
# Schema: risk-audit-v0
# See: crates/forge-core-validate/src/risk_audit.rs
#      docs/adr/0002-memory-trust-model.md

schema_version: risk-audit-v0

rules:
  - id: deny-auto-promoted
    description: |
      `approval: auto_promoted` is forbidden. It violates the F06 NFR by
      promoting a memory to authority with no policy and no raw evidence.
      Replace with `approval: approved` plus an explicit `authority_level`
      field on the entry (`raw`, `provisional`, or `authority`). To reach
      `authority`, the entry must also pass the promote evidence gate
      (F06.6). See CONTEXT.md "AutoPromoted Anti-pattern".
    severity: error
    detector:
      kind: regex
      # Match the YAML key/value with optional inline comment, so a commented
      #-out `# approval: auto_promoted` is still flagged for cleanup.
      pattern: 'approval:\s*auto_promoted'
    evidence_required: false
    fix_hint: |
      Replace `approval: auto_promoted` with `approval: approved` and set an
      explicit `authority_level:` field. For `authority`, provide
      `evidence_ref` and run `forge-core memory promote`.
    applies_to:
      - "**/*.yaml"

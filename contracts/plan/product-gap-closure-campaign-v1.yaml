schema_version: "0.1"
artifact_kind: "canonical-campaign-manifest"
campaign_id: "forge-product-gap-closure-p0-v1"
status: "active"
created_at: "2026-07-18"
project: "forge-method-core"
base_commit: "137b3cf43b123d4b15c45b544a3e3060e714ffb9"
source_checkpoint: "0.12.0"
objective: >-
  Implement every remaining product-gap source item without overstating evidence,
  then run one explicit stabilization, publication, and field-evidence sequence.

authority:
  canonical_execution_authority: "contracts/plan/product-gap-closure-campaign-v1.yaml"
  precedence:
    - rank: 1
      source: "contracts/plan/product-gap-closure-plan.yaml"
      owns: "item identities, product outcomes, sequencing policy, and exit intent"
    - rank: 2
      source: "docs/product-status.md"
      owns: "current source and evidence facts"
    - rank: 3
      source: "docs/product-gap-register.md"
      owns: "accepted gaps, priority, classification, and closure semantics"
    - rank: 4
      source: "contracts/plan/agent-native-guidance-plan.yaml"
      owns: "inherited authority boundaries and historical implementation lineage"
    - rank: 5
      source: "contracts/backlog/rust-only-core-backlog.yaml"
      owns: "Rust-only, typed-authority, and legacy-forensic constraints"
  conflict_rule: >-
    Apply each source only inside its owned domain. The higher-ranked source wins
    on overlap, but no source, checkpoint, or transcript may convert source
    implementation into release, hosted, independent-review, or field evidence.

story_inventory:
  authority: "contracts/plan/product-gap-closure-story-inventory-v1.yaml"
  schema_version: "1.0"
  current_record_count: 81
  source_story_count: 76
  evidence_story_count: 5
  forensic_exclusion_count: 26
  records_embedded: false

constraints:
  - "The product runtime and authority path remain Rust-only."
  - "Python may be used only for repository tooling; no Python runtime authority is introduced."
  - "Compiled and typed contracts outrank prose, fixtures, and conversational summaries."
  - "Scheduling, checkpoints, and handoffs remain provider-neutral."
  - "Unexecuted validation is always recorded as pending rather than passing."
  - "Pre-existing user changes, .pi state, branches, and worktrees are preserved."

campaign_scope:
  active_item_ids:
    - "C1.1"
    - "C1.2"
    - "C1.3"
    - "C1.4"
    - "C2.1"
    - "C2.2"
    - "C2.3"
    - "C2.4"
    - "C3.1"
    - "C3.2"
    - "C3.3"
    - "C3.4"
    - "C4.1"
    - "C4.2"
    - "C5.1"
    - "C5.2"
    - "C5.3"
    - "C6.1"
    - "C6.2"
    - "C7.1"
    - "C7.2"
  deferred_item_ids: []
  unlock_rule: >-
    Source items are assignable whenever their source dependencies are ready.
    C3.2 opens only after all source items and source stories close; C3.3 opens
    after C3.2, and C3.4 opens after C3.3.

status_vocabulary:
  values:
    - "planned"
    - "in_progress"
    - "blocked_external"
    - "implemented_pending_evidence"
    - "completed"
  transitions:
    planned: ["in_progress", "blocked_external"]
    in_progress: ["implemented_pending_evidence", "blocked_external"]
    blocked_external: ["in_progress", "implemented_pending_evidence"]
    implemented_pending_evidence: ["completed", "in_progress", "blocked_external"]
    completed: []

category_vocabulary:
  values:
    - "partial_public_surface"
    - "implementation_absent"
    - "engineering_hardening_debt"
    - "external_evidence_pending"
  definitions:
    partial_public_surface: "Some reusable source exists, but the promised public behavior is incomplete."
    implementation_absent: "The promised source boundary is not yet implemented."
    engineering_hardening_debt: "Source controls required for a trustworthy release remain incomplete."
    external_evidence_pending: "The item primarily owns stabilization, publication, hosted, or field evidence."

scheduling_vocabulary:
  values:
    - "pre_stabilization_implementation"
    - "stabilization_gate"
    - "post_stabilization_evidence"
  definitions:
    pre_stabilization_implementation: "All source, fixture, checker, and product-surface implementation uses continuous compile-only compiler feedback while runtime and heavy gates remain deferred; cargo check may execute build scripts and proc macros as compile-time behavior but must not execute project tests or binaries."
    stabilization_gate: "The sole campaign item allowed to execute deferred runtime, project-linked-build, matrix, archive, and hosted gates after every source item and source story closes."
    post_stabilization_evidence: "Publication, exact-public-asset, independent-review, and field evidence after stabilization passes."

execution_policy:
  max_concurrent_agents: 13
  one_owner_per_item: true
  dependency_ready_only: true
  checkpoint_required: true
  unknown_or_corrupt_state_admits_agents: false
  implementation_claim: "implemented_pending_evidence"
  compiler_feedback:
    mode: "compiler_errors_as_work_queue"
    active_before_item: "C3.2"
    hermetic_launcher_only: true
    canonical_launcher: "/usr/bin/python3 -I /mnt/d/forge-method-core/scripts/hermetic-compile-feedback.py"
    trusted_cargo_path: "/opt/forge-method/rust-1.85.1/bin/cargo"
    trusted_rustc_path: "/opt/forge-method/rust-1.85.1/bin/rustc"
    trusted_rustdoc_path: "/opt/forge-method/rust-1.85.1/bin/rustdoc"
    trusted_path: "/usr/bin"
    trusted_executable_invariants: "Cargo, rustc, rustdoc, every executable path component, and every PATH directory are root-owned non-symlinks, are not group/world writable, and are not writable by the invoking uid."
    fixed_environment:
      HOME: "/nonexistent"
      CARGO_HOME: "/home/user/.cargo"
      PATH: "/usr/bin"
      RUSTC: "/opt/forge-method/rust-1.85.1/bin/rustc"
      RUSTDOC: "/opt/forge-method/rust-1.85.1/bin/rustdoc"
      LANG: "C.UTF-8"
      LC_ALL: "C.UTF-8"
    execution_boundary: "The canonical launcher rejects any mutable or symlinked Cargo/rustc/rustdoc chain, replaces the inherited environment, and exposes only root-owned /usr/bin for native child discovery. Compile-only cargo check still executes dependency or workspace build scripts and proc macros as necessary compile-time behavior, including building proc-macro artifacts; it must not execute project tests or binaries."
    requires_structurally_valid_policy: true
    coherent_batch_requirement: "Every coherent source batch passes a compile-only locked or frozen package-scoped check through the canonical hermetic launcher before work moves on."
    periodic_workspace_requirement: "Accumulated source batches periodically pass /usr/bin/python3 -I /mnt/d/forge-method-core/scripts/hermetic-compile-feedback.py check --locked --workspace --all-targets."
    allowed_command_shapes:
      - "/usr/bin/python3 -I /mnt/d/forge-method-core/scripts/hermetic-compile-feedback.py check (--locked|--frozen) (-p|--package) <workspace-package> [reviewed compile-only selectors]"
      - "/usr/bin/python3 -I /mnt/d/forge-method-core/scripts/hermetic-compile-feedback.py check (--locked|--frozen) --workspace [reviewed compile-only selectors]"
      - "/usr/bin/python3 -I /mnt/d/forge-method-core/scripts/hermetic-compile-feedback.py metadata (--locked|--frozen) --no-deps --format-version 1"
    allowed_check_flags:
      - "--all-targets"
      - "--all-features"
      - "--features <feature-list>"
      - "--no-default-features"
      - "--lib"
      - "--bins"
      - "--examples"
      - "--tests"
      - "--benches"
      - "--bin <name>"
      - "--example <name>"
      - "--test <name>"
      - "--bench <name>"
    forbidden_modifiers:
      - "+toolchain"
      - "--release or --profile"
      - "--target or --target-dir"
      - "--config or -Z"
      - "inherited executable, native tool-discovery, config, proxy, shell, Python, Git, or Rust wrapper injection"
      - "non-hermetic direct Cargo, unknown launchers, shell control operators, pipes, redirects, or substitutions"
  deferred_heavy_stabilization:
    active: true
    authority_item: "C3.2"
    opens_after_typed_source_closure: true
    scope: "Runtime tests, project linked or release builds, matrices, archives, Cargo-backed project execution, and hosted stabilization commands open only after every typed C3.2 precondition; compile-time build-script and proc-macro execution inherent in admitted cargo check remains allowed before C3.2."
    heavy_commands_forbidden_before_c3_2:
      - "cargo test, including --no-run and every filter or target variant"
      - "cargo run, build, install, bench, nextest, fuzz, clippy, doc, package, rustc, fix, clean, update, fetch, vendor, tree, generate-lockfile, aliases, plugins, and unknown subcommands"
      - "direct rustc, rustup, rustfmt, rustdoc, clippy-driver, nextest, cross, and cargo-* tools"
      - "toolchain overrides, release or custom profiles, target or target-dir selection, Cargo config, unstable flags, and environment or runner injection"
      - "runtime tests, full suites, E2E, stress, failure injection, benchmarks, fuzzing, and doctests"
      - "project linked builds, release builds, native-platform or MSRV matrices, archives, SBOMs, and install smoke"
      - "exec, builtin, command, env, time, timeout, nice, nohup, script, stdbuf, ionice, corepack, xargs, find -exec, make, just, task, mise, direnv, nix/devenv, shell or language launchers, generic child launchers, aliases, functions, path shims, and unreviewed local scripts"
      - "Cargo-backed generators or checkers that execute project binaries; admitted cargo check may execute build scripts and proc macros only as inherent compile-time behavior"
      - "GitHub Actions, gh workflow or run execution, act, and CI triggers"
    publication_commands_forbidden_before_c3_3:
      - "cargo publish, login, owner, and yank"
      - "git tag"
      - "git push"
      - "gh release"
      - "release publication or public-asset mutation"
    field_commands_forbidden_before_c3_4:
      - "real-host or production-host journeys"
      - "field evidence collection"
      - "independent semantic or actor-separation review"
    c3_2_does_not_lift:
      - "publication commands"
      - "field commands"
      - "independent-review commands"


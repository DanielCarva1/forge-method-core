schema_version: "0.1"
artifact_kind: "agent-native-guidance-implementation-plan"
status: "active"
created_at: "2026-07-09"
project: "forge-method-core"

objective: >-
  Make Forge an invisible, agent-native governance control plane that can guide
  a non-technical human and a fallible host agent from intent to an
  evidence-backed result without relying on scripted dialogue or chained skills.

authority:
  product_constitution: "contracts/policies/agent-native-product-constitution.yaml"
  architecture_proposal: "contracts/spec/agent-native-assurance-architecture.yaml"
  human_direction: "Proceed with the agent-native plan and begin by documenting it."

constraints:
  - "Do not rewrite the working integrity spine."
  - "Keep the Rust core host- and model-agnostic."
  - "Keep the human interaction in chat through the host agent."
  - "Do not expose YAML authoring or workflow selection as normal human work."
  - "Do not migrate all 110 workflows before proving one vertical slice."
  - "Do not let documentation claims outrun executable evidence."
  - "Operation-wide atomicity and end-to-end MCP authorization/replay enforcement remain release blockers."

delivery_strategy:
  principle: "Prove one deep vertical slice before broad catalog migration."
  checkpoint_policy:
    - "Complete phases land as separate validated commits that a user can fast-forward pull."
    - "Every user-visible checkpoint updates the changelog and source-install update path."
    - "Prebuilt distribution requires a SemVer tag only after the checkpoint passes the release matrix."
    - "Schema or command changes must remain additive within a minor line or ship explicit migration guidance."
  published_local_checkpoints:
    - commit: "87406ba"
      scope: "P0-P2 agent-native doctrine, Assurance Case v0, validation, and Obligation Engine"
    - commit: "7fe6d21"
      tag: "v0.4.0"
      scope: "P3 conversational Assurance Adapter, default read-only MCP projection, and replacement-agent resume"
    - commit: "1267048"
      scope: "P4a deterministic fail-closed Execution Admission policy decision point and executable acceptance corpus"
    - commit: "fc6aabd"
      scope: "P4b.1a operator-owned principal registry, trusted identity derivation, and hardened read-only MCP subprocess boundary"
    - commit: "8bc03eb"
      scope: "P4b.1b bounded durable replay WAL and effect-lock-first commit guard substrate"
  preserve:
    - "Command Surface"
    - "typed contracts"
    - "eventlog and WAL"
    - "claims, gates, and effect admission"
    - "host Adapter model"
  defer:
    - "full Domain Pack ecosystem"
    - "bulk conversion of the workflow catalog"
    - "new UI"
    - "model-specific orchestration"

phases:
  - id: "P0-doctrine-and-assurance-model"
    status: "completed"
    outcome: "The product constitution, epistemic-risk model, assurance architecture, and migration direction are explicit and reviewable."
    deliverables:
      - "contracts/policies/agent-native-product-constitution.yaml"
      - "contracts/spec/agent-native-assurance-architecture.yaml"
      - "contracts/plan/agent-native-guidance-plan.yaml"
      - "CONTEXT.md domain-language navigation"
    exit:
      - "The human accepts or corrects the assurance model."
      - "Open architecture questions are resolved or deliberately deferred."
      - "The first versioned contract slice is selected."

  - id: "P1-contract-and-eval-foundation"
    status: "completed"
    outcome: "A minimal typed vocabulary and failing acceptance corpus define agent-native guidance before runtime implementation."
    candidate_contracts:
      - "Intent Proposal"
      - "Project Snapshot"
      - "Obligation"
      - "Assurance Claim"
      - "Evidence Assessment"
      - "Decision Request"
      - "Capability Gap"
      - "Guidance Response"
    eval_scenarios:
      - "underspecified idea from a non-technical human"
      - "host agent proposes a plausible but incomplete method"
      - "artifact-heavy progress without representative integrated execution"
      - "novel domain with no applicable pack or evaluator"
      - "human insists on a risky path after receiving an evidence-backed warning"
      - "replacement agent resumes from durable state"
    exit:
      - "Schemas reject unknown fields and invalid state transitions."
      - "The acceptance corpus distinguishes good guidance from obedient execution and procedural overreach."

  - id: "P2-obligation-engine-vertical-slice"
    status: "completed"
    outcome: "A read-only Module derives obligations, evidence gaps, Decision Requests, Capability Gaps, and next-best actions from one Intent Proposal and Project Snapshot."
    scope:
      - "Use a small universal assurance frame."
      - "No model inside the Rust core."
      - "No durable mutation in the first slice."
      - "Keep existing workflows available as advisory playbooks."
    architecture_gate:
      - "Choose the crate/Module placement by Depth, Locality, and deletion test rather than by file size."
      - "The Interface is the test surface."
      - "Avoid a pass-through Module between CLI and existing decisions code."
    exit:
      - "Deterministic fixtures cover missing method, unsupported capability, critical unknown, waiver, and verified readiness."
      - "The engine does not treat agent confidence or artifact presence as evidence."

  - id: "P3-conversational-golden-path"
    status: "completed"
    outcome: "One host Adapter proves chat-only human interaction from an empty consumer through evidence-backed next actions and resume."
    scenario:
      - "Human provides only a goal in chat."
      - "Host agent creates typed proposals and artifacts without exposing YAML work."
      - "Forge returns gaps, obligations, rationale, and next-best actions."
      - "The agent builds and verifies an early representative vertical slice."
      - "A fresh agent resumes without hidden context."
    exit:
      - "The human never selects a workflow or edits a Forge artifact."
      - "Critical unknowns block readiness."
      - "The final explanation is generated from typed state and evidence."

  - id: "P4-execution-assurance-hardening"
    status: "in_progress"
    outcome: "Agent-native guidance can safely authorize real mutations."
    completed_slices:
      - id: "P4a-read-only-execution-admission-pdp"
        delivers:
          - "pure deterministic fail-closed Execution Admission decision"
          - "content-addressed Assurance Case and Operation, Command, and Effect contract bindings"
          - "typed principal, replay, claim, gate, and commit observations"
          - "executable accepted/blocked scenario matrix"
        boundary: "No MCP or kernel enforcement is claimed by P4a."
      - id: "P4b.1a-trusted-principal-registry-substrate"
        delivers:
          - "strict operator-owned YAML registry for credential, principal, agent, role, audience, tool, grant, key, and revocation bindings"
          - "canonical authority-field signature KAT plus freshness, exact tool, operation.execute grant, and caller-selected-key rejection"
          - "read-only MCP startup can preload the registry while mutating stdio allowlists remain fail-closed"
          - "read-only child processes pin the current binary, canonical repo cwd, minimal environment, and null stdin"
        boundary: "The principal is not yet propagated to the kernel; live MCP stdio mutation remains disabled."
      - id: "P4b.1b-durable-replay-substrate"
        delivers:
          - "bounded CRC32C-framed replay WAL with durable reserve and compare-and-swap consume"
          - "canonical intent and immutable commit-descriptor digest bindings"
          - "manifest/WAL half-pair, corrupt-state, path-escape, and capacity fail-closed checks"
          - "effect-lock-first ReplayCommitGuard for future kernel integration"
        boundary: >-
          This is a Rust store API only. Live MCP and CLI mutation do not use it;
          effect commit plus replay consume are not yet atomic; whole-pair
          deletion or rollback is not distinguishable from first bootstrap by
          the explicit initializer and needs an externally protected epoch/head
          or initialization policy. Runtime reserve never recreates a missing
          pair.
      - id: "P4b.2a-opaque-authority-and-in-process-seam"
        delivers:
          - "host-neutral forge-core-authority crate for attestation, principal registry, and execution authorization"
          - "opaque non-cloneable and non-deserializable VerifiedExecutionAuthorization with redacted audit projection"
          - "typed VerifiedMcpExecutionCall and injected in-process executor with no mutation subprocess fallback"
          - "structural rejection of caller-selected root, durability, payload scope/limits, transaction identity, commit time, and unknown arguments"
        boundary: >-
          The seam is dormant and exercised only by direct internal tests.
          Public MCP stdio mutation remains fail-closed until replay reservation,
          prepared late admission, provenance, recovery, and an explicit
          enablement decision land.
      - id: "P4b.2b-prepared-transaction-and-late-admission"
        delivers:
          - "canonical trusted environment binding for project root, Forge state root, and exact audience"
          - "kernel-derived commit descriptor binding contracts, payloads, lock/WAL scope, transaction id, and synchronous durability"
          - "read-only initial and late file-effect preflight under a retained exact effect lock"
          - "kernel-owned durable replay reservation plus owned effect-lock-first replay guard"
          - "limited trusted snapshot source for assurance, claims, gates, state version, and time"
          - "kernel-derived principal/replay/contract/freshness/commit observations and late Execution Admission"
          - "opaque admitted typestate with no effect commit method and executable zero-effect-WAL evidence"
        boundary: >-
          This path is internal and dormant. Preparation records a replay
          reservation but does not write the project, effect WAL, metadata, or
          evidence and does not consume replay. Claim/gate revisions are held as
          exact typed snapshots, not operating-system locks against a same-user
          bypass. MCP and CLI mutation remain unchanged and public MCP mutation
          remains fail-closed.
      - id: "P4b.2c-provenance-commit-and-recovery"
        delivers:
          - "complete canonical redacted provenance for verified authorization, late and commit-time Admission, three effect preflights, commit descriptor, and replay reservation"
          - "immediate-commit mutable-authority revalidation before the first effect-WAL record"
          - "direct linear consumption of LateAdmittedExecutionTransaction into one synchronous effect-WAL commit"
          - "effect-WAL replay binding plus durable replay_consumed completion evidence"
          - "typed pending receipts that forbid treating an already-committed effect as safe to retry"
          - "deterministic idempotent reconciliation for crashes after effect Commit and before replay completion"
          - "strict provenance verification and compaction retention for integrated audit/recovery evidence"
        boundary: >-
          This path is internal and dormant. Effect and replay WALs are not one
          physical atomic file; typed pending receipts and deterministic
          reconciliation close the crash window. Claim/gate revisions remain
          cooperative snapshots, whole replay-pair rollback detection remains
          external, operation-wide/saga semantics remain unsupported, and MCP
          and CLI mutation remain unchanged and fail-closed.
      - id: "P4b.3a-typed-deployment-policy"
        delivers:
          - "closed typed read-only and trusted-single-effect deployment modes"
          - "cross-field invariant validation for audience, exact tool, loaders, reconciliation, effect scope, opt-in, root binding, commit protocol, and trust-boundary acknowledgement"
          - "active-read-only versus policy-validated-dormant audit states"
          - "safe read-only operator example plus adversarial parser and invariant tests"
        boundary: >-
          Policy validation cannot activate mutation. Trusted material and
          snapshot loading, startup reconciliation, and MCP server wiring remain
          absent, so public MCP mutation stays fail-closed.
      - id: "P4b.3b-trusted-material-and-snapshot-loaders"
        delivers:
          - "canonical project-confined and byte-bounded local file reader"
          - "strict typed operation, command, effect, risk-audit, and execution-snapshot loading"
          - "payload bytes bound to sha256 digests carried inside the signed MCP intent"
          - "exact Admission authority, content token, and claim/gate revision cross-checks"
          - "dormant in-process executor that loads successfully and still rejects activation"
        boundary: >-
          Loading performs no network, model, subprocess, write, replay reserve,
          WAL append, or kernel preparation. Citation requirements remain
          unsupported, startup reconciliation is not wired, and public MCP
          mutation stays fail-closed.
      - id: "P4b.3c-startup-reconciliation-and-explicit-opt-in"
        delivers:
          - "explicit CLI opt-in requiring policy, exact allowlist, principal registry, and state-relative snapshot"
          - "Project Link resolved sidecar state root plus pre-listen replay verification and P4b.2c reconciliation"
          - "kernel evaluation of loaded risk-audit and citation requirements before replay reservation"
          - "trusted single-effect executor through late Admission, provenance commit, replay consume, and completion evidence"
          - "typed applied, blocked, and recovery-required MCP results with no mutation subprocess fallback"
          - "project bootstrap initialization of the replay manifest/WAL pair"
        boundary: >-
          Read-only remains default. Only execute-operation can mutate and only
          under explicit reconciled trusted deployment. Operation-wide/saga
          semantics, hostile-user isolation, externally anchored replay
          anti-rollback, and turnkey agent credential/snapshot setup remain out
          of scope.
    checkpoint_sequence:
      rule: >-
        P4b.2a, P4b.2b, P4b.2c, and each P4b.3 sub-checkpoint land as separate validated commits so
        source users can fast-forward pull a usable checkpoint without
        implicitly enabling the next authority boundary.
    next_slice:
      id: "P4b.4-agent-operated-trusted-deployment"
      scope:
        - "generate and refresh signed Admission snapshots through an agent-facing command/API rather than manual YAML"
        - "add secure credential provisioning, rotation, revocation, and client configuration guidance"
        - "prove the complete flow through a real MCP client and replacement-agent resume"
        - "surface activation/reconciliation/readiness diagnostics conversationally"
        - "preserve every P4b.3c authority, replay, gate, and single-effect limit"
    following_slices:
      - "operation-wide transaction or complete typed saga semantics"
      - "externally protected replay epoch/head for whole-pair rollback detection"
    release_blockers:
      - "agent-operated Admission snapshot generation without human YAML editing"
      - "secure host credential provisioning and lifecycle"
      - "real MCP client end-to-end deployment evidence"
      - "externally protected replay epoch/head or enforced deployment isolation"
      - "Execution Principal propagated through claims, traces, WAL, and evidence"
    exit:
      - "A late effect failure cannot silently leave an operation partially applied."
      - "A self-selected caller key or ignored fake contract flag cannot authorize mutation."

  - id: "P5-workflow-migration"
    status: "pending"
    outcome: "The catalog is incrementally expressed as policies, obligations, Assurance Claims, playbooks, and evaluators."
    strategy:
      - "Choose a small set of high-leverage workflows used by the golden path."
      - "Preserve legacy workflows as compatibility playbooks during migration."
      - "Measure deletion behavior before retiring workflow fields."
      - "Do not claim the full catalog is executable until its predicates and evidence rules are evaluated by runtime."

  - id: "P6-domain-pack-ecosystem"
    status: "pending"
    outcome: "Novel domains extend Forge through governed knowledge and evaluators rather than core-specific scripts."
    scope:
      - "pack manifest, version, provenance, conflicts, and compatibility"
      - "domain obligations, hazards, lifecycle models, playbooks, evaluators, and fixtures"
      - "capability requirements and Adapter declarations"
      - "promotion path from local learning to reviewed reusable pack"

first_executable_slice:
  name: "unknown-unknowns-assurance-foundation"
  current_done:
    - "agent-native constitution documented"
    - "universal assurance and competence-acquisition proposal documented"
    - "implementation phases and release blockers documented"
    - "Assurance Case v0 Rust contract family with closed enums and deny-unknown-fields"
    - "semantic validation for evidence, waivers, references, ranks, and target-specific readiness"
    - "three acceptance fixtures distinguishing novel-domain, artifact-only, and verified readiness states"
    - "schema generation, generic contract CLI validation, inventory registration, and repo validation coverage"
    - "read-only Obligation Engine Module with a pure typed Interface in forge-core-decisions"
    - "deterministic Assurance Case derivation from Intent Proposal, Project Snapshot, universal lens observations, epistemic signals, capabilities, and Decision Needs"
    - "four typed input fixtures covering novel-domain and method gaps, unsupported capability, artifact-only progress, waiver, and verified release readiness"
    - "derived outputs validated by the P1 semantic validator plus byte-equivalent determinism coverage"
    - "read-only assurance derive/resume host Adapter with stable CliEnvelope output"
    - "content-addressed resume token and compact guidance projection derived from the complete Assurance Case"
    - "human attention requested only for due irreducible Decision Requests"
    - "default read-only MCP projection with order-independent flag-only invocation"
    - "typed conversational golden path from an empty consumer through replacement-agent resume"
    - "P4a pure Execution Admission PDP with content-addressed authority bindings"
    - "P4a scenario corpus for principal, replay, snapshot, evidence, tampering, and commit failures"
    - "P4b.1a operator-owned MCP principal registry and fail-closed stdio mutation boundary"
    - "P4b.1b bounded durable replay WAL and effect-lock-first commit guard Rust substrate"
    - "P4b.2a host-neutral opaque execution authorization and typed in-process MCP executor seam"
    - "P4b.2b opaque prepared transaction, double effect preflight, owned replay guard, and dormant late Admission typestate"
    - "P4b.2c complete redacted provenance, immediate commit Admission, one-effect commit, replay completion receipt, and deterministic crash reconciliation"
    - "P4b.3a closed typed deployment policy with active read-only and validated-but-dormant trusted-single-effect states"
    - "P4b.3b canonical bounded typed material, signed-payload, risk-audit, and local snapshot loaders wired to an always-dormant executor"
    - "P4b.3c explicit reconciled single-effect MCP activation with sidecar state, kernel risk/citation gates, provenance commit, and replay completion"
  next_action: >-
    Implement P4b.4 as separate pullable checkpoints focused on agent-operated
    usability: generate/refresh signed Admission snapshots without human YAML,
    define secure credential lifecycle, prove a real MCP client end to end, and
    expose conversational readiness diagnostics without weakening P4b.3c.
  not_in_scope:
    - "turning the Obligation Engine into a model-driven orchestrator"
    - "rewriting existing workflows"
    - "adding a game-specific method to core"
    - "claiming unknown unknowns can be eliminated"

success_measures:
  - id: "human_zero_artifact_ops"
    measure: "The human completes the golden path without editing files, selecting workflows, or operating commands."
  - id: "ignorance_visibility"
    measure: "A novel-domain scenario produces explicit unknowns and Capability Gaps rather than false readiness."
  - id: "early_reality_feedback"
    measure: "Every consequential project reaches a representative vertical slice before component progress can dominate the readiness signal."
  - id: "evidence_bound_done"
    measure: "Every required readiness claim traces to representative evidence or an authorized waiver."
  - id: "agent_replaceability"
    measure: "A replacement agent resumes the same Assurance Case and next action from durable state."
  - id: "freedom_inside_governance"
    measure: "Different capable agents can use different successful strategies while satisfying the same obligations and evaluators."

risks:
  - id: "overformalization"
    mitigation: "Start with a minimal assurance vocabulary and one vertical slice."
  - id: "checklist_regression"
    mitigation: "Keep playbooks advisory and use diverse probes plus representative evidence."
  - id: "false_quantification"
    mitigation: "Use ordinal risk and explicit rationale until validated calibration data exists."
  - id: "domain_pack_poisoning"
    mitigation: "Require provenance, review, versioning, conflict handling, and evidence-backed promotion."
  - id: "human_overload"
    mitigation: "Generate Decision Requests only for irreducible human choices and always include a recommendation and consequences."
  - id: "premature_refactor"
    mitigation: "Preserve current Modules and prove the new Interface through fixtures before moving code."

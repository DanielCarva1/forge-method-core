schema_version: "0.1"
artifact_kind: "agent-native-guidance-implementation-plan"
status: "active"
created_at: "2026-07-09"
project: "forge-method-core"

objective: >-
  Make Forge an invisible, agent-native governance control plane that can guide
  a non-technical human and a fallible host agent from intent to an
  evidence-backed result without relying on scripted dialogue or chained skills.

authority:
  product_constitution: "contracts/policies/agent-native-product-constitution.yaml"
  architecture_proposal: "contracts/spec/agent-native-assurance-architecture.yaml"
  human_direction: "Proceed with the agent-native plan and begin by documenting it."

constraints:
  - "Do not rewrite the working integrity spine."
  - "Keep the Rust core host- and model-agnostic."
  - "Keep the human interaction in chat through the host agent."
  - "Do not expose YAML authoring or workflow selection as normal human work."
  - "Do not migrate all 110 workflows before proving one vertical slice."
  - "Do not let documentation claims outrun executable evidence."
  - "Do not imply that the agent-facing workflow CLI is exposed through MCP; that Adapter is a separate authority boundary."

delivery_strategy:
  principle: "Prove one deep vertical slice before broad catalog migration."
  checkpoint_policy:
    - "Complete phases land as separate validated commits that a user can fast-forward pull."
    - "Every user-visible checkpoint updates the changelog and source-install update path."
    - "Prebuilt distribution requires a SemVer tag only after the checkpoint passes the release matrix."
    - "Schema or command changes must remain additive within a minor line or ship explicit migration guidance."
  published_local_checkpoints:
    - commit: "87406ba"
      scope: "P0-P2 agent-native doctrine, Assurance Case v0, validation, and Obligation Engine"
    - commit: "7fe6d21"
      tag: "v0.4.0"
      scope: "P3 conversational Assurance Adapter, default read-only MCP projection, and replacement-agent resume"
    - commit: "1267048"
      scope: "P4a deterministic fail-closed Execution Admission policy decision point and executable acceptance corpus"
    - commit: "fc6aabd"
      scope: "P4b.1a operator-owned principal registry, trusted identity derivation, and hardened read-only MCP subprocess boundary"
    - commit: "8bc03eb"
      scope: "P4b.1b bounded durable replay WAL and effect-lock-first commit guard substrate"
    - commit: "6b9b798"
      scope: "P5a complete-catalog migration foundation and deterministic shadow baseline"
    - commit: "1124841"
      scope: "P5b closed governance contracts, simulation-only lane, and opaque verified typestate"
    - commit: "4f425c9"
      scope: "P5c admitted golden-path runtime, trusted Project Snapshot Adapter, ledger TCB, and replacement-agent continuity"
    - commit: "3d5fd97"
      scope: "P5d.1 versioned candidate release/batch foundation, structural scorecard, and rollout audit"
    - commit: "8e6ea14"
      scope: "P5d.2 opaque release admission, durable project pinning, and crash-recoverable upgrade"
    - commit: "d18006c"
      followups: ["109ac22", "a79301c"]
      scope: "P5d.3 reviewed core-assurance candidate, behavioral shadow corpus, quarantine, and historical compatibility"
  current_package_checkpoint:
    version: "0.5.0"
    publication_state: "source_pullable_after_repository_gates"
    minimum_consumer_version: "0.5.0"
    guide_payload_schema: "0.2"
    workflow_release_identity: "0.4.0"
    boundary: >-
      Package SemVer identifies the pullable P5 completion checkpoint. It does
      not rewrite the frozen five-release workflow-governance history, and no
      tag is claimed before the release matrix succeeds.
  preserve:
    - "Command Surface"
    - "typed contracts"
    - "eventlog and WAL"
    - "claims, gates, and effect admission"
    - "host Adapter model"
  defer:
    - "full Domain Pack ecosystem"
    - "bulk conversion of the workflow catalog"
    - "new UI"
    - "model-specific orchestration"

phases:
  - id: "P0-doctrine-and-assurance-model"
    status: "completed"
    outcome: "The product constitution, epistemic-risk model, assurance architecture, and migration direction are explicit and reviewable."
    deliverables:
      - "contracts/policies/agent-native-product-constitution.yaml"
      - "contracts/spec/agent-native-assurance-architecture.yaml"
      - "contracts/plan/agent-native-guidance-plan.yaml"
      - "CONTEXT.md domain-language navigation"
    exit:
      - "The human accepts or corrects the assurance model."
      - "Open architecture questions are resolved or deliberately deferred."
      - "The first versioned contract slice is selected."

  - id: "P1-contract-and-eval-foundation"
    status: "completed"
    outcome: "A minimal typed vocabulary and failing acceptance corpus define agent-native guidance before runtime implementation."
    candidate_contracts:
      - "Intent Proposal"
      - "Project Snapshot"
      - "Obligation"
      - "Assurance Claim"
      - "Evidence Assessment"
      - "Decision Request"
      - "Capability Gap"
      - "Guidance Response"
    eval_scenarios:
      - "underspecified idea from a non-technical human"
      - "host agent proposes a plausible but incomplete method"
      - "artifact-heavy progress without representative integrated execution"
      - "novel domain with no applicable pack or evaluator"
      - "human insists on a risky path after receiving an evidence-backed warning"
      - "replacement agent resumes from durable state"
    exit:
      - "Schemas reject unknown fields and invalid state transitions."
      - "The acceptance corpus distinguishes good guidance from obedient execution and procedural overreach."

  - id: "P2-obligation-engine-vertical-slice"
    status: "completed"
    outcome: "A read-only Module derives obligations, evidence gaps, Decision Requests, Capability Gaps, and next-best actions from one Intent Proposal and Project Snapshot."
    scope:
      - "Use a small universal assurance frame."
      - "No model inside the Rust core."
      - "No durable mutation in the first slice."
      - "Keep existing workflows available as advisory playbooks."
    architecture_gate:
      - "Choose the crate/Module placement by Depth, Locality, and deletion test rather than by file size."
      - "The Interface is the test surface."
      - "Avoid a pass-through Module between CLI and existing decisions code."
    exit:
      - "Deterministic fixtures cover missing method, unsupported capability, critical unknown, waiver, and verified readiness."
      - "The engine does not treat agent confidence or artifact presence as evidence."

  - id: "P3-conversational-golden-path"
    status: "completed"
    outcome: "One host Adapter proves chat-only human interaction from an empty consumer through evidence-backed next actions and resume."
    scenario:
      - "Human provides only a goal in chat."
      - "Host agent creates typed proposals and artifacts without exposing YAML work."
      - "Forge returns gaps, obligations, rationale, and next-best actions."
      - "The agent builds and verifies an early representative vertical slice."
      - "A fresh agent resumes without hidden context."
    exit:
      - "The human never selects a workflow or edits a Forge artifact."
      - "Critical unknowns block readiness."
      - "The final explanation is generated from typed state and evidence."

  - id: "P4-execution-assurance-hardening"
    status: "completed"
    outcome: "Agent-native guidance can safely authorize real mutations."
    completed_slices:
      - id: "P4a-read-only-execution-admission-pdp"
        delivers:
          - "pure deterministic fail-closed Execution Admission decision"
          - "content-addressed Assurance Case and Operation, Command, and Effect contract bindings"
          - "typed principal, replay, claim, gate, and commit observations"
          - "executable accepted/blocked scenario matrix"
        boundary: "No MCP or kernel enforcement is claimed by P4a."
      - id: "P4b.1a-trusted-principal-registry-substrate"
        delivers:
          - "strict operator-owned YAML registry for credential, principal, agent, role, audience, tool, grant, key, and revocation bindings"
          - "canonical authority-field signature KAT plus freshness, exact tool, operation.execute grant, and caller-selected-key rejection"
          - "read-only MCP startup can preload the registry while mutating stdio allowlists remain fail-closed"
          - "read-only child processes pin the current binary, canonical repo cwd, minimal environment, and null stdin"
        boundary: "The principal is not yet propagated to the kernel; live MCP stdio mutation remains disabled."
      - id: "P4b.1b-durable-replay-substrate"
        delivers:
          - "bounded CRC32C-framed replay WAL with durable reserve and compare-and-swap consume"
          - "canonical intent and immutable commit-descriptor digest bindings"
          - "manifest/WAL half-pair, corrupt-state, path-escape, and capacity fail-closed checks"
          - "effect-lock-first ReplayCommitGuard for future kernel integration"
        boundary: >-
          This is a Rust store API only. Live MCP and CLI mutation do not use it;
          effect commit plus replay consume are not yet atomic; whole-pair
          deletion or rollback is not distinguishable from first bootstrap by
          the explicit initializer and needs an externally protected epoch/head
          or initialization policy. Runtime reserve never recreates a missing
          pair.
      - id: "P4b.2a-opaque-authority-and-in-process-seam"
        delivers:
          - "host-neutral forge-core-authority crate for attestation, principal registry, and execution authorization"
          - "opaque non-cloneable and non-deserializable VerifiedExecutionAuthorization with redacted audit projection"
          - "typed VerifiedMcpExecutionCall and injected in-process executor with no mutation subprocess fallback"
          - "structural rejection of caller-selected root, durability, payload scope/limits, transaction identity, commit time, and unknown arguments"
        boundary: >-
          The seam is dormant and exercised only by direct internal tests.
          Public MCP stdio mutation remains fail-closed until replay reservation,
          prepared late admission, provenance, recovery, and an explicit
          enablement decision land.
      - id: "P4b.2b-prepared-transaction-and-late-admission"
        delivers:
          - "canonical trusted environment binding for project root, Forge state root, and exact audience"
          - "kernel-derived commit descriptor binding contracts, payloads, lock/WAL scope, transaction id, and synchronous durability"
          - "read-only initial and late file-effect preflight under a retained exact effect lock"
          - "kernel-owned durable replay reservation plus owned effect-lock-first replay guard"
          - "limited trusted snapshot source for assurance, claims, gates, state version, and time"
          - "kernel-derived principal/replay/contract/freshness/commit observations and late Execution Admission"
          - "opaque admitted typestate with no effect commit method and executable zero-effect-WAL evidence"
        boundary: >-
          This path is internal and dormant. Preparation records a replay
          reservation but does not write the project, effect WAL, metadata, or
          evidence and does not consume replay. Claim/gate revisions are held as
          exact typed snapshots, not operating-system locks against a same-user
          bypass. MCP and CLI mutation remain unchanged and public MCP mutation
          remains fail-closed.
      - id: "P4b.2c-provenance-commit-and-recovery"
        delivers:
          - "complete canonical redacted provenance for verified authorization, late and commit-time Admission, three effect preflights, commit descriptor, and replay reservation"
          - "immediate-commit mutable-authority revalidation before the first effect-WAL record"
          - "direct linear consumption of LateAdmittedExecutionTransaction into one synchronous effect-WAL commit"
          - "effect-WAL replay binding plus durable replay_consumed completion evidence"
          - "typed pending receipts that forbid treating an already-committed effect as safe to retry"
          - "deterministic idempotent reconciliation for crashes after effect Commit and before replay completion"
          - "strict provenance verification and compaction retention for integrated audit/recovery evidence"
        boundary: >-
          This path is internal and dormant. Effect and replay WALs are not one
          physical atomic file; typed pending receipts and deterministic
          reconciliation close the crash window. Claim/gate revisions remain
          cooperative snapshots, whole replay-pair rollback detection remains
          external, operation-wide/saga semantics remain unsupported, and MCP
          and CLI mutation remain unchanged and fail-closed.
      - id: "P4b.3a-typed-deployment-policy"
        delivers:
          - "closed typed read-only and trusted-single-effect deployment modes"
          - "cross-field invariant validation for audience, exact tool, loaders, reconciliation, effect scope, opt-in, root binding, commit protocol, and trust-boundary acknowledgement"
          - "active-read-only versus policy-validated-dormant audit states"
          - "safe read-only operator example plus adversarial parser and invariant tests"
        boundary: >-
          Policy validation cannot activate mutation. Trusted material and
          snapshot loading, startup reconciliation, and MCP server wiring remain
          absent, so public MCP mutation stays fail-closed.
      - id: "P4b.3b-trusted-material-and-snapshot-loaders"
        delivers:
          - "canonical project-confined and byte-bounded local file reader"
          - "strict typed operation, command, effect, risk-audit, and execution-snapshot loading"
          - "payload bytes bound to sha256 digests carried inside the signed MCP intent"
          - "exact Admission authority, content token, and claim/gate revision cross-checks"
          - "dormant in-process executor that loads successfully and still rejects activation"
        boundary: >-
          Loading performs no network, model, subprocess, write, replay reserve,
          WAL append, or kernel preparation. Citation requirements remain
          unsupported, startup reconciliation is not wired, and public MCP
          mutation stays fail-closed.
      - id: "P4b.3c-startup-reconciliation-and-explicit-opt-in"
        delivers:
          - "explicit CLI opt-in requiring policy, exact allowlist, principal registry, and state-relative snapshot"
          - "Project Link resolved sidecar state root plus pre-listen replay verification and P4b.2c reconciliation"
          - "kernel evaluation of loaded risk-audit and citation requirements before replay reservation"
          - "trusted single-effect executor through late Admission, provenance commit, replay consume, and completion evidence"
          - "typed applied, blocked, and recovery-required MCP results with no mutation subprocess fallback"
          - "project bootstrap initialization of the replay manifest/WAL pair"
        boundary: >-
          Read-only remains default. Only execute-operation can mutate and only
          under explicit reconciled trusted deployment. Operation-wide/saga
          semantics, hostile-user isolation, externally anchored replay
          anti-rollback, and turnkey agent credential/snapshot setup remain out
          of scope.
    checkpoint_sequence:
      rule: >-
        P4b.2a, P4b.2b, P4b.2c, and each later P4b sub-checkpoint land as
        separate validated commits so source users can fast-forward pull a
        usable checkpoint without implicitly enabling the next authority
        boundary.
    completed_p4b4_checkpoints:
      - id: "P4b.4a-signed-mutable-authority-snapshot-binding"
        delivers:
          - "canonical SHA-256 binding over claims, gates, state version, and trusted observation time"
          - "pre-replay loader verification of the snapshot token"
          - "late and immediate-commit token recomputation from fresh snapshots under retained locks"
          - "fail-closed compatibility diagnostics for older unbound serialized snapshots"
        boundary: >-
          This hardens generated and manual snapshots but does not yet create,
          refresh, or sign them for the agent.
      - id: "P4b.4b-agent-operated-snapshot-generation"
        delivers:
          - "forge-core mcp snapshot agent-facing command with stable envelope output"
          - "Project Link sidecar resolution and authoritative claim-WAL projection"
          - "content-derived gate revisions and automatic operation/assurance/effect bindings"
          - "atomic state-root-confined snapshot refresh plus exact intent digest output"
          - "active registry credential selection without exposing private key material"
        boundary: >-
          Snapshot creation no longer requires human YAML editing. Signing-key
          provisioning/rotation/revocation and host client configuration remain
          the next explicit authority boundary.
      - id: "P4b.4c-secure-credential-lifecycle"
        delivers:
          - "OS-random ed25519 provisioning into an explicit operator-owned secret directory"
          - "atomic registry updates with active exact-tool and operation.execute authority"
          - "rotation and revocation commit authority loss before old-secret deletion"
          - "in-process signature over exact MCP arguments and generated Admission digest"
          - "no private key bytes in stdout, project root, Forge state, registry, or snapshot"
        boundary: >-
          The operator directory inherits host OS account isolation; Forge does
          not claim hostile same-user isolation. Real-client integration and
          conversational readiness remain the final P4b.4 checkpoint.
      - id: "P4b.4d-real-client-readiness-proof"
        delivers:
          - "forge-core mcp readiness with conversational checks, next actions, and durable replacement-agent resume guidance"
          - "generated standard MCP stdio client configuration bound to the exact executable, root, allowlist, registry, policy, and snapshot"
          - "official rmcp client proof for initialize, tools/list, signed execute-operation, and applied sidecar effect"
          - "wire _meta attestation restoration from rmcp RequestContext into the typed verifier boundary"
          - "Project Link sidecar effect lock, WAL, replay, metadata, and target confinement with no consumer-local .forge-method"
        boundary: >-
          P4b.4 is complete. Mutation remains exact single-effect, explicit
          opt-in, same-user trusted, and locally replay-protected; externally
          anchored whole-pair rollback detection, complete Execution Principal
          propagation, and operation-wide/saga semantics remain separate work.
    completed_p4b5_checkpoints:
      - id: "P4b.5a-external-replay-anchor"
        delivers:
          - "operator-protected external replay anchor with random epoch, monotonic generation, and exact manifest/WAL-prefix digests"
          - "agent-facing provision, verify, and advance lifecycle with Project Link resolution and operator-path confinement"
          - "deployment-policy identity binding and required external_monotonic_head posture"
          - "startup, reconciliation, pre-request, and post-request automatic anchor enforcement"
          - "official-client proof that an applied mutation advances the external head plus rollback rejection tests"
        boundary: >-
          The external anchor detects whole replay-pair rollback only while the
          independently protected anchor survives. Coordinated rollback of both
          stores remains outside Forge's cooperative same-user guarantee.
      - id: "P4b.5b-execution-principal-propagation"
        delivers:
          - "canonical portable ExecutionPrincipal evidence DTO derived from opaque verified authority"
          - "backwards-compatible claimant principal identity in claim WAL projections, summaries, and conflict attribution"
          - "exact principal, agent, and role matching for required trusted execution claims"
          - "principal-bound effect-WAL provenance with recovery cross-checks"
          - "durable pre-effect principal trace plus principal and trace id in kernel/MCP receipts"
          - "official-client proof of principal propagation from registry through applied evidence"
        boundary: >-
          Serialized principal identity is evidence, never authority. Historical
          agent-only claims remain readable for coordination but cannot authorize
          trusted mutation. Operation-wide/saga semantics remain separate work.
    completed_p4b6_checkpoints:
      - id: "P4b.6a-operation-wide-wal-substrate"
        delivers:
          - "architecture decision selecting one operation-wide WAL for complete local file-backed effect sets"
          - "deterministic OperationEffectBundle preserving constituent refs and ids"
          - "semantic, actor, operation, ordered-ref, and unique-id binding"
          - "store-equivalent physical target resolution and cross-kind alias overlap rejection"
          - "one-lock, one-Begin/Commit, complete before-image rollback and crash-recovery proof"
          - "pure Execution Admission support for verified multi-effect whole-operation WAL scope"
          - "legacy multi-effect executor fail-closed before command evidence or project mutation"
        boundary: >-
          This is a Rust transaction and policy substrate. The opaque prepared
          kernel and public MCP deployment remain exact single-effect until
          P4b.6b/P4b.6c bind payloads, provenance, replay, recovery, policy, and
          real-client evidence to the complete operation.
      - id: "P4b.6b-prepared-kernel-operation-wide-integration"
        delivers:
          - "opaque ExecutionRequest and PreparedExecutionMaterial support for a complete ordered effect set with legacy single-effect compatibility"
          - "exact source-ref, content-token, operation declaration, effect document, and payload union binding before lock or replay reservation"
          - "kernel-derived transaction envelope with operation_wide_wal and whole_operation Admission at late and immediate commit boundaries"
          - "commit descriptor and canonical provenance binding the envelope plus every constituent ref, id, and token"
          - "principal trace and receipt preserving all constituent effects while the WAL commits one envelope"
          - "recovery validation of strategy/effect scope plus replay reconciliation without constituent reapplication"
          - "adversarial proofs for reordered refs, second-effect drift, one Begin/Commit, and operation-wide crash recovery"
        boundary: >-
          Prepared operation-wide execution is Rust-only. Public MCP policy,
          bounded loading, snapshot generation, signing syntax, readiness, and
          official-client execution remain exact single-effect until P4b.6c.
      - id: "P4b.6c-trusted-mcp-operation-wide-activation"
        delivers:
          - "closed trusted_operation_wide policy and dedicated typed operator opt-in"
          - "bounded exact ordered 2..64 effect loading with complete snapshot and Admission binding"
          - "MCP array syntax and detached exact-arguments signing with scalar single-effect compatibility"
          - "readiness-derived scope-specific client configuration and startup reconciliation"
          - "one operation-wide kernel transaction through the public in-process MCP executor"
          - "official rmcp proof of two outputs, one Begin/Commit pair, principal evidence, replay anchor advancement, and sidecar confinement"
        boundary: >-
          P4 operation assurance hardening is complete for read-only, exact
          single-effect, and local file-backed operation-wide transactions.
          Typed saga compensation and external-system atomicity remain separate.
    current_program:
      id: "P5-workflow-migration"
      status: "completed"
      scope:
        - "move workflow authority from ordered prose into executable governance"
        - "preserve compatibility and prove deletion safety before retiring legacy fields"
    active_checkpoint:
      id: "P5d.5-signed-retirement-deletion-proof-and-final-scorecard"
      status: "completed"
      scope:
        - "retire exactly 42 legacy authority documents through aggregate dual-signature authorization"
        - "preserve 47 compatibility-only, 3 quarantined, and 18 P6 workflows as visible non-executable states"
        - "ship package 0.5.0 with guide payload schema 0.2 and minimum compatible consumer 0.5.0 while preserving workflow release identity 0.4.0"
    next_slice:
      id: "P6a-domain-pack-contract-and-composition"
      status: "pending"
      scope:
        - "define closed versioned domain-pack contracts and deterministic composition"
        - "keep pack knowledge outside implicit core or mutation authority"
    following_slices:
      - "P6b pack lifecycle, resolution, and trust"
    checkpoint_evidence:
      - "fixed-registry signed applicability, capability, evidence, signal, decision, and waiver boundaries pass adversarial tests"
      - "Decision Need activation and repeated on-signal episodes are proven without caller-authored authority"
      - "golden-path, real-binary consumer, validator, workspace test, clippy, formatting, and generated-surface gates pass"
      - "P5d.2 legacy-ledger compatibility, opaque admission, atomic transition, crash recovery, CAS/idempotency, override rejection, and replacement-agent gates pass"
      - "P5d.3 compiles five candidates, keeps three workflows quarantined, and evaluates 35 positive, negative, ambiguity, false-completion, stale-evidence, resume, and ablation scenarios with zero mismatches or errors"
      - "P5d.3 preserves the exact P5d.2 admitted registry and proves historical replay against a frozen upgraded-WAL fixture before any third release can be admitted"
      - "P5d.4a binds the complete review graph into two distinct Ed25519 roles and admits only the exact append-only 20-policy successor through an opaque kernel capability"
      - "P5d.4a proves foundation-to-core-assurance CAS upgrade, invalidate_all receipt semantics, prepared-authority invalidation, replacement-agent resume, quarantine exclusion, and 139-check repository validation"
      - "P5d.4b.1 preserves frozen V1 admission and folds one release-specific V2 authorization at a time with no partial-chain escape"
      - "P5d.4b.1 admits 13 assurance/quality/operations workflows through 91 scenarios into a four-release, 33-policy runtime; catalog dispositions are 33/56/3/18 and aggregate validation is 156 clean checks"
      - "P5d.4b.2 admits nine agent-native continuity/lifecycle workflows through 63 scenarios into a five-release, 42-policy runtime; catalog dispositions are 42/47/3/18 and aggregate validation is 169 clean checks"
      - "P5d.4b completes core reviewed rollout while leaving all 47 compatibility-only workflows non-executable, all three quarantines excluded, and all 18 P6 candidates outside core authority"
      - "P5d.5 archives a byte-identical 110-workflow historical catalog, removes exactly 42 admitted workflows from the 68-workflow operational catalog, and keeps P5d.4 recomputation intact"
      - "P5d.5 admits an exact all-42 retirement checkpoint only after policy-derived five-surface deletion proof, repository consumer fixtures, two independent Ed25519 signatures, opaque kernel admission, 42/47/3/18 runtime accounting, 42/68 legacy accounting, and 170 clean validation checks"
      - "P5d.5 runtime evidence is split: 189 frozen P5d.4 scenarios prove exact report/outcome/digest equality for 27 promoted policies, while the independent golden-path suite proves signed authority, readiness, completion receipts, and continuation for the 15 base policies; no single test adapter claims all 42"
    exit:
      - "A late effect failure cannot silently leave an operation partially applied."
      - "A self-selected caller key or ignored fake contract flag cannot authorize mutation."

  - id: "P5-workflow-migration"
    status: "completed"
    outcome: "The catalog is incrementally expressed as policies, obligations, Assurance Claims, playbooks, and evaluators."
    strategy:
      - "Choose a small set of high-leverage workflows used by the golden path."
      - "Preserve legacy workflows as compatibility playbooks during migration."
      - "Measure deletion behavior before retiring workflow fields."
      - "Do not claim the full catalog is executable until its predicates and evidence rules are evaluated by runtime."
    delivery_cadence:
      slice_size: "medium_to_large"
      push_rule: >-
        Use local commits for safe internal checkpoints, but push only one
        coherent, usable slice at a time so the full CI cost is paid for a
        meaningful product increment rather than each implementation step.
      release_rule: >-
        Every pushed slice must preserve a usable master, backward compatibility
        or an explicit migration path, generated documentation, full validation,
        and an agent-operable result that downstream users can pull immediately.
      exception: "security or data-integrity hotfixes may ship independently"
    slices:
      - id: "P5a-workflow-migration-foundation"
        status: "completed"
        size: "large"
        outcome: >-
          Forge can inventory and classify the complete workflow catalog,
          identify which legacy fields encode authority, advice, evidence, or
          presentation, and create a deterministic migration manifest without
          changing current user-visible behavior.
        delivers:
          - "typed migration manifest linking legacy workflows to policies, obligations, claims, playbooks, evaluators, and compatibility projections"
          - "catalog inventory and classifier with explicit unmapped/ambiguous states"
          - "selection of the representative golden-path workflow set using leverage, risk, and coverage criteria"
          - "shadow-mode parity harness comparing legacy eligibility/guidance with the future executable projection"
          - "migration telemetry and deletion-test baseline before any legacy authority is retired"
        exit:
          - "every catalog workflow is classified or explicitly marked unresolved"
          - "the golden-path migration set and its coverage rationale are durable"
          - "shadow evaluation causes no mutation and reports deterministic parity evidence"
          - "existing guide/MCP/CLI consumers remain byte- or semantically compatible"
        publication: "one pullable foundation checkpoint after full workspace gates"
      - id: "P5b-executable-workflow-governance-kernel"
        status: "completed"
        size: "large"
        depends_on: ["P5a-workflow-migration-foundation"]
        outcome: >-
          Forge establishes closed workflow policies, a simulation-only raw
          lane, and an opaque verified-kernel typestate seam while playbooks
          remain non-authoritative strategies available to capable agents.
        delivers:
          - "closed typed contracts and semantic validation for workflow policy, obligation/evidence mapping, evaluator binding, and advisory playbook projection"
          - "deterministic simulation_only evaluation of candidate eligibility, blocking gaps, completion evidence, and next-best actions from caller-authored YAML"
          - "explicit candidate Decision Request and Capability Gap production instead of guessed workflow progression"
          - "opaque, non-deserializable verified decision typestate that requires an opaque trusted snapshot"
          - "legacy workflow compatibility simulation that cannot grant progression or completion authority"
          - "adversarial tests for missing evidence, contradictory predicates, invented completion, cyclic dependencies, and playbook-as-authority attempts"
        exit:
          - "raw input and candidate complete output are visibly simulation_only and cannot unlock progression, completion, mutation, or Execution Admission"
          - "only the opaque trusted-snapshot lane can produce a verified governance decision"
          - "playbook deletion or replacement cannot bypass obligations or fabricate readiness"
          - "legacy projections are explicitly simulation-only for migrated fixtures"
          - "no model-specific script or word-for-word dialogue enters core authority"
        publication: "one pullable contract/simulation/opaque-typestate checkpoint after full workspace gates"
      - id: "P5c-golden-path-workflow-migration"
        status: "completed"
        size: "large"
        depends_on: ["P5b-executable-workflow-governance-kernel"]
        outcome: >-
          The representative agent-native golden path runs end to end through
          executable governance while the human remains in chat and a replacement
          agent can resume without knowing or selecting a workflow.
        delivers:
          - "repository-owned admitted policy loading with canonical bundle digest binding inside the trusted Adapter/kernel"
          - "trusted Project Snapshot Adapter deriving phase/state from durable project state"
          - "authoritative prerequisite completion, capability registry/probe, human-decision, and evaluator-evidence receipts with freshness derived from trusted times"
          - "migration of the selected high-leverage discovery, planning, build, verification, correction, and readiness behaviors"
          - "agent-facing guidance generated from obligations, gaps, evidence, decisions, and evaluator results"
          - "representative vertical-slice requirement that prevents artifact-only progress from appearing ready"
          - "shadow comparison, compatibility projection, replacement-agent resume, and real consumer E2E proof"
          - "failure corpus covering ignorant human, ignorant agent, unsupported capability, false progress, stale evidence, and authorized waiver"
        exit:
          - "the human edits no Forge artifact and selects no workflow"
          - "critical unknowns and missing competence block readiness with actionable next steps"
          - "a fresh agent resumes the same governed state and next action"
          - "completion consumption rechecks project, policy digest, state version, phase, and readiness target scope"
          - "legacy and migrated paths have measured, reviewed behavioral differences"
        implementation_evidence:
          - "contracts/workflow-governance/golden-path-v0.yaml admits exactly 15 typed policies with closed activation, routing, prerequisites, obligations, claims, capabilities, decisions, evaluators, and waiver limits"
          - "crates/forge-core-workflow-governance-tcb provides the confined hash-chained ledger, atomic multi-record batch, and lock-scoped recovery/append boundary without exposing semantic mutation to store, CLI, or MCP"
          - "crates/forge-core-kernel/src/workflow_governance/adapter.rs derives policy, phase, state, applicability, capabilities, decisions, evidence freshness, completion, continuity, and shadow comparison from policy plus receipts"
          - "crates/forge-core-cli/src/workflow_cmd.rs exposes the agent-facing init/next/resume/shadow/receipt/completion command family without workflow, phase, bundle, or target selection"
          - "crates/forge-core-kernel/tests/workflow_governance_golden_path.rs and crates/forge-core-cli/tests/workflow_governance_integration_e2e.rs are the required proof surfaces for 15-policy routing, representative evidence, late completion consumption, replacement-agent resume, and consumer CLI behavior"
        boundary: >-
          P5c completed executable governance for the selected 15-policy golden
          path through the local CLI and repository-owned bundle. The remaining
          catalog stays compatibility or migration evidence until P5d. The ledger
          hash chain detects internal record tampering and malformed/torn tails
          but has no external monotonic anchor: clean truncation to a previously
          valid prefix and malicious same-user rollback of the entire internally
          consistent ledger are not detected. The state.yaml file is a
          compatibility projection only, and no end-to-end workflow MCP Adapter
          or hostile-user isolation is claimed. The dedicated
          forge-core-workflow-governance-tcb crate plus forge-core-kernel form
          the shipped workflow trusted computing base; store, CLI, and MCP have
          no direct unchecked semantic append dependency. Explicit hostile
          linkage or direct same-user state writes remain outside this
          isolation boundary.
        publication: "one pullable golden-path migration checkpoint after full workspace gates"
      - id: "P5d-catalog-rollout-and-legacy-retirement"
        status: "completed"
        size: "medium_to_large"
        depends_on: ["P5c-golden-path-workflow-migration"]
        outcome: >-
          The remaining catalog has a governed incremental rollout path and
          legacy workflow authority is retired only where executable coverage,
          compatibility evidence, and deletion tests prove it is safe.
        delivers:
          - "batch migration tooling and coverage report for the remaining catalog"
          - "explicit unresolved-workflow quarantine instead of optimistic automatic conversion"
          - "versioned compatibility and deprecation policy with consumer migration diagnostics"
          - "deletion tests proving retired fields no longer influence authority or readiness"
          - "final P5 scorecard separating executable, compatibility-only, quarantined, and retired workflows"
        exit:
          - "no workflow is presented as executable without runtime-evaluated predicates and evidence rules"
          - "retirement requires observed compatibility and successful deletion behavior"
          - "unknown or ambiguous workflows remain visible and non-authoritative"
          - "P5 completion status is evidence-backed rather than catalog-count theater"
        slices:
          - id: "P5d.1-versioned-release-batch-and-scorecard-foundation"
            status: "completed"
            size: "medium_to_large"
            outcome: >-
              Closed release, batch, quarantine, compatibility, retirement,
              and derived scorecard contracts make every catalog disposition
              explicit without granting executable or retirement authority.
            delivers:
              - "stable governance lineage plus versioned content-addressed release and batch identity"
              - "exhaustive per-workflow disposition intent with no optimistic fallback"
              - "global composition validation and deterministic candidate scorecard"
              - "schema and CLI audit surfaces that remain read-only and candidate-only"
            exit:
              - "raw manifest or batch YAML cannot claim executable or retired state"
              - "missing, duplicate, cross-batch, domain-leak, digest, version, and composition errors fail closed"
              - "scorecard state is derived from validated inputs and cannot improve through authored labels or counts"
          - id: "P5d.2-opaque-release-admission-and-project-pinning"
            status: "completed"
            size: "large"
            depends_on: ["P5d.1-versioned-release-batch-and-scorecard-foundation"]
            outcome: >-
              Projects remain pinned to their admitted governance release and
              move releases only through an atomic, auditable kernel upgrade.
            delivers:
              - "closed embedded release registry with distinct lineage, release, runtime-bundle, policy-set, and registry provenance identities"
              - "opaque admitted-release loader that can grandfather only the exact P5c fifteen-policy set in this slice"
              - "hash-chained release transition with genesis/current identity recovery and no project-local authority override"
              - "crash-recoverable WAL replacement that resolves to the exact prior or committed release and fails closed on ambiguity"
              - "agent-facing release status and CAS-bound idempotent upgrade argv with replacement-agent recovery"
              - "receipt carryover limited to exact policy equivalence and automatic invalidation for incompatible future bundles"
            exit:
              - "installing a newer binary cannot silently change the active project release"
              - "failed upgrade preserves the prior release and replacement-agent recovery selects the same release"
              - "caller paths and local contract overrides cannot enter runtime admission"
          - id: "P5d.3-first-reviewed-batch-quarantine-and-shadow-corpus"
            status: "completed"
            size: "large"
            depends_on: ["P5d.2-opaque-release-admission-and-project-pinning"]
            outcome: >-
              The first non-golden batch is compiled from typed overlays,
              unresolved semantics are quarantined, and behavioral comparison
              measures governed outcomes rather than catalog projection bytes.
            delivers:
              - "five typed core-assurance review candidates and three explicit non-authoritative quarantines"
              - "closed behavioral coverage, scenario corpus, governed projection, and derived shadow-report contracts"
              - "positive, negative, ambiguity, false-completion, stale-evidence, resume, and ablation evidence for every candidate"
              - "append-only registry evolution checks plus frozen P5d.2 upgraded-WAL compatibility evidence before any third admission"
              - "candidate-only release composition that cannot appear as an admitted successor until independent P5d.4 authorization"
            exit:
              - "free-form legacy prose never becomes runtime authority"
              - "every migrated workflow has positive, negative, ambiguity, false-completion, stale, resume, and ablation evidence"
              - "quarantine remains visible and cannot satisfy routing, prerequisites, readiness, or completion"
              - "self-authored shadow parity cannot mint admission, executable state, retirement, or receipt carryover"
          - id: "P5d.4a-independent-review-and-first-new-policy-admission"
            status: "completed"
            size: "large"
            depends_on: ["P5d.3-first-reviewed-batch-quarantine-and-shadow-corpus"]
            outcome: >-
              The P5d.3 candidate can enter runtime only after a complete review
              graph is recomputed, approved by distinct cryptographic roles, and
              consumed by a kernel-owned opaque admission capability.
            delivers:
              - "content-addressed Review Index over every candidate, corpus, evaluator, registry, and promoted runtime artifact"
              - "semantic-reviewer plus release-authorizer quorum with distinct principals, credentials, and public keys"
              - "append-only three-release registry whose new 20-policy successor invalidates all prior receipts"
              - "explicit adjacent project upgrade and replacement-agent continuity without genesis skipping"
            exit:
              - "candidate YAML, shadow verdict, signatures, and audit projections cannot mint runtime authority"
              - "the five new policies are executable only after an explicit foundation-to-core-assurance upgrade"
              - "the three quarantined workflows remain non-authoritative and absent from routing and completion"
          - id: "P5d.4b-remaining-core-reviewed-batches"
            status: "completed"
            size: "large"
            depends_on: ["P5d.4a-independent-review-and-first-new-policy-admission"]
            outcome: >-
              Remaining core candidates roll out in reviewed bounded batches;
              domain-specific or extension-authoring knowledge remains outside
              core authority for P6.
            checkpoints:
              - id: "P5d.4b.1-assurance-operations-reviewed-admission"
                status: "completed"
                delivers:
                  - "generic schema-0.2 single-release Review Index, evaluator, release-specific authorization, and sequential kernel admission"
                  - "13 assurance/quality/operations policies with 91 deterministic behavioral scenarios"
                  - "append-only four-release registry with 33 executable policies and invalidate_all transition semantics"
                  - "complete 110-entry disposition counts of 33 migration, 56 compatibility-only, 3 quarantined, and 18 domain-pack candidates"
                  - "frozen P5d.4a V1 bytes, payload digest, authorization, and historical 139-check anchor remain unchanged"
                  - "156-check aggregate repository validation"
              - id: "P5d.4b.2-continuity-lifecycle-reviewed-admission"
                status: "completed"
                workflow_ids:
                  - "checkpoint-preview"
                  - "collaboration-handoff"
                  - "research-closeout"
                  - "retrospective"
                  - "sprint-status"
                  - "project-context"
                  - "spec-distillation"
                  - "evolve-project"
                  - "product-area-map"
                delivers:
                  - "nine agent-native durable-truth, handoff, learning, recovery, product-map, and evolution policies without scripted speech or agent autoauthority"
                  - "63 deterministic behavioral scenarios with nine resume checkpoints and nine load-bearing ablations"
                  - "append-only five-release registry with 42 executable policies and exact 33-policy predecessor prefix"
                  - "complete catalog accounting at 42 migration, 47 compatibility-only, 3 quarantined, and 18 domain-pack candidates"
                  - "139 historical, 156 Batch A, and 169 aggregate clean validation anchors"
            exit:
              - "every one of the 110 catalog workflows has one explicit visible disposition"
              - "batch composition and selection remain deterministic at catalog scale"
              - "P6 candidates cannot leak into the core executable denominator"
          - id: "P5d.5-signed-retirement-deletion-proof-and-final-scorecard"
            status: "completed"
            size: "large"
            depends_on: ["P5d.4b-remaining-core-reviewed-batches"]
            outcome: >-
              Legacy authority is retired only by a verified authorization
              bound to exact replacement, release, compatibility, shadow, and
              deletion evidence.
            delivers:
              - "byte-identical evidence-only snapshot of all 110 legacy workflows and a 68-workflow operational catalog with exactly the 42 admitted legacy documents removed"
              - "policy-derived routing, readiness, verdict, receipt, and continuation deletion projections recomputed by the evaluator"
              - "repository compatibility matrix, typed replacement tombstones, and fail-closed agent diagnostics for every retired id"
              - "aggregate exact-set authorization with two independent Ed25519 roles and a kernel-owned opaque OnceLock capability"
              - "final two-axis scorecard: runtime 42 executable / 47 compatibility / 3 quarantine / 18 domain; legacy 42 retired / 68 retained"
              - "verified read-only retirement-status, caller override rejection, zero-write E2E, and 170 clean repository checks"
            exit:
              - "removing retired legacy documents cannot change routing, readiness, verdicts, receipts, or continuation"
              - "consumer compatibility window and typed replacement diagnostics are observed before retirement"
              - "final scorecard separates executable, compatibility-only, quarantined, domain-pack, and retired states with evidence digests"
        publication: "one pullable P5 completion checkpoint after full workspace gates"

  - id: "P6-domain-pack-ecosystem"
    status: "pending"
    outcome: "Novel domains extend Forge through governed knowledge and evaluators rather than core-specific scripts."
    scope:
      - "pack manifest, version, provenance, conflicts, and compatibility"
      - "domain obligations, hazards, lifecycle models, playbooks, evaluators, and fixtures"
      - "capability requirements and Adapter declarations"
      - "promotion path from local learning to reviewed reusable pack"
    delivery_cadence:
      slice_size: "medium_to_large"
      push_rule: >-
        Keep implementation checkpoints local and push only complete ecosystem
        capabilities with focused evidence plus full workspace CI.
      compatibility_rule: >-
        Core remains domain-agnostic; installing, removing, upgrading, or
        rejecting a pack must not silently rewrite core semantics or existing
        project authority.
    slices:
      - id: "P6a-domain-pack-contract-and-composition"
        size: "large"
        depends_on: ["P5d-catalog-rollout-and-legacy-retirement"]
        outcome: >-
          A closed, versioned Domain Pack contract can contribute governed
          knowledge without gaining implicit core or mutation authority.
        delivers:
          - "manifest identity, semantic version, schema compatibility, provenance, license/source metadata, dependencies, conflicts, and replacement declarations"
          - "typed contributions for obligations, hazards, lifecycle models, policies, playbooks, evaluators, fixtures, capability requirements, and Adapter declarations"
          - "deterministic composition order and namespacing across core plus multiple packs"
          - "fail-closed duplicate, conflict, incompatible-version, dangling-reference, and cyclic-dependency validation"
          - "content-addressed pack identity and auditable composed-project projection"
        exit:
          - "pack content cannot shadow core or another pack without an explicit compatible replacement rule"
          - "composition is deterministic and independent of filesystem discovery order"
          - "unknown fields, references, capabilities, and evaluator kinds fail closed"
          - "removing a pack produces explicit missing-domain gaps rather than fabricated readiness"
        publication: "one pullable pack-contract/composition checkpoint after full workspace gates"
      - id: "P6b-pack-lifecycle-resolution-and-trust"
        size: "large"
        depends_on: ["P6a-domain-pack-contract-and-composition"]
        outcome: >-
          Agents can inspect, install, validate, activate, upgrade, roll back,
          and remove packs through a governed lifecycle with supply-chain and
          compatibility protections.
        delivers:
          - "deterministic dependency resolver and lock state for exact pack versions/content identities"
          - "staged install/upgrade/remove transaction with preflight, rollback, and project compatibility report"
          - "provenance and trust policy separating local, reviewed, and explicitly untrusted sources"
          - "evaluator/Adapter capability sandbox declarations and denial of undeclared execution authority"
          - "adversarial pack corpus for poisoning, namespace capture, dependency confusion, authority escalation, incompatible upgrade, and rollback"
        exit:
          - "pack lifecycle failure cannot leave a partially activated project domain model"
          - "untrusted pack knowledge cannot authorize mutation or suppress universal assurance obligations"
          - "upgrade and rollback preserve reproducible lock state and explain every semantic change"
          - "agents receive actionable capability gaps instead of attempting unavailable evaluators or Adapters"
        publication: "one pullable governed lifecycle checkpoint after full workspace gates"
      - id: "P6c-learning-promotion-and-reviewed-registry"
        size: "medium_to_large"
        depends_on: ["P6b-pack-lifecycle-resolution-and-trust"]
        outcome: >-
          Useful local learning can become reusable domain knowledge only through
          evidence-backed promotion, review, versioning, and conflict analysis.
        delivers:
          - "local candidate capture that never becomes authority merely because an agent learned or proposed it"
          - "promotion stages for candidate, trial, validated, reviewed, deprecated, revoked, and superseded pack content"
          - "evidence, evaluator, fixture, review, and provenance requirements for each promotion boundary"
          - "reviewed registry/index with compatibility metadata and revocation/supersession handling"
          - "ablation or strong-judge comparison showing promoted knowledge improves outcomes without hiding gaps"
        exit:
          - "chat memory and local observations cannot silently enter reusable pack authority"
          - "promotion decisions are reproducible from durable evidence and review records"
          - "revoked or superseded content remains auditable but cannot activate in new resolutions"
          - "conflicting local learning produces an explicit review request"
        publication: "one pullable learning-promotion checkpoint after full workspace gates"
      - id: "P6d-reference-pack-and-novel-domain-proof"
        size: "large"
        depends_on: ["P6c-learning-promotion-and-reviewed-registry"]
        outcome: >-
          A real reference pack proves that Forge can guide an initially ignorant
          human and agent through a novel domain without hard-coding that domain
          into core or declaring readiness from document presence.
        delivers:
          - "one reviewed reference Domain Pack with hazards, lifecycle, obligations, playbooks, evaluators, fixtures, and capability/Adapter requirements"
          - "one hostile or malformed comparison pack proving trust and composition rejection"
          - "chat-only consumer journey from domain gap through pack resolution, representative execution evidence, correction, and readiness"
          - "replacement-agent resume plus install/upgrade/rollback/remove E2E coverage"
          - "core deletion test proving the reference domain contributes no special-case Rust logic"
        exit:
          - "the unpacked project exposes an explicit domain/capability gap instead of false confidence"
          - "the reviewed pack changes governed obligations and available evidence without changing universal core rules"
          - "representative execution, not artifact presence, is required for readiness"
          - "P6 success is reproduced through a real host Adapter and fresh replacement agent"
        publication: "one pullable P6 ecosystem completion checkpoint after full workspace gates"


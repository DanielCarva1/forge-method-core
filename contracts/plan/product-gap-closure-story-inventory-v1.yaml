scheduling_invariants:
- Every pre_stabilization_source record must be source_complete with no remaining_source_work before C3.2 opens.
- Every coherent pre_stabilization_source batch must pass a compile-only locked or frozen package-scoped check through
  /usr/bin/python3 -I /mnt/d/forge-method-core/scripts/hermetic-compile-feedback.py before work moves on, with periodic
  compile-only locked workspace checks through the same closed-environment launcher; cargo check may execute build scripts
  and proc macros as compile-time behavior but must not execute project tests or binaries, and non-hermetic direct Cargo fails closed.
- C3.2 is stabilization only; it may execute deferred runtime, full-suite, failure-injection, project-linked-build,
  platform, archive, and hosted gates but may not own missing source implementation.
- C3.3 is publication only and remains planned until C3.2 passes.
- C3.4 is field and independent-review evidence only and remains planned until the exact C3.3 public assets exist.
- No pre_stabilization_source record depends directly on C3.2, C3.3, or C3.4.
- A source_complete value records source state and does not by itself claim compiler-feedback, runtime, full-suite,
  hosted, publication, independent-review, or field evidence passed.
- Planned records have owner and checkpoint set to null.
- C2.2 source records are source_complete under the closed continuity checkpoint; runtime, interruption, mixed-version,
  platform, hosted, release, independent-review, and field evidence remain deferred.
- FRUST-001 remains a source-complete campaign-wide supporting predecessor with no campaign item or active owner.
- Legacy v2 records remain forensic_reference_only exclusions and are not current source stories.

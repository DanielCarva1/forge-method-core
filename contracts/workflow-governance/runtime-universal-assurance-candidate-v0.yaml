schema_version: '0.1'
workflow_governance_bundle:
  id: bundle.workflow-governance.universal-assurance-candidate-v0
  policies:
  - id: policy.workflow.adversarial-review
    compatibility_workflow_id: adversarial-review
    routing:
      priority: 30
      readiness_target: execute
      activation: on_signal
      signals:
      - adversarial_review_requested
    eligible_phases:
    - anytime
    prerequisites: []
    obligations:
    - id: obligation.workflow.adversarial-review.scope-bounded
      description: The challenged artifact, success criteria, assumptions, constraints, and risk boundary are explicit.
      criticality: critical
      required_before: execute
      claim_refs:
      - claim.workflow.adversarial-review.scope-bounded
    - id: obligation.workflow.adversarial-review.assumptions-challenged
      description: An independent review challenges the material assumptions and strongest failure paths.
      criticality: critical
      required_before: execute
      claim_refs:
      - claim.workflow.adversarial-review.assumptions-challenged
    - id: obligation.workflow.adversarial-review.findings-dispositioned
      description: High-impact findings have an evidenced repair, authorized acceptance, deferral, or rejection disposition.
      criticality: critical
      required_before: execute
      claim_refs:
      - claim.workflow.adversarial-review.findings-dispositioned
    claims:
    - id: claim.workflow.adversarial-review.scope-bounded
      statement: The review scope and attack criteria are concrete enough to falsify material claims.
      evaluator_ref: evaluator.workflow.adversarial-review.scope-inspection
      waiver:
        kind: not_waivable
    - id: claim.workflow.adversarial-review.assumptions-challenged
      statement: A principal independent from the author challenged material assumptions, misuse cases, and failure paths.
      evaluator_ref: evaluator.workflow.adversarial-review.independent-review
      waiver:
        kind: not_waivable
    - id: claim.workflow.adversarial-review.findings-dispositioned
      statement: Every high-impact finding has an explicit risk-aware disposition and owner.
      evaluator_ref: evaluator.workflow.adversarial-review.disposition-review
      waiver:
        kind: not_waivable
    evaluators:
    - id: evaluator.workflow.adversarial-review.scope-inspection
      provider: repository_inspector
      accepted_evidence_kinds:
      - artifact_inspection
      minimum_strength: inspected_artifact
      minimum_passing_observations: 1
      minimum_distinct_principals: 1
      max_age_seconds: 86400
      freshness: current_only
      disproof_policy: require_uncontested_support
    - id: evaluator.workflow.adversarial-review.independent-review
      provider: independent_reviewer
      accepted_evidence_kinds:
      - independent_review
      minimum_strength: independent_confirmation
      minimum_passing_observations: 1
      minimum_distinct_principals: 1
      max_age_seconds: 86400
      freshness: current_only
      disproof_policy: require_uncontested_support
    - id: evaluator.workflow.adversarial-review.disposition-review
      provider: independent_reviewer
      accepted_evidence_kinds:
      - independent_review
      minimum_strength: independent_confirmation
      minimum_passing_observations: 1
      minimum_distinct_principals: 1
      max_age_seconds: 86400
      freshness: current_only
      disproof_policy: require_uncontested_support
    capability_requirements:
    - id: capability.workflow.adversarial-review.independent-reviewer
      kind: evaluator
      probe_kind: static_registry
      description: A reviewer independent from the artifact author can challenge material assumptions.
      affected_claim_refs:
      - claim.workflow.adversarial-review.assumptions-challenged
      - claim.workflow.adversarial-review.findings-dispositioned
      resolution_options:
      - Acquire an independent reviewer with the required scope.
      - Defer commitment until independent review is available.
      blocks_before: execute
    decision_rules:
    - id: decision.workflow.adversarial-review.high-impact-risk
      activation: claim_unresolved
      claim_ref: claim.workflow.adversarial-review.findings-dispositioned
      question: Which governed disposition should apply to the unresolved high-impact finding?
      reason: irreversible_risk
      alternatives:
      - id: alternative.adversarial.repair
        description: Repair the affected artifact and repeat the review.
        consequences:
        - Reduces known risk before commitment.
      - id: alternative.adversarial.more-evidence
        description: Produce stronger evidence before choosing a disposition.
        consequences:
        - Defers commitment while uncertainty is reduced.
      - id: alternative.adversarial.authorized-acceptance
        description: Seek explicit acceptance from the required authority.
        consequences:
        - Preserves residual risk with accountable ownership.
      - id: alternative.adversarial.reject-or-defer
        description: Reject or defer the affected promise.
        consequences:
        - Prevents an unsupported commitment.
      recommended_alternative_ref: alternative.adversarial.repair
      blocking: true
      blocks_before: execute
    advisory_playbook:
      id: playbook.workflow.adversarial-review
      steps:
      - Bound the artifact, success criteria, assumptions, constraints, risk tolerance, and owner.
      - Attack high-impact failure paths and preserve findings with evidence and dispositions.
  - id: policy.workflow.architecture
    compatibility_workflow_id: architecture
    routing:
      priority: 150
      readiness_target: execute
      activation: when_applicable
      signals: []
    eligible_phases:
    - 3-plan
    prerequisites:
    - policy_ref: policy.workflow.product-requirements
      requirement: always
    - policy_ref: policy.workflow.write-spec
      requirement: always
    obligations:
    - id: obligation.workflow.architecture.architecture-bounded
      description: Material system boundaries, interfaces, ownership, risks, and rejected alternatives are explicit.
      criticality: critical
      required_before: execute
      claim_refs:
      - claim.workflow.architecture.architecture-bounded
    claims:
    - id: claim.workflow.architecture.architecture-bounded
      statement: Architecture decisions trace to requirements and expose validation hooks for expensive or irreversible choices.
      evaluator_ref: evaluator.workflow.architecture.architecture-review
      waiver:
        kind: authorized
        max_target: execute
        authority_scope: project.architecture
        max_age_seconds: 86400
    evaluators:
    - id: evaluator.workflow.architecture.architecture-review
      provider: independent_reviewer
      accepted_evidence_kinds:
      - artifact_inspection
      - independent_review
      minimum_strength: independent_confirmation
      minimum_passing_observations: 1
      minimum_distinct_principals: 1
      max_age_seconds: 604800
      freshness: current_only
      disproof_policy: require_uncontested_support
    capability_requirements:
    - id: capability.workflow.architecture.repository-inventory
      kind: tool
      probe_kind: static_registry
      description: Current repository and integration boundaries can be inspected.
      affected_claim_refs:
      - claim.workflow.architecture.architecture-bounded
      resolution_options:
      - Acquire repository and integration inventory access.
      - Constrain architecture scope to the inspectable boundary.
      blocks_before: execute
    decision_rules: []
    advisory_playbook:
      id: playbook.workflow.architecture
      steps:
      - Compare plausible boundaries and record interfaces, data ownership, risks, test hooks, and rejected alternatives.
      - Trace decisions to governed requirements rather than preferred technology alone.
  - id: policy.workflow.build-story
    compatibility_workflow_id: build-story
    routing:
      priority: 190
      readiness_target: execute
      activation: required
      signals: []
    eligible_phases:
    - 4-build-verify
    prerequisites:
    - policy_ref: policy.workflow.story-creation
      requirement: always
    - policy_ref: policy.workflow.test-strategy
      requirement: always
    obligations:
    - id: obligation.workflow.build-story.implementation-conforms
      description: Implementation conforms to the bounded story and governed constraints.
      criticality: critical
      required_before: execute
      claim_refs:
      - claim.workflow.build-story.implementation-conforms
    - id: obligation.workflow.build-story.representative-execution
      description: The built behavior passes deterministic and representative execution.
      criticality: critical
      required_before: release
      claim_refs:
      - claim.workflow.build-story.representative-execution
    claims:
    - id: claim.workflow.build-story.implementation-conforms
      statement: Repository changes satisfy the accepted story without unrelated or hidden scope.
      evaluator_ref: evaluator.workflow.build-story.implementation-review
      waiver:
        kind: authorized
        max_target: execute
        authority_scope: project.delivery
        max_age_seconds: 86400
    - id: claim.workflow.build-story.representative-execution
      statement: The implemented behavior works under a representative runtime and failure surface.
      evaluator_ref: evaluator.workflow.build-story.runtime-verification
      waiver:
        kind: not_waivable
    evaluators:
    - id: evaluator.workflow.build-story.implementation-review
      provider: repository_inspector
      accepted_evidence_kinds:
      - artifact_inspection
      - deterministic_check
      minimum_strength: inspected_artifact
      minimum_passing_observations: 1
      minimum_distinct_principals: 0
      max_age_seconds: 86400
      freshness: current_only
      disproof_policy: require_uncontested_support
    - id: evaluator.workflow.build-story.runtime-verification
      provider: representative_runtime
      accepted_evidence_kinds:
      - deterministic_check
      - representative_execution
      minimum_strength: representative_execution
      minimum_passing_observations: 2
      minimum_distinct_principals: 0
      max_age_seconds: 86400
      freshness: current_only
      disproof_policy: require_uncontested_support
    capability_requirements:
    - id: capability.workflow.build-story.representative-runtime
      kind: environment
      probe_kind: runtime_handshake
      description: A representative runtime can execute the changed behavior.
      affected_claim_refs:
      - claim.workflow.build-story.representative-execution
      resolution_options:
      - Provision or select a representative runtime.
      - Keep completion blocked and record the environment gap.
      blocks_before: release
    decision_rules: []
    advisory_playbook:
      id: playbook.workflow.build-story
      steps:
      - Implement the bounded story incrementally and collect deterministic evidence.
      - Exercise changed behavior in a representative runtime before any completion claim.
  - id: policy.workflow.code-review
    compatibility_workflow_id: code-review
    routing:
      priority: 195
      readiness_target: release
      activation: when_applicable
      signals: []
    eligible_phases:
    - 4-build-verify
    - 6-evolve
    prerequisites:
    - policy_ref: policy.workflow.build-story
      requirement: when_applicable
    - policy_ref: policy.workflow.test-strategy
      requirement: when_applicable
    obligations:
    - id: obligation.workflow.code-review.changed-surface-bounded
      description: The changed surface and expected behavior are bounded against current requirements and risks.
      criticality: critical
      required_before: release
      claim_refs:
      - claim.workflow.code-review.changed-surface-bounded
    - id: obligation.workflow.code-review.findings-evidenced
      description: Independent review findings are severity-ranked, actionable, evidenced, and durable.
      criticality: critical
      required_before: release
      claim_refs:
      - claim.workflow.code-review.findings-evidenced
    - id: obligation.workflow.code-review.blockers-dispositioned
      description: Blocking findings are repaired and reverified or explicitly authorized for the release scope.
      criticality: critical
      required_before: release
      claim_refs:
      - claim.workflow.code-review.blockers-dispositioned
    claims:
    - id: claim.workflow.code-review.changed-surface-bounded
      statement: The exact diff, affected behavior, acceptance criteria, and risk boundary are inspectable.
      evaluator_ref: evaluator.workflow.code-review.diff-inspection
      waiver:
        kind: not_waivable
    - id: claim.workflow.code-review.findings-evidenced
      statement: An independent reviewer inspected the changed behavior and persisted actionable findings.
      evaluator_ref: evaluator.workflow.code-review.independent-review
      waiver:
        kind: not_waivable
    - id: claim.workflow.code-review.blockers-dispositioned
      statement: No blocking finding remains unresolved for the proposed release.
      evaluator_ref: evaluator.workflow.code-review.blocker-recheck
      waiver:
        kind: authorized
        max_target: release
        authority_scope: authority.release.code-review-waiver
        max_age_seconds: 86400
    evaluators:
    - id: evaluator.workflow.code-review.diff-inspection
      provider: repository_inspector
      accepted_evidence_kinds:
      - artifact_inspection
      minimum_strength: inspected_artifact
      minimum_passing_observations: 1
      minimum_distinct_principals: 1
      max_age_seconds: 86400
      freshness: current_only
      disproof_policy: require_uncontested_support
    - id: evaluator.workflow.code-review.independent-review
      provider: independent_reviewer
      accepted_evidence_kinds:
      - independent_review
      minimum_strength: independent_confirmation
      minimum_passing_observations: 1
      minimum_distinct_principals: 1
      max_age_seconds: 86400
      freshness: current_only
      disproof_policy: require_uncontested_support
    - id: evaluator.workflow.code-review.blocker-recheck
      provider: independent_reviewer
      accepted_evidence_kinds:
      - independent_review
      minimum_strength: independent_confirmation
      minimum_passing_observations: 1
      minimum_distinct_principals: 1
      max_age_seconds: 86400
      freshness: current_only
      disproof_policy: reject_any_disproof
    capability_requirements:
    - id: capability.workflow.code-review.repository-diff-inspection
      kind: tool
      probe_kind: local_command
      description: The exact repository diff and linked validation surface can be inspected.
      affected_claim_refs:
      - claim.workflow.code-review.changed-surface-bounded
      - claim.workflow.code-review.findings-evidenced
      resolution_options:
      - Acquire read access to the exact diff, requirements, and validation evidence.
      - Defer review until the changed surface is reproducible.
      blocks_before: release
    decision_rules:
    - id: decision.workflow.code-review.expected-behavior
      activation: observed_need
      claim_ref: null
      question: Which materially different expected behavior should govern this code review?
      reason: product_direction
      alternatives:
      - id: alternative.code-review.preserve-accepted
        description: Preserve the currently accepted requirement and review the implementation against it.
        consequences:
        - Keeps the accepted product promise and may require implementation repair.
      - id: alternative.code-review.revise-accepted
        description: Revise the expected behavior through the governed requirements path before reviewing code.
        consequences:
        - Changes the accepted product boundary and requires downstream trace updates.
      - id: alternative.code-review.defer
        description: Defer review and release until the ambiguity is resolved.
        consequences:
        - Prevents an arbitrary review verdict.
      recommended_alternative_ref: alternative.code-review.preserve-accepted
      blocking: true
      blocks_before: release
    advisory_playbook:
      id: playbook.workflow.code-review
      steps:
      - Inspect the exact changed surface against expected behavior, risks, and evidence.
      - Persist actionable findings and recheck blockers instead of treating review prose as completion.
  - id: policy.workflow.context-recovery
    compatibility_workflow_id: context-recovery
    routing:
      priority: 10
      readiness_target: explore
      activation: on_signal
      signals:
      - context_recovery_required
    eligible_phases:
    - anytime
    prerequisites: []
    obligations:
    - id: obligation.workflow.context-recovery.continuity-restored
      description: A replacement agent can recover governed state and the next action without chat memory.
      criticality: critical
      required_before: explore
      claim_refs:
      - claim.workflow.context-recovery.continuity-restored
    claims:
    - id: claim.workflow.context-recovery.continuity-restored
      statement: Durable state, decisions, evidence, blockers, and next action are sufficient for replacement-agent continuation.
      evaluator_ref: evaluator.workflow.context-recovery.continuity-review
      waiver:
        kind: not_waivable
    evaluators:
    - id: evaluator.workflow.context-recovery.continuity-review
      provider: independent_reviewer
      accepted_evidence_kinds:
      - artifact_inspection
      - independent_review
      minimum_strength: independent_confirmation
      minimum_passing_observations: 1
      minimum_distinct_principals: 1
      max_age_seconds: 86400
      freshness: current_only
      disproof_policy: require_uncontested_support
    capability_requirements: []
    decision_rules: []
    advisory_playbook:
      id: playbook.workflow.context-recovery
      steps:
      - Load durable project state and governance receipts rather than relying on chat memory.
      - Reconstruct blockers, accepted decisions, evidence provenance, and the next governed action.
  - id: policy.workflow.correct-course
    compatibility_workflow_id: correct-course
    routing:
      priority: 20
      readiness_target: execute
      activation: on_signal
      signals:
      - course_correction_required
    eligible_phases:
    - anytime
    prerequisites: []
    obligations:
    - id: obligation.workflow.correct-course.contradiction-resolved
      description: Disproven assumptions and material drift are resolved or explicitly rerouted.
      criticality: critical
      required_before: execute
      claim_refs:
      - claim.workflow.correct-course.contradiction-resolved
    claims:
    - id: claim.workflow.correct-course.contradiction-resolved
      statement: The corrected direction addresses current contradictory evidence without hiding scope or risk.
      evaluator_ref: evaluator.workflow.correct-course.correction-review
      waiver:
        kind: not_waivable
    evaluators:
    - id: evaluator.workflow.correct-course.correction-review
      provider: independent_reviewer
      accepted_evidence_kinds:
      - independent_review
      - deterministic_check
      minimum_strength: independent_confirmation
      minimum_passing_observations: 1
      minimum_distinct_principals: 1
      max_age_seconds: 86400
      freshness: current_only
      disproof_policy: require_uncontested_support
    capability_requirements: []
    decision_rules: []
    advisory_playbook:
      id: playbook.workflow.correct-course
      steps:
      - Inspect the disproof, drift, or changed constraint and identify affected governed claims.
      - Propose the smallest correction that restores evidence-backed coherence and reroute dependent work.
  - id: policy.workflow.discover-intent
    compatibility_workflow_id: discover-intent
    routing:
      priority: 100
      readiness_target: explore
      activation: required
      signals: []
    eligible_phases:
    - 1-discovery
    prerequisites: []
    obligations:
    - id: obligation.workflow.discover-intent.intent-grounded
      description: Human intent, audience, constraints, non-goals, and observable success are explicit.
      criticality: critical
      required_before: explore
      claim_refs:
      - claim.workflow.discover-intent.intent-grounded
    claims:
    - id: claim.workflow.discover-intent.intent-grounded
      statement: The product direction is specific enough to distinguish success from a fluent but wrong interpretation.
      evaluator_ref: evaluator.workflow.discover-intent.intent-review
      waiver:
        kind: not_waivable
    evaluators:
    - id: evaluator.workflow.discover-intent.intent-review
      provider: authorized_human
      accepted_evidence_kinds:
      - human_acceptance
      - artifact_inspection
      minimum_strength: authoritative_acceptance
      minimum_passing_observations: 1
      minimum_distinct_principals: 1
      max_age_seconds: 604800
      freshness: current_only
      disproof_policy: require_uncontested_support
    capability_requirements: []
    decision_rules: []
    advisory_playbook:
      id: playbook.workflow.discover-intent
      steps:
      - Clarify the outcome, affected people, constraints, non-goals, and observable proof.
      - Persist accepted intent and route unresolved material choices as decisions.
  - id: policy.workflow.domain-scan
    compatibility_workflow_id: domain-scan
    routing:
      priority: 110
      readiness_target: explore
      activation: when_applicable
      signals: []
    eligible_phases:
    - 1-discovery
    - 2-specification
    prerequisites:
    - policy_ref: policy.workflow.discover-intent
      requirement: always
    obligations:
    - id: obligation.workflow.domain-scan.domain-risks-bounded
      description: Material domain rules, harms, duties, and expert-review needs are explicit.
      criticality: critical
      required_before: explore
      claim_refs:
      - claim.workflow.domain-scan.domain-risks-bounded
    claims:
    - id: claim.workflow.domain-scan.domain-risks-bounded
      statement: Domain-sensitive assumptions are supported, rejected, or blocked by traceable sources and qualified review.
      evaluator_ref: evaluator.workflow.domain-scan.domain-review
      waiver:
        kind: authorized
        max_target: explore
        authority_scope: project.domain
        max_age_seconds: 86400
    evaluators:
    - id: evaluator.workflow.domain-scan.domain-review
      provider: external_authority
      accepted_evidence_kinds:
      - external_authority
      - research
      - independent_review
      minimum_strength: independent_confirmation
      minimum_passing_observations: 1
      minimum_distinct_principals: 1
      max_age_seconds: 86400
      freshness: current_only
      disproof_policy: require_uncontested_support
    capability_requirements:
    - id: capability.workflow.domain-scan.qualified-review
      kind: knowledge
      probe_kind: external_verification
      description: Qualified domain review is available when risk requires it.
      affected_claim_refs:
      - claim.workflow.domain-scan.domain-risks-bounded
      resolution_options:
      - Acquire qualified review with traceable scope.
      - Narrow the product boundary until the unsupported domain claim is removed.
      blocks_before: execute
    decision_rules: []
    advisory_playbook:
      id: playbook.workflow.domain-scan
      steps:
      - Identify rules, harms, trust boundaries, source quality, and qualified-review needs.
      - Separate evidence, expert judgment, inference, and assumptions before downstream planning.
  - id: policy.workflow.nfr-evidence-audit
    compatibility_workflow_id: nfr-evidence-audit
    routing:
      priority: 206
      readiness_target: release
      activation: when_applicable
      signals: []
    eligible_phases:
    - 5-ready-operate
    prerequisites:
    - policy_ref: policy.workflow.product-requirements
      requirement: always
    - policy_ref: policy.workflow.build-story
      requirement: always
    obligations:
    - id: obligation.workflow.nfr-evidence-audit.universe-bounded
      description: The security, performance, reliability, accessibility, maintainability, and compliance claims in scope are bounded.
      criticality: critical
      required_before: release
      claim_refs:
      - claim.workflow.nfr-evidence-audit.universe-bounded
    - id: obligation.workflow.nfr-evidence-audit.status-evidenced
      description: Every in-scope NFR has a current evidence status from a qualified evaluator.
      criticality: critical
      required_before: release
      claim_refs:
      - claim.workflow.nfr-evidence-audit.status-evidenced
    - id: obligation.workflow.nfr-evidence-audit.impact-governed
      description: NFR gaps, waivers, and release impacts are explicit, accountable, and current.
      criticality: critical
      required_before: release
      claim_refs:
      - claim.workflow.nfr-evidence-audit.impact-governed
    claims:
    - id: claim.workflow.nfr-evidence-audit.universe-bounded
      statement: The applicable NFR universe and acceptance thresholds are explicit and finite.
      evaluator_ref: evaluator.workflow.nfr-evidence-audit.universe-review
      waiver:
        kind: not_waivable
    - id: claim.workflow.nfr-evidence-audit.status-evidenced
      statement: A qualified independent review confirms that each applicable NFR status is linked to current evidence suitable for that declared domain and threshold.
      evaluator_ref: evaluator.workflow.nfr-evidence-audit.evidence-review
      waiver:
        kind: not_waivable
    - id: claim.workflow.nfr-evidence-audit.impact-governed
      statement: All material NFR gaps and waivers have an explicit release consequence and authority.
      evaluator_ref: evaluator.workflow.nfr-evidence-audit.impact-review
      waiver:
        kind: authorized
        max_target: release
        authority_scope: authority.release.nfr-waiver
        max_age_seconds: 86400
    evaluators:
    - id: evaluator.workflow.nfr-evidence-audit.universe-review
      provider: independent_reviewer
      accepted_evidence_kinds:
      - independent_review
      minimum_strength: independent_confirmation
      minimum_passing_observations: 1
      minimum_distinct_principals: 1
      max_age_seconds: 86400
      freshness: current_only
      disproof_policy: require_uncontested_support
    - id: evaluator.workflow.nfr-evidence-audit.evidence-review
      provider: independent_reviewer
      accepted_evidence_kinds:
      - independent_review
      minimum_strength: independent_confirmation
      minimum_passing_observations: 1
      minimum_distinct_principals: 1
      max_age_seconds: 86400
      freshness: current_only
      disproof_policy: require_uncontested_support
    - id: evaluator.workflow.nfr-evidence-audit.impact-review
      provider: external_authority
      accepted_evidence_kinds:
      - external_authority
      minimum_strength: authoritative_acceptance
      minimum_passing_observations: 1
      minimum_distinct_principals: 1
      max_age_seconds: 86400
      freshness: current_only
      disproof_policy: reject_any_disproof
    capability_requirements:
    - id: capability.workflow.nfr-evidence-audit.qualified-evaluation
      kind: evaluator
      probe_kind: external_verification
      description: Qualified evaluators are available for every material NFR domain in scope.
      affected_claim_refs:
      - claim.workflow.nfr-evidence-audit.universe-bounded
      - claim.workflow.nfr-evidence-audit.status-evidenced
      - claim.workflow.nfr-evidence-audit.impact-governed
      resolution_options:
      - Acquire qualified evaluation for the unsupported NFR domain.
      - Remove the unsupported promise from release scope.
      blocks_before: release
    decision_rules:
    - id: decision.workflow.nfr-evidence-audit.release-impact
      activation: claim_unresolved
      claim_ref: claim.workflow.nfr-evidence-audit.impact-governed
      question: How should the unresolved NFR gap constrain this release?
      reason: irreversible_risk
      alternatives:
      - id: alternative.nfr.repair

schema_version: "0.1"
contract: "assurance_case"
status: "draft"
purpose: "Represent the evidence-backed claims, obligations, human decisions, capability gaps, and next-best actions behind one readiness verdict."
design_rules:
  - id: "confidence_is_not_evidence"
    rule: "Agent confidence and artifact presence do not verify an Assurance Claim."
  - id: "unknown_is_a_state"
    rule: "Human or agent ignorance must remain explicit until evidence, waiver, or a Capability Gap resolves it."
  - id: "readiness_has_a_target"
    rule: "Exploration, durable execution, and release are assessed separately so missing domain competence can allow learning while blocking false readiness."
  - id: "human_attention_is_reserved"
    rule: "Decision Requests are valid only for irreducible preference, value, cost, risk, direction, or external-authority choices."
  - id: "strategy_is_not_authority"
    rule: "Ranked next actions recommend how to reduce evidence gaps but do not become mutation authority."
rust_compatibility:
  serialization: "serde"
  id_policy: "stable_ascii_ids"
  timestamp_policy: "rfc3339_utc"
  enum_policy: "closed_for_v0_with_unknown_rejected"
  unknown_field_policy: "deny"
enums:
  obligation_criticality:
    - "advisory"
    - "required"
    - "critical"
  obligation_status:
    - "pending"
    - "in_progress"
    - "satisfied"
    - "blocked"
  assurance_claim_status:
    - "unknown"
    - "hypothesized"
    - "supported"
    - "verified"
    - "disproven"
    - "waived"
  readiness_target:
    - "explore"
    - "execute"
    - "release"
  readiness_verdict:
    - "blocked"
    - "ready"
  human_decision_reason:
    - "preference"
    - "value_judgment"
    - "material_cost"
    - "irreversible_risk"
    - "product_direction"
    - "external_authority"
  capability_gap_kind:
    - "agent"
    - "tool"
    - "environment"
    - "knowledge"
    - "evaluator"
    - "authority"
    - "domain_pack"
  next_action_kind:
    - "research"
    - "experiment"
    - "implement"
    - "evaluate"
    - "challenge"
    - "ask_human"
    - "acquire_capability"
    - "declare_gap"
    - "proceed"
required_fields:
  - "id"
  - "intent"
  - "project_snapshot"
  - "obligations"
  - "claims"
  - "decision_requests"
  - "capability_gaps"
  - "next_actions"
  - "readiness.target"
  - "readiness.verdict"
  - "readiness.blocker_refs"
field_contract:
  intent: "The host agent's typed interpretation of desired outcome, constraints, preferences, unacceptable outcomes, and uncertainty."
  project_snapshot: "Derived observation with state revision and evidence refs; never a hand-edited readiness assertion."
  obligations:
    item:
      criticality: "Whether the obligation is advisory, required, or critical."
      status: "Current fulfillment state."
      required_before: "Earliest readiness target that requires satisfaction."
      claim_refs: "Assurance Claims whose verified or waived status satisfies the obligation."
  claims:
    item:
      status: "Closed epistemic-state enum."
      evidence_refs: "Provenance-bearing observations supporting or disproving the claim."
      waiver: "Explicit authority, reason, consequences, and optional expiry; valid only when status is waived."
  decision_requests: "Irreducible human choices with alternatives, consequences, and one recommendation."
  capability_gaps: "Missing agent, tool, environment, knowledge, evaluator, authority, or Domain Pack capability."
  next_actions: "Ranked actions that reduce the most consequential evidence gap."
  readiness: "Target-specific verdict with explicit blocker refs and rationale."
semantic_rules:
  - "Verified, supported, and disproven claims require evidence."
  - "Waived claims require explicit waiver authority and consequences."
  - "Satisfied obligations require all referenced claims to be verified or waived."
  - "A ready verdict cannot have due unsatisfied obligations or due blocking decisions/capability gaps."
  - "A blocked verdict requires explicit, resolvable blocker refs."
  - "All internal claim, recommendation, and blocker refs must resolve."
  - "Next-action ranks must be unique, non-zero, and contiguous from one."
failure_modes_prevented:
  - "agent confidence substitutes for proof"
  - "documents and assets accumulate without integrated reality feedback"
  - "novel-domain ignorance is hidden behind a plausible plan"
  - "a human is asked to approve technical process they delegated"
  - "readiness is declared while critical claims remain unknown or disproven"

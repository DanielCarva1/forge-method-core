schema_version: "0.1"
architecture: "rust_core"
selected_host: "none"
authority_model:
  host_client_authority: "Host and protocol clients adapt requests and reports only; they do not grant core authority."
  core_authority: "Only reviewed core services may derive typed authority; candidate data remains inert."
  candidate_documents_are_inert: true
crates:
  - name: "forge-contract-validator"
    owns: "validates legacy contract invocations"
    does_not_own: "core authority, host selection, or state mutation"
    authority_boundary: "compatibility"
  - name: "forge-core-authority"
    owns: "verifies execution-admission capabilities and produces opaque in-process authority"
    does_not_own: "host selection, private broker keys, or direct state mutation"
    authority_boundary: "core"
  - name: "forge-core-cli"
    owns: "renders structured command requests and reports"
    does_not_own: "core policy decisions, signing authority, or host selection"
    authority_boundary: "host_client"
  - name: "forge-core-command-surface"
    owns: "defines host-neutral command request and response types"
    does_not_own: "execution admission, state mutation, or host selection"
    authority_boundary: "core"
  - name: "forge-core-contracts"
    owns: "defines typed Forge contracts and inert candidate document boundaries"
    does_not_own: "host selection, private broker keys, signing, trust, or state mutation"
    authority_boundary: "core"
  - name: "forge-core-crypto"
    owns: "verifies cryptographic evidence"
    does_not_own: "host selection, key custody, or policy decisions"
    authority_boundary: "core"
  - name: "forge-core-decisions"
    owns: "derives typed policy decision records"
    does_not_own: "execution admission, state mutation, or host selection"
    authority_boundary: "core"
  - name: "forge-core-domain-pack-learning-store"
    owns: "persists domain-pack learning projections"
    does_not_own: "policy decisions, host selection, or private broker keys"
    authority_boundary: "core"
  - name: "forge-core-domain-pack-tcb"
    owns: "enforces domain-pack trusted-computing-base invariants"
    does_not_own: "host selection or external private broker key custody"
    authority_boundary: "core"
  - name: "forge-core-eval"
    owns: "evaluates typed Forge evidence"
    does_not_own: "host selection, signing, or state mutation"
    authority_boundary: "core"
  - name: "forge-core-eval-harness"
    owns: "coordinates read-only evaluation harness inputs"
    does_not_own: "host selection, trust, signing, or state mutation"
    authority_boundary: "core"
  - name: "forge-core-eventlog"
    owns: "records durable event-log projections"
    does_not_own: "workflow policy decisions, host selection, or private broker keys"
    authority_boundary: "core"
  - name: "forge-core-governance"
    owns: "derives governance projections from recorded events"
    does_not_own: "host selection, signing, or direct execution admission"
    authority_boundary: "core"
  - name: "forge-core-graph"
    owns: "validates typed workflow graph projections"
    does_not_own: "host selection, trust, signing, or state mutation"
    authority_boundary: "core"
  - name: "forge-core-kernel"
    owns: "coordinates host-neutral runtime services and prepared execution admission"
    does_not_own: "host selection, external private broker keys, or direct adapter control"
    authority_boundary: "core"
  - name: "forge-core-memory"
    owns: "persists memory projections from event records"
    does_not_own: "host selection, trust, signing, or policy admission"
    authority_boundary: "core"
  - name: "forge-core-protocol-mcp"
    owns: "adapts typed Forge services to the MCP protocol"
    does_not_own: "core policy authority, host selection, or private broker key custody"
    authority_boundary: "host_client"
  - name: "forge-core-research"
    owns: "persists research evidence projections"
    does_not_own: "host selection, signing, trust, or execution admission"
    authority_boundary: "core"
  - name: "forge-core-schema"
    owns: "generates schemas from typed contracts"
    does_not_own: "host selection, state mutation, or policy decisions"
    authority_boundary: "core"
  - name: "forge-core-store"
    owns: "persists and recovers typed Forge state"
    does_not_own: "workflow policy decisions, host selection, or private broker key custody"
    authority_boundary: "core"
  - name: "forge-core-trace"
    owns: "defines read-only observability trace types"
    does_not_own: "host selection, signing, trust, or state mutation"
    authority_boundary: "core"
  - name: "forge-core-validate"
    owns: "validates typed contracts and static structured-text architecture inputs; provides host-neutral conformance vectors and aggregate candidate-only reports"
    does_not_own: "host selection, support, release, install, signing, trust, private broker keys, or state mutation"
    authority_boundary: "core"
  - name: "forge-core-workflow-governance-tcb"
    owns: "enforces workflow-governance trusted-computing-base invariants"
    does_not_own: "host selection or external private broker key custody"
    authority_boundary: "core"

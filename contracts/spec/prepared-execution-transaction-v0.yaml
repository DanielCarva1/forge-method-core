schema_version: "0.1"
spec: "prepared_execution_transaction_v0"
status: "p4b2c_implemented_dormant"
purpose: >-
  Carry one opaque verified execution request through kernel-derived project,
  effect, replay, claim, gate, and commit authority; evaluate Admission at both
  the late-preparation and immediate-commit boundaries; persist complete
  redacted provenance; commit exactly one effect; and reconcile the durable
  effect-commit/replay-consume crash window without enabling public MCP mutation.

rust_interface:
  module: "forge_core_kernel crate-root re-exports over the private prepared_execution module"
  prepare: "prepare_execution_transaction"
  prepared_type: "PreparedExecutionTransaction"
  late_evaluation: "PreparedExecutionTransaction::evaluate_late"
  admitted_typestate: "LateAdmittedExecutionTransaction"
  effect_commit: "LateAdmittedExecutionTransaction::commit"
  recovery: "reconcile_prepared_execution_commits"

trusted_environment:
  type: "TrustedExecutionEnvironment"
  derives:
    - "canonical existing project root"
    - "canonical existing .forge-method state root contained by the project"
    - "operator-configured exact resource audience"
  fixed_kernel_controls:
    effect_lock: ".forge-method/locks/effects.lock"
    effect_wal: ".forge-method/wal/effects.ndjson"
    durability: "sync_on_append"
    transaction_id: "derived from signed request id, effect id, and intent digest"
  caller_cannot_select:
    - "root or state root"
    - "audience after environment construction"
    - "effect/replay lock path"
    - "effect WAL path"
    - "durability"
    - "transaction id"
    - "recorded-at time"

prepare_sequence:
  - "consume the linear VerifiedExecutionCall into opaque authorization plus structured request"
  - "reject unintegrated risk-audit or citation requirements rather than silently ignoring them"
  - "recompute the ExecutionAdmissionRequest digest and compare it with signed verified authority"
  - "verify principal, agent, role, nonce, issued-at, operation, command, effect, and payload bindings"
  - "derive a canonical commit descriptor binding project root, audience, all contract refs/tokens, payload paths/hashes/lengths, lock, WAL, tx id, and durability"
  - "acquire the exact effect-store lock"
  - "run a read-only file-effect preflight under that retained lock"
  - "durably reserve the nonce while the effect lock is already held"
  - "convert effect lock plus replay reservation into OwnedReplayCommitGuard, retaining effect-lock then replay-lock order"

late_boundary:
  revalidation:
    - "repeat exact file-effect preflight under the retained effect lock"
    - "require byte-equivalent typed preflight observations; any drift fails closed"
  trusted_snapshot_source_may_supply_only:
    - "Assurance Case"
    - "complete claim snapshot plus revisions"
    - "complete gate snapshot plus revisions and observed state version"
    - "current project state version"
    - "current unix time"
  snapshot_source_execution_rule: >-
    Capture is a bounded trusted local read while effect and replay locks are
    held. It must not call a model, network, subprocess, or mutation path.
  kernel_derives_and_overwrites:
    - "registry-authorized principal observation"
    - "exact audience and grants"
    - "fresh reserved replay observation and revision"
    - "operation, command, and effect documents"
    - "single-effect WAL commit guarantees"
    - "attestation freshness windows retained by verified authorization"
  decision: "evaluate_execution_admission"
  admitted_result: >-
    A non-cloneable, non-deserializable LateAdmittedExecutionTransaction retains
    verified authority, the exact Admission input and decision, all prepared
    material, and both locks. Only this type can enter the P4b.2c commit method.

immediate_commit_boundary:
  sequence:
    - "repeat exact effect preflight and require equality with the late-admitted preflight"
    - "capture a new bounded assurance/claim/gate/state/time snapshot"
    - "rebuild and evaluate Execution Admission; a new policy block writes no effect WAL"
    - "build complete typed provenance for authorization, both Admissions, all three preflights, descriptor, digest, and replay reservation"
    - "replace raw nonce fields in persisted Admission projections with the verified nonce fingerprint"
    - "canonicalize and hash the provenance document"
    - "append provenance plus pseudonymous replay binding in the effect-WAL begin record before any project write"
    - "commit exactly one effect with synchronous effect-WAL durability"
    - "consume replay while both locks remain held"
    - "release replay lock but retain effect lock, then append replay_consumed completion evidence"
  result_states:
    committed: "effect Commit, replay Consume, and effect-WAL replay_consumed marker are durable"
    effect_committed_replay_pending: "effect is durable; caller must run reconciliation and must not retry as a new execution"
    effect_committed_completion_pending: "effect and replay are durable; reconciliation must append the missing completion marker"
    not_committed: "effect application blocked or rolled back; replay remains permanently observed/reserved"

crash_reconciliation:
  lock_order: "acquire canonical effect lock, then replay lock per candidate"
  sequence:
    - "recover and roll back any effect transaction without a durable effect Commit"
    - "repair only an incomplete final effect-WAL JSON record under the retained effect lock"
    - "strictly parse effect WAL and verify canonical provenance digests"
    - "select provenance-bound effect Commits without replay_consumed evidence"
    - "validate stored root, audience, descriptor, tx id, and replay reservation against the trusted environment"
    - "consume replay by pseudonymous key hash without persisting or requiring the raw nonce"
    - "treat an exact already-consumed replay transition as idempotent"
    - "append replay_consumed evidence under the retained effect lock"
  compaction_rule: >-
    Provenance-bound transactions are retained by effect-WAL compaction. A
    future governed archival/export boundary may supersede indefinite retention;
    ordinary closed-record compaction may not erase recovery or audit evidence.

executable_evidence:
  - "valid commit writes one target, complete provenance Begin, effect Commit, replay Consume, and replay_consumed marker"
  - "raw nonce is absent from persisted effect WAL"
  - "claim revision drift at the immediate commit call blocks before the first effect-WAL record"
  - "filesystem drift after late Admission fails before the first effect-WAL record"
  - "simulated crash after effect Commit and before replay Consume is reconciled without rolling back the committed effect"
  - "a torn replay_consumed tail is repaired and exact already-consumed replay reconciliation is idempotent"
  - "tampered provenance digest fails closed"
  - "effect-WAL compaction retains complete provenance-bound transactions"
  - "prepared and admitted typestates remain non-cloneable and non-deserializable"

intentional_limits:
  - "effect and replay WALs are not physically atomic; typed pending receipts plus deterministic recovery close the crash window"
  - "a failed or dropped pre-commit attempt leaves its replay nonce permanently seen"
  - "claim and gate authority is an exact typed revision snapshot, not an operating-system lock against a same-user bypass writer"
  - "same-user raw filesystem access remains outside the cooperative governance boundary"
  - "the P4b.2c path is wired only to explicitly reconciled P4b.3c single-effect MCP deployment"
  - "public MCP mutation remains disabled by default"
  - "operation-wide atomicity and saga semantics remain unsupported"
  - "whole replay manifest/WAL pair deletion or rollback detection still requires an externally protected epoch/head"

next_boundary:
  id: "P4b.4d-real-client-readiness-proof"
  required:
    - "agent-operated credential setup without weakening the narrow capability"
    - "real MCP client end-to-end deployment evidence"

references:
  - "contracts/spec/execution-provenance-commit-v0.yaml"
  - "contracts/spec/execution-authority-handoff-v0.yaml"
  - "contracts/spec/execution-admission-v0.yaml"
  - "contracts/spec/replay-protection-wal-v0.yaml"
  - "contracts/spec/execution-trust-boundary-v0.yaml"
  - "contracts/plan/agent-native-guidance-plan.yaml"

schema_version: "0.1"
spec: "execution_provenance_commit_v0"
status: "p4b2c_implemented_dormant"
purpose: >-
  Define the durable evidence and recovery protocol that binds one late-admitted
  execution to one effect-WAL commit and one replay reservation without
  serializing authority or exposing the raw nonce.

provenance_envelope:
  store_type: "EffectExecutionProvenance"
  schema_version: "0.1"
  encoding: "RFC 8785-style canonical JSON through serde_json_canonicalizer"
  digest: "lowercase sha256 token over the canonical document"
  verify_on:
    - "effect-WAL append"
    - "pending replay projection"
    - "crash reconciliation"
  complete_document_fields:
    - "trusted canonical project root and audience"
    - "redacted VerifiedExecutionAuthorizationAudit"
    - "late Admission input and decision"
    - "immediate-commit Admission input and decision"
    - "initial, late, and immediate-commit effect preflights"
    - "canonical PreparedCommitDescriptor and digest"
    - "pseudonymous replay reservation"
  redaction:
    forbidden_persisted_value: "raw nonce"
    replacement: "verified nonce fingerprint in both persisted Admission projections"
    recovery_identity: "replay key hash plus intent/commit digests and reservation revision"

effect_wal_protocol:
  begin:
    requires:
      - "complete verified provenance envelope"
      - "EffectReplayCommitBinding"
    durability: "sync_on_append before any project write"
  effect_commit:
    meaning: "all writes and the effect Commit marker are durable"
  replay_consumed:
    requires:
      - "matching committed transaction"
      - "matching replay binding"
      - "typed ReplayConsumeResult in consumed state"
    evidence:
      - "reservation and consumed revisions"
      - "consume sequence"
      - "whether completion was appended by recovery"

recovery_matrix:
  - crash_point: "before effect Begin"
    result: "no effect; replay reservation remains permanently seen"
  - crash_point: "after effect Begin or writes but before effect Commit"
    result: "existing effect-WAL recovery rolls the transaction back; replay remains seen"
  - crash_point: "after effect Commit but before replay Consume"
    result: "reconciler consumes exact replay binding and appends replay_consumed"
  - crash_point: "after replay Consume but before replay_consumed"
    result: "an incomplete final marker is safely truncated; idempotent replay consume returns the existing transition; reconciler appends marker"
  - crash_point: "after replay_consumed"
    result: "reconciliation is a no-op"

fail_closed_rules:
  - "provenance and replay binding must appear together only on the integrated Begin"
  - "duplicate or conflicting integrated Begin, Commit, rollback, or completion fails projection"
  - "effect id cannot change inside one transaction"
  - "completion without a prior exact Commit is rejected"
  - "root, audience, tx id, descriptor paths, digests, or reservation drift blocks reconciliation"
  - "ordinary effect-WAL compaction retains all provenance-bound transaction records"

public_surface:
  mcp_stdio_mutation: "disabled_fail_closed"
  cli_integration: "not_wired"
  legacy_execute_operation_integration: "not_wired"
  reason: >-
    The internal kernel boundary is executable, but deployment still lacks an
    explicit operator enablement policy, trusted adapter material/snapshot
    loading, and startup reconciliation wiring.

references:
  - "contracts/spec/prepared-execution-transaction-v0.yaml"
  - "contracts/spec/replay-protection-wal-v0.yaml"
  - "contracts/spec/execution-admission-v0.yaml"
  - "contracts/spec/execution-trust-boundary-v0.yaml"

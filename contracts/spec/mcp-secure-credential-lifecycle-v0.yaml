schema_version: "0.1"
spec: "mcp_secure_credential_lifecycle_v0"
status: "p4b4c_implemented"
purpose: >-
  Give the host agent a complete local credential lifecycle without exposing
  private key bytes or letting project-controlled content choose authority.

command:
  name: "forge-core mcp credential"
  actions:
    provision: "create OS-random ed25519 key and active exact-tool registry entry"
    rotate: "create replacement, atomically revoke old registry authority, then delete old secret"
    revoke: "atomically revoke registry authority before deleting the secret"
    sign: "sign exact execute-operation arguments and Admission digest in process"

secret_boundary:
  allowed: "explicit absolute operator-owned directory outside project and Forge state roots"
  stored_bytes: "32-byte ed25519 signing key"
  unix_permissions: "0700 directory and 0600 create-new secret file"
  windows_boundary: "inherits the operator directory DACL and acknowledged same-user trust boundary"
  never_emitted:
    - "private key bytes"
    - "seed"
    - "project-local secret copy"
    - "snapshot-local secret copy"

registry_boundary:
  - "registry contains public key only"
  - "credential id is unique"
  - "allowed tool is exactly execute-operation"
  - "required grant is operation.execute"
  - "revoked credentials cannot sign through the command"

signing_output:
  shape: "MCP _meta.attestation JSON"
  binds:
    - "exact arguments object"
    - "credential id and audience"
    - "generated execution_intent_digest"
    - "snapshot nonce and issued_at timestamp"
  verification: "round-trip tested with the production AttestationVerifier"

completed_follow_on:
  id: "P4b.5b-execution-principal-propagation"
  result: "Registry-verified identity now propagates through claims, traces, WAL provenance, receipts, and MCP evidence."

references:
  - "contracts/spec/mcp-agent-snapshot-generation-v0.yaml"
  - "contracts/spec/execution-authority-handoff-v0.yaml"
  - "contracts/spec/mcp-trusted-single-effect-activation-v0.yaml"
  - "contracts/spec/mcp-real-client-readiness-v0.yaml"
  - "contracts/spec/execution-principal-propagation-v0.yaml"

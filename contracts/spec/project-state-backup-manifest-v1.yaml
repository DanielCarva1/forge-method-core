schema_version: "0.1"
backup_manifest_contract:
  id: project-state-backup-manifest-v1
  status: frozen
  rust_schema:
    document: forge_core_contracts::BackupManifestDocument
    schema_version: forge_project_state_backup_manifest_v1
    format: forge_project_state_backup_v1
    unknown_versions: reject
    unknown_fields: reject
  security_claims:
    integrity_only:
      api: BackupManifestDocument::validate_integrity
      proves: canonical self-consistency, closed typed source inventory, entry hashes, and cross-bindings
      does_not_prove: authenticity, freshness, or whole-set substitution/rollback resistance
      warning: manifest_set_digest is recomputable and never a trust root
    authenticity_and_restore:
      s03_public_success_api: none
      reason: retained filesystem guards, archive readers, protected receipt loading, and restore publication belong to C2-S04
      c2_s04_required_opaque_inputs:
        - a private-field verified archive capability minted only after no-follow exact-member and exact Project Link byte verification
        - a private-field retained exclusive mutation/quiescence guard backed by real OS locks or an opaque host boundary
        - a private-field trusted backup receipt loaded and verified from operator-protected storage disjoint from archive and staging
      trusted_receipt_provenance:
        archive_derived: forbidden
        caller_comment_or_boolean: forbidden
        minimum_binding: [manifest_set_digest, project_id, exact_project_link_sha256, workflow_release, effective_epoch, replay_monotonic_head, domain_pack_monotonic_heads, archived_public_registry_raw_sha256]
        story_boundary: C2-S04 must implement protected receipt I/O and private constructors; S03 deliberately cannot mint proof of future I/O
  canonical_set_digest:
    encoding: RFC 8785 JSON Canonicalization Scheme
    exclusion: backup_manifest.manifest_set_digest is removed before canonicalization
    input: forge-method:project-state-backup-set:v1\0 || u64be(canonical_byte_length) || canonical_bytes
    output: sha256:<64-lowercase-hex>
  source_enumerator:
    roots:
      - exact project/.forge-method.yaml
      - complete no-follow recursive state root
      - exact provisioned sidecar/operator public registry files
    classifier_api: BackupManifestDocument::classify_source_file
    complete_enumeration_api: BackupManifestDocument::verify_source_enumeration
    invariant: every no-follow regular source file is either one exact typed archive member or one explicit shipped exclusion; unknown files reject
    metadata: [logical_path, no_follow_entry_type, no_follow_hard_link_count, byte_length, sha256]
    archive_verification_is_not_enumeration: true
    explicit_exclusions:
      producer_locks:
        - state-root/locks/**
        - state-root/domain-pack-learning/capture.lock
        - state-root/contracts/isolations/.forge-isolation.lock
      crash_private:
        - crash-replace .forge-next/.forge-previous/.forge-transaction siblings
        - atomic-write .tmp and effect .forge-tmp/.forge-bak siblings
        - claim-WAL and project-state temporary siblings
        - domain-packs/generations/staging/**
        - workflow/operator secret roots, private-keys/**, '*.key', and '*.pem'
  source_derived_inventory:
    always_present: [project/.forge-method.yaml, state-root/ledger.ndjson, state-root/replay-wal.manifest.json, state-root/wal/replay.fmr1]
    conditional_stores:
      - project state and claim WAL rotation closure
      - workflow governance and workflow action replay WALs
      - effect WAL/compaction, memory events, research/sources.ndjson, governance/conflicts.ndjson
      - Domain Pack lifecycle generations, ledger records, receipts, and exact object union
      - Domain Pack local learning index plus exact content-addressed object closure
      - isolation contract identities/agents/raw digests under contracts/isolations
      - workflow principal and broker archived public registry raw bytes
      - claims, handoffs, artifacts, evidence, snapshots, ledgers, requests, runtime, stories, agents, preflight, effect index, and trace families
    domain_pack_learning:
      index: domain-pack-learning/index.json
      closure: each sorted parsed record binds candidate_id, candidate_digest, raw_sha256, exact object_relative_path, and object entry SHA-256
      race_prevention: capture.lock retained across index/object source projection and copy; otherwise opaque exclusive quiescence required
    isolation_contracts:
      closure: each sorted projection binds isolation_id, agent_id, exact YAML path, and raw SHA-256
      race_prevention: .forge-isolation.lock retained across projection and copy
    declared_effect_outputs:
      generic_catch_all: forbidden
      source: committed file-backed effect WAL/metadata-index records parsed under effect/index locks
      binding: sorted operation_id, effect_id, file_path target kind, exact metadata logical_ref/state-relative path, content SHA-256, and raw metadata-record SHA-256
      reserved_internal_families: forbidden
  domain_pack_external_provisioning:
    lifecycle_independent: true
    operator_sources_before_activation_or_interrupted_acquisition: supported
    supply_chain_anchor_state: [not_provisioned, provisioned]
    reviewed_learning_anchor_state: [not_provisioned, provisioned]
    binding_when_provisioned:
      - exact operator-sources raw SHA-256, operator root identity, public input paths, and public input SHA-256 values
      - supply-chain/reviewer/reviewed monotonic head identities, generations, and digests
      - active lifecycle generation digests when active
  public_workflow_registries:
    archived_material_identity: exact raw registry SHA-256
    undefined_identity_set_digest: removed
    current_machine_state: not represented by archived material
    replacement_machine_absence: legitimate; C2-S04 reads current protected monotonic authorities independently and never manufactures presence from archive
  snapshot_protocol:
    mode: cooperative_locks_with_producer_quiescence_and_stable_enumeration
    real_producer_locks_include:
      - Domain Pack external anchors, operator sources, rebase, lifecycle, and learning capture
      - workflow credential/broker registries, workflow governance, claims, action replay, memory, research, governance conflicts, and isolations
      - command evidence, effect index, effect WAL, replay WAL, trace, and protected replay anchor
    unlocked_producers: require opaque_exclusive_quiescence_required_by_restore_engine plus stable complete enumeration
    assertion_boolean: forbidden
  replay_anchor:
    preserved_source_fields: [schema_version, deployment_id, epoch, generation, previous_anchor_digest, head]
    invariants:
      - deployment_id is nonblank and at most 256 bytes
      - generation is nonzero; generation one has no predecessor and later generations require one
      - epoch is 32-byte lowercase hex
      - record_count equals last_seq
      - manifest digest, WAL prefix digest, and WAL byte length equal archived entries
  archive_entry_policy:
    no_follow: required
    regular_file_only: true
    hardlink_count: exactly_one
    rejects: [symlink, hardlink, device, fifo, socket, directory, duplicate, omitted, extra, substituted, unclassified]
  fixtures:
    valid:
      - contracts/fixtures/backup-manifest/valid/empty-pre-rotation-v1.yaml
      - contracts/fixtures/backup-manifest/valid/multi-generation-v1.yaml
      - contracts/fixtures/backup-manifest/valid/no-active-provisioned-v1.yaml
      - contracts/fixtures/backup-manifest/valid/replacement-machine-public-material-v1.yaml
    semantic_hostile:
      path: contracts/fixtures/backup-manifest/hostile/
      invariant: every named file is a full parse-valid unique document and is enumerated by the Rust semantic-rejection test
    parse_rejection:
      path: contracts/fixtures/backup-manifest/parse-rejection/
      invariant: strict-deserialization evidence is exercised separately and never counted as semantic coverage

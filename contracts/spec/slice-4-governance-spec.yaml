success_signal_C5:
  - "Two simulated agents can acquire non-overlapping claims and the engine reports both active"
  - "Agent B's write into agent A's claimed path is blocked with a typed reason"
  - "claim status shows the full coordination picture (the bus view)"
  - "coordination-eval fixtures exercise the real failure taxonomy"

out_of_scope:
  - "Realtime websocket bus (DD15 rejects — file-backed is the wedge)"
  - "CRDT/OT text engine (research explicitly rejects for repo work)"
  - "Full runtime-handoff execution (contracts exist; operational handoff engine is a later slice)"

open_questions:
  - "Should claim TTL defaults be per-scope (story vs lane vs driver)? Decide in S4.3 with sensible defaults."
  - "Is heartbeat automatic (engine pings) or agent-driven (CLI)? Lean agent-driven (DC9 — engine doesn't babysit)."

next_workflow: "build-story S4.3 (claim engine)"

    exit: "engine funcs compile, unit-tested against synthetic claim fixtures, reject illegal transitions with typed reasons"

  S4.4:
    title: "Governance CLI: claim / release / status / list"
    detail: "contracts/stories/S4.4-governance-cli.yaml"
    status: "done"
    autonomy_value: "HIGH — exposes S4.3 to agents via shell, same envelope as guide/* (DD17)"
    scope:

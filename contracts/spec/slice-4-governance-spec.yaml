spec_id: "slice-4-governance-spec"
created_at: "2026-06-26"
project: "forge-method-rust"
closes_capability: "C5_multi_agent_governance"

intent: |
  Build the operational surface for multi-agent governance ON TOP of the proven
  data model (claim/runtime/coordination_eval contracts) and integrity spine
  (layer 3, already proven slice 0). Deliver the C5 promise: multiple agents /
  people / LLMs work on the same repo without collision, versioning pain, or
  silent overwrite.

research_basis: "contracts/research/multi-agent-collaboration-governance-research.yaml"
audit_basis: ".forge-method/artifacts/S4.1-governance-audit.yaml"

the_four_layer_pattern:
  layer_1_isolation: "git worktree per agent — physical non-overwrite. (GAP — build S4.6)"
  layer_2_prevention: "claim-before-edit — others see the claim, work elsewhere. (GAP — build S4.3+S4.4+S4.5)"
  layer_3_authority_audit: "append-only WAL, origin-bound authority, tamper-evident. (DONE — integrity spine, proven S0.4)"
  layer_4_coordination_bus: "shared plan, shared claims, agents see each other. (PARTIAL — filesystem is the bus per DC10; add semantic claim logic S4.3)"

decisions_locked:
  DD15: "Coordination-bus = filesystem + WAL, NOT a new websocket/sqlite layer. DC10 file-backed protocol is forge's wedge. agent-state-db/SYNAPSE patterns are explicitly NOT adopted."
  DD16: "Claim lifecycle is a typed engine state machine: Active -(heartbeat)-> Active | -(ttl expiry)-> Stale -> Expired -> HandoffRequired; release -> Released. Transitions reject illegal (same pattern as phase_transition S1.7)."
  DD17: "Governance CLI uses the SAME CliEnvelope contract (DD9) + exit taxonomy (DD10) as guide/*. Consistency over novelty."
  DD18: "Logical prevention (claims) BEFORE physical isolation (worktree). Claims prevent collision semantically and unblock parallel agents sooner; worktree hardens later. Both required for full C5."
  DD19: "reclaim_policy is a DRIVER/HUMAN governance decision, NOT an engine decision (DC9). The engine enforces only NON-DELEGABLE rules: no steal, no duplicate authority, no silent loss of handoff."
  DD20: "expiry boundary is INCLUSIVE: now_unix >= expires_at => expired."
  DD21: "is_expired is FAIL-CLOSED: unparseable expires_at => expired. A corrupt lease is never live; it routes to handoff/recovery."
  DD22: "Coordination-bus = a directory of claim-state YAML files (one per claim), rewritten on each lifecycle transition. The append-only integrity spine (layer 3, proven S0.4) audits every write — we do NOT duplicate layer 3 with a parallel claim event-log. The claim file IS the materialized state."
  DD23: "Time is injected: --now-unix <epoch> is optional (for replay/tests); default = real system time. The pure engine stays deterministic given now_unix. Malformed --now-unix is REJECTED (exit 3), never silently coerced to epoch 0."
  DD24: "Heartbeat is agent-driven (DC9). The engine never babysits a claim; an agent explicitly calls `claim heartbeat` to refresh its lease."
  DD25: "LIFECYCLE LOCK: mutating claim operations (acquire/heartbeat/release) hold an exclusive advisory directory lock for the whole load->decide->write, so the pure engine is never defeated by a concurrent writer. Atomic temp+rename writes prevent partial-file DoS."


risks_known:
  R6_hand_edit_bypass: |
    A claim file is plain YAML that load_claims trusts as authoritative state. An agent
    with filesystem write access COULD forge authority by hand-editing a claim YAML
    (make itself claimant, resurrect a released claim, fake an expires_at). The pure
    engine only validates transitions AFTER loading this state — it cannot detect a
    forged initial state. This is ACCEPTED for S4.4 because: (a) the multi-LLM model
    (DC10) is cooperative — agents follow the typed-contract protocol by design, the
    same way state.yaml is trusted not to be hand-edited; (b) physical isolation via
    git worktree (S4.6, layer 1) prevents one agent from touching another's bus; (c)
    the integrity spine will be wired to audit claim writes in a later slice so that
    forged/unauthorized claim files are detectable. Cryptographic signing of every
    claim file was deliberately NOT added (over-engineering for the file-backed wedge).
    Mitigation status: PARTIAL until S4.6 (worktree) + claim-write spine integration.

autonomy_priority_rationale: |
  The user asked to prioritize stories that LIBERATE AGENT AUTONOMY (so the system
  itself enables multi-agent work, letting development continue with less human
  dependence). The ordering below builds the SEMANTIC coordination layer first:
  after S4.3+S4.4 an agent can SEE active claims and DECLARE its own via CLI —
  that alone lets agents avoid collision. S4.5 adds enforcement. S4.6+S4.7
  complete the promise. Each slice independently raises what agents can do alone.


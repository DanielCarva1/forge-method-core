      - "ClaimLifecycleDecision typed result (Accepted | Rejected(ClaimRejection)) mirroring GuideValidation"
      - "ClaimRejection variants: AlreadyClaimedByOther, StaleCannotHeartbeat, NotClaimant, IllegalTransition, ExpiredRequiresHandoff"
      - "Lease/TTL computation: now - last_heartbeat > ttl_seconds => Stale; Stale past grace => Expired"

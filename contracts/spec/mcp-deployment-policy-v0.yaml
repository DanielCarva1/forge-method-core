schema_version: "0.1"
spec: "mcp_deployment_policy_v0"
status: "p4b6c_operation_wide_activation_complete"
purpose: >-
  Define a closed operator-owned deployment posture for the local MCP adapter
  without allowing policy validation itself to activate mutation.

modes:
  read_only:
    activation_state: "active_read_only"
    invariants:
      - "no required mutation audience"
      - "no mutating tools"
      - "material loading, snapshot loading, and startup reconciliation disabled"
      - "no effect scope or mutation commit protocol"
      - "public mutation disabled"
  trusted_single_effect:
    activation_state: "policy_validated_dormant"
    invariants:
      - "non-blank exact audience"
      - "exactly one mutating tool: execute-operation"
      - "canonical project-bound material loading"
      - "bounded local read-only snapshot loading"
      - "startup reconciliation required before listen"
      - "single-effect scope only"
      - "explicit operator opt-in"
      - "canonical configured root binding"
      - "Project Link resolved sidecar state-root binding"
      - "external monotonic replay-head policy"
      - "execution_provenance_commit_v0@0.1 pinned"
      - "same-user trust boundary explicitly acknowledged"
  trusted_operation_wide:
    activation_state: "policy_validated_dormant"
    invariants:
      - "all trusted-single-effect root, replay, audience, loader, and commit controls"
      - "operation-wide effect scope only"
      - "at least two and at most 64 unique ordered operation-declared effect refs"
      - "dedicated explicit --enable-trusted-operation-wide operator opt-in"

fail_closed_rules:
  - "unknown YAML fields and unknown enum values fail deserialization"
  - "blank identifiers, audiences, and protocol identifiers fail validation"
  - "duplicate, missing, or additional mutating tools fail validation"
  - "trusted mode and effect scope must match exactly"
  - "saga effect scope is not representable"
  - "trusted policy validation exposes no activation capability"

checkpoint_boundary:
  implemented: >-
    Typed policy plus canonical bounded contract, signed-payload, risk-audit,
    and sidecar snapshot loaders. P4b.6c activates either exact single-effect or
    operation-wide scope only through separate typed opt-ins and reconciliation.
  not_implemented:
    - "typed saga or cross-external-system atomicity"
    - "coordinated rollback of replay state and its independently protected external anchor"
    - "hostile-user isolation beyond the acknowledged same-user boundary"
  next: "P5 workflow migration; typed saga remains a later separate program"

references:
  - "contracts/examples/mcp-deployment-policy.yaml"
  - "contracts/spec/execution-provenance-commit-v0.yaml"
  - "contracts/spec/execution-trust-boundary-v0.yaml"
  - "contracts/spec/mcp-trusted-material-loading-v0.yaml"
  - "contracts/spec/mcp-trusted-single-effect-activation-v0.yaml"
  - "contracts/spec/mcp-trusted-operation-wide-activation-v0.yaml"
  - "contracts/spec/mcp-real-client-readiness-v0.yaml"
  - "contracts/spec/replay-external-anchor-v0.yaml"
  - "contracts/spec/execution-principal-propagation-v0.yaml"

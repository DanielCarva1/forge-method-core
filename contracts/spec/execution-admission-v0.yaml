schema_version: "0.1"
spec: "execution_admission_v0"
status: "p4b6b_operation_wide_prepared_kernel"
purpose: >-
  Bind an evidence-backed Assurance Case and a commit-time runtime snapshot to
  one exact mutation intent before the Execution Assurance Kernel may admit it.

interface:
  rust_module: "forge_core_decisions::execution_admission"
  input: "ExecutionAdmissionInputDocument"
  output: "ExecutionAdmissionDecision"
  properties:
    - "pure"
    - "deterministic"
    - "deny_unknown_fields"
    - "fail_closed"
    - "all_issues_returned_for_agent_self_correction"

authority_bindings:
  assurance:
    - "request case id equals the supplied Assurance Case id"
    - "request token equals the canonical SHA-256 Assurance Case token"
    - "readiness is Ready at Execute or a later target"
    - "snapshot state version equals the commit-time project version"
    - "no due required obligation, Decision Request, or Capability Gap remains"
  operation:
    - "request operation id equals the typed OperationContract"
    - "request operation token equals the canonical SHA-256 OperationContract token"
    - "project and concurrency state versions equal the commit-time version"
    - "mutation policy is Allowed and missing_authority is empty"
    - "provided Command and Effect contracts are exactly bound by ref and canonical SHA-256 token"
    - "duplicate request or observed bindings are rejected"
    - "commands executed inside the mutation boundary are read-only and offline"
  principal:
    - "request principal, agent, and role equal the trusted Adapter observation and Operation caller role"
    - "signature verification alone is not authorization"
    - "only an authorized key registry or OAuth resource-server result may authorize mutation"
    - "audience must equal the configured Forge audience"
    - "authority grants include operation.execute"
    - "the attestation binds the canonical execution-intent digest"
  replay:
    - "nonce is non-empty and equals the reserved nonce"
    - "reservation status is fresh_reserved"
    - "reserved digest equals the canonical execution-intent digest"
    - "reservation revision equals the revision attested by the request"
    - "issued-at time is within the injected freshness and future-skew windows"
  claims:
    - "claim snapshot is complete and its revision equals the signed expectation"
    - "duplicate signed expectations or observed claim refs are rejected"
    - "required claim revision is revalidated from the commit-time snapshot"
    - "required claim is live, matches principal id, agent id, and role, and targets the current state version"
    - "legacy agent-only claims cannot stand in for the verified execution principal"
    - "file-backed writes, including artifacts, evidence, ledgers, and request streams, are governed by the caller claim and do not conflict with another live claim"
  gates:
    - "gate snapshot is complete and its revision equals the signed expectation"
    - "duplicate signed expectations or observed gate refs are rejected"
    - "every required gate revision is revalidated at commit"
    - "every required gate passed against the current project state version"
    - "every passing required gate records evidence refs and a non-empty checker identity"
  commit:
    - "single_effect_wal admits exactly one effect with verified lock, rollback recovery, and durable commit record"
    - "operation_wide_wal requires at least two effects, whole-operation scope, and the same verified WAL guarantees"
    - "a single effect disguised as operation_wide_wal fails closed for insufficient scope"
    - "saga remains typed but unsupported and additionally requires whole-operation scope plus complete compensation"

trust_boundary:
  accepted_observation_sources:
    - "authorized_key_registry"
    - "oauth_resource_server"
  explicitly_insufficient:
    - "caller_supplied_public_key"
    - "signature_verified_without_registry_authority"
    - "caller_supplied_nonce_without_server_reservation"
    - "presence_of_operation_command_or_effect_flag"
    - "agent_confidence"
    - "artifact_presence"

current_boundary:
  enforced_now:
    - "typed pure decision and content-addressed binding"
    - "P4a executable acceptance corpus"
    - "P3 resume token now shares the same canonical token function"
    - "P4b.1a strict operator-owned principal registry and trusted identity derivation primitive"
    - "P4b.1b durable bounded replay WAL Rust substrate with intent, commit-descriptor, and revision binding"
    - "P4b.2a host-neutral opaque VerifiedExecutionAuthorization with no caller deserialization, cloning, or authority-field construction"
    - "P4b.2a typed in-process MCP executor seam rejects caller-selected root, durability, payload scope/limits, transaction identity, and commit time"
    - "private seam tests preserve verified authority through one in-memory dispatch and prove no mutation subprocess is spawned"
    - "P4b.2b kernel derives canonical project/audience/contract/payload/lock/WAL/transaction/durability commit authority"
    - "P4b.2b retains an owned effect-lock-first replay guard and compares initial versus late file-effect preflight"
    - "P4b.2b rebuilds principal, replay, contract, freshness, and commit observations around a limited fresh assurance/claim/gate snapshot"
    - "P4b.2b evaluates Execution Admission into an opaque admitted typestate before any effect-WAL record or project write"
    - "P4b.2c repeats effect preflight and Execution Admission from a new bounded mutable-authority snapshot at the immediate commit call"
    - "P4b.2c persists complete canonical redacted authority, Admission, preflight, descriptor, and replay provenance before the first project write"
    - "P4b.2c consumes the admitted typestate into exactly one effect Commit, replay Consume, and effect-WAL replay_consumed marker"
    - "P4b.2c returns typed pending receipts and deterministically reconciles both effect-Commit/replay-Consume crash windows"
    - "P4b.4a binds claims, gates, state version, and trusted observation time into one canonical authority_snapshot_token covered by the attested execution intent"
    - "the trusted loader verifies that token before replay reservation and both late boundaries recompute it from fresh snapshots under retained locks"
    - "replay manifest/WAL half-pairs and corrupt authority state fail closed"
    - "effect-lock-first ReplayCommitGuard retains the future kernel lock order through consume or drop"
    - "MCP stdio mutation stays fail-closed unless P4b.3c explicit policy, trusted loading, and exact-root startup reconciliation all succeed"
    - "read-only MCP child processes use a pinned binary, repo-scoped cwd, minimal environment, and null stdin"
    - "P4b.5b propagates the verified ExecutionPrincipal through claims, conflict attribution, effect-WAL provenance, durable pre-effect traces, receipts, and MCP evidence"
    - "P4b.6a admits a verified multi-effect whole-operation WAL observation in the pure decision point"
    - "P4b.6a composes exact ordered file-backed effects into one deterministic internal transaction envelope"
    - "P4b.6a legacy multi-effect execution fails closed before command evidence or project writes"
    - "P4b.6b prepared execution derives whole-operation Admission from the exact ordered effect and payload set"
    - "P4b.6b repeats complete-envelope preflight and Admission at late and immediate-commit boundaries"
  not_yet_claimed:
    - "effect WAL and replay WAL are one physically atomic transaction"
    - "detection when replay state and its P4b.5a external anchor are rolled back together"
    - "replay WAL compaction or rotation"
    - "typed saga execution and complete compensation"

references:
  - id: "mcp_authorization_2025_11_25"
    url: "https://modelcontextprotocol.io/specification/2025-11-25/basic/authorization"
    supports: "MCP resource servers validate tokens for their intended audience and do not pass tokens through."
  - id: "mcp_security_best_practices"
    url: "https://modelcontextprotocol.io/docs/tutorials/security/security_best_practices"
    supports: "Sessions are not authentication; identity and authorization must come from verified request context."
  - id: "rfc_9700"
    url: "https://www.rfc-editor.org/info/rfc9700/"
    supports: "OAuth security best current practice includes sender-constrained access tokens and replay prevention."
  - id: "rfc_9449"
    url: "https://www.rfc-editor.org/info/rfc9449/"
    supports: "A unique proof identifier and server-side tracking can detect and prevent replay."

local_specs:
  - "contracts/spec/execution-authority-handoff-v0.yaml"
  - "contracts/spec/prepared-execution-transaction-v0.yaml"
  - "contracts/spec/execution-provenance-commit-v0.yaml"
  - "contracts/spec/replay-protection-wal-v0.yaml"
  - "contracts/spec/execution-trust-boundary-v0.yaml"
  - "contracts/spec/execution-principal-propagation-v0.yaml"
  - "contracts/spec/operation-wide-transaction-v0.yaml"

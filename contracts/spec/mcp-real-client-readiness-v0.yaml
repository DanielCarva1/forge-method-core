schema_version: "0.1"
spec: "mcp_real_client_readiness_v0"
status: "p4b5_complete_principal_evidence_ready"
purpose: >-
  Close the agent-operated trusted MCP setup loop with one readiness command,
  generated host configuration, durable replacement-agent resume, and proof
  through a real protocol client rather than only direct server tests.

command:
  name: "forge-core mcp readiness"
  checks:
    - "Project Link and canonical sidecar state root resolve"
    - "allowlist exposes exactly the trusted execute-operation mutation"
    - "selected registry credential is active"
    - "operator private key matches the registered public key"
    - "deployment policy and registry audiences match"
    - "snapshot authority token and principal binding are current"
    - "snapshot issued time is inside the server attestation freshness window"
    - "external replay anchor is operator-owned, policy-bound, and current or prefix-advanceable"
    - "replay WAL is clean and incomplete commits reconcile before listen"
  output:
    - "ready verdict with named checks"
    - "operator-actionable next steps"
    - "replacement-agent resume instruction"
    - "optional standard MCP stdio client JSON"

generated_client:
  binds:
    - "current canonical forge-core executable"
    - "canonical project root"
    - "exact allowlist, principal registry, and deployment policy paths"
    - "state-relative execution snapshot"
    - "canonical external replay anchor"
    - "explicit trusted-single-effect opt-in"
  excludes:
    - "private key bytes"
    - "caller-selected roots or durability"
    - "implicit mutation enablement"

real_client_proof:
  implementation: "official rmcp client over Tokio child-process stdio"
  sequence:
    - "generate credential, authority snapshot, signature, readiness report, and client config"
    - "initialize the server from the generated config"
    - "list the exact execute-operation tool"
    - "transport _meta.attestation through RequestContext into the typed verifier"
    - "apply one signed single effect"
    - "verify target, effect WAL, and replay WAL in the Project Link sidecar"
    - "verify the external anchor advanced to the consumed replay head"
    - "verify the applied receipt and durable trace carry the registry-verified principal tuple"
    - "verify no consumer-local .forge-method is created"

replacement_agent:
  durable_inputs:
    - "project and Project Link"
    - "claim WAL and generated snapshot"
    - "operator registry, secret directory, policy, and allowlist"
    - "operator-protected external replay anchor"
  behavior: "rerunning readiness reproduces the same checks without chat-only state"

preserved_limits:
  - "read-only remains the default MCP deployment"
  - "mutation requires explicit exact single-effect opt-in"
  - "same-user trust boundary is acknowledged, not presented as hostile-user isolation"
  - "coordinated rollback of both replay state and the external anchor requires stronger isolation"
  - "operation-wide transaction and saga semantics are not claimed"

completed_follow_on:
  id: "P4b.5b-execution-principal-propagation"
  result: "The official client now proves principal-bound receipt and durable trace evidence."

references:
  - "contracts/spec/mcp-secure-credential-lifecycle-v0.yaml"
  - "contracts/spec/mcp-agent-snapshot-generation-v0.yaml"
  - "contracts/spec/mcp-trusted-single-effect-activation-v0.yaml"
  - "contracts/spec/replay-external-anchor-v0.yaml"
  - "contracts/plan/agent-native-guidance-plan.yaml"
  - "contracts/spec/execution-principal-propagation-v0.yaml"

schema_version: "0.1"
spec: "replay_protection_wal_v0"
status: "p4b5_complete_principal_bound_externally_anchored_runtime"
purpose: >-
  Provide a durable, bounded, single-use nonce reservation and recovery
  substrate integrated with the explicitly enabled trusted single-effect MCP
  boundary without claiming broader CLI or multi-effect mutation.

interface:
  rust_module: "forge_core_store::replay_wal"
  initialization: "initialize_replay_wal"
  reserve: "reserve_replay_nonce"
  guarded_consume: "acquire_replay_commit_guard then ReplayCommitGuard::consume"
  owned_guarded_consume: "OwnedReplayCommitGuard::consume_retaining_effect_lock"
  effect_commit_recovery: "consume_replay_key_hash_under_effect_lock"
  administrative_consume: "consume_replay_nonce_non_boundary"
  recovery: "recover_replay_wal"

authority_key:
  inputs:
    - "trusted principal id"
    - "configured Forge audience"
    - "opaque nonce"
  persisted_form: "domain-separated, length-prefixed, unkeyed SHA-256 hash"
  confidentiality: >-
    Pseudonymous only. Low-entropy principal, audience, or nonce values can be
    guessed offline; the hash is not encryption and must not be described as
    confidential.
  bindings:
    - "canonical execution-intent SHA-256 digest"
    - "immutable canonical commit-descriptor SHA-256 digest"
    - "compare-and-swap revision"

state_layout:
  trust_boundary: >-
    The caller supplies an existing canonical Forge state root. Operators must
    keep that root outside untrusted project artifacts or protect it with
    equivalent operating-system permissions.
  files:
    wal: "wal/replay.fmr1"
    manifest: "replay-wal.manifest.json"
    lock: "locks/replay.wal.lock"
  marker_pair_rule: >-
    The manifest and WAL must exist together. A half-pair, corrupt manifest,
    non-regular authority file, or path resolving outside the trusted root
    fails closed.
  anti_rollback_boundary: >-
    Runtime reserve never recreates a missing pair. The explicit initializer
    cannot distinguish first bootstrap from deletion or rollback of both the
    manifest and WAL together by itself. P4b.5a trusted MCP deployment now
    requires a separately managed replay anchor that binds the manifest and
    latest trusted WAL prefix. Coordinated rollback of both stores remains
    outside the guarantee and requires independent operator protection.

transitions:
  reserve:
    - "the first observation of a principal/audience/nonce key writes revision 1"
    - "any later reserve of that key is rejected, including after consume"
    - "recovery, conflict checks, append, and fsync occur under the replay lock"
  consume:
    - "requires the reserved intent digest, commit digest, and expected revision"
    - "the first valid consume appends expected_revision + 1"
    - "an exact retry after a lost response is idempotent and appends nothing"
  non_boundary_warning: >-
    consume_replay_nonce_non_boundary releases the replay lock independently
    of any effect commit and is only an administrative or recovery convenience.

durability:
  framing:
    - "monotonic sequence number"
    - "CRC32C-protected header and payload"
    - "torn-tail repair only for an incomplete final header or payload"
  initialization:
    - "manifest and empty WAL creation are synced"
    - "the created directory chain is synced, including Windows directory handles"
  append: "each reserve or consume append is flushed and fsynced before success"
  corruption_policy: >-
    Checksum, sequence, decode, and invalid-transition failures are never
    rewritten into an authoritative state.

resource_bounds:
  max_wal_bytes: 8388608
  max_records: 10000
  completed_lifecycle_capacity: >-
    The record cap alone permits at most 5,000 completed reserve/consume
    lifecycles when each uses two records. The byte cap may permit fewer, and
    unconsumed reservations change the mix.
  behavior_at_limit: "fail closed before append"
  compaction_or_rotation: "not implemented"
  consequence: >-
    Capacity exhaustion blocks further reservations/consumes until a future
    reviewed compaction, rotation, or migration mechanism exists.

lock_order:
  required: "effect-store lock before replay WAL lock"
  enforcement: >-
    ReplayCommitGuard borrows the caller's EffectStoreLock while owning the
    replay lock. The owned variant keeps both locks inside the opaque prepared
    transaction; after consume it can release replay while retaining effect
    authority for the durable replay_consumed effect-WAL marker.
  scope_limit: >-
    The store validates the caller-declared effect-lock path against the held
    lock but cannot know whether that path is the canonical lock for the
    intended effect. P4b.2b now derives the path and canonical commit
    descriptor inside the dormant kernel path rather than adapter input.
  lifecycle_binding: >-
    P4b.2c consumes only the opaque admitted typestate, embeds the exact replay
    binding in the provenance-bearing effect Begin, commits one effect, consumes
    replay, and appends typed completion evidence. Pending receipts forbid
    silently treating an already committed effect as safe to retry.
  limitation: >-
    The two WALs are not physically atomic. P4b.2c provides deterministic,
    idempotent kernel recovery for a crash after effect Commit and before replay
    Consume or its effect-WAL completion marker.

current_boundary:
  enforced_now:
    - "Rust API for durable reserve, recovery, guarded validation, and consume"
    - "manifest/WAL half-pair and corruption detection"
    - "bounded replay cost and append capacity"
    - "borrowed and owned effect-lock-first lifetime guards"
    - "owned effect-lock-first replay guard retained by the P4b.2b prepared kernel transaction"
    - "P4b.2b kernel-owned reserve binds the signed intent to a canonical commit descriptor before late Admission"
    - "P4b.2c consumes replay after one provenance-bound effect Commit while retaining effect authority"
    - "P4b.2c recovery consumes by persisted pseudonymous key hash without raw nonce material"
    - "exact already-consumed recovery is idempotent and completion is acknowledged in the effect WAL"
    - "explicit reconciled P4b.3c MCP single-effect execution reserves and consumes this WAL"
    - "P4b.5a trusted MCP startup and every execution verify and advance an external prefix-bound replay anchor"
  not_yet_claimed:
    - "effect-WAL commit and replay consume are one atomic transaction"
    - "detection when both replay state and the external anchor are rolled back together"
    - "compaction, rotation, or online migration"

references:
  - "contracts/spec/execution-admission-v0.yaml"
  - "contracts/spec/execution-authority-handoff-v0.yaml"
  - "contracts/spec/prepared-execution-transaction-v0.yaml"
  - "contracts/spec/execution-provenance-commit-v0.yaml"
  - "contracts/spec/execution-trust-boundary-v0.yaml"
  - "contracts/spec/replay-external-anchor-v0.yaml"
  - "contracts/plan/agent-native-guidance-plan.yaml"

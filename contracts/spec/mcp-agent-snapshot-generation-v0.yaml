schema_version: "0.1"
spec: "mcp_agent_snapshot_generation_v0"
status: "p4b6c_operation_wide_generation_complete"
purpose: >-
  Let the host agent generate and refresh the exact Admission snapshot needed
  by trusted MCP execution without asking the human to edit YAML.

command:
  name: "forge-core mcp snapshot"
  required_inputs:
    - "canonical project root"
    - "operation and Assurance Case project-relative references"
    - "zero or more command contract references"
    - "operator-owned principal registry path and active credential id"
    - "fresh nonce"
  default_output: "runtime/mcp-execution-snapshot.yaml under the Project Link state root"
  returns:
    - "state-relative snapshot_ref"
    - "execution_intent_digest for the detached attestation"
    - "authority_snapshot_token"
    - "credential/audience and claim/gate count audit fields"
    - "effect_count for the complete ordered operation effect set"

authority_derivation:
  claims: "solely from forge_core_store::derive_state over the sidecar claim WAL"
  required_claim_identity: >-
    The project claim reference selects only the expected claim id; the claim
    document and revision come from the WAL projection.
  gates: "complete union of operation gate refs with content-derived revisions"
  contracts: "canonical project-confined bounded typed reads"
  identity: "active registry entry authorized for execute-operation and operation.execute"

write_boundary:
  behavior: "same-directory atomic replacement"
  confinement: "safe relative path whose canonical parent remains under state_root"
  forbidden:
    - "absolute output"
    - "parent traversal"
    - "symlink escape"
    - "project-local private key material"

failure_policy:
  - "state-version mismatch fails before output"
  - "missing required WAL claim fails before output"
  - "claim projection diagnostics or corruption fail closed"
  - "duplicate command/effect refs and zero or more than 64 operation effects fail closed"
  - "revoked, unknown, or underprivileged credentials fail closed"

completed_follow_on:
  id: "P4b.5b-execution-principal-propagation"
  result: "Snapshot principal binding now continues through claims, traces, WAL provenance, receipts, and MCP evidence."

references:
  - "contracts/spec/execution-authority-snapshot-binding-v0.yaml"
  - "contracts/spec/mcp-trusted-single-effect-activation-v0.yaml"
  - "contracts/spec/mcp-trusted-operation-wide-activation-v0.yaml"
  - "contracts/spec/claims-integrity-spine-spec.yaml"
  - "contracts/spec/mcp-real-client-readiness-v0.yaml"
  - "contracts/spec/execution-principal-propagation-v0.yaml"

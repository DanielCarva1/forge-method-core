schema_version: "0.1"
artifact_kind: "catalog-audit"
status: "verified"
created_at: "2026-06-25"
project: "forge-method-rust"
audited: "Forge-method-core/skills/forge-method/references/ + modules/ + facilitation/"
method: "deterministic grep + structural parse (reproducible), not opinion"

purpose:
  one_line: "Mechanically preserve and verify the frozen 110-workflow historical subject while routing only the 68-workflow operational catalog after P5d.5 retirement."

catalog_subjects:
  historical_audit_subject:
    count: 110
    path: "contracts/evidence/workflow-retirement/legacy-catalog/"
    role: "immutable evidence and migration-audit input; never a routing fallback"
  operational_catalog:
    count: 68
    path: "contracts/workflows/"
    role: "only source eligible for current guide routing"
  retired_with_typed_tombstones: 42

# ---------------------------------------------------------------------------
# headline findings
# ---------------------------------------------------------------------------
headline:
  structure_is_sound: true
  text: "Historical finding: all 110 workflow contracts were structurally complete and compact. P5d.5 preserves those exact documents as evidence, retires 42 admitted legacy authorities, and exposes only 68 retained workflows to routing; historical gaps below are an audit record, not the current operational state."

# ---------------------------------------------------------------------------
# structural truth (reproducible)
# ---------------------------------------------------------------------------
structural_truth:
  total_workflows: 110
  subject: "frozen historical retirement evidence"
  operational_workflows_after_p5d5: 68
  typed_retirement_tombstones: 42
  contract_fields_required: ["trigger", "inputs", "steps", "outputs", "done_when", "blocked_when", "handoff"]
  workflows_complete_all_7: 110
  workflows_incomplete: 0
  size_range_lines: "33-61"
  largest: "build-story (61 lines)"
  smallest: "collaboration-handoff (33 lines)"
  verdict: "compact state-machines as AGENTS.md requires; no bloat in references/"

# ---------------------------------------------------------------------------
# phase declaration gap (critical for orchestrator DC1)
# ---------------------------------------------------------------------------
phase_declaration_gap:
  workflows_declaring_phase_in_trigger: 9
  workflows_omitting_phase: 101
  declared:
    "1-discovery": ["discover-intent"]
    "2-specification": ["write-spec", "product-requirements"]
    "3-plan": ["plan-sprint", "test-strategy"]
    "4-build-verify": ["build-story", "ready-release"]
    "5-ready-operate": ["guidance-engine"]
    "6-evolve": ["evolve-project"]
  why_it_matters: "the guide-orchestrator (DC1) cannot route by phase if 92% of workflows do not declare it. Every workflow MUST declare its owning phase (or phases) in trigger for the router to reason."

# ---------------------------------------------------------------------------
# data-integrity bugs (routing hazards)
# ---------------------------------------------------------------------------
data_integrity_bugs:
  - bug: "double-prefix filenames"
    files: ["workflow-workflow-analyze.md", "workflow-workflow-builder.md", "workflow-workflow-validate.md"]
    problem: "ID resolves ambiguously (analyze vs workflow-analyze); modules reference workflow-analyze; file strips to 'analyze'"
  - bug: "filename/header mismatch"
    file: "workflow-start.md"
    header_id: "start-runtime"
    module_reference: "start-runtime"
    problem: "file name and canonical ID diverge"
bug_implication: "a router that keys on filename vs canonical id will fail to resolve these. Must normalize: 1 canonical id per workflow, filename == id."

# ---------------------------------------------------------------------------
# module coverage (the 'build anything' promise, part 1)
# ---------------------------------------------------------------------------
module_coverage:
  domains_shipped: 9
  modules:
    core-runtime: {workflows: 20, role: "the method operating itself; routing, context, recovery"}
    software-builder: {workflows: 38, role: "general software: spec->arch->story->build->release"}
    game-studio: {workflows: 30, role: "games: GDD, MDA, mechanics, playtest"}
    creative-studio: {workflows: 16, role: "creative/narrative/storytelling"}
    enterprise: {workflows: 23, role: "compliance, team-operating-model, governance"}
    platform-ops: {workflows: 22, role: "devops, observability, ci, security"}
    launch-ops: {workflows: 16, role: "release/readiness/launch"}
    test-architect: {workflows: 25, role: "test strategy, framework, eval"}
    runtime-builder: {workflows: 35, role: "meta: build new forge modules/workflows/agents"}
  orphan_workflows_no_module: []  # FX4 RESOLVED 2026-07-07 — see orphan_resolution below
  orphan_implication: "RESOLVED — all 12 originals now have a documented home (4 retired/renamed, 8 assigned to core-runtime)."
  orphan_resolution:
    resolved_at: "2026-07-07"
    retired_or_renamed:
      - {from: "start", to: "start-runtime", reason: "FX2 id normalization"}
      - {from: "validate", to: "workflow-validate", reason: "FX2 id normalization"}
      - {from: "analyze", to: "agent-analyze", reason: "FX2 id normalization"}
      - {from: "builder", to: "builder-scaffold", reason: "FX2 id normalization"}
    assigned_to_core_runtime:
      # cross-cutting utilities that span every domain; core-runtime is the
      # natural home until/unless a future module split (Wave 3+) argues
      # otherwise. No schema field added — module coverage stays a documented
      # property of this audit block, not a serialized workflow field.
      - {workflow: "collaboration-handoff", rationale: "cross-phase handoff; applies to every team/agent combo"}
      - {workflow: "product-area-map", rationale: "modularization aid; domain-agnostic"}
      - {workflow: "team-operating-model", rationale: "multi-human/agent coordination; not domain-specific"}
      - {workflow: "hook-event-plan", rationale: "lifecycle automation primitive; cross-cutting"}
      - {workflow: "isolated-eval-runner", rationale: "eval isolation utility; used by any domain's evals"}
      - {workflow: "repo-split-plan", rationale: "structural repo operation; domain-agnostic"}
      - {workflow: "trunk-based-plan", rationale: "branching strategy; cross-cutting"}
      - {workflow: "api-browser-utility", rationale: "reusable connector/test utility; cross-cutting"}

# ---------------------------------------------------------------------------
# the 'build anything' promise - assessed honestly
# ---------------------------------------------------------------------------
build_anything_assessment:
  verdict: "the promise WILL BE sustained via extensibility, NOT via universal embedded coverage"
  extensibility_mechanism:
    - "module-builder + module-ideation + module-distribution: scaffold a new domain module"
    - "workflow-builder + workflow-analyze + workflow-validate: add a new workflow"
    - "runtime-builder: assemble agents/templates/packs"
  shipped_coverage_gaps:
    - "no data-science/ML module (training, eval, MLOps)"
    - "no hardware/IoT module"
    - "no mobile-app-specific module (iOS/Android lifecycle, store, signing)"
    - "no web-frontend-specific module (component design, design-system, SSR)"
    - "no research/academic module"
    - "no content/marketing/SEO module"
  assessment: "the framework is domain-agnostic and extensible enough that ANY domain can be added as a module. The promise holds IF (a) adding a module is genuinely turnkey (today it is manual and under-specified), and (b) the cross-cutting core (discovery, spec, system-design-gate, plan, build, gate) is strong for every domain."

# ---------------------------------------------------------------------------
# system-design gate (FX3 — CLOSED 2026-07-07; promoted to mandatory gate)
# ---------------------------------------------------------------------------
system_design_gate:
  status: "CLOSED — enforced as mandatory spec->plan gate (DC6)"
  existing_workflow: "architecture"
  architecture_covers: ["system boundaries", "components", "data ownership", "interfaces", "dependencies", "integration contracts", "tradeoffs", "rejected options", "platform/security/privacy/ops hooks"]
  enforcement_evidence:
    - "crates/forge-core-decisions/src/phase_transition.rs:113 — (Phase::Specification, Phase::Plan) => Some(GateKind::SystemDesign)"
    - "crates/forge-core-decisions/src/phase_transition.rs:244 — test spec_to_plan_without_system_design_gate_is_blocked"
    - "crates/forge-core-decisions/src/guide_validation.rs:225,238 — SystemDesign gate exercised in guide validation"
  historical_gap_notes:
    - "PREVIOUSLY (now fixed): trigger was conditional, not mandatory; gate was not enforced between spec and plan."
    - "FIX (FX3) LANDED: GateKind::SystemDesign is mandatory on the Specification->Plan edge; failing the gate blocks the transition with a typed reason."
  superseded_required_fix: "FX3 is closed. No further action."


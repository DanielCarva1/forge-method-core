schema_version: "0.1"
spec: "execution_principal_propagation_v0"
status: "p4b5b_implemented"
purpose: >-
  Preserve the verified execution actor as one canonical portable identity
  across claim coordination, Admission, effect-WAL provenance, durable traces,
  receipts, and MCP evidence without turning a serialized identity into
  mutation authority.

portable_identity:
  rust_type: "forge_core_contracts::ExecutionPrincipal"
  fields:
    - "principal_id"
    - "agent_id"
    - "role"
  authority_rule: >-
    ExecutionPrincipal is an evidence DTO. Only the opaque
    VerifiedExecutionAuthorization produced from the operator registry can
    authorize a mutation.
  source: >-
    AuthorizedPrincipal and its redacted audit projection derive the tuple
    from registry-verified authority; trusted execution never accepts the DTO
    as a substitute for that capability.

claim_propagation:
  wire_field: "claim.claimant_principal_id"
  compatibility: >-
    The field is optional so historical claim documents and WAL records remain
    readable. New agent-operated claim acquisition should pass
    --principal-id <verified-principal-id>.
  admission_rule: >-
    A required execution claim must match principal_id, agent_id, and role.
    An old agent-only claim may coordinate legacy work but cannot authorize a
    trusted execution.
  conflict_attribution: >-
    Conflict events prefer principal_id and therefore distinguish two
    principals even when they share the same human-readable agent label.

commit_propagation:
  effect_wal: >-
    The integrated Begin carries execution_provenance with an explicit typed
    execution_principal alongside the redacted verified authorization audit.
    Its canonical digest binds both before the first project write.
  recovery: >-
    Reconciliation rejects provenance when the explicit principal tuple does
    not exactly match the serialized authorization principal.
  trace: >-
    After immediate-commit Admission and before the effect-WAL/project write,
    the kernel durably appends a deterministic effect_staged trace containing
    principal, agent, role, operation, grants, inputs, outputs, and risk. Trace
    append failure blocks the commit before any effect is applied.
  evidence:
    - "ExecutionCommitReceipt.execution_principal"
    - "ExecutionCommitReceipt.principal_trace_event_id"
    - "trusted MCP applied result carrying the complete receipt"
    - "canonical provenance digest binding the principal tuple"

fail_closed_rules:
  - "caller-selected ExecutionPrincipal never grants authority"
  - "missing or mismatched claim principal blocks trusted execution"
  - "provenance principal and authorization principal must match on recovery"
  - "principal trace must be durable before an effect transaction begins"
  - "raw nonce, signature, and private key material remain excluded from evidence"

preserved_limits:
  - "claimant_principal_id remains optional on legacy wire documents"
  - "effect WAL remains recovery authority; the trace is an audit projection"
  - "cooperative same-user governance is not hostile-user isolation"
  - "operation-wide prepared-kernel transactions preserve the same principal tuple, but MCP activation remains P4b.6c"
  - "complete typed saga semantics remain unsupported"

references:
  - "contracts/spec/execution-authority-handoff-v0.yaml"
  - "contracts/spec/execution-admission-v0.yaml"
  - "contracts/spec/execution-provenance-commit-v0.yaml"
  - "contracts/spec/claims-integrity-spine-spec.yaml"
  - "contracts/spec/mcp-trusted-single-effect-activation-v0.yaml"
  - "contracts/spec/operation-wide-transaction-v0.yaml"
  - "contracts/plan/agent-native-guidance-plan.yaml"

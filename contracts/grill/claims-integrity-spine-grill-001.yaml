phase_decision_restated: |
  Build the claims integrity spine = P2.1 (append-only WAL with CRC-32C +
  prefix-recovery) + P2.2 (derive_state as the ONLY constructor of claim state,
  load_claims becomes debug/fallback). This closes the gap proven by the
  discovery exploit (hand-edited expires_at was silently honored) by making
  claims derive from an append-only, chain-checked ledger instead of mutable YAML.


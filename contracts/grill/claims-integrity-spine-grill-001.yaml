the_one_fork:  # genuinely irreversable; artifacts cannot resolve it
  id: "F1-threat-model"
  question: "Does the claims integrity spine need to resist a DETERMINED adversary with filesystem write access, or only accidents / buggy agents / naive hand-edits / torn writes?"
  why_it_matters: |
    It changes the on-disk format and the trust model irreversibly.
    CRC-32C (W2's choice) detects: torn writes, bit-rot, accidental edits,
    and NAIVE hand-edits (editing one record breaks the chain → recovery stops).
    CRC-32C does NOT stop an agent that understands the format: it can append a
    forged record (e.g. release a rival's claim, or steal a lane as another
    agent_id) with a correctly-recomputed CRC. Determined adversaries also win
    by deleting/rolling-back the whole WAL — CRC cannot anchor against that.
    Origin-bound signatures (ed25519, already a workspace dep) stop forging and
    bind each record to an issuer key — but require key management (where does
    a CLI invoked by many agents get its key?) and do not by themselves stop
    rollback without an external anchor.
  options:
    - id: "F1a"
      name: "CRC-32C chain only (build W2 as-is)"
      threat_covered: "accidents, torn writes, bit-rot, naive/buggy hand-edits, concurrent corruption"
      threat_uncovered: "an agent that writes WAL records with correct CRCs to forge another agent's identity or kill a rival's claim; rollback/delete"
      cost: "L (W2 is designed; ~1 crate add: crc32c + fs4 reuse)"
      reversible_upgrade_path: "signatures are ADDITIVE later (add sig field + verify), not a redesign"
    - id: "F1b"
      name: "CRC-32C chain + origin-bound ed25519 signatures per record"
      threat_covered: "everything in F1a + forging-as-another-agent + rollback-of-individual-records (signed checkpoint anchors)"
      threat_uncovered: "total WAL deletion (needs external published anchor, out of scope)"
      cost: "XL (key management: per-agent vs per-machine vs per-repo origin; key provisioning for CLI-invoked agents; signed-checkpoint anchor protocol)"
      risk: "key management is the hard part and can over-engineer for forge's actual trust boundary (cooperative agents the USER spawned within ONE repo)"
    - id: "F1c"
      name: "CRC-32C now (F1a) + non-malleable-authority as a designed v-next layer"
      rationale: "Ship the spine that closes the proven gap against the realistic threats. Design signatures as an additive, separately-gated layer triggered when coordination crosses an org/trust boundary. Avoids baking key-management into the foundation before the multi-owner use case is real."
  recommendation: "F1c"
  recommendation_rationale: |
    CRC-32C + derive_state closes the discovery gap for every threat forge
    actually faces today (cooperative agents in one repo: the dangers are bugs,
    torn writes, concurrency, naive edits — all covered). The adversarial threat
    (an agent forging another's identity) presumes a trust boundary forge does
    not yet assume: every agent in the bus was spawned by the same user/org.
    Origin-binding is real excellence, but it is an additive layer best added
    when the multi-owner coordination case is concrete, not speculated. F1a-now
    + F1b-designed keeps excellence without over-engineering the foundation.

assumptions_to_confirm_in_spec:
  - "Separate claims WAL (claims.wal.*) distinct from effects WAL (effects.ndjson) — different durability/lifecycle. W2 assumes separate."
  - "derive_state is LAZY (replay on each command) for v1.1; snapshot+rotation (P3.3) is a later perf layer, not a correctness one."
  - "Clean break on migration: claims-active/ gitignored ephemeral YAML is abandoned, not migrated. Existing leases simply expire."
  - "Payload encoding = canonical CBOR for deterministic bytes (W2 open question, resolvable in spec)."
  - "Local-filesystem requirement documented (NFS/SMB/WSL-DrvFS advisory-lock + fsync caveats)."


schema_version: "0.1"
contract: "tool_effect_contract"
status: "draft"
purpose: "Describe fine-grained read/write effects for mutating operations so Forge can detect conflicts, notify affected agents, and choose repair without delegating concurrency policy to chat."
design_rules:
  - id: "operation_contract_refs_effects"
    rule: "OperationContract may reference ToolEffectContract, but must not inline raw read_set/write_set as ungoverned fields."
  - id: "fine_conflict_not_blind_abort"
    rule: "A read/write conflict should produce a typed conflict result and notification path before falling back to abort/retry."
  - id: "no_write_without_expected_basis"
    rule: "Every write target needs an expected hash, expected version, append-only policy, or explicit human/driver authority."
  - id: "repair_is_typed"
    rule: "Repair choices are closed enums; the host agent may explain and execute within policy, not invent conflict handling."
  - id: "destructive_effect_requires_inverse_or_stop"
    rule: "A destructive write or delete must either name an inverse/compensation contract before execution or stop for human/driver review."
rust_compatibility:
  serialization: "serde"
  id_policy: "stable_ascii_ids"
  timestamp_policy: "rfc3339_utc"
  enum_policy: "closed_for_v0_with_unknown_rejected"
  collection_policy: "arrays_of_structs_not_freeform_maps"
enums:
  effect_kind:
    - "file_edit"
    - "state_write"
    - "artifact_write"
    - "evidence_append"
    - "request_append"
    - "command_run"
    - "git_stage"
  target_kind:
    - "file_path"
    - "glob"
    - "state_key"
    - "artifact_id"
    - "evidence_id"
    - "ledger_stream"
    - "request_stream"
    - "completion_id"
  access_mode:
    - "read"
    - "write"
    - "append"
    - "create"
    - "delete"
  conflict_code:
    - "read_target_changed"
    - "write_target_changed"
    - "write_target_claimed"
    - "expected_state_version_mismatch"
    - "completion_now_done"
    - "path_outside_scope"
    - "overlapping_write_set"
    - "missing_inverse_for_destructive_write"
  conflict_policy:
    - "allow"
    - "block"
    - "notify_and_repair"
    - "driver_review"
    - "human_review"
  repair_strategy:
    - "none"
    - "rebase_plan"
    - "refresh_reads"
    - "record_request"
    - "run_gate"
    - "ask_human"
    - "compensate_then_retry"
  inverse_kind:
    - "none"
    - "exact_rollback"
    - "logical_compensation"
    - "restore_snapshot"
    - "append_reversal"
    - "manual_repair"
  inverse_source:
    - "unavailable"
    - "tool_contract"
    - "mcp_annotation"
    - "command_contract"
    - "snapshot"
    - "human_approval"
required_fields:
  - "id"
  - "effect_kind"
  - "operation_ref"
  - "actor.agent_id"
  - "read_set"
  - "write_set"
  - "conflict_detection.policy"
  - "repair.strategy"
  - "repair.inverse.kind"
  - "repair.inverse.source"
field_contract:
  id: "Stable effect contract id."
  operation_ref: "OperationContract id or operation family using this effect shape."
  actor:
    agent_id: "Agent/runtime id applying the effect."
    role: "driver|worker|runtime|unknown."
  read_set:
    item:
      target_kind: "Closed target kind enum."
      ref: "Stable path/key/id read before planning or mutation."
      expected_hash: "Optional content hash observed by the agent."
      expected_version: "Optional version observed by the agent."
      required_for_plan: "Whether changing this target can invalidate the agent plan."
  write_set:
    item:
      target_kind: "Closed target kind enum."
      ref: "Stable path/key/id the effect may write."
      access_mode: "write|append|create|delete."
      expected_hash: "Optional pre-write content hash."
      expected_version: "Optional pre-write version."
      destructive: "Whether the write removes or overwrites user/project data."
  conflict_detection:
    check_against: "latest_projection|ledger|filesystem|state_version"
    granularity: "path|state_key|artifact_id|stream"
    conflict_codes: "Closed list of conflict_code values."
    policy: "Closed conflict_policy enum."
  notification:
    required: "Boolean."
    recipients: "driver|affected_readers|lane_owner|human."
    request_contract_ref: "Optional typed request/notification to append."
  repair:
    strategy: "Closed repair_strategy enum."
    automatic_repair_allowed: "Boolean."
    inverse_operation_ref: "Optional inverse/compensation operation."
    stop_if_inverse_missing: "Boolean for destructive writes."
    inverse:
      kind: "Closed inverse_kind enum."
      source: "Closed inverse_source enum."
      ref: "Optional ToolEffect/Command/MCP/snapshot reference for inverse or compensation."
      input_mapping_refs: "Optional refs describing how the inverse receives prior outputs."
      validation_gate_refs: "Optional GateContract refs that must pass after compensation."
      review_required: "Whether human/driver review is required before applying the inverse."
destructive_policy:
  default: "Destructive effects are blocked unless inverse metadata exists or stop_if_inverse_missing is true with human_review/driver_review/block policy."
  allowed_without_inverse:
    - "conflict_detection.policy is human_review, driver_review, or block"
    - "repair.automatic_repair_allowed is false"
    - "repair.stop_if_inverse_missing is true"
  allowed_with_inverse:
    - "repair.inverse.kind is not none"
    - "repair.inverse.source is not unavailable"
    - "repair.inverse.ref points to a typed contract or durable snapshot reference"
    - "repair.inverse.validation_gate_refs names follow-up validation when automatic repair is allowed"
evidence_basis:
  direct_patterns:
    - source_id: "coagent_2606_15376"
      supports: "Long-running multi-agent work benefits from registered saga-style inverses for undo/reorder instead of blind abort."
    - source_id: "rac_2605_03409"
      supports: "Log-based recovery with compensation pairs can reduce side effects and token/latency cost."
    - source_id: "microservices_saga_pattern"
      supports: "Compensation is explicit design work; automatic rollback is not free outside a local ACID transaction."
  safety_context:
    - source_id: "owasp_llm06_excessive_agency"
      supports: "High-impact actions need limited permissions and independent verification/approval."
    - source_id: "runtime_enforcement_2503_18666"
      supports: "Runtime enforcement can block unsafe agent executions with low overhead."
    - source_id: "solver_policy_tool_agents_2603_20449"
      supports: "Tool-use policy should be checked before execution rather than only prompted."
    - source_id: "verifiable_safe_tool_use_2601_08012"
      supports: "Structured capability/safety labels move tool safety from ad hoc prompting to enforceable specifications."
  orchestration_context:
    - source_id: "tool_use_orchestration_survey_2603_22862"
      supports: "Long-horizon multi-tool agents need orchestration around intermediate state, recovery, safety, cost, and verifiability."
  inference_boundary: "The sources support undo/compensation, runtime enforcement, and high-impact action governance; Forge's v0 rule is the product-specific minimum that destructive writes must declare inverse metadata or stop before execution."
failure_modes_prevented:
  - "host agent overwrites files changed after it read them"
  - "host agent blind-aborts long-running worker work instead of notifying"
  - "host agent retries mutation without refreshing stale reads"
  - "destructive write has no inverse or explicit stop rule"

# ---------------------------------------------------------------------------
# source_input: raw human intent in the human's own framing
# ---------------------------------------------------------------------------
source_input:
  human: "creator of forge-method"
  verbatim_framing:
    - "another agent (codex) fucked up my project"
    - "I wanted simple yaml contracts; the agent created a million lines of markdown dictating behavior"
    - "agents already have the ability to understand that if the yaml says to be polite, it is polite; no need for a soap-opera script"
    - "the forge method is a protocol that gives directions for the agent to navigate; dictating step by step makes it dumber"
    - "the agent becomes an interpreter; the human never reads the docs directly, always through the agent"
    - "no documents for humans, except a single GH README (intro + news + install)"
    - "agents started editing state/contracts to continue without respecting the protocols"
    - "I'm building my own forge app in rust too; this one is compatible/borrowed, the other has its own shell; I want reuse"
    - "correction: what I want MOST is a usable product; fixing state became a priority only because it ruins everything else"

# ---------------------------------------------------------------------------
# source_answer: what pi concluded, distilled
# ---------------------------------------------------------------------------
source_answer:
  core_thesis: "Forge Method is a navigation protocol, not a behavior script. Agents are smart and getting smarter; the protocol gives directions and hard gates, not prose dictating how to speak."
  guiding_principles:
    - id: "G1_agent_optimal_format"
      rule: "All method-internal artifacts are agent-optimal typed YAML. Markdown is render/export-only, never runtime or agent-facing authority."
      evidence: "format research; anthropic 2025 context-engineering guidance; arxiv 2411.10541 (40% perf variance by format); arxiv 2602.05447 (YAML 60% fewer tokens than MD for file-native agents)"
    - id: "G2_directions_not_script"
      rule: "Contracts carry directions (navigate discovery->spec->plan->build) and hard gates (grill required, PRD before story, market/UX/PRD/epics mandatory). No 'Presence:' persona prose, no step-by-step behavior scripts."
      evidence: "anthropic 2025 names this exact pattern as anti-pattern: 'hardcoding complex brittle logic in prompts creates fragility'"
    - id: "G3_funnel_of_autonomy"
      rule: "Interaction density thins down the funnel: top (discovery) is provocative and high-contact; bottom (build) is contractual and near-silent. Today it is uniform."
    - id: "G4_integrity_enforced"
      rule: "State is derived from an immutable append-only log, never hand-edited. The protocol that an agent can rewrite to bypass is theater. Authority is required for every mutation."
      evidence: "grite arXiv:2606.19616 validated append-only log + CRDT + leases; python runtime claims append-only but only activates under registry.yaml (default mode unprotected) = claim is false"
    - id: "G5_human_never_reads_artifacts"
      rule: "Internal artifacts (PRD, ADR, grill, story, discovery) are agent-consumed. The single human surface is one GitHub README."
    - id: "G6_no_replay_as_truth"
      rule: "No agent (including pi) treats prior chat as source of truth. Durable typed files are truth. This artifact exists to lock mechanical audit facts so they cannot be lied about again."
  reframe_of_problem:
    - "The perceived problem (80k markdown) is a symptom. The roots are three: (1) FORMAT md-vs-yaml, (2) CONTENT script-vs-direction, (3) ARCHITECTURE enforcement + funnel."
    - "Order of attack is reversed from the visible symptom: integrity/architecture first, then content, then format. Fixing YAML on a lying engine is lipstick."

# ---------------------------------------------------------------------------
# audit: mechanical, reproducible truth (antidote to the integrity lie)
# ---------------------------------------------------------------------------
audit:
  verified_by: "pi via cargo + grep + git, 2026-06-25"
  reproducible: "every fact below has a command; re-run to verify"
  repositories:
    forge_method_core:
      path: "/mnt/c/Forge-method-core"
      role: "active but broken Python runtime; the protocol we are rebuilding"
      last_tag: "v2.0.1"
      runtime: "skills/forge-method/scripts/forge_method_runtime.py = 18334 lines (god-file monolith)"
      command_surface: "106 cmd_ functions"
      markdown_count: "677 .md files (~27700 lines); ~239 are method definition, rest is state/docs"
      integrity_claim: "FALSE"
      integrity_proof: "is_fleet_mode() gates append-only behind .forge-method/agents/registry.yaml; default single-agent mode has NO integrity. requests-apply writes arbitrary payload into state.yaml. hashlib exists but only hashes assets, never verifies contracts at load."
      verdict: "lying runtime; cannot remain acceptance center"
    forge_method_rust:
      path: "/mnt/c/forge-method-rust"
      role: "adopted core real; target of rebuild"
      git_activity: "single commit 'Initial Rust core migration'"
      crates:
        forge_core_contracts: "2215 lines, 17 files, dozens of typed enums, serde-derived"
        forge_core_store: "4054 lines, WAL append-only with begin/before-image/commit + rollback + validate_tool_effect before write"
        forge_core_cli: "12821 lines"
        forge_core_kernel: "1844 lines"
        forge_core_validate: "2458 lines"
        forge_core_schema: "344 lines"
        forge_contract_validator: "405 lines"
      compile: "PASS (cargo check --workspace exit 0, 2m43s)"
      test: "FAIL (6 targets fail; deserializes_all_operation_fixtures panic = fixtures/code desync)"
      cli_surface: "24 commands"
      cli_commands_real:
        - "validate, execute-operation, rebuild/query-effect-index"
        - "host-adapter-manifest/projection/process-policy/admit-invocation"
        - "host-adapter-distribution-policy/admit-distribution"
        - "host-adapter-verify-artifact/provenance/rekor-entry"
        - "host-adapter-verify-sigstore-trust-policy/fulcio/bundle/dsse/timestamp"
        - "host-adapter-verify-ct-sct/revocation-policy/tuf/crl"
      cli_missing: "NO init, guide, oracle, gate, doctor, story_*, review, council, artifact, eval, handoff, next, resume, preflight"
      integrity_enforced: "TRUE"
      integrity_proof: "store append_effect_wal_record writes begin/before-image/commit records; apply path calls validate_tool_effect first and aborts on validation errors; effect metadata carries authority_boundary + forbidden_authority + required_authority_contracts; ed25519-dalek + sigstore + serde_json_canonicalizer are USED not just imported"
      verdict: "REAL cryptographic+integrity spine (exactly the fix G4 needs); but ZERO operational method surface on top"
      critical_finding: "the other agent built the hardest layer (integrity+supply-chain) but skipped forge-core state machine and the entire guidance/gates/catalog surface = the actual product is missing"
      research_basis_verified: "backlog.yaml cites real arxiv IDs; grite arXiv:2606.19616 independently confirmed real (paper, github neul-labs/grite, crate libgrite-git v0.5.3, numbers match: dup 0.78->0.00, 3x throughput)"
    forge_rust_app:
      path: "/mnt/c/forge-rust-app"
      role: "future standalone app with own shell; reuses core later"
      state: "early scaffold; mostly stub crates (1 line each); forge-api 364 lines, forge-server 463 lines are the only real ones"
      verdict: "separate product; consume forge-method-rust core later; not this work"


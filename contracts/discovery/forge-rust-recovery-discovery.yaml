audience:
  first_user: "the creator himself, who needs a WORKING forge-method to continue building the standalone app"
  second_user: "builders using borrowed shells (codex/cursor/opencode/claude/pi) who want a protocol that guides them to build anything"
  decider: "the creator"

outcome:
  when_working: "a builder can run forge-method via any borrowed shell and get a rich guided path (discovery->spec->plan->build->ready) where the agent provokes and extracts early, then runs autonomously once it has what it needs"
  what_changes: "the protocol stops being a lying markdown theater and becomes a fast compiled engine that enforces its own contracts and cannot be bypassed by the agent it governs"

constraints:
  fixed:
    - "core language is Rust (non-negotiable, 6 months of POC-deferral debt ends now)"
    - "this core plugs into borrowed shells; the standalone app is a separate product that reuses this core"
    - "no new Python implementation targets for the core"
  format:
    - "method-internal artifacts are typed YAML, agent-optimal"
    - "single human surface = one GitHub README (intro + patch notes + install + deeper section)"
  process:
    - "must follow forge-method flows (discovery->specification->plan->build->ready->evolve) even while rebuilding the method; practice what we preach"

non_goals:
  - "must not become a step-by-step behavior script that underuses smart agents"
  - "must not keep Python as acceptance center"
  - "must not require humans to read internal artifacts"
  - "must not reinvent the integrity spine that already compiles in forge-method-rust"
  - "must not throw away the real contracts/backlog/research the other agent produced honestly"
  - "must not chase the state-mutation fix as the primary goal; it is a consequence of building the method right, not the destination"

success_signal:
  primary: "a builder can init a project, get guided through discovery, and build a story autonomously, all via the Rust core, with the agent unable to mutate state without authority"
  proof_closes_discovery: "this artifact + the mechanical audit being accepted as durable truth by the human"
  proof_closes_build: "cargo test green; cli parity for the minimum viable command surface; a real guided session end-to-end"

visible_or_operational_proof:
  early: "cargo test green across the spine (fix the 6 failing targets first)"
  mid: "minimum viable surface running: init -> guide -> story_add -> story_done -> gate, enforced by Rust"
  late: "full operational parity with python's 106 commands, migrated to typed contracts"

early_visual_feedback_loop:
  - "fix failing tests and show green cargo test"
  - "demonstrate one guided init+story flow through the rust binary"
  - "show an attempted unauthorized state mutation being REJECTED by the store (the G4 proof)"


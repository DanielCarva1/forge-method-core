schema_version: "0.1"
workflow:
  id: "security-plan"
  phases:
  - "3-plan"
  trigger:
  - "project has authentication, authorization, secrets, data, or deployment risk"
  - "track == enterprise"
  inputs:
  - "architecture artifact"
  - "data flows"
  - "threat assumptions"
  - "deployment constraints"
  steps:
  - "identify assets, trust boundaries, and threats"
  - "define security requirements and checks"
  - "record secrets and access rules"
  - "link checks to evidence, owners, open risks, and release impact"
  - "save security plan"
  outputs:
  - "security plan"
  - "required checks"
  - "unresolved risks"
  - "release impact"
  done_when:
  - "security risks have checks or owners"
  - "secrets and access boundaries are explicit"
  - "release gate can inspect evidence or waiver"
  - "release gate can inspect the plan"
  blocked_when:
  - "sensitive data classification is unknown"
  - "security owner or constraint is missing"
  handoff:
  - "preserve security path, risks, checks, evidence links, owners, and release impact"

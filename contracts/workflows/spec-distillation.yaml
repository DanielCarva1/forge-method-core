schema_version: "0.1"
workflow:
  id: "spec-distillation"
  phases:
  - "1-discovery"
  - "2-specification"
  trigger:
  - "messy notes, transcript, or long brief must become a compact machine contract"
  - "user asks to distill a spec before planning"
  inputs:
  - "source notes or transcript"
  - "known constraints"
  - "target module/track"
  - "acceptance expectations"
  steps:
  - "extract objective, users, constraints, decisions, and open questions"
  - "separate facts, assumptions, risks, and rejected options"
  - "produce compact spec kernel and companion notes if needed"
  - "route to write-spec, product-requirements, or plan-sprint"
  outputs:
  - "spec kernel"
  - "assumption/risk/open-question list"
  - "next workflow"
  done_when:
  - "spec is compact enough for agent handoff"
  - "assumptions and open questions are explicit"
  - "next workflow is known"
  blocked_when:
  - "source material is unavailable"
  - "objective cannot be inferred without human input"
  handoff:
  - "preserve spec kernel path, assumptions, open questions, and next workflow"

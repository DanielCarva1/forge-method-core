schema_version: "0.1"
workflow:
  id: "concept-selection"
  phases:
  - "1-discovery"
  trigger:
  - "multiple ideas exist and one direction must be chosen"
  - "user needs a decision without losing alternatives"
  inputs:
  - "candidate concepts"
  - "selection criteria"
  - "risks"
  - "constraints"
  steps:
  - "score candidates against criteria"
  - "identify tradeoffs and discarded strengths"
  - "select primary and backup concepts"
  - "preserve rationale"
  outputs:
  - "selected concept"
  - "backup concept"
  - "decision rationale"
  done_when:
  - "chosen direction is explicit"
  - "rejected alternatives are summarized"
  - "next workflow is known"
  blocked_when:
  - "criteria are missing"
  - "two options remain materially equal"
  handoff:
  - "preserve selected concept, backup, rationale, and next workflow"

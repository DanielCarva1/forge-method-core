schema_version: "0.1"
workflow:
  id: "build-story"
  phases:
  - "4-build-verify"
  trigger:
  - "state.phase == 4-build-verify"
  - "sprint has a ready story"
  - "user asks Codex to continue autonomous development"
  inputs:
  - ".forge-method/state.yaml"
  - ".forge-method/sprint.yaml"
  - "active story"
  - "acceptance criteria"
  - "decision sources"
  - "domain context when the active track has one"
  - "relevant source files"
  - "required checks"
  steps:
  - "select the next ready story"
  - "restate scope in one short paragraph"
  - "inspect only files needed for the story"
  - "preserve domain-specific acceptance, proof, and non-goals"
  - "implement the smallest correct change"
  - "run required checks"
  - "perform code review"
  - "record review findings with review add"
  - "repair failures or review findings"
  - "resolve or waive review findings"
  - "write evidence"
  - "update sprint status"
  - "continue to the next ready story or ready gate without procedural confirmation"
  - "delete ephemeral task docs only after evidence is recorded"
  outputs:
  - "code changes"
  - "review findings or explicit clean review"
  - "check results"
  - "evidence entry"
  - "updated sprint"
  - "updated state"
  done_when:
  - "all acceptance criteria are satisfied"
  - "required checks pass or documented exceptions are accepted"
  - "linked review findings are resolved or waived"
  - "evidence is written"
  - "sprint status is updated"
  - "next story or ready gate is explicit"
  blocked_when:
  - "missing credential"
  - "destructive action requires explicit user approval"
  - "spec contradicts itself"
  - "acceptance criteria are missing"
  - "required external service is unavailable"
  handoff:
  - "preserve exact next action"
  - "preserve failing command and output summary if blocked"
  - "preserve touched files and evidence path"
  - "never ask for procedural ok/continue between mechanical steps"

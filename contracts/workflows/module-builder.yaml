schema_version: "0.1"
workflow:
  id: "module-builder"
  phases:
  - "1-discovery"
  - "6-evolve"
  trigger:
  - "user wants to build, create, scaffold, package, or assemble a Forge module"
  - "module ideation has produced a build roadmap"
  inputs:
  - "module plan or skills/workflows folder"
  - "module id, title, purpose, workflows, agents, templates, and packs"
  - "configuration and dependency decisions"
  - "install and validation expectations"
  steps:
  - "read the plan and all included runtime artifacts"
  - "assemble module manifest, catalog links, setup/install notes, and generated paths"
  - "confirm workflow order, followed_by relationships, outputs, templates, and packs"
  - "add deterministic scripts or smoke hooks only where reliability needs them"
  - "hand off distribution/readiness when install, publish, or upgrade behavior matters"
  outputs:
  - "module manifest"
  - "packaged runtime artifact list"
  - "setup/config boundary"
  - "validation handoff"
  done_when:
  - "module membership resolves to packaged workflow/catalog entries"
  - "setup, configuration, and dependency behavior are explicit"
  - "next workflow is module-distribution, module-validate, or workflow-validate"
  blocked_when:
  - "required artifact paths are missing"
  - "module metadata conflicts with catalog or workflow docs"
  - "install path cannot be validated locally"
  handoff:
  - "preserve module manifest path, generated paths, setup/config boundary, validation command, and remaining manual steps"

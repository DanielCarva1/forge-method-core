name: Release

# Produces cross-compiled `forge-core` binaries for Linux, macOS (Intel +
# Apple Silicon), and Windows on every tag push `v*`, then attaches them to a
# GitHub Release. This is what makes "Option B — prebuilt binary" in the
# README real: users download the asset for their platform and put it on PATH.
#
# Why cross-compile on linux runners (not native): cheaper, faster, single
# job matrix. The `cross` tool handles the glibc/musl/linux-gnu split; for
# macOS we use the native macOS runner because cross-compiling from linux to
# darwin requires non-free SDKs. Windows MSVC likewise runs natively.
#
# Supply chain (R-SCM, 2026-07-01):
# - Each archive is signed with cosign keyless (sigstore via GitHub OIDC).
#   The signature + certificate + Rekor entry are bundled into a `.sigstore`
#   file uploaded alongside the asset. Users verify identity via
#   `cosign verify-blob --certificate-identity <runner> ...`.
# - An SBOM (CycloneDX) is generated from Cargo.lock in the release job and
#   uploaded as `forge-core-<version>.cdx.json`. Enables CVE auditing of the
#   crypto-heavy transitive deps (ed25519-dalek, p256, sigstore-tsa, ...).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (must already exist)"
        required: true

permissions:
  contents: write
  id-token: write # required for cosign keyless signing via GitHub OIDC

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: forge-core
            archive: forge-core-x86_64-linux.tar.gz
            can_smoke: true
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: forge-core
            archive: forge-core-aarch64-linux.tar.gz
            can_smoke: false # cross-compiled aarch64 binary cannot run on x86_64 runner
          # Run on macos-14 (Apple Silicon) and cross-compile to x86_64.
          # The macos-13 (Intel) runner is being phased out and is extremely
          # slow for crypto-heavy release builds. Apple Silicon runners are
          # 3-5x faster, and x86_64 binaries run via Rosetta 2 for smoke tests.
          - target: x86_64-apple-darwin
            runner: macos-14
            artifact: forge-core
            archive: forge-core-x86_64-macos.tar.gz
            can_smoke: true
          - target: aarch64-apple-darwin
            runner: macos-14
            artifact: forge-core
            archive: forge-core-aarch64-macos.tar.gz
            can_smoke: true
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: forge-core.exe
            archive: forge-core-x86_64-windows.zip
            can_smoke: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross
        if: runner.os == 'Linux'
        run: cargo install cross --locked --quiet || true

      # R-SCM.2: cosign is used to sign each archive keyless via GitHub OIDC.
      # Installed once per job; the signing step runs after packaging.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Linux targets are cross-compiled from the linux runner to keep the
      # matrix uniform; cross handles the sysroot differences between
      # x86_64 (host) and aarch64 (foreign).
      - name: Build (Linux cross)
        if: runner.os == 'Linux'
        run: cross build --release --target ${{ matrix.target }} -p forge-core-cli

      - name: Build (native)
        if: runner.os != 'Linux'
        run: cargo build --release --target ${{ matrix.target }} -p forge-core-cli

      - name: Smoke test the freshly built binary (POSIX)
        # Only smoke-test when the binary can actually run on the runner.
        # Cross-compiled targets (e.g. aarch64-linux built on an x86_64 runner)
        # cannot execute without QEMU, which is out of scope for the release
        # pipeline. The build itself succeeding is sufficient evidence for
        # those targets.
        if: runner.os != 'Windows' && matrix.can_smoke
        run: |
          ./target/${{ matrix.target }}/release/${{ matrix.artifact }} --help > /dev/null
          ./target/${{ matrix.target }}/release/${{ matrix.artifact }} validate --root .

      - name: Smoke test the freshly built binary (Windows)
        if: runner.os == 'Windows' && matrix.can_smoke
        run: |
          .\target\${{ matrix.target }}\release\${{ matrix.artifact }} --help | Out-Null
          .\target\${{ matrix.target }}\release\${{ matrix.artifact }} validate --root .

      - name: Package (POSIX)
        if: runner.os != 'Windows'
        working-directory: target/${{ matrix.target }}/release
        run: |
          # Copy the `forge` wrapper alongside the binary so a single archive
          # exposes both names. The skill `start-forge` looks for `forge`
          # first; shipping it removes the need for users to alias anything.
          cp ../../../distribution/forge ./forge
          chmod 0755 ./forge
          tar czf ../../../${{ matrix.archive }} ${{ matrix.artifact }} forge
          cd ../../..
          # sha256sum is GNU coreutils (Linux); macOS ships shasum instead.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum ${{ matrix.archive }} > ${{ matrix.archive }}.sha256
          else
            shasum -a 256 ${{ matrix.archive }} > ${{ matrix.archive }}.sha256
          fi

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Copy the `forge.cmd` wrapper alongside the binary so a single
          # archive exposes both names (see POSIX packaging comment above).
          Copy-Item "distribution\forge.cmd" "target\${{ matrix.target }}\release\forge.cmd" -Force
          Compress-Archive -Path "target\${{ matrix.target }}\release\${{ matrix.artifact }}", "target\${{ matrix.target }}\release\forge.cmd" -DestinationPath "${{ matrix.archive }}"
          $hash = (Get-FileHash "${{ matrix.archive }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.archive }}" | Out-File -Encoding ascii "${{ matrix.archive }}.sha256"

      # R-SCM.2: sign each archive with cosign keyless via GitHub OIDC.
      # Produces a .sigstore bundle (signature + cert + Rekor entry) that
      # users verify offline with `cosign verify-blob --bundle ...`.
      #
      # `shell: bash` is mandatory here: the command uses backslash line
      # continuations (bash syntax), and the Windows runner default shell is
      # PowerShell, which parses `--\` as a dangling unary operator and fails.
      # Bash ships on all GitHub runners including windows-latest (via Git Bash).
      - name: Sign archive (sigstore keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        shell: bash
        run: |
          cosign sign-blob --yes \
            --bundle ${{ matrix.archive }}.sigstore \
            ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256
            ${{ matrix.archive }}.sigstore

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -la release-assets/

      # R-SCM.1: generate a CycloneDX SBOM from Cargo.lock. cargo-cyclonedx
      # resolves the transitive dependency tree and emits a JSON BOM that
      # downstream auditors can feed to dependency/vulnerability scanners
      # (e.g. OWASP Dep-Check, Trivy, grype). One BOM covers all targets
      # because all share the same Cargo.lock dependency set.
      #
      # `continue-on-error: true` on BOTH steps: the SBOM is supply-chain
      # enrichment, not a release blocker. cargo-cyclonedx is a third-party
      # tool whose CLI has broken across versions, and a metadata-generation
      # failure must never prevent the signed binaries from shipping. The
      # release publish step below globs `*.cdx.json` only if it exists, so a
      # missing SBOM degrades gracefully.
      #
      # Version pin: cargo-cyclonedx 0.5.x removed the legacy `-p <pkg>` and
      # `--output-pattern` flags (0.5.0, Mar 2024). The invocation below uses
      # the 0.5.x surface: package discovery is automatic via `cargo metadata`,
      # and `--override-filename` controls the output name. Pinning to 0.5.9
      # (the release current as of 2026-03-19, MSRV 1.85) keeps this stable.
      - name: Install cargo-cyclonedx
        continue-on-error: true
        run: cargo install cargo-cyclonedx --version 0.5.9 --locked --quiet || true

      - name: Generate CycloneDX SBOM
        continue-on-error: true
        run: |
          cargo cyclonedx --format json --override-filename forge-core-${{ steps.tag.outputs.name }}
          # cargo-cyclonedx 0.5.x writes <override-filename>.cdx.json in the
          # workspace root; surface it in release-assets.
          mv forge-core-${{ steps.tag.outputs.name }}.cdx.json release-assets/forge-core-${{ steps.tag.outputs.name }}.cdx.json

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/*.tar.gz
            release-assets/*.zip
            release-assets/*.sha256
            release-assets/*.sigstore
          body: |
            ## Forge Method Core ${{ steps.tag.outputs.name }}

            ### Install

            Download the asset for your platform, extract, and put the binary
            on your `PATH`:

            ```bash
            # Linux / macOS
            tar xzf forge-core-<arch>-<os>.tar.gz
            install -m 0755 forge-core ~/.local/bin/

            # Windows (PowerShell)
            Expand-Archive forge-core-x86_64-windows.zip $env:LOCALAPPDATA\Programs\forge-core
            # then add $env:LOCALAPPDATA\Programs\forge-core to your PATH
            ```

            Verify it landed on your PATH:

            ```bash
            forge-core validate --root .
            ```

            See the [Quick Start](https://github.com/DanielCarva1/forge-method-core#quick-start)
            section of the README for the first project init.

            ### Supported hosts

            `codex`, `cursor`, `claude`, `opencode`, `vscode`, `pidev`,
            `forge_standalone`, `custom`. Run
            `forge-core host-adapter-manifest --json` for the full per-command
            authority boundary.

            ### Verification

            Each asset ships with three siblings:

            - `.sha256` — SHA-256 checksum (integrity)
            - `.sigstore` — sigstore bundle (signature + certificate + Rekor entry)
            - `forge-core-<version>.cdx.json` — CycloneDX SBOM (dependency inventory)

            **Verify integrity** (proves the bytes were not tampered in transit):

            ```bash
            sha256sum -c forge-core-<arch>-<os>.tar.gz.sha256
            ```

            **Verify identity** (proves the asset was built by the release CI
            and recorded in the public Rekor transparency log):

            ```bash
            cosign verify-blob \
              --bundle forge-core-<arch>-<os>.tar.gz.sigstore \
              --certificate-identity-regexp 'https://github.com/DanielCarva1/forge-method-core/.github/' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              forge-core-<arch>-<os>.tar.gz
            ```

            **Audit dependencies** (CVE scan via grype/Trivy against the SBOM):

            ```bash
            grype sbom:./forge-core-<version>.cdx.json
            ```

      # Attach the SBOM separately, ONLY if cargo-cyclonedx produced one.
      # The install + generate steps above are continue-on-error
      # (cargo-cyclonedx is a third-party tool whose CLI has broken across
      # versions), so this glob may match nothing. action-gh-release without
      # fail_on_unmatched_files treats a no-match as "upload nothing", not an
      # error — so the release ships without an SBOM rather than not shipping
      # at all. The signed binaries are the product; the SBOM is enrichment.
      - name: Attach SBOM if present
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: release-assets/*.cdx.json

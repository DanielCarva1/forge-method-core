name: Release

# A tag push publishes a release. A manual dispatch rebuilds and validates an
# existing tag, but deliberately cannot publish it.
#
# Every platform archive is a self-describing Forge adoption kit: the native
# binary, its wrapper, the start-forge skill, selected operator/adoption docs,
# and an embedded, content-addressed RELEASE-MANIFEST.json.
#
# Supply-chain controls:
# - the requested tag, workspace version, checked-out commit, and CLI version
#   must agree before an archive can be created;
# - archives are assembled deterministically from an explicit payload allowlist
#   and verified before upload and again before publication;
# - every archive is signed keylessly with Sigstore/cosign via GitHub OIDC;
# - a valid CycloneDX SBOM is mandatory for publication.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to rebuild and validate (manual runs never publish)"
        required: true
        type: string

permissions: {}

jobs:
  metadata:
    name: Validate release identity and packaging contract
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.identity.outputs.tag }}
      version: ${{ steps.identity.outputs.version }}
      commit_sha: ${{ steps.identity.outputs.commit_sha }}
      source_date_epoch: ${{ steps.identity.outputs.source_date_epoch }}
    permissions:
      actions: read
      checks: read
      contents: read

    steps:
      - name: Checkout the exact requested tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Require tag, workspace version, and commit identity to agree
        id: identity
        shell: bash
        env:
          REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import re
          import subprocess
          import tomllib
          from pathlib import Path

          tag = os.environ["REQUESTED_TAG"]
          if re.fullmatch(r"v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(?:-[0-9A-Za-z.-]+)?", tag) is None:
              raise SystemExit(f"release tag must be an exact v-prefixed SemVer, got {tag!r}")

          cargo = tomllib.loads(Path("Cargo.toml").read_text(encoding="utf-8"))
          version = cargo["workspace"]["package"]["version"]
          if tag != f"v{version}":
              raise SystemExit(
                  f"release identity mismatch: tag={tag!r}, workspace version={version!r}"
              )

          tag_ref = f"refs/tags/{tag}"
          try:
              tag_commit = subprocess.check_output(
                  ["git", "rev-parse", f"{tag_ref}^{{commit}}"],
                  text=True,
                  stderr=subprocess.STDOUT,
              ).strip()
          except subprocess.CalledProcessError as error:
              raise SystemExit(
                  f"release identity must name an existing tag {tag_ref}: {error.output.strip()}"
              ) from error
          head_commit = subprocess.check_output(
              ["git", "rev-parse", "HEAD"], text=True
          ).strip()
          if tag_commit != head_commit:
              raise SystemExit(
                  f"checkout mismatch: {tag} resolves to {tag_commit}, HEAD is {head_commit}"
              )

          source_date_epoch = subprocess.check_output(
              ["git", "show", "-s", "--format=%ct", "HEAD"], text=True
          ).strip()
          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as stream:
              stream.write(f"tag={tag}\n")
              stream.write(f"version={version}\n")
              stream.write(f"commit_sha={head_commit}\n")
              stream.write(f"source_date_epoch={source_date_epoch}\n")
          PY

      - name: Test deterministic archive tooling
        run: python scripts/test-release-archive.py

      - name: Require successful CI for the exact release commit
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          success_count="$(
            gh api \
              -H 'Accept: application/vnd.github+json' \
              "/repos/$GH_REPO/actions/workflows/ci.yml/runs?head_sha=$sha&status=success&per_page=100" \
              --jq '[.workflow_runs[] | select(.event == "push" or .event == "pull_request")] | length'
          )"
          test "$success_count" -gt 0 || {
            echo "release rejected: no successful CI run exists for exact commit $sha" >&2
            exit 1
          }

  build:
    name: Build ${{ matrix.target }}
    needs: metadata
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write # required for cosign keyless signing via GitHub OIDC
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: forge-core
            wrapper: distribution/forge
            wrapper_name: forge
            archive: forge-core-x86_64-linux.tar.gz
            can_smoke: true
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: forge-core
            wrapper: distribution/forge
            wrapper_name: forge
            archive: forge-core-aarch64-linux.tar.gz
            can_smoke: false # foreign binary cannot execute on the x86_64 runner
          - target: x86_64-apple-darwin
            runner: macos-15
            artifact: forge-core
            wrapper: distribution/forge
            wrapper_name: forge
            archive: forge-core-x86_64-macos.tar.gz
            can_smoke: true # runs under Rosetta 2
          - target: aarch64-apple-darwin
            runner: macos-15
            artifact: forge-core
            wrapper: distribution/forge
            wrapper_name: forge
            archive: forge-core-aarch64-macos.tar.gz
            can_smoke: true
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: forge-core.exe
            wrapper: distribution/forge.cmd
            wrapper_name: forge.cmd
            archive: forge-core-x86_64-windows.zip
            can_smoke: true

    steps:
      - name: Checkout the validated immutable commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.metadata.outputs.commit_sha }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable action
        with:
          toolchain: 1.97.0
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross
        if: runner.os == 'Linux'
        run: cargo install cross --version 0.2.5 --locked --quiet

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Build (Linux cross)
        if: runner.os == 'Linux'
        run: cross build --release --target ${{ matrix.target }} -p forge-core-cli

      - name: Build (native)
        if: runner.os != 'Linux'
        run: cargo build --release --target ${{ matrix.target }} -p forge-core-cli

      - name: Smoke test version and core commands (POSIX)
        if: runner.os != 'Windows' && matrix.can_smoke
        shell: bash
        env:
          EXPECTED_VERSION: forge-core ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail
          binary="./target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          actual="$("$binary" --version)"
          test "$actual" = "$EXPECTED_VERSION" || {
            echo "CLI version mismatch: expected '$EXPECTED_VERSION', got '$actual'" >&2
            exit 1
          }
          "$binary" --help >/dev/null
          "$binary" validate --root .

      - name: Smoke test version and core commands (Windows)
        if: runner.os == 'Windows' && matrix.can_smoke
        shell: pwsh
        env:
          EXPECTED_VERSION: forge-core ${{ needs.metadata.outputs.version }}
        run: |
          $binary = ".\target\${{ matrix.target }}\release\${{ matrix.artifact }}"
          $actual = (& $binary --version).Trim()
          if ($actual -ne $env:EXPECTED_VERSION) {
            throw "CLI version mismatch: expected '$env:EXPECTED_VERSION', got '$actual'"
          }
          & $binary --help | Out-Null
          & $binary validate --root .

      - name: Build and verify deterministic release archive
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build-release-archive.py \
            --repo-root . \
            --binary "target/${{ matrix.target }}/release/${{ matrix.artifact }}" \
            --binary-name "${{ matrix.artifact }}" \
            --wrapper "${{ matrix.wrapper }}" \
            --wrapper-name "${{ matrix.wrapper_name }}" \
            --archive "${{ matrix.archive }}" \
            --version "${{ needs.metadata.outputs.version }}" \
            --source-date-epoch "${{ needs.metadata.outputs.source_date_epoch }}"
          python scripts/check-release-archive.py \
            --archive "${{ matrix.archive }}" \
            --version "${{ needs.metadata.outputs.version }}" \
            --binary-name "${{ matrix.artifact }}" \
            --wrapper-name "${{ matrix.wrapper_name }}" \
            --payload-manifest distribution/release-payload.txt \
            --require-checksum

      - name: Sign archive (Sigstore keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        shell: bash
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --bundle "${{ matrix.archive }}.sigstore" \
            "${{ matrix.archive }}"

      - name: Upload validated artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.archive }}
          if-no-files-found: error
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256
            ${{ matrix.archive }}.sigstore

  release:
    name: Publish GitHub Release
    if: github.event_name == 'push'
    needs: [metadata, build]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Checkout the validated immutable commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.metadata.outputs.commit_sha }}
          persist-credentials: false

      - name: Download all build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Require the exact signed asset set
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          archives = {
              "forge-core-x86_64-linux.tar.gz",
              "forge-core-aarch64-linux.tar.gz",
              "forge-core-x86_64-macos.tar.gz",
              "forge-core-aarch64-macos.tar.gz",
              "forge-core-x86_64-windows.zip",
          }
          expected = archives | {f"{name}.sha256" for name in archives} | {
              f"{name}.sigstore" for name in archives
          }
          root = Path("release-assets")
          actual = {path.name for path in root.iterdir() if path.is_file()}
          if actual != expected:
              raise SystemExit(
                  "release asset set mismatch\n"
                  f"missing: {sorted(expected - actual)}\n"
                  f"unexpected: {sorted(actual - expected)}"
              )
          empty = sorted(name for name in expected if (root / name).stat().st_size == 0)
          if empty:
              raise SystemExit(f"empty release assets: {empty}")
          PY

      - name: Re-verify archive manifests and checksums
        shell: bash
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail
          for archive in \
            forge-core-x86_64-linux.tar.gz \
            forge-core-aarch64-linux.tar.gz \
            forge-core-x86_64-macos.tar.gz \
            forge-core-aarch64-macos.tar.gz
          do
            python scripts/check-release-archive.py \
              --archive "release-assets/$archive" \
              --version "$VERSION" \
              --binary-name forge-core \
              --wrapper-name forge \
              --payload-manifest distribution/release-payload.txt \
              --require-checksum
          done
          python scripts/check-release-archive.py \
            --archive release-assets/forge-core-x86_64-windows.zip \
            --version "$VERSION" \
            --binary-name forge-core.exe \
            --wrapper-name forge.cmd \
            --payload-manifest distribution/release-payload.txt \
            --require-checksum

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Verify every signature against this release workflow and tag
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
        run: |
          set -euo pipefail
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@refs/tags/${RELEASE_TAG}"
          for archive in release-assets/*.tar.gz release-assets/*.zip
          do
            cosign verify-blob \
              --bundle "${archive}.sigstore" \
              --certificate-identity "$identity" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              "$archive"
          done

      - name: Reconfirm the tag still resolves to the validated commit
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
          EXPECTED_SHA: ${{ needs.metadata.outputs.commit_sha }}
        run: |
          set -euo pipefail
          remote_refs="$(git ls-remote --tags origin "refs/tags/$RELEASE_TAG" "refs/tags/$RELEASE_TAG^{}")"
          resolved="$(printf '%s\n' "$remote_refs" | awk '$2 ~ /\^\{\}$/ {print $1; found=1} END {if (!found && NR == 1) print $1}')"
          test -n "$resolved" && test "$resolved" = "$EXPECTED_SHA" || {
            echo "release rejected: $RELEASE_TAG no longer resolves to $EXPECTED_SHA (got ${resolved:-missing})" >&2
            exit 1
          }

      - name: Install pinned release Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable action
        with:
          toolchain: 1.97.0

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --version 0.5.9 --locked --quiet

      - name: Generate and validate mandatory CycloneDX SBOM
        shell: bash
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail
          cargo cyclonedx \
            --format json \
            --manifest-path crates/forge-core-cli/Cargo.toml \
            --override-filename "forge-core-$VERSION.cdx"
          sbom="crates/forge-core-cli/forge-core-$VERSION.cdx.json"
          test -s "$sbom" || {
            echo "mandatory CycloneDX SBOM was not generated at $sbom" >&2
            exit 1
          }
          python - "$sbom" "$VERSION" <<'PY'
          import json
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          expected_version = sys.argv[2]
          document = json.loads(path.read_text(encoding="utf-8"))
          if document.get("bomFormat") != "CycloneDX":
              raise SystemExit(f"{path}: bomFormat is not CycloneDX")
          component = document.get("metadata", {}).get("component")
          if not isinstance(component, dict):
              raise SystemExit(f"{path}: metadata.component is missing")
          if component.get("name") != "forge-core-cli":
              raise SystemExit(
                  f"{path}: expected forge-core-cli component, got {component.get('name')!r}"
              )
          if component.get("version") != expected_version:
              raise SystemExit(
                  f"{path}: expected version {expected_version!r}, got {component.get('version')!r}"
              )
          PY
          cp "$sbom" "release-assets/forge-core-$VERSION.cdx.json"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          name: ${{ needs.metadata.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/*.tar.gz
            release-assets/*.zip
            release-assets/*.sha256
            release-assets/*.sigstore
            release-assets/*.cdx.json
          body: |
            ## Forge Method Core ${{ needs.metadata.outputs.tag }}

            ### Install

            Download the asset for your platform, extract it, and put the
            binary and wrapper on your `PATH`. Each archive also contains the
            `start-forge` skill, selected adoption/operator documentation,
            and an embedded `RELEASE-MANIFEST.json` with the SHA-256, size,
            and mode of every payload file.

            Verify the installed CLI:

            ```bash
            forge-core --version
            forge-core validate --root .
            ```

            ### Verification

            Each platform asset has a checksum and Sigstore bundle. The
            release also includes a mandatory CycloneDX SBOM.

            ```bash
            sha256sum -c forge-core-<arch>-<os>.tar.gz.sha256

            cosign verify-blob \
              --bundle forge-core-<arch>-<os>.tar.gz.sigstore \
              --certificate-identity 'https://github.com/DanielCarva1/forge-method-core/.github/workflows/release.yml@refs/tags/<tag>' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              forge-core-<arch>-<os>.tar.gz

            grype sbom:./forge-core-<version>.cdx.json
            ```

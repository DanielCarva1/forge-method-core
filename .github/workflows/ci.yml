name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  windows-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Unit tests
        run: python -m unittest discover -s tests
      - name: Runtime smoke
        shell: pwsh
        run: .\scripts\smoke-runtime.ps1
      - name: Install smoke
        shell: pwsh
        run: .\scripts\smoke-install.ps1
  linux-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Unit tests
        run: python -m unittest discover -s tests
      - name: Runtime smoke
        run: bash scripts/smoke-runtime.sh
      - name: Install smoke
        run: bash scripts/smoke-install.sh

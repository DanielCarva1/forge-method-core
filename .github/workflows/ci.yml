name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Type-check workspace
        run: cargo check --workspace --all-targets

      # NOTE: clippy pedantic runs as `-W` (warn) rather than `-D` (deny) at
      # v0.1.0 because the codebase carries ~40 pre-existing pedantic lints
      # (mostly in test/bench code and in conflict_detection.rs, where several
      # warnings encode deliberate design tradeoffs). Tracked for cleanup in
      # follow-up; see docs/dev-docs/.../progress/excellence_roadmap.md.
      # Promoting back to `-D warnings` is gated on that cleanup landing.
      - name: Clippy (pedantic, warn)
        run: cargo clippy --workspace --all-targets -- -W clippy::pedantic

      - name: Test workspace
        run: cargo test --workspace

      - name: Validate contracts
        run: cargo run -p forge-core-cli -- validate --root .

      - name: Regression anchor (122 clean diagnostics)
        run: |
          count=$(cargo run --quiet -p forge-core-cli -- validate --root . --json 2>/dev/null | grep -c '"diagnostics": 0')
          echo "Anchor count: $count (expected 122)"
          test "$count" = "122"

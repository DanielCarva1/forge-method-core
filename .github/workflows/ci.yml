name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  quality:
    name: Linux quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check generated workspace layout
        run: python scripts/generate-workspace-layout.py --check

      - name: Check generated command surface docs
        run: cargo run -p forge-core-command-surface --example generate_command_surface_docs -- --check

      - name: Check formatting
        run: cargo fmt --all -- --check

      # clippy pedantic runs as `-D` (deny). Adding new pedantic warnings will
      # fail CI, which is intentional: each new lint must be either fixed or
      # accompanied by a documented #[allow] with a justification comment.
      - name: Clippy (pedantic, deny)
        run: cargo clippy --workspace --all-targets -- -D clippy::pedantic

      - name: Validate contracts
        run: cargo run -p forge-core-cli -- validate --root .

      - name: Regression anchor (126 clean diagnostics)
        run: |
          count=$(cargo run --quiet -p forge-core-cli -- validate --root . --json 2>/dev/null | grep -c '"diagnostics": 0')
          echo "Anchor count: $count (expected 126)"
          test "$count" = "126"

  platform:
    name: ${{ matrix.os }} cargo all-targets
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Type-check workspace all targets
        run: cargo check --workspace --all-targets

      - name: Test workspace
        run: cargo test --workspace

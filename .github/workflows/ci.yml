name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  quality:
    name: Linux quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable action
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check generated workspace layout
        run: python scripts/generate-workspace-layout.py --check

      - name: Check local documentation links
        run: python scripts/check-doc-links.py

      - name: Check generated command surface docs
        run: cargo run -p forge-core-command-surface --example generate_command_surface_docs -- --check

      - name: Check generated workflow release foundation
        run: cargo run -p forge-core-decisions --example generate_workflow_release_foundation -- --check

      - name: Check generated workflow release registry
        run: cargo run -p forge-core-decisions --example generate_workflow_release_registry -- --check

      - name: Check generated core assurance behavioral evidence
        run: cargo run -p forge-core-decisions --example generate_workflow_core_assurance_evidence -- --check

      - name: Check generated core assurance candidate release
        run: cargo run -p forge-core-decisions --example generate_workflow_core_assurance_candidate -- --check

      - name: Check generated independently reviewed admission
        run: cargo run -p forge-core-decisions --example generate_workflow_core_assurance_admission -- --check

      - name: Check generated assurance operations behavioral evidence
        run: cargo run -p forge-core-decisions --example generate_workflow_assurance_operations_evidence -- --check

      - name: Check generated assurance operations candidate release
        run: cargo run -p forge-core-decisions --example generate_workflow_assurance_operations_candidate -- --check

      - name: Check generated assurance operations reviewed admission
        run: cargo run -p forge-core-decisions --example generate_workflow_assurance_operations_admission -- --check

      - name: Check generated agent-native continuity behavioral evidence
        run: cargo run -p forge-core-decisions --example generate_workflow_agent_native_continuity_evidence -- --check

      - name: Check generated agent-native continuity candidate release
        run: cargo run -p forge-core-decisions --example generate_workflow_agent_native_continuity_candidate -- --check

      - name: Check generated agent-native continuity reviewed admission
        run: cargo run -p forge-core-decisions --example generate_workflow_agent_native_continuity_admission -- --check

      - name: Check generated signed workflow retirement checkpoint
        run: cargo run -p forge-core-decisions --example generate_workflow_retirement_checkpoint -- --check

      - name: Verify trusted workflow retirement runtime evidence
        run: cargo test -p forge-core-kernel --test workflow_retirement_runtime_evidence

      - name: Check formatting
        run: cargo fmt --all -- --check

      # clippy pedantic runs as `-D` (deny). Adding new pedantic warnings will
      # fail CI, which is intentional: each new lint must be either fixed or
      # accompanied by a documented #[allow] with a justification comment.
      - name: Clippy (pedantic, deny, including expensive-journey code)
        run: cargo clippy --workspace --all-targets --all-features -- -D clippy::pedantic

      - name: Validate contracts
        run: cargo run -p forge-core-cli -- validate --root .

      - name: Regression anchors (139 historical, 156 Batch A, 169 pre-retirement, 174 aggregate)
        run: |
          cargo run --quiet -p forge-core-cli -- validate --root . --json 2>/dev/null > target/validate-summary.json
          python - <<'PY'
          import json
          with open("target/validate-summary.json", encoding="utf-8") as stream:
              summary = json.load(stream)
          checks = summary["checks"]
          batch_a = [
              check for check in checks
              if "agent-native-continuity" not in check["name"]
              and "agent_native_continuity" not in check["name"]
              and not check["name"].startswith("domain_pack_")
              and check["name"] != "workflow_retirement_checkpoint"
          ]
          historical = [
              check for check in batch_a
              if "assurance-operations" not in check["name"]
              and "assurance_operations" not in check["name"]
              and check["name"] != "workflow_release_v2_admission"
          ]
          assert summary["status"] == "passed", summary["diagnostics"]
          assert len(historical) == 139, len(historical)
          assert len(batch_a) == 156, len(batch_a)
          pre_retirement = [
              check for check in checks
              if check["name"] != "workflow_retirement_checkpoint"
              and not check["name"].startswith("domain_pack_")
          ]
          assert len(pre_retirement) == 169, len(pre_retirement)
          assert len(checks) == 174, len(checks)
          assert all(check["diagnostics"] == 0 for check in checks), checks
          print(
              f"Historical anchor: {len(historical)}; "
              f"Batch A anchor: {len(batch_a)}; "
              f"pre-retirement: {len(pre_retirement)}; aggregate: {len(checks)}"
          )
          PY

  platform:
    name: ${{ matrix.os }} platform gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable action

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Type-check workspace all targets
        run: cargo check --workspace --all-targets

      - name: Type-check expensive journey on Windows
        if: runner.os == 'Windows'
        run: cargo check -p forge-core-cli --test domain_pack_cli_e2e --features expensive-p6d-e2e

      - name: Test workspace
        run: cargo test --workspace

  expensive-journey:
    name: Linux P6d reference journey
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable action

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # This single test is the protocol-level reference journey. It is kept
      # out of the Linux/Windows platform matrix because duplicating it added
      # roughly an hour to every checkpoint without adding platform-specific
      # evidence. Platform jobs still compile every target and run every
      # non-expensive workspace test on both operating systems.
      - name: Run expensive P6d reference journey once
        run: cargo test -p forge-core-cli --test domain_pack_cli_e2e --features expensive-p6d-e2e p6d_workflow_journey::p6d_reference_pack_real_journey -- --exact

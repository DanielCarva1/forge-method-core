name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  quality:
    name: Linux quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check generated workspace layout
        run: python scripts/generate-workspace-layout.py --check

      - name: Check generated command surface docs
        run: cargo run -p forge-core-command-surface --example generate_command_surface_docs -- --check

      - name: Check generated workflow release foundation
        run: cargo run -p forge-core-decisions --example generate_workflow_release_foundation -- --check

      - name: Check generated workflow release registry
        run: cargo run -p forge-core-decisions --example generate_workflow_release_registry -- --check

      - name: Check generated core assurance behavioral evidence
        run: cargo run -p forge-core-decisions --example generate_workflow_core_assurance_evidence -- --check

      - name: Check generated core assurance candidate release
        run: cargo run -p forge-core-decisions --example generate_workflow_core_assurance_candidate -- --check

      - name: Check generated independently reviewed admission
        run: cargo run -p forge-core-decisions --example generate_workflow_core_assurance_admission -- --check

      - name: Check generated assurance operations behavioral evidence
        run: cargo run -p forge-core-decisions --example generate_workflow_assurance_operations_evidence -- --check

      - name: Check generated assurance operations candidate release
        run: cargo run -p forge-core-decisions --example generate_workflow_assurance_operations_candidate -- --check

      - name: Check generated assurance operations reviewed admission
        run: cargo run -p forge-core-decisions --example generate_workflow_assurance_operations_admission -- --check

      - name: Check formatting
        run: cargo fmt --all -- --check

      # clippy pedantic runs as `-D` (deny). Adding new pedantic warnings will
      # fail CI, which is intentional: each new lint must be either fixed or
      # accompanied by a documented #[allow] with a justification comment.
      - name: Clippy (pedantic, deny)
        run: cargo clippy --workspace --all-targets -- -D clippy::pedantic

      - name: Validate contracts
        run: cargo run -p forge-core-cli -- validate --root .

      - name: Regression anchors (139 historical, 156 aggregate)
        run: |
          cargo run --quiet -p forge-core-cli -- validate --root . --json 2>/dev/null > target/validate-summary.json
          python - <<'PY'
          import json
          with open("target/validate-summary.json", encoding="utf-8") as stream:
              summary = json.load(stream)
          checks = summary["checks"]
          historical = [
              check for check in checks
              if "assurance-operations" not in check["name"]
              and "assurance_operations" not in check["name"]
              and check["name"] != "workflow_release_v2_admission"
          ]
          assert summary["status"] == "passed", summary["diagnostics"]
          assert len(historical) == 139, len(historical)
          assert len(checks) == 156, len(checks)
          assert all(check["diagnostics"] == 0 for check in checks), checks
          print(f"Historical anchor: {len(historical)}; aggregate: {len(checks)}")
          PY

  platform:
    name: ${{ matrix.os }} cargo all-targets
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Type-check workspace all targets
        run: cargo check --workspace --all-targets

      - name: Test workspace
        run: cargo test --workspace

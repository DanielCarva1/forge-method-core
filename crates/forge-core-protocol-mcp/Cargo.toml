[package]
name = "forge-core-protocol-mcp"
version.workspace = true
edition.workspace = true

[dependencies]
forge-core-contracts = { path = "../forge-core-contracts" }
forge-core-cli = { path = "../forge-core-cli" }
# Local tokio features for stdio MCP server (io-util + macros for the
# async runtime + buffered stdin/AsyncBufReadExt). We do NOT modify the
# workspace tokio pin (`features = ["rt","time"]`) — other crates depend
# on it. Declare features locally here only.
tokio = { workspace = true, features = ["rt", "io-util", "macros"] }
rmcp = { workspace = true, features = ["transport-io"] }
serde.workspace = true
serde_json.workspace = true
serde_json_canonicalizer.workspace = true
ed25519-dalek.workspace = true
tracing.workspace = true

[dev-dependencies]
proptest.workspace = true
# For attestation sign/verify round-trip tests only. ed25519-dalek 2.x
# re-exports `rand_core` traits; `rand` provides `OsRng`. Dev-only — not part
# of the production build.
rand = "0.8"
